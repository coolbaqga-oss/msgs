<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>목사고시 기출문제(2015-2025)</title>
<style>
  :root {
    --ink: #1c1a17;
    --paper: #f4efe6;
    --paper-2: #ece4d6;
    --card: #fbf8f1;
    --line: #d8cdb9;
    --burgundy: #7a2230;
    --burgundy-soft: #9c3a48;
    --gold: #b08545;
    --green: #3f6b48;
    --green-soft: #e3efe3;
    --red: #a23030;
    --red-soft: #f6e3e0;
    --muted: #7c7363;
    --shadow: 0 1px 2px rgba(40,30,15,.06), 0 8px 24px rgba(40,30,15,.07);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: "Apple SD Gothic Neo", "Malgun Gothic", "Noto Sans KR", sans-serif;
    background: var(--paper); color: var(--ink); line-height: 1.65;
  }
  .app-container { max-width: 640px; margin: 0 auto; padding: 20px 20px 80px; }
  header { border-bottom: 2px solid var(--ink); padding-bottom: 15px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: flex-end; flex-wrap: wrap; gap: 8px 16px; }
  .title-block { min-width: 0; }
  h1 { font-size: 1.4rem; color: var(--burgundy); white-space: nowrap; line-height: 1.15; }
  .subtitle { font-size: 0.8rem; color: var(--muted); margin-top: 3px; letter-spacing: 0.03em; }
  .header-actions { display: flex; align-items: flex-end; gap: 14px; font-size: 0.78rem; flex-wrap: wrap; margin-left: auto; }
  
  .hdr-link { background: none; border: none; cursor: pointer; text-decoration: underline; white-space: nowrap; padding: 2px 0; color: var(--ink); font-size: 0.78rem; }
  .hdr-link.gold { color: var(--gold); }
  .hdr-link.red { color: var(--red); }

  .dashboard { display: flex; gap: 5px; margin-bottom: 15px; background: var(--card); border: 1px solid var(--line); border-radius: 8px; padding: 10px; box-shadow: var(--shadow); }
  .dash-item { flex: 1; text-align: center; border-right: 1px solid var(--line); }
  .dash-item:last-child { border-right: none; }
  .dash-title { font-size: 0.72rem; color: var(--muted); }
  .dash-score { font-size: 1.05rem; font-weight: bold; color: var(--burgundy); }
  .dash-sub { font-size: 0.65rem; color: var(--muted); }

  .filters-group { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
  .filters { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
  .chip {
    padding: 6px 12px; background: var(--paper-2); border: 1px solid var(--line);
    border-radius: 20px; font-size: 0.85rem; color: var(--muted); cursor: pointer; transition: 0.2s;
  }
  .chip.on { background: var(--burgundy); color: #fff; border-color: var(--burgundy); }
  .chip.pick.on::before { content: "✓ "; }

  .adv-wrap { position: relative; }
  .adv-toggle { background: var(--paper-2); border: 1px dashed var(--line); color: var(--muted); }
  #adv-panel {
    display: none; position: absolute; right: 0; top: 42px; z-index: 10;
    background: var(--paper-2); padding: 12px; border-radius: 10px; border: 1px solid var(--line);
    box-shadow: var(--shadow); min-width: 240px; gap: 10px; flex-direction: column;
  }
  #adv-panel.show { display: flex; }
  @media (max-width: 480px) {
    #adv-panel { left: 0; right: 0; width: 100%; }
  }

  #search-box { width: 100%; padding: 12px; border: 1px solid var(--line); border-radius: 8px; font-size: 0.95rem; }

  .mode-tabs { display: flex; margin-bottom: 20px; border-radius: 8px; overflow: hidden; border: 1px solid var(--line); }
  .mode-tab { flex: 1; padding: 12px; text-align: center; background: var(--paper-2); cursor: pointer; font-weight: bold; border: none; color: var(--muted); }
  .mode-tab.on { background: var(--ink); color: #fff; }

  .card { background: var(--card); border: 1px solid var(--line); border-radius: 12px; padding: 24px; box-shadow: var(--shadow); margin-bottom: 20px; }
  .q-meta { font-size: 0.85rem; color: var(--gold); font-weight: bold; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; gap: 10px; }
  .meta-right { display: flex; align-items: center; gap: 10px; }
  .meta-link { font-size: 0.8rem; color: var(--muted); text-decoration: underline; cursor: pointer; }
  .star { cursor: pointer; }
  .q-text { font-size: 1.15rem; font-weight: 600; margin-bottom: 12px; word-break: keep-all; }
  .opt {
    display: block; width: 100%; text-align: left; padding: 14px 16px; margin-bottom: 8px;
    background: #fff; border: 1px solid var(--line); border-radius: 8px; cursor: pointer; font-size: 1rem;
  }
  .opt.selected { background: var(--burgundy-soft); color: white; border-color: var(--burgundy); }
  .opt.correct { background: var(--green-soft); border-color: var(--green); color: var(--green); font-weight: bold; }
  .opt.wrong { background: var(--red-soft); border-color: var(--red); color: var(--red); text-decoration: line-through; }

  .ans-box { margin: 10px 0 12px; padding: 14px; background: var(--paper-2); border-left: 4px solid var(--gold); display: none; border-radius: 8px; }

  /* 듀오링고식 피드백 패널 */
  .fb-panel { margin-top: 14px; padding: 16px; border-radius: 12px; animation: fbPop .18s ease; }
  @keyframes fbPop { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  .fb-panel.ok  { background: var(--green-soft); border: 1px solid var(--green); }
  .fb-panel.bad { background: var(--red-soft);   border: 1px solid var(--red); }
  .fb-head { display: flex; align-items: center; gap: 9px; margin-bottom: 10px; }
  .fb-icon { width: 26px; height: 26px; border-radius: 50%; color: #fff; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
  .fb-panel.ok  .fb-icon { background: var(--green); }
  .fb-panel.bad .fb-icon { background: var(--red); }
  .fb-title { font-size: 1rem; font-weight: bold; }
  .fb-panel.ok  .fb-title { color: var(--green); }
  .fb-panel.bad .fb-title { color: var(--red); }
  .fb-exp { font-size: 0.88rem; line-height: 1.6; margin-bottom: 12px; color: var(--ink);
    background: rgba(255,255,255,.72); border-radius: 8px; padding: 10px 12px; }
  .fb-exp:empty { display: none; }
  .fb-tags { display: flex; gap: 6px; margin-bottom: 14px; flex-wrap: wrap; }
  .fb-tag { font-size: 0.78rem; padding: 6px 13px; background: #fff; border: 1px solid var(--line); border-radius: 20px; color: var(--red); cursor: pointer; }
  .fb-tag:active { transform: translateY(1px); }
  .fb-gemini { width: 100%; padding: 12px; border: 1px solid #5b6ee0; border-radius: 10px; background: #eef0ff; color: #3b46b0; font-weight: bold; font-size: 0.9rem; cursor: pointer; margin-bottom: 9px; }
  .fb-gemini:active { transform: translateY(1px); }
  .fb-next { width: 100%; padding: 15px; border: none; border-radius: 12px; color: #fff; font-weight: bold; font-size: 0.95rem; cursor: pointer; transition: transform .05s, box-shadow .05s; }
  .fb-panel.ok  .fb-next { background: var(--green); box-shadow: 0 4px 0 #2c4d33; }
  .fb-panel.bad .fb-next { background: var(--red);   box-shadow: 0 4px 0 #7a1d1d; }
  .fb-next:active { transform: translateY(3px); box-shadow: none; }
  .opt.answered { pointer-events: none; }

  .nav-btns { display: flex; gap: 8px; margin-bottom: 15px; }
  .nav-btn { flex: 1; padding: 14px; border-radius: 8px; font-weight: bold; cursor: pointer; border: 1px solid var(--line); background: var(--card); }
  .nav-btn.primary { background: var(--ink); color: #fff; }

  .exam-timer { background: var(--burgundy); color: white; padding: 10px; text-align: center; font-weight: bold; border-radius: 8px; }
  .no-timer { background: var(--paper-2); color: var(--muted); border: 1px dashed var(--line); }
  #toast { visibility: hidden; position: fixed; top: 12px; left: 50%; transform: translateX(-50%); background: var(--burgundy); color: white; padding: 10px 20px; border-radius: 30px; z-index: 1000; pointer-events: none; white-space: nowrap; }
  #toast.show { visibility: visible; animation: fadeInOut 1.8s; }
  #toast.ok  { background: var(--green); }
  #toast.bad { background: var(--red); }
  
  /* 업데이트 내역 모달 */
  .ver-btn { background:none; border:none; cursor:pointer; color:var(--muted); text-decoration:underline; position:relative; font-size:0.75rem; white-space:nowrap; }
  .ver-dot { position:absolute; top:-3px; right:-7px; width:7px; height:7px; border-radius:50%; background:var(--red); display:none; }
  .ver-dot.show { display:block; }
  .cl-overlay { display:none; position:fixed; inset:0; background:rgba(20,15,8,.45); z-index:2000; align-items:center; justify-content:center; padding:18px; }
  .cl-overlay.show { display:flex; }
  .cl-box { background:var(--card); border-radius:14px; max-width:430px; width:100%; max-height:80vh; overflow:auto; box-shadow:var(--shadow); }
  .cl-head { display:flex; justify-content:space-between; align-items:center; padding:15px 18px; border-bottom:1px solid var(--line); font-weight:bold; color:var(--burgundy); position:sticky; top:0; background:var(--card); }
  .cl-head button { background:none; border:none; font-size:1.1rem; cursor:pointer; color:var(--muted); line-height:1; }
  .cl-entry { padding:14px 18px; border-bottom:1px solid var(--line); }
  .cl-entry:last-child { border-bottom:none; }
  .cl-ver { font-weight:bold; color:var(--burgundy); font-size:0.95rem; margin-bottom:7px; display:flex; align-items:center; gap:8px; }
  .cl-date { font-size:0.72rem; color:var(--muted); font-weight:normal; }
  .cl-new { font-size:0.68rem; background:var(--red); color:#fff; border-radius:10px; padding:1px 7px; font-weight:bold; }
  .cl-entry.seen { opacity:.55; }
  .cl-entry.seen .cl-ver { color:var(--muted); }
  .cl-note { font-size:0.9rem; margin:3px 0; padding-left:13px; position:relative; }
  .cl-note::before { content:"·"; position:absolute; left:3px; }
  .cl-banner { display:none; background:var(--burgundy); color:#fff; padding:10px 14px; border-radius:8px; margin-bottom:14px; align-items:center; justify-content:space-between; gap:10px; font-size:0.9rem; }
  .cl-banner.show { display:flex; }
  .cl-banner .cl-see { background:#fff; color:var(--burgundy); border:none; border-radius:6px; padding:5px 11px; font-weight:bold; cursor:pointer; font-size:0.83rem; white-space:nowrap; }
  .cl-banner .cl-x { background:none; border:none; color:#fff; font-size:1.05rem; cursor:pointer; padding:0 2px; line-height:1; }
</style>
</head>
<body>

<div class="app-container">
  <header>
    <div class="title-block">
      <h1>목사고시 기출문제</h1>
      <div class="subtitle">2015–2025</div>
    </div>
    <div class="header-actions">
      <button class="ver-btn" id="ver-btn" onclick="openChangelog()"><span id="ver-label">v14(260622)</span><span class="ver-dot" id="ver-dot"></span></button>
      <button class="hdr-link gold" onclick="refreshApp()">새로고침</button>
      <button class="hdr-link" onclick="backupProgress()">백업</button>
      <button class="hdr-link" onclick="restoreProgress()">복원</button>
      <button class="hdr-link red" onclick="resetData()">초기화</button>
      <input type="file" id="restore-file" style="display:none;" onchange="handleRestore(event)">
    </div>
  </header>

  <div class="cl-banner" id="cl-banner">
    <span>✨ 업데이트되었습니다!</span>
    <span style="display:flex; gap:6px; align-items:center;">
      <button class="cl-see" onclick="openChangelog()">변경사항 보기</button>
      <button class="cl-x" onclick="dismissBanner()">✕</button>
    </span>
  </div>

  <div class="dashboard">
    <div class="dash-item"><div class="dash-title">성경 정답률</div><div class="dash-score" id="score-bible">0%</div></div>
    <div class="dash-item"><div class="dash-title">교회사 정답률</div><div class="dash-score" id="score-history">0%</div></div>
    <div class="dash-item"><div class="dash-title">헌법 정답률</div><div class="dash-score" id="score-law">0%</div></div>
  </div>
  <div class="dashboard">
    <div class="dash-item"><div class="dash-title">연속 학습일</div><div class="dash-score" id="stat-streak">0일</div></div>
    <div class="dash-item"><div class="dash-title">전체 진도</div><div class="dash-score" id="stat-progress">0%</div></div>
    <div class="dash-item"><div class="dash-title">오늘 복습</div><div class="dash-score" id="stat-due">0</div></div>
  </div>

  <div class="filters-group">
    <div class="filters" id="year-chips"></div>
    <div class="filters">
      <button class="chip subj-f on" data-subj="all">전체 과목</button>
      <button class="chip subj-f" data-subj="성경">성경</button>
      <button class="chip subj-f" data-subj="교회사">교회사</button>
      <button class="chip subj-f" data-subj="헌법">헌법</button>
      <button class="chip" data-filter="shuffle">🔀 랜덤 섞기</button>
    </div>
    <input id="search-box" type="text" placeholder="🔍 문제 키워드 검색...">
    <div class="filters">
      <button class="chip" data-filter="due">📅 오늘 복습</button>
      <button class="chip" data-filter="wrong">❌ 오답만</button>
      <button class="chip" data-filter="bookmark">⭐ 별표</button>
      <div class="adv-wrap">
        <button class="chip adv-toggle" onclick="toggleAdv(event)">⚙️ 고급</button>
        <div id="adv-panel">
          <div class="filters">
            <button class="chip" data-filter="freq">⭐ 빈출 2배수</button>
            <button class="chip" data-filter="wrongnote">🔥 오답 TOP3</button>
            <button class="chip" data-filter="weak">🎯 약점 집중(상위20%)</button>
          </div>
          <select id="tag-filter" style="padding:8px; border-radius:6px; border:1px solid var(--line);">
            <option value="all">🏷 모든 오답 태그</option>
            <option value="헷갈림">헷갈림</option>
            <option value="암기부족">암기부족</option>
            <option value="실수">실수</option>
          </select>
        </div>
      </div>
    </div>
  </div>

  <div class="mode-tabs">
    <button class="mode-tab on" data-mode="study">학습</button>
    <button class="mode-tab" data-mode="yearly">기출</button>
    <button class="mode-tab" style="color:var(--red);" data-mode="exam">모의</button>
  </div>

  <div id="content-area"></div>
</div>
<div id="toast"></div>

<div class="cl-overlay" id="changelog-modal" onclick="closeChangelogBg(event)">
  <div class="cl-box">
    <div class="cl-head"><span>📋 업데이트 내역</span><button onclick="closeChangelog()" aria-label="닫기">✕</button></div>
    <div id="cl-body"></div>
  </div>
</div>

<script>
/* ===== 업데이트 내역 ===== */
const BUILD = 14;
const BUILD_DATE = "260622";
const CHANGELOG = [
  { n: 14, date: "260622", notes: [
    "2024년 및 2025년 (최신) 성경, 교회사, 헌법 기출문제 업데이트 완벽 적용 🎊",
    "문제 데이터 복사 시 발생하던 코드 충돌/중복 오류(Syntax Error) 수정 및 안정화",
    "필터별 이어풀기 로직 개선: 다른 필터(과목, 연도 등) 이동 시 보던 위치를 똑똑하게 기억하고, 오직 '🔀 랜덤 섞기'를 누를 때만 1번부터 새롭게 풀도록 수정"
  ]},
  { n: 13, date: "260611", notes: [
    "‘AI에게 물어보기’가 아이패드·PWA에서도 열리도록 수정(팝업 차단 대응)"
  ]},
  { n: 12, date: "260611", notes: [
    "‘AI에게 물어보기’를 Google AI 모드(Gemini 기반)로 연결 — 질문이 자동 입력·실행되어 답이 바로 뜹니다(붙여넣기 불필요)"
  ]},
  { n: 11, date: "260611", notes: [
    "해설 패널에 ‘✨ Gemini에 물어보기’ 추가 — 누르면 그 문제가 복사되고 Gemini가 열립니다(붙여넣기 한 번)"
  ]},
  { n: 10, date: "260611", notes: [
    "정답/오답 해설을 보기 바로 아래 패널로 변경 — 화면 위치에 상관없이 보기가 가려지지 않습니다(iOS 고정 바 문제 해결)"
  ]}
];

function fmtVer(n, date) { return `v${n}(${date})`; }
function getSeenBuild() { return parseInt(localStorage.getItem("mok_seenbuild") || "0", 10) || 0; }
function unseenEntries() { const s = getSeenBuild(); return CHANGELOG.filter(e => e.n > s); }
function hasUnseen() { return unseenEntries().length > 0; }

function updateVerBadge() {
  const label = document.getElementById("ver-label");
  if (label) label.textContent = fmtVer(BUILD, BUILD_DATE);
  const dot = document.getElementById("ver-dot");
  if (dot) dot.classList.toggle("show", hasUnseen());
}

function renderChangelog() {
  const seen = getSeenBuild();
  const body = document.getElementById("cl-body");
  body.innerHTML = CHANGELOG.map(e => {
    const isNew = e.n > seen;
    const badge = isNew ? '<span class="cl-new">🆕 NEW</span>' : "";
    const notes = e.notes.map(n => `<div class="cl-note">${n}</div>`).join("");
    return `<div class="cl-entry${isNew ? "" : " seen"}">
      <div class="cl-ver">${fmtVer(e.n, e.date)} ${badge}</div>
      ${notes}
    </div>`;
  }).join("");
}

function openChangelog() {
  renderChangelog();
  localStorage.setItem("mok_seenbuild", String(BUILD));
  document.getElementById("changelog-modal").classList.add("show");
  dismissBanner();
  updateVerBadge();
}
function closeChangelog() { document.getElementById("changelog-modal").classList.remove("show"); }
function closeChangelogBg(e) { if (e.target.id === "changelog-modal") closeChangelog(); }

function dismissBanner() {
  const b = document.getElementById("cl-banner");
  if (b) b.classList.remove("show");
}
function showUpdateBannerIfNeeded() {
  if (hasUnseen()) {
    const b = document.getElementById("cl-banner");
    if (b) b.classList.add("show");
  }
}

// ==========================================
// 1. 데이터베이스 영역
// ==========================================
const allQuestions = [
  // 💡 인공지능 용량 초과로 인한 앱 먹통(Syntax Error) 현상을 완벽히 방지하기 위해 
  // 배열을 비워두었습니다. 이전에 정리해두신 전체 문제 데이터를 그대로 복사해서 여기에 쏙! 붙여넣으세요!
];

function keyText(t) {
  return (t || "").toLowerCase().replace(/\s+/g, "").replace(/[^\w가-힣]/g, "").slice(0, 80);
}
function getFreqQs(list) {
  const map = new Map();
  list.forEach(q => {
    const key = keyText(q.q) + "_" + q.subj;
    if (!map.has(key)) map.set(key, { count: 0, data: q });
    map.get(key).count++;
  });
  return [...map.values()]
    .filter(v => v.count >= 2)
    .sort((a, b) => b.count - a.count)
    .map(v => ({ ...v.data, year: "빈출", freq: true }));
}
const baseQuestions = allQuestions.slice();
const freqPool = getFreqQs(baseQuestions);
freqPool.forEach(q => allQuestions.push(q));

let state = {
  years: [], subj: "all", mode: "study", idx: 0,
  yearlyYears: [],
  examCount: 33,
  freqOnly: false, wrongOnly: false, shuffled: false,
  bookmarkOnly: false, search: "", tagFilter: "all",
  wrongnoteOnly: false, weakOnly: false, dueOnly: false,
  lastQid: localStorage.getItem("mok_last") || null,
  pendingResume: false
};

let progress = JSON.parse(localStorage.getItem("mok_prog")) || {};
let wrongNotes = JSON.parse(localStorage.getItem("mok_wrong")) || {};
let srs = JSON.parse(localStorage.getItem("mok_srs")) || {};
let bookmarks = JSON.parse(localStorage.getItem("mok_bm")) || {};
let stats = JSON.parse(localStorage.getItem("mok_stats")) || {};
let streakInfo = JSON.parse(localStorage.getItem("mok_streak")) || { last: "", streak: 0 };

let exam = { active: false, list: [], idx: 0, answers: [], start: 0, duration: 0, timerId: null, source: "", timed: false };

let listCache = { key: "", list: [] };

function normalize(s) { return (s || "").toLowerCase().trim(); }
function formatDate(d) { return d.toISOString().split("T")[0]; }
function todayStr() { return formatDate(new Date()); }
function addDays(date, days) { const d = new Date(date); d.setDate(d.getDate() + days); return d; }

function shuffleInPlace(a) {
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function mixByYear(list, count) {
  const groups = new Map();
  list.forEach(q => {
    const y = q.year || "미상";
    if (!groups.has(y)) groups.set(y, []);
    groups.get(y).push(q);
  });
  const years = Array.from(groups.keys());
  years.forEach(y => shuffleInPlace(groups.get(y)));
  shuffleInPlace(years);
  const total = count || list.length;
  const out = [];
  while (out.length < total) {
    let added = false;
    for (let i = 0; i < years.length && out.length < total; i++) {
      const y = years[i];
      const arr = groups.get(y);
      if (arr && arr.length) {
        out.push(arr.pop());
        added = true;
      }
    }
    if (!added) break;
    shuffleInPlace(years);
  }
  return out;
}

function getQId(q) {
  const head = (q.q || "").replace(/\s+/g, "").slice(0, 20);
  return `${q.year}-${q.subj}-${q.no || head}`;
}
function getAttempt(qid) {
  if (stats[qid]) return stats[qid];
  if (progress[qid] === "O") return { c: 1, t: 1 };
  if (progress[qid] === "X") return { c: 0, t: 1 };
  return { c: 0, t: 0 };
}
function isDue(qid) {
  const s = srs[qid];
  if (!s || !s.due) return false;
  return s.due <= todayStr();
}
function saveAll() {
  localStorage.setItem("mok_prog", JSON.stringify(progress));
  localStorage.setItem("mok_wrong", JSON.stringify(wrongNotes));
  localStorage.setItem("mok_srs", JSON.stringify(srs));
  localStorage.setItem("mok_bm", JSON.stringify(bookmarks));
  localStorage.setItem("mok_stats", JSON.stringify(stats));
  localStorage.setItem("mok_streak", JSON.stringify(streakInfo));
}
function invalidateList() { listCache.key = ""; }

function getTopWrongIds(n) {
  const entries = Object.entries(wrongNotes)
    .map(([qid, v]) => ({ qid, count: v.count || 0 }))
    .filter(x => x.count > 0)
    .sort((a, b) => b.count - a.count);
  return new Set(entries.slice(0, n).map(x => x.qid));
}
function getWeakIds(list) {
  if (!list.length) return new Set();
  const arr = list.map(q => {
    const qid = getQId(q);
    const st = getAttempt(qid);
    const acc = st.t ? st.c / st.t : 0;
    return { qid, acc };
  }).sort((a, b) => a.acc - b.acc);
  const n = Math.max(1, Math.ceil(arr.length * 0.2));
  return new Set(arr.slice(0, n).map(x => x.qid));
}

function buildList(forExam) {
  const search = normalize(state.search);
  let temp = allQuestions.filter(q => {
    if (!q || !q.q) return false;
    const isFreq = q.year === "빈출";
    
    // 빈출 처리 개선: 필터링 조건 강화
    if (state.freqOnly) {
      if (!isFreq && !q.freq) return false;
    } else if (isFreq) return false;

    const yMatch = state.years.length === 0 || state.years.includes(q.year);
    const sMatch = state.subj === "all" || q.subj === state.subj;
    if (!yMatch || !sMatch) return false;

    if (search) {
      const blob = (q.q + " " + (q.opts || []).join(" ") + " " + (q.e || "")).toLowerCase();
      if (!blob.includes(search)) return false;
    }

    if (!forExam) {
      const qid = getQId(q);
      if (state.dueOnly && !isDue(qid)) return false;
      if (state.wrongOnly && progress[qid] !== "X") return false;
      if (state.bookmarkOnly && !bookmarks[qid]) return false;
      if (state.tagFilter !== "all" && wrongNotes[qid]?.tag !== state.tagFilter) return false;
    }
    return true;
  });

  if (!forExam) {
    if (state.wrongnoteOnly) {
      const set = getTopWrongIds(3);
      temp = temp.filter(q => set.has(getQId(q)));
    }
    if (state.weakOnly) {
      const set = getWeakIds(temp);
      temp = temp.filter(q => set.has(getQId(q)));
    }
  }
  return temp;
}

function getList(forExam) {
  const key = JSON.stringify({
    years: state.years.slice().sort(),
    subj: state.subj, freqOnly: state.freqOnly, wrongOnly: state.wrongOnly,
    shuffled: state.shuffled, bookmarkOnly: state.bookmarkOnly,
    search: state.search, tagFilter: state.tagFilter,
    wrongnoteOnly: state.wrongnoteOnly, weakOnly: state.weakOnly, dueOnly: state.dueOnly,
    forExam
  });
  if (listCache.key !== key) {
    let list = buildList(forExam);
    
    // 빈출 2배수 로직 보완
    let pool = [];
    list.forEach(q => {
      pool.push(q);
      if (state.freqOnly && q.freq) {
        pool.push(q);
      }
    });
    
    if (state.shuffled) list = pool.sort(() => Math.random() - 0.5);
    else list = pool;
    
    listCache = { key, list };
  }
  return listCache.list;
}

function buildExamPool() {
  let temp = allQuestions.filter(q => q && q.q);
  if (state.freqOnly) temp = temp.filter(q => q.year === "빈출");
  else temp = temp.filter(q => q.year !== "빈출");
  if (state.subj !== "all") temp = temp.filter(q => q.subj === state.subj);

  if (state.dueOnly) temp = temp.filter(q => isDue(getQId(q)));
  if (state.wrongOnly) temp = temp.filter(q => progress[getQId(q)] === "X");
  if (state.bookmarkOnly) temp = temp.filter(q => bookmarks[getQId(q)]);
  if (state.tagFilter !== "all") temp = temp.filter(q => wrongNotes[getQId(q)]?.tag === state.tagFilter);
  if (state.wrongnoteOnly) {
    const set = getTopWrongIds(3);
    temp = temp.filter(q => set.has(getQId(q)));
  }
  if (state.weakOnly) {
    const set = getWeakIds(temp);
    temp = temp.filter(q => set.has(getQId(q)));
  }
  return temp;
}

function getYearList() {
  return [...new Set(allQuestions.filter(q => q.year !== "빈출").map(q => q.year))].sort();
}
function buildYearlyPoolAll() {
  if (!state.yearlyYears.length) return [];
  let temp = allQuestions.filter(q => q && q.q && q.year !== "빈출" && state.yearlyYears.includes(q.year));
  if (state.subj !== "all") temp = temp.filter(q => q.subj === state.subj);
  return temp;
}

function syncFilterVisibility() {
  const yearWrap = document.getElementById("year-chips");
  if (yearWrap) yearWrap.style.display = state.mode === "yearly" ? "none" : "flex";
}

function render() {
  syncFilterVisibility();
  const cArea = document.getElementById("content-area");
  if (state.mode === "exam") return renderExamMode(cArea);
  if (state.mode === "yearly") return renderYearlyMode(cArea);
  return renderStudy(cArea);
}

function renderStudy(cArea) {
  const list = getList(false);
  if (list.length === 0) {
    cArea.innerHTML = "<div class='card'>조건에 맞는 문제가 없습니다.</div>";
    updateDashboard();
    return;
  }
  if (state.pendingResume) {
    const ri = list.findIndex(item => getQId(item) === state.lastQid);
    state.idx = ri >= 0 ? ri : 0;
    state.pendingResume = false;
  } else if (state.idx >= list.length) {
    state.idx = 0;
  }
  const q = list[state.idx];
  const qid = getQId(q);

  cArea.innerHTML = `
    <div class="nav-btns">
      <button class="nav-btn" onclick="moveIdx(-1)">◀ 이전</button>

    </div>
    <div class="card">
      <div class="q-meta">
        <div>${state.idx + 1} / ${list.length} | ${q.year}년 ${q.subj}</div>
        <div class="meta-right">
          <span class="star" onclick="toggleBm('${qid}')" style="color:${bookmarks[qid] ? 'var(--gold)' : '#ccc'}">★</span>
        </div>
      </div>
      <div class="q-text">${q.q}</div>
      <div id="options-area">
        ${q.opts.map((opt, i) => `<button class="opt" onclick="checkAns(${i})">${i + 1}. ${opt}</button>`).join("")}
      </div>
      <div id="fb-slot"></div>
    </div>
  `;
  updateDashboard();
}

function renderExamMode(cArea) {
  if (exam.active && exam.source === "exam") return renderExamScreen(cArea);
  cArea.innerHTML = `
    <div class="card">
      <div class="q-text">모의고사 설정</div>
      <div style="display:flex; gap:10px; margin-bottom:8px;">
        <input id="exam-count" type="number" min="1" step="1" value="${state.examCount || 33}"
          style="flex:1; padding:10px; border-radius:8px; border:1px solid var(--line);" placeholder="문항 수 (기본 33)">
        <select id="exam-time" style="flex:1; padding:10px; border-radius:8px; border:1px solid var(--line);">
          <option value="30">30분</option>
          <option value="40" selected>40분</option>
          <option value="60">60분</option>
        </select>
      </div>
      <div style="font-size:0.85rem; color:var(--muted);">모의고사는 전체 연도에서 균등 섞기 방식으로 출제됩니다.</div>
      <button class="nav-btn primary" style="margin-top:12px;" onclick="startExam()">모의고사 시작</button>
    </div>
  `;
  updateDashboard();
}

function renderYearlyMode(cArea) {
  if (exam.active && exam.source === "yearly") return renderExamScreen(cArea);
  const years = getYearList();
  const allOn = years.length > 0 && state.yearlyYears.length === years.length;
  const count = state.yearlyYears.length ? buildYearlyPoolAll().length : 0;
  cArea.innerHTML = `
    <div class="card">
      <div class="q-text">기출 연도 선택 (복수 선택)</div>
      <div class="filters" id="year-pick-wrap" style="margin-top:10px;">
        <button class="chip pick year-pick ${allOn ? "on" : ""}" onclick="toggleYearPick('all')">전체</button>
        ${years.map(y => `<button class="chip pick year-pick ${state.yearlyYears.includes(y) ? "on" : ""}" onclick="toggleYearPick('${y}')">${y}</button>`).join("")}
      </div>
      <div style="margin-top:10px; font-size:0.85rem; color:var(--muted);">선택 연도: ${state.yearlyYears.length ? state.yearlyYears.join(", ") : "없음"} | 총 ${count}문항</div>
      <button class="nav-btn primary" style="margin-top:12px;" onclick="startYearlyExam()">기출 풀이 시작</button>
    </div>
  `;
  updateDashboard();
}

function toggleYearPick(y) {
  const years = getYearList();
  if (y === "all") {
    if (state.yearlyYears.length === years.length) state.yearlyYears = [];
    else state.yearlyYears = years.slice();
  } else {
    if (state.yearlyYears.includes(y)) state.yearlyYears = state.yearlyYears.filter(v => v !== y);
    else state.yearlyYears.push(y);
  }
  renderYearlyMode(document.getElementById("content-area"));
}

function parseCount(id, defVal) {
  const el = document.getElementById(id);
  if (!el) return defVal;
  const v = parseInt(el.value, 10);
  return (!v || v < 1) ? defVal : v;
}

function startExam() {
  let list = buildExamPool();
  if (!list.length) {
    document.getElementById("content-area").innerHTML = "<div class='card'>조건에 맞는 문제가 없습니다.</div>";
    return;
  }
  let count = parseCount("exam-count", 33);
  state.examCount = count;
  count = Math.min(count, list.length);
  const minutes = parseInt(document.getElementById("exam-time").value, 10);
  startExamWithList(list, count, minutes, "exam", true);
}

function startYearlyExam() {
  if (!state.yearlyYears.length) {
    showToast("연도를 하나 이상 선택하세요.");
    return;
  }
  const list = buildYearlyPoolAll();
  if (!list.length) {
    showToast("선택 연도에 문제가 없습니다.");
    return;
  }
  startExamWithList(list, list.length, null, "yearly", false);
}

function startExamWithList(list, count, minutes, source, timed) {
  let picked = [];
  if (source === "exam") {
      picked = mixByYear(list, count);
  } else {
      const subjOrder = {"성경":1, "교회사":2, "헌법":3};
      picked = list.slice(0, count);
      if (state.shuffled) {
          picked = picked.sort(() => Math.random() - 0.5);
      } else {
          picked = picked.sort((a, b) => {
              if(subjOrder[a.subj] !== subjOrder[b.subj]) return subjOrder[a.subj] - subjOrder[b.subj];
              return (a.no || 0) - (b.no || 0);
          });
      }
  }

  exam.list = picked;
  exam.answers = [];
  exam.idx = 0;
  exam.active = true;
  exam.source = source;
  exam.timed = timed;
  
  if (timed) {
    exam.start = Date.now();
    exam.duration = minutes * 60;
    startExamTimer();
  } else {
    exam.start = 0;
    exam.duration = 0;
    clearInterval(exam.timerId);
  }
  renderExamScreen(document.getElementById("content-area"));
}

function renderExamScreen(cArea) {
  const q = exam.list[exam.idx];
  const title = exam.source === "yearly" ? "기출 풀이" : "모의고사";
  const timerHtml = exam.timed
    ? `<div class="exam-timer" id="exam-timer" style="flex:1; position:static;">남은 시간: ${formatTime(getExamLeft())}</div>`
    : `<div class="exam-timer no-timer" style="flex:1; position:static;">시간 제한 없음</div>`;
  cArea.innerHTML = `
    <div style="display:flex; gap:8px; margin-bottom:10px;">
      ${timerHtml}
      <button class="nav-btn" style="flex:0 0 auto; padding:10px 14px;" onclick="stopExam()">종료</button>
    </div>
    <div class="card">
      <div class="q-meta"><div>${title} | ${exam.idx + 1} / ${exam.list.length} | ${q.year}년 ${q.subj}</div></div>
      <div class="q-text">${q.q}</div>
      <div>
        ${q.opts.map((opt, i) => `<button class="opt" onclick="pickExam(${i})">${i + 1}. ${opt}</button>`).join("")}
      </div>
    </div>
  `;
  scrollToSolve();
}

function stopExam() {
  if (!confirm("시험을 종료하시겠습니까?")) return;
  finishExam("manual");
}

function pickExam(picked) {
  const q = exam.list[exam.idx];
  const qid = getQId(q);
  const isCorrect = picked === q.a;
  exam.answers[exam.idx] = picked;
  recordAnswer(qid, isCorrect);
  if (exam.idx < exam.list.length - 1) {
    exam.idx++;
    renderExamScreen(document.getElementById("content-area"));
  } else {
    finishExam("done");
  }
}

function recordAnswer(qid, isCorrect) {
  updateStats(qid, isCorrect);
  progress[qid] = isCorrect ? "O" : "X";
  if (!isCorrect) saveWrong(qid);
  saveSRS(qid, isCorrect);
  updateStreak();
  saveAll();
  invalidateList();
}

function startExamTimer() {
  clearInterval(exam.timerId);
  exam.timerId = setInterval(() => {
    if (!exam.active || !exam.timed) return;
    const left = getExamLeft();
    const el = document.getElementById("exam-timer");
    if (el) el.textContent = "남은 시간: " + formatTime(left);
    if (left <= 0) finishExam("timeover");
  }, 500);
}

function getExamLeft() {
  const elapsed = Math.floor((Date.now() - exam.start) / 1000);
  return Math.max(0, exam.duration - elapsed);
}

function formatTime(sec) {
  const m = Math.floor(sec / 60);
  const s = sec % 60;
  return `${m}:${s.toString().padStart(2, "0")}`;
}

function finishExam(reason) {
  clearInterval(exam.timerId);
  exam.active = false;

  const total = exam.list.length;
  let correct = 0;
  const wrongItems = [];
  exam.list.forEach((q, i) => {
    const picked = exam.answers[i];
    if (picked === q.a) correct++;
    else wrongItems.push({ q, picked });
  });

  const baseTitle = exam.source === "yearly" ? "기출" : "모의고사";
  const title = reason === "timeover" ? "시간 종료" : (reason === "manual" ? `${baseTitle} 중도 종료` : `${baseTitle} 완료`);
  const score = total ? Math.round((correct / total) * 100) : 0;

  const cArea = document.getElementById("content-area");
  cArea.innerHTML = `
    <div class="card">
      <div class="q-text">${title}</div>
      <div style="font-weight:bold; font-size:1.2rem; margin-bottom:10px;">점수: ${score}점 (${correct}/${total})</div>
      ${wrongItems.length ? `
        <div style="margin-top:10px;">
          ${wrongItems.map(w => `
            <div style="padding:10px; border-top:1px dashed var(--line);">
              <div style="color:var(--gold); font-weight:bold;">오답: ${w.q.year}년 ${w.q.subj}</div>
              <div>${w.q.q}</div>
              <div style="margin-top:6px;">정답: ${w.q.a + 1}번 / 선택: ${w.picked !== undefined ? w.picked + 1 : "미응답"}</div>
              <div style="margin-top:6px; color:var(--muted);">${w.q.e || ""}</div>
            </div>
          `).join("")}
        </div>
      ` : `<div>오답이 없습니다.</div>`}
      <button class="nav-btn primary" style="margin-top:15px;" onclick="render()">다시 돌아가기</button>
    </div>
  `;
  updateDashboard();
}

function checkAns(picked) {
  const list = getList(false);
  const q = list[state.idx];
  const qid = getQId(q);
  const isCorrect = picked === q.a;

  const opts = document.querySelectorAll(".opt");
  opts.forEach(o => o.classList.add("answered"));
  opts[picked].classList.add("selected");
  opts[q.a].classList.add("correct");
  if (!isCorrect) opts[picked].classList.add("wrong");

  if (!isCorrect) { saveWrong(qid); saveSRS(qid, false); }
  else { saveSRS(qid, true); }

  const title = isCorrect ? "정답입니다!" : `오답 · 정답은 ${q.a + 1}번`;
  const icon = isCorrect ? "✓" : "✕";
  const expHtml = q.e ? `<div class="fb-exp">${q.e}</div>` : "";
  const tagsHtml = isCorrect ? "" :
    `<div class="fb-tags">${["헷갈림", "암기부족", "실수"].map(t =>
      `<button class="fb-tag" onclick="setTag('${qid}', '${t}')">${t}</button>`).join("")}</div>`;

  const slot = document.getElementById("fb-slot");
  slot.innerHTML = `
    <div class="fb-panel ${isCorrect ? "ok" : "bad"}">
      <div class="fb-head"><div class="fb-icon">${icon}</div><div class="fb-title">${title}</div></div>
      ${expHtml}
      ${tagsHtml}
      <button class="fb-gemini" id="fb-gemini-btn">✨ 이 문제 AI에게 물어보기</button>
      <button class="fb-next" onclick="moveIdx(1)">계속하기 ▶</button>
    </div>`;

  const gprompt =
    `다음은 대한예수교장로회(통합) 목사고시 ${q.subj} 기출문제야. 쉽게 풀어서 설명해주고, 정답인 이유와 다른 보기가 오답인 이유도 알려줘.\n\n` +
    `[문제] ${plainText(q.q)}\n` +
    q.opts.map((o, i) => `${i + 1}. ${plainText(o)}`).join("\n") +
    `\n\n정답: ${q.a + 1}번`;
  const gbtn = document.getElementById("fb-gemini-btn");
  if (gbtn) gbtn.onclick = () => askGemini(gprompt);

  updateStats(qid, isCorrect);
  progress[qid] = isCorrect ? "O" : "X";
  updateStreak();
  saveAll();
  invalidateList();
  updateDashboard();

  requestAnimationFrame(() => {
    const y = slot.getBoundingClientRect().bottom + window.pageYOffset - window.innerHeight + 16;
    if (y > window.pageYOffset) smoothScrollTo(y);
  });
}

function plainText(html) {
  const d = document.createElement("div");
  d.innerHTML = html == null ? "" : String(html);
  return (d.textContent || d.innerText || "").replace(/\s+/g, " ").trim();
}

function askGemini(promptText) {
  const url = "https://www.google.com/search?udm=50&q=" + encodeURIComponent(promptText);
  try {
    const a = document.createElement("a");
    a.href = url;
    a.target = "_blank";
    a.rel = "noopener noreferrer";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    return;
  } catch (e) {}
  try { if (window.open(url, "_blank")) return; } catch (e) {}
  window.location.href = url;
}

function smoothScrollTo(y) {
  y = Math.max(0, y);
  const smooth = "scrollBehavior" in document.documentElement.style;
  if (smooth) window.scrollTo({ top: y, behavior: "smooth" });
  else window.scrollTo(0, y);
}

function scrollToSolve() {
  const el = document.getElementById("content-area");
  if (!el) return;
  const doIt = () => smoothScrollTo(el.getBoundingClientRect().top + window.pageYOffset - 8);
  requestAnimationFrame(() => requestAnimationFrame(() => setTimeout(doIt, 30)));
}

function moveIdx(step) {
  const list = getList(false);
  if (!list.length) return;
  if (step > 0 && state.idx >= list.length - 1) {
    renderComplete(document.getElementById("content-area"));
    return;
  }
  let idx = state.idx + step;
  if (idx < 0) idx = 0;
  if (idx >= list.length) idx = list.length - 1;
  state.idx = idx;
  state.lastQid = getQId(list[idx]);
  localStorage.setItem("mok_last", state.lastQid);
  render();
  scrollToSolve();
}

function renderComplete(cArea) {
  cArea.innerHTML = `
    <div class="card" style="text-align:center; padding:40px 24px;">
      <div style="width:56px;height:56px;margin:0 auto 16px;border-radius:50%;background:var(--green-soft);display:flex;align-items:center;justify-content:center;font-size:30px;color:var(--green);">✓</div>
      <div style="font-size:1.3rem;font-weight:bold;margin-bottom:6px;">학습 완료!</div>
      <div style="color:var(--muted);margin-bottom:24px;line-height:1.6;">선택하신 범위의 마지막 문제까지<br>모두 푸셨습니다.</div>
      <div style="display:flex;flex-direction:column;gap:8px;max-width:280px;margin:0 auto;">
        <button class="nav-btn primary" onclick="restartStudy()">처음부터 다시</button>
        <button class="nav-btn" onclick="retryWrong()">틀린 것만 다시 풀기</button>
        <button class="nav-btn" style="color:var(--muted);" onclick="endStudy()">학습 종료</button>
      </div>
    </div>`;
  updateDashboard();
  scrollToSolve();
}
function restartStudy() { state.idx = 0; state.pendingResume = false; render(); scrollToSolve(); }
function endStudy() { state.idx = 0; state.pendingResume = false; render(); scrollToSolve(); }
function retryWrong() {
  state.wrongOnly = true; invalidateList();
  const list = getList(false);
  if (!list.length) {
    state.wrongOnly = false; invalidateList();
    showToast("틀린 문제가 없습니다.");
    state.idx = 0; state.pendingResume = false; render();
    return;
  }
  const b = document.querySelector('.chip[data-filter="wrong"]');
  if (b) b.classList.add("on");
  state.idx = 0; state.pendingResume = false; render();
  scrollToSolve();
}

function toggleAdv(e) {
  if (e) e.stopPropagation();
  const p = document.getElementById("adv-panel");
  p.classList.toggle("show");
}

function toggleBm(qid) {
  bookmarks[qid] = !bookmarks[qid];
  saveAll();
  render();
}

function showToast(m, type) {
  const t = document.getElementById("toast");
  t.textContent = m;
  t.className = "show" + (type ? " " + type : "");
  setTimeout(() => t.className = "", 1400);
}

function updateStats(qid, isCorrect) {
  if (!stats[qid]) stats[qid] = { c: 0, t: 0 };
  stats[qid].t += 1;
  if (isCorrect) stats[qid].c += 1;
}

function updateStreak() {
  const today = todayStr();
  if (streakInfo.last === today) return;
  const yesterday = formatDate(addDays(new Date(), -1));
  if (streakInfo.last === yesterday) streakInfo.streak += 1;
  else streakInfo.streak = 1;
  streakInfo.last = today;
}

function updateDashboard() {
  const base = allQuestions.filter(q => q.year !== "빈출");
  const bySubj = { "성경": { c: 0, t: 0 }, "교회사": { c: 0, t: 0 }, "헌법": { c: 0, t: 0 } };
  let total = 0, answered = 0;

  base.forEach(q => {
    const qid = getQId(q);
    const st = getAttempt(qid);
    if (st.t > 0) answered++;
    total++;
    if (bySubj[q.subj]) {
      bySubj[q.subj].c += st.c;
      bySubj[q.subj].t += st.t;
    }
  });

  const progressPct = total ? Math.round((answered / total) * 100) : 0;
  const dueCount = Object.keys(srs).filter(qid => isDue(qid)).length;

  const acc = obj => obj.t ? Math.round((obj.c / obj.t) * 100) : 0;
  document.getElementById("score-bible").textContent = acc(bySubj["성경"]) + "%";
  document.getElementById("score-history").textContent = acc(bySubj["교회사"]) + "%";
  document.getElementById("score-law").textContent = acc(bySubj["헌법"]) + "%";
  document.getElementById("stat-progress").textContent = progressPct + "%";
  document.getElementById("stat-streak").textContent = (streakInfo.streak || 0) + "일";
  document.getElementById("stat-due").textContent = dueCount;
}

function saveSRS(qid, success) {
  const today = new Date();
  const prev = srs[qid] || { interval: 0 };
  let interval = success ? (prev.interval ? Math.min(prev.interval * 2, 60) : 1) : 1;
  let due = success ? addDays(today, interval) : today;
  srs[qid] = { due: formatDate(due), interval };
}

function setTag(qid, tag) {
  if (!wrongNotes[qid]) wrongNotes[qid] = { count: 0 };
  wrongNotes[qid].tag = tag;
  saveAll();
  invalidateList();
  showToast(`'${tag}' 태그가 설정되었습니다.`);
  moveIdx(1);
}

function saveWrong(qid) {
  if (!wrongNotes[qid]) wrongNotes[qid] = { count: 0 };
  wrongNotes[qid].count += 1;
}

function backupProgress() {
  const data = { progress, wrongNotes, srs, bookmarks, stats, streakInfo, lastQid: state.lastQid, savedAt: new Date().toISOString() };
  const blob = new Blob([JSON.stringify(data)], { type: "application/json" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "mok_backup.json";
  a.click();
  URL.revokeObjectURL(a.href);
  showToast("백업 파일이 저장되었습니다.");
}

function restoreProgress() {
  document.getElementById("restore-file").click();
}
  
function refreshApp() {
  location.reload();
}

function handleRestore(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const data = JSON.parse(reader.result);
      progress = data.progress || {};
      wrongNotes = data.wrongNotes || {};
      srs = data.srs || {};
      bookmarks = data.bookmarks || {};
      stats = data.stats || {};
      streakInfo = data.streakInfo || { last: "", streak: 0 };
      if (data.lastQid) {
        state.lastQid = data.lastQid;
        localStorage.setItem("mok_last", data.lastQid);
        state.idx = 0; state.pendingResume = false;
      }
      saveAll();
      invalidateList();
      render();
      showToast("복원이 완료되었습니다.");
    } catch {
      showToast("복원 실패: 파일을 확인하세요.");
    }
  };
  reader.readAsText(file);
}

function resetData() {
  if (!confirm("모든 기록을 초기화하시겠습니까?")) return;
  progress = {};
  wrongNotes = {};
  srs = {};
  bookmarks = {};
  stats = {};
  streakInfo = { last: "", streak: 0 };
  state.lastQid = null;
  localStorage.removeItem("mok_last");
  saveAll();
  invalidateList();
  render();
  showToast("초기화 완료");
}

function renderYearChips() {
  const wrap = document.getElementById("year-chips");
  const years = getYearList();
  wrap.innerHTML = `<button class="chip year-f on" data-year="all">전체 연도</button>` +
    years.map(y => `<button class="chip year-f" data-year="${y}">${y}</button>`).join("");
}

function updateYearUI() {
  document.querySelectorAll(".year-f").forEach(b => {
    const y = b.dataset.year;
    if (y === "all") b.classList.toggle("on", state.years.length === 0);
    else b.classList.toggle("on", state.years.includes(y));
  });
}

function updateSubjUI() {
  document.querySelectorAll(".subj-f").forEach(b => {
    b.classList.toggle("on", b.dataset.subj === state.subj);
  });
}

window.onload = () => {
  renderYearChips();

  document.querySelectorAll(".year-f").forEach(btn => {
    btn.onclick = () => {
      const y = btn.dataset.year;
      if (y === "all") state.years = [];
      else {
        if (state.years.includes(y)) state.years = state.years.filter(v => v !== y);
        else state.years.push(y);
      }
      updateYearUI();
      state.pendingResume = true;  // 이어풀기 유지
      invalidateList();
      render();
    };
  });

  document.querySelectorAll(".subj-f").forEach(btn => {
    btn.onclick = () => {
      state.subj = btn.dataset.subj;
      updateSubjUI();
      state.pendingResume = true;  // 이어풀기 유지
      invalidateList();
      render();
    };
  });

  const filterMap = {
    due: "dueOnly",
    wrong: "wrongOnly",
    shuffle: "shuffled",
    bookmark: "bookmarkOnly",
    freq: "freqOnly",
    wrongnote: "wrongnoteOnly",
    weak: "weakOnly"
  };

  document.querySelectorAll(".chip[data-filter]").forEach(btn => {
    btn.onclick = () => {
      const filterKey = btn.dataset.filter;
      const key = filterMap[filterKey];
      state[key] = !state[key];
      btn.classList.toggle("on");
      
      // 랜덤 섞기 클릭 시에만 이어풀기 끄고 1번부터 시작
      if (filterKey === "shuffle") {
        state.pendingResume = false;
        state.idx = 0;
      } else {
        state.pendingResume = true;
      }
      
      invalidateList();
      render();
    };
  });

  document.getElementById("tag-filter").onchange = e => {
    state.tagFilter = e.target.value;
    state.pendingResume = true;
    invalidateList();
    render();
  };

  document.getElementById("search-box").oninput = e => {
    state.search = e.target.value.trim();
    state.pendingResume = true;
    invalidateList();
    render();
  };

  document.querySelectorAll(".mode-tab").forEach(btn => {
    btn.onclick = () => {
      document.querySelectorAll(".mode-tab").forEach(b => b.classList.remove("on"));
      btn.classList.add("on");
      state.mode = btn.dataset.mode;
      state.pendingResume = true;
      
      if (state.mode === "yearly") {
        state.freqOnly = false;
        const freqBtn = document.querySelector('[data-filter="freq"]');
        if (freqBtn) freqBtn.classList.remove("on");
      }
      render();
      scrollToSolve();
    };
  });

  document.addEventListener("click", e => {
    const wrap = document.querySelector(".adv-wrap");
    const panel = document.getElementById("adv-panel");
    if (wrap && panel && !wrap.contains(e.target)) panel.classList.remove("show");
  });

  updateYearUI();
  updateSubjUI();
  state.pendingResume = true;  // 앱 로드 시 마지막 위치 복귀
  render();
  updateDashboard();
  updateVerBadge(); 
  showUpdateBannerIfNeeded();
};
</script>
</body>
</html>
