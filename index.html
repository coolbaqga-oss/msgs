<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>목사고시 실전 CBT — 예장통합</title>
<style>
  :root {
    --ink: #1c1a17;
    --paper: #f4efe6;
    --paper-2: #ece4d6;
    --card: #fbf8f1;
    --line: #d8cdb9;
    --burgundy: #7a2230;
    --burgundy-soft: #9c3a48;
    --gold: #b08545;
    --green: #3f6b48;
    --green-soft: #e3efe3;
    --red: #a23030;
    --red-soft: #f6e3e0;
    --muted: #7c7363;
    --shadow: 0 1px 2px rgba(40,30,15,.06), 0 8px 24px rgba(40,30,15,.07);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { -webkit-text-size-adjust: 100%; }
  body {
    font-family: "Apple SD Gothic Neo", "Malgun Gothic", "Noto Sans KR", sans-serif;
    background: var(--paper);
    color: var(--ink);
    line-height: 1.65;
    letter-spacing: -0.01em;
  }
  .app-container {
    max-width: 640px;
    margin: 0 auto;
    padding: 20px;
    padding-bottom: 80px;
  }
  header {
    border-bottom: 2px solid var(--ink);
    padding-bottom: 15px;
    margin-bottom: 15px;
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
  }
  h1 { font-size: 1.5rem; color: var(--burgundy); letter-spacing: -0.03em; margin-bottom: 5px;}
  
  /* 과목별 대시보드 */
  .dashboard {
    display: flex; gap: 5px; margin-bottom: 20px;
    background: var(--card); border: 1px solid var(--line);
    border-radius: 8px; padding: 10px; box-shadow: var(--shadow);
  }
  .dash-item {
    flex: 1; text-align: center; border-right: 1px solid var(--line);
  }
  .dash-item:last-child { border-right: none; }
  .dash-title { font-size: 0.75rem; color: var(--muted); }
  .dash-score { font-size: 1.1rem; font-weight: bold; color: var(--burgundy); }
  
  .filters {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 20px;
  }
  .chip {
    padding: 6px 12px;
    background: var(--paper-2);
    border: 1px solid var(--line);
    border-radius: 20px;
    font-size: 0.9rem;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s;
  }
  .chip.on {
    background: var(--burgundy);
    color: #fff;
    border-color: var(--burgundy);
  }
  
  .mode-tab {
    flex: 1;
    padding: 10px;
    text-align: center;
    background: var(--paper-2);
    border: 1px solid var(--line);
    cursor: pointer;
    font-weight: bold;
    color: var(--muted);
  }
  .mode-tab:first-child { border-radius: 8px 0 0 8px; }
  .mode-tab:last-child { border-radius: 0 8px 8px 0; }
  .mode-tab.on {
    background: var(--ink);
    color: #fff;
    border-color: var(--ink);
  }

  /* 카드 디자인 */
  .card {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 24px;
    box-shadow: var(--shadow);
    margin-bottom: 20px;
  }
  .q-meta { font-size: 0.85rem; color: var(--gold); font-weight: bold; margin-bottom: 10px; }
  .q-text { font-size: 1.2rem; font-weight: 600; margin-bottom: 20px; word-break: keep-all; }
  
  .options { display: flex; flex-direction: column; gap: 10px; }
  .opt {
    padding: 14px 16px;
    background: #fff;
    border: 1px solid var(--line);
    border-radius: 8px;
    cursor: pointer;
    transition: 0.2s;
    font-size: 1.05rem;
  }
  .opt:hover { border-color: var(--gold); background: var(--paper-2); }
  .opt.correct { background: var(--green-soft); border-color: var(--green); color: var(--green); font-weight: bold; }
  .opt.wrong { background: var(--red-soft); border-color: var(--red); color: var(--red); text-decoration: line-through; }
  .opt.dim { opacity: 0.5; cursor: not-allowed; }
  .opt.selected { background: var(--burgundy-soft); color: white; border-color: var(--burgundy); }
  
  .ans-box {
    margin-top: 20px;
    padding: 16px;
    background: var(--paper-2);
    border-left: 4px solid var(--gold);
    border-radius: 0 8px 8px 0;
    font-size: 0.95rem;
    display: none;
    animation: fadeIn 0.3s;
  }
  
  /* 50:50 듀얼 버튼 */
  .nav-btns { display: flex; gap: 10px; margin-top: 20px; }
  .nav-btn {
    flex: 1;
    padding: 14px;
    background: var(--card);
    color: var(--ink);
    border: 1px solid var(--line);
    border-radius: 8px;
    font-size: 1.05rem;
    font-weight: bold;
    cursor: pointer;
    transition: 0.2s;
  }
  .nav-btn.primary { background: var(--ink); color: #fff; border-color: var(--ink); }
  .nav-btn.primary:hover { background: var(--burgundy); border-color: var(--burgundy); }
  .nav-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* 시험모드 전용 CSS */
  .exam-timer {
    background: var(--burgundy);
    color: white;
    padding: 10px;
    text-align: center;
    font-size: 1.2rem;
    font-weight: bold;
    border-radius: 8px;
    margin-bottom: 20px;
    position: sticky;
    top: 10px;
    z-index: 100;
    box-shadow: var(--shadow);
  }
  .exam-submit-btn {
    display: block;
    width: 100%;
    padding: 15px;
    background: var(--ink);
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 1.1rem;
    font-weight: bold;
    margin-top: 30px;
    margin-bottom: 40px;
    cursor: pointer;
  }
  .exam-result-box {
    background: var(--card);
    border: 2px solid var(--burgundy);
    padding: 20px;
    border-radius: 8px;
    text-align: center;
    margin-bottom: 20px;
  }
  .wrong-badge {
    display: inline-block;
    background: var(--red-soft);
    color: var(--red);
    padding: 2px 8px;
    border-radius: 12px;
    font-size: 0.8rem;
    margin-left: 10px;
  }

  /* 토스트 알림 */
  #toast {
    visibility: hidden;
    min-width: 250px;
    background-color: var(--burgundy);
    color: #fff;
    text-align: center;
    border-radius: 8px;
    padding: 16px;
    position: fixed;
    z-index: 1000;
    left: 50%;
    bottom: 30px;
    transform: translateX(-50%);
    font-size: 0.95rem;
    box-shadow: var(--shadow);
  }
  #toast.show {
    visibility: visible;
    animation: fadein 0.5s, fadeout 0.5s 2.5s;
  }
  @keyframes fadein { from { bottom: 0; opacity: 0; } to { bottom: 30px; opacity: 1; } }
  @keyframes fadeout { from { bottom: 30px; opacity: 1; } to { bottom: 0; opacity: 0; } }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>

<div class="app-container">
  <header>
    <div>
      <div class="kicker">대한예수교장로회 · 통합</div>
      <h1>목사고시 실전 CBT</h1>
    </div>
    <button id="reset" style="background:transparent; border:none; color:var(--muted); text-decoration:underline; cursor:pointer;">기록 초기화</button>
  </header>

  <!-- 과목별 정답률 대시보드 -->
  <div class="dashboard">
    <div class="dash-item"><div class="dash-title">성경 정답률</div><div class="dash-score" id="score-bible">0%</div></div>
    <div class="dash-item"><div class="dash-title">교회사 정답률</div><div class="dash-score" id="score-history">0%</div></div>
    <div class="dash-item"><div class="dash-title">헌법 정답률</div><div class="dash-score" id="score-law">0%</div></div>
  </div>

  <!-- 필터 옵션 -->
  <div class="filters">
    <button class="chip year-f on" data-year="all">전체 연도</button>
    <button class="chip year-f" data-year="2015">2015 기출</button>
    <button class="chip year-f" data-year="2016">2016 기출</button>
    <button class="chip year-f" data-year="2017">2017 기출</button>
    <button class="chip year-f" data-year="2018">2018 기출</button>
    <button class="chip year-f" data-year="2019">2019 기출</button>
    <button class="chip year-f" data-year="2020">2020 기출</button>
    <button class="chip year-f" data-year="2021">2021 기출</button>
    <button class="chip year-f" data-year="2022">2022 기출</button>
    <button class="chip year-f" data-year="2023">2023 기출</button>
    <button class="chip year-f" data-year="2024">2024 기출</button>
    <button class="chip year-f" data-year="2025">2025 기출</button>
    
    <div style="width:100%; height:4px;"></div>
    
    <button class="chip subj-f on" data-subj="all">전체 과목</button>
    <button class="chip subj-f" data-subj="성경">성경</button>
    <button class="chip subj-f" data-subj="교회사">교회사</button>
    <button class="chip subj-f" data-subj="헌법">헌법</button>
    
    <div style="width:100%; height:4px;"></div>
    
    <button class="chip" data-filter="freq">⭐ 빈출 2배수</button>
    <button class="chip" data-filter="wrong">내가 틀린 문제</button>
    <button class="chip" data-filter="shuffle">🔀 랜덤 섞기</button>
    <button class="chip" style="border-color:var(--burgundy); color:var(--burgundy); font-weight:bold;" data-filter="wrongnote">🔥 약점 TOP(3회 이상)</button>
  </div>

  <!-- ✨ 카테고리(모드) 3분할 -->
  <div class="filters" style="display:flex; margin-bottom:20px;">
    <button class="mode-tab on" data-mode="study">학습 모드</button>
    <button class="mode-tab" data-mode="yearly">📚 연도별 기출</button>
    <button class="mode-tab" style="color:var(--red);" data-mode="exam">⏳ 실전 모의고사</button>
  </div>

  <!-- 콘텐츠 렌더링 영역 -->
  <div id="content-area"></div>
</div>

<!-- 토스트 알림창 -->
<div id="toast"></div>

<script>
// ==========================================
// 1. 데이터베이스 영역
// ==========================================
const allQuestions = [
  // =========================================================================
  // 💡 여기에 기존에 가지고 계신 기출문제 데이터를 그대로 복사해서 붙여넣으세요!
  // (렌더링 시간 단축과 에러 방지를 위해 배열을 비워두었습니다)
  // =========================================================================
];

function keyText(t) {
  return (t || "").toLowerCase().replace(/\s+/g, "").replace(/[^\w가-힣]/g, "").slice(0, 80);
}
function getFreqQs(list) {
  const map = new Map();
  list.forEach(q => {
    const key = keyText(q.q) + "_" + q.subj;
    if (!map.has(key)) map.set(key, { count: 0, data: q });
    map.get(key).count++;
  });
  return [...map.values()]
    .filter(v => v.count >= 2)
    .sort((a, b) => b.count - a.count)
    .map(v => ({ ...v.data, year: "빈출" }));
}
const baseQuestions = allQuestions.slice();
const freqPool = getFreqQs(baseQuestions);
freqPool.forEach(q => allQuestions.push(q));

// ==========================================
// 2. 상태 및 로컬 스토리지 관리 (✨ 다중 책갈피 적용)
// ==========================================
let state = {
  year: 'all', 
  subj: 'all',
  mode: 'study', // 'study', 'yearly', 'exam'
  idx: 0,
  freqOnly: false,
  wrongOnly: false,
  shuffled: false,
  wrongnoteOnly: false,
  pendingResume: false // 이어풀기 여부
};

let progress = JSON.parse(localStorage.getItem("moksagosi_prog")) || {};
let wrongNotes = JSON.parse(localStorage.getItem("wrongNotes")) || {};
let srs = JSON.parse(localStorage.getItem("mok_srs")) || {};
let bookmarks = JSON.parse(localStorage.getItem("mok_bm")) || {};
let stats = JSON.parse(localStorage.getItem("mok_stats")) || {};

// ✨ 필터 조합별로 위치를 기억하는 다중 책갈피 객체!
let lastQids = JSON.parse(localStorage.getItem("mok_last_qids")) || {};

let list = [];
let showAns = false;
let listCache = { key: "", list: [] };

// 모의고사/연도별기출 공용 데이터 객체
let examData = { active: false, finished: false, isYearly: false, list: [], answers: [], timeLeft: 1200, timerId: null };

const getQId = (q) => `${q.year}-${q.subj}-${q.no || q.q.slice(0, 10)}`;

function save() {
  localStorage.setItem("moksagosi_prog", JSON.stringify(progress));
}

// ==========================================
// 3. UI 렌더링 및 필터링 로직
// ==========================================
function render() {
  // 모드별 분기
  if (state.mode === 'yearly') return renderYearly();
  if (state.mode === 'exam') return renderExam();

  // --- 이하 학습 모드(study) 로직 ---
  const cArea = document.getElementById("content-area");
  cArea.innerHTML = "";
  showAns = false;

  // 캐시 키(현재 필터 조합) 생성
  const filterKey = JSON.stringify({
    year: state.year, subj: state.subj, freqOnly: state.freqOnly, 
    wrongOnly: state.wrongOnly, shuffled: state.shuffled, wrongnoteOnly: state.wrongnoteOnly
  });

  // 필터링 적용
  if (listCache.key !== filterKey) {
      let tempList = allQuestions.filter(q => {
        if (!state.freqOnly && state.year !== 'all' && q.year !== state.year && q.year !== '빈출') return false;
        if (state.freqOnly && q.year !== '빈출') return false;
        if (state.subj !== 'all' && q.subj !== state.subj) return false;
        
        if (state.wrongOnly) {
          const rec = progress[getQId(q)];
          if (!rec || rec === 'O') return false;
        }
        if (state.wrongnoteOnly) {
          if (!wrongNotes[getQId(q)] || wrongNotes[getQId(q)].count < 3) return false;
        }
        return true;
      });

      // 셔플 및 빈출 2배수 적용 (학습 모드)
      if (state.shuffled) {
        let pool = [];
        tempList.forEach(q => {
          pool.push(q);
          if (state.freqOnly && q.year === '빈출') pool.push(q);
        });
        tempList = pool.sort(() => Math.random() - 0.5);
      }
      
      listCache = { key: filterKey, list: tempList };
  }
  
  list = listCache.list;
  updateDashboard();

  if (list.length === 0) {
    cArea.innerHTML = `<div class="card" style="text-align:center; padding:40px;">조건에 맞는 문제가 없습니다.</div>`;
    return;
  }
  
  // ✨ 다중 책갈피 이어풀기 로직 적용
  if (state.pendingResume) {
    const savedQid = lastQids[filterKey]; // 현재 필터 조합에 해당하는 책갈피 가져오기
    const ri = list.findIndex(item => getQId(item) === savedQid);
    state.idx = ri >= 0 ? ri : 0;
    state.pendingResume = false;
  } else if (state.idx >= list.length) {
    state.idx = 0;
  }

  // 현재 보고 있는 문제의 위치를 책갈피에 저장
  const q = list[state.idx];
  lastQids[filterKey] = getQId(q);
  localStorage.setItem("mok_last_qids", JSON.stringify(lastQids));

  renderStudy(cArea, q);
}

// 과목별 정답률 계산
function updateDashboard() {
  let stats = { '성경': { t: 0, c: 0 }, '교회사': { t: 0, c: 0 }, '헌법': { t: 0, c: 0 } };
  
  allQuestions.forEach(q => {
    const qid = getQId(q);
    if (progress[qid] === 'O' || progress[qid] === 'X') {
      if (stats[q.subj]) {
          stats[q.subj].t++;
          if (progress[qid] === 'O') stats[q.subj].c++;
      }
    }
  });

  ['성경', '교회사', '헌법'].forEach(subj => {
    const el = document.getElementById(`score-${subj === '성경' ? 'bible' : subj === '교회사' ? 'history' : 'law'}`);
    if (el) {
      const percent = stats[subj].t === 0 ? 0 : Math.round((stats[subj].c / stats[subj].t) * 100);
      el.textContent = `${percent}%`;
    }
  });
}

function showToast(msg) {
  const x = document.getElementById("toast");
  x.innerHTML = msg;
  x.className = "show";
  setTimeout(() => { x.className = x.className.replace("show", ""); }, 3000);
}

function scrollToQuestion() {
  const el = document.querySelector('.card');
  if (el) {
    const y = el.getBoundingClientRect().top + window.pageYOffset - 20;
    window.scrollTo({ top: y < 0 ? 0 : y, behavior: 'auto' });
  }
}

// ==========================================
// [학습 모드] 렌더링
// ==========================================
function renderStudy(cArea, q) {
  const qid = getQId(q);
  const rec = progress[qid];
  
  let html = `
    <div class="card">
      <div class="q-meta">${state.idx + 1} / ${list.length} &nbsp;|&nbsp; ${q.year}년 ${q.subj} ${q.no ? q.no+'번' : ''}</div>
      <div class="q-text">Q. ${q.q}</div>
      <div class="options">
  `;
  
  q.opts.forEach((opt, i) => {
    html += `<div class="opt" id="opt-${i}">${i + 1}. ${opt}</div>`;
  });
  
  html += `
      </div>
      <div class="ans-box" id="ans-box">
        <strong>정답: ${q.a + 1}번</strong><br><br>
        ${q.e}
      </div>
    </div>
    <div class="nav-btns">
      <button class="nav-btn" id="prev-btn">◀ 이전</button>
      <button class="nav-btn primary" id="next-btn">다음 ▶</button>
    </div>
  `;
  
  cArea.innerHTML = html;
  
  // 마킹 정보 표시
  if (rec === 'O') document.querySelector('.q-meta').innerHTML += ` <span style="color:var(--green)">[맞힘]</span>`;
  if (rec === 'X') document.querySelector('.q-meta').innerHTML += ` <span style="color:var(--red)">[틀림]</span>`;
  
  q.opts.forEach((opt, i) => {
    document.getElementById(`opt-${i}`).onclick = () => {
      if (showAns) return;
      showAns = true;
      
      if (i === q.a) {
        progress[qid] = 'O';
      } else {
        progress[qid] = 'X';
        
        // 오답 노트 카운트 증가
        if (!wrongNotes[qid]) wrongNotes[qid] = { count: 0, last: '' };
        wrongNotes[qid].count++;
        wrongNotes[qid].last = new Date().toISOString().split('T')[0];
        localStorage.setItem("wrongNotes", JSON.stringify(wrongNotes));
        
        // ✨ 에빙하우스 오답 자동 반복 (틀리면 맨 뒤에 다시 추가)
        list.push(q);
        showToast("오답 노트에 기록되었습니다.<br>이 문제는 뒤에서 다시 출제됩니다.");
      }
      save();
      updateDashboard();
      
      document.getElementById(`opt-${q.a}`).classList.add("correct");
      if (i !== q.a) document.getElementById(`opt-${i}`).classList.add("wrong");
      document.getElementById("ans-box").style.display = "block";
    };
  });
  
  document.getElementById("prev-btn").onclick = () => { state.idx--; render(); scrollToQuestion(); };
  document.getElementById("next-btn").onclick = () => { state.idx++; render(); scrollToQuestion(); };
}

// ==========================================
// [연도별 기출] 렌더링
// ==========================================
function renderYearly() {
  const cArea = document.getElementById("content-area");
  cArea.innerHTML = "";

  if (!examData.active && !examData.finished) {
    if (state.year === 'all') {
        cArea.innerHTML = `
        <div class="card" style="text-align:center; padding:40px 20px;">
            <h2 style="color:var(--burgundy); margin-bottom:15px;">📚 연도별 기출 풀기</h2>
            <p>상단 필터에서 풀고자 하는 <b>[연도]</b>와 <b>[과목]</b>을 선택해 주세요.</p>
            <p style="color:var(--muted); font-size:0.9rem; margin-top:10px;">(예: 2025 기출 / 전체 과목)</p>
        </div>`;
        return;
    }

    let currentList = allQuestions.filter(q => q.year === state.year && (state.subj === 'all' || q.subj === state.subj));
    
    cArea.innerHTML = `
      <div class="card" style="text-align:center; padding:40px 20px;">
        <h2 style="color:var(--burgundy); margin-bottom:15px;">📚 ${state.year}년도 기출 풀기</h2>
        <p>선택하신 [<b>${state.subj === 'all' ? '전체 과목' : state.subj}</b>] 총 <b>${currentList.length}문제</b>를<br>실제 시험지 번호 순서대로 풀어봅니다.</p>
        <p style="color:var(--muted); font-size:0.9rem; margin-top:10px;">(본 모드는 제한 시간이 없습니다.)</p>
        <button onclick="startExamMode(true)" style="margin-top:30px; padding:12px 24px; background:var(--ink); color:#fff; border:none; border-radius:8px; font-size:1.1rem; cursor:pointer;">기출 풀기 시작</button>
      </div>`;
    return;
  }

  drawExamUI(cArea, true); // true = yearly mode
}

// ==========================================
// [실전 모의고사] 렌더링 (랜덤 33문제)
// ==========================================
function renderExam() {
  const cArea = document.getElementById("content-area");
  cArea.innerHTML = "";

  if (!examData.active && !examData.finished) {
    let subjText = state.subj === 'all' ? '전체 과목 믹스' : state.subj;
    cArea.innerHTML = `
      <div class="card" style="text-align:center; padding:40px 20px;">
        <h2 style="color:var(--red); margin-bottom:15px;">⏳ 실전 모의고사 (33제)</h2>
        <p>선택된 필터 내에서 [<b>${subjText}</b>]<br><b>랜덤 33문제</b>가 섞여서 출제됩니다.</p>
        <p style="color:var(--muted); font-size:0.9rem; margin-top:10px;">실제 목사고시와 동일하게 20분 타이머가 작동합니다.</p>
        <button onclick="startExamMode(false)" style="margin-top:30px; padding:12px 24px; background:var(--burgundy); color:#fff; border:none; border-radius:8px; font-size:1.1rem; cursor:pointer;">모의고사 시작</button>
      </div>`;
    return;
  }

  drawExamUI(cArea, false); // false = random exam mode
}

// 공통 시험/모의고사 UI 그리기 함수
function drawExamUI(cArea, isYearly) {
  if (examData.finished) {
    let score = 0;
    examData.list.forEach((q, idx) => { if (examData.answers[idx] === q.a) score++; });
    const finalScore = Math.round((score / examData.list.length) * 100);

    let html = `
      <div class="exam-result-box">
        <h2>${isYearly ? state.year+'년 기출 결과' : '모의고사 결과'}</h2>
        <h1 style="color:var(--burgundy); font-size:3rem; margin:10px 0;">${finalScore}점</h1>
        <p>${examData.list.length}문제 중 ${score}문제 정답</p>
        <button onclick="resetExamMode()" style="margin-top:15px; padding:8px 16px; border:1px solid var(--burgundy); background:transparent; color:var(--burgundy); border-radius:4px; cursor:pointer;">종료하고 돌아가기</button>
      </div>
      <h3 style="margin-bottom:10px; color:var(--red);">틀린 문제 오답 노트</h3>
    `;

    let hasWrong = false;
    examData.list.forEach((q, idx) => {
      if (examData.answers[idx] !== q.a) {
        hasWrong = true;
        html += `
          <div class="card" style="margin-top:15px; border-left:4px solid var(--red);">
            <div class="q-meta">${q.year}년 ${q.subj} ${q.no ? q.no+'번' : ''} <span class="wrong-badge">내가 고른 답: ${examData.answers[idx] !== undefined ? examData.answers[idx]+1+'번' : '미체크'}</span></div>
            <div class="q-text" style="font-size:1rem; margin-bottom:10px;">Q. ${q.q}</div>
            <div class="ans-box" style="margin-top:10px; display:block; padding:10px;">
              <strong>정답: ${q.a + 1}번</strong><br>
              ${q.e}
            </div>
          </div>`;
      }
    });
    
    if(!hasWrong) html += `<div class="card" style="text-align:center; font-weight:bold;">🎉 완벽합니다! 모두 맞았습니다.</div>`;
    
    cArea.innerHTML = html;
    window.scrollTo(0, 0);
    return;
  }

  // 문제 푸는 화면 (타이머 유무)
  let timerHtml = "";
  if (!isYearly) {
      const min = Math.floor(examData.timeLeft / 60).toString().padStart(2, '0');
      const sec = (examData.timeLeft % 60).toString().padStart(2, '0');
      timerHtml = `<div class="exam-timer">남은 시간 - ${min}:${sec}</div>`;
  } else {
      timerHtml = `<div class="exam-timer" style="background:var(--ink);">📚 ${state.year}년 기출 풀이 (총 ${examData.list.length}문제)</div>`;
  }
  
  let html = timerHtml;
  
  examData.list.forEach((q, qIndex) => {
    html += `
      <div class="card" style="margin-bottom:20px; padding:20px;">
        <div class="q-meta">${qIndex + 1}번. (${q.year} ${q.subj} ${q.no ? q.no+'번' : ''})</div>
        <div class="q-text" style="font-size:1.1rem;">${q.q}</div>
        <div class="options">
          ${q.opts.map((opt, i) => `
            <div class="opt" 
                 onclick="markExamAnswer(${qIndex}, ${i})" 
                 style="cursor:pointer; padding:10px; border:1px solid var(--line); margin-bottom:5px; border-radius:4px; ${examData.answers[qIndex] === i ? 'background:var(--burgundy-soft); color:white; border-color:var(--burgundy);' : ''}">
              ${i + 1}. ${opt}
            </div>
          `).join('')}
        </div>
      </div>`;
  });

  html += `<button class="exam-submit-btn" onclick="submitExamMode()">답안 제출 및 채점하기</button>`;
  cArea.innerHTML = html;
}

// 시험 시작 컨트롤러
function startExamMode(isYearly) {
  let pool = [];

  if (isYearly) {
      // 연도별: 선택 연도/과목에 맞춰 기출 번호(no) 순서대로 정렬
      const subjOrder = {"성경":1, "교회사":2, "헌법":3};
      let currentList = allQuestions.filter(q => q.year === state.year && (state.subj === 'all' || q.subj === state.subj));
      
      // ✨ 셔플 옵션이 켜져 있으면 순서를 랜덤으로 섞음
      if (state.shuffled) {
          pool = currentList.sort(() => Math.random() - 0.5);
      } else {
          pool = currentList.sort((a, b) => {
              if(subjOrder[a.subj] !== subjOrder[b.subj]) return subjOrder[a.subj] - subjOrder[b.subj];
              return (a.no || 0) - (b.no || 0);
          });
      }
  } else {
      // 랜덤 모의고사: 33문제 추출
      let currentList = allQuestions.filter(q => {
        if (!state.freqOnly && state.year !== 'all' && q.year !== state.year && q.year !== '빈출') return false;
        if (state.freqOnly && q.year !== '빈출') return false;
        if (state.subj !== 'all' && q.subj !== state.subj) return false;
        return true;
      });
      
      // '전체 과목'일 경우 각 과목별로 11문제씩 공평하게 뽑아 섞음
      if (state.subj === 'all' && currentList.length >= 33) {
          let bible = currentList.filter(q => q.subj === '성경').sort(()=>Math.random()-0.5).slice(0,11);
          let history = currentList.filter(q => q.subj === '교회사').sort(()=>Math.random()-0.5).slice(0,11);
          let law = currentList.filter(q => q.subj === '헌법').sort(()=>Math.random()-0.5).slice(0,11);
          pool = [...bible, ...history, ...law].sort(()=>Math.random()-0.5);
      } else {
          pool = [...currentList].sort(()=>Math.random()-0.5).slice(0, 33);
      }
  }
  
  examData = { 
      active: true, 
      finished: false, 
      isYearly: isYearly,
      list: pool, 
      answers: new Array(pool.length).fill(undefined), 
      timeLeft: 1200, 
      timerId: null 
  };
  
  if (!isYearly) {
      examData.timerId = setInterval(() => {
        examData.timeLeft--;
        if (examData.timeLeft <= 0) {
          clearInterval(examData.timerId);
          alert("시간이 종료되었습니다. 자동 채점합니다.");
          submitExamMode();
        } else {
          render(); // 타이머 갱신
        }
      }, 1000);
  }
  
  render();
}

function markExamAnswer(qIndex, optIndex) {
  examData.answers[qIndex] = optIndex;
  render(); 
}

function submitExamMode() {
  clearInterval(examData.timerId);
  
  // 틀린 문제 오답노트 자동 등록
  examData.list.forEach((q, idx) => {
    if (examData.answers[idx] !== q.a) {
      const qid = getQId(q);
      if (!wrongNotes[qid]) wrongNotes[qid] = { count: 0, last: '' };
      wrongNotes[qid].count++;
      wrongNotes[qid].last = new Date().toISOString().split('T')[0];
    }
  });
  localStorage.setItem("wrongNotes", JSON.stringify(wrongNotes));
  
  examData.active = false;
  examData.finished = true;
  updateDashboard();
  render();
}

function resetExamMode() {
  examData = { active: false, finished: false, isYearly: false, list: [], answers: [], timeLeft: 1200, timerId: null };
  render();
}

// ==========================================
// 5. 이벤트 리스너 연결
// ==========================================
document.querySelectorAll(".year-f").forEach(btn => {
  btn.onclick = () => {
    document.querySelectorAll(".year-f").forEach(x => x.classList.remove("on"));
    btn.classList.add("on"); 
    state.year = btn.dataset.year; 
    state.pendingResume = true; // 이어풀기 켬
    render();
  };
});

document.querySelectorAll(".subj-f").forEach(btn => {
  btn.onclick = () => {
    document.querySelectorAll(".subj-f").forEach(x => x.classList.remove("on"));
    btn.classList.add("on"); 
    state.subj = btn.dataset.subj; 
    state.pendingResume = true; // 이어풀기 켬
    render();
  };
});

const filterMap = {
  due: "dueOnly", wrong: "wrongOnly", shuffle: "shuffled",
  bookmark: "bookmarkOnly", freq: "freqOnly", wrongnote: "wrongnoteOnly", weak: "weakOnly"
};

document.querySelectorAll(".chip[data-filter]").forEach(btn => {
  btn.onclick = () => {
    const f = btn.dataset.filter;
    const key = filterMap[f];
    state[key] = !state[key];
    btn.classList.toggle("on"); 
    
    // ✨ 랜덤 섞기 누를 때만 1번부터 시작하게!
    if(f === "shuffle"){ 
      state.idx = 0; 
      state.pendingResume = false; // 이어풀기 끔
    } else {
      state.pendingResume = true;  // 다른 필터는 이어풀기 켬
    }
    render();
  };
});

document.getElementById("tag-filter").onchange = e => {
  state.tagFilter = e.target.value;
  state.pendingResume = true;
  render();
};

document.getElementById("search-box").oninput = e => {
  state.search = e.target.value.trim();
  state.pendingResume = true;
  render();
};

// 모드 탭 클릭 이벤트 (3가지 모드 분기)
document.querySelectorAll(".mode-tab").forEach(t => {
  t.onclick = () => {
    document.querySelectorAll(".mode-tab").forEach(x => x.classList.remove("on"));
    t.classList.add("on"); 
    state.mode = t.dataset.mode; 
    state.pendingResume = true; 
    
    if(state.mode === 'study' && examData.active) {
        clearInterval(examData.timerId); examData.active = false;
    }
    render();
  };
});

document.getElementById("reset").onclick = () => {
  if (!confirm("모든 기록을 초기화하시겠습니까?")) return;
  progress = {}; localStorage.removeItem("moksagosi_prog");
  wrongNotes = {}; localStorage.removeItem("wrongNotes");
  lastQids = {}; localStorage.removeItem("mok_last_qids");
  state.idx = 0; render(); 
  alert("학습 기록 및 오답노트가 모두 초기화되었습니다.");
};

document.addEventListener("keydown", e => {
  if (state.mode !== 'study') return; 
  if (e.key === "ArrowRight") { const n = document.getElementById("next-btn"); if (n) n.click(); }
  if (e.key === "ArrowLeft") { const p = document.getElementById("prev-btn"); if (p) p.click(); }
  if (e.key >= "1" && e.key <= "5") {
    const idx = parseInt(e.key) - 1;
    const btn = document.getElementById(`opt-${idx}`);
    if (btn) btn.click();
  }
});

// 초기 실행
window.onload = () => {
  state.pendingResume = true;
  render();
};
</script>
