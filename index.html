{subj:"성경",year:"2021",no:1,q:"레위기 14장에서 정결함을 받을 나병환자가 제사장에게 가져가야 할 것이 아닌 것은?",opts:["관유","백향목","홍색실","우슬초","살아있는 정결한 새 두마리"],a:0,e:"<b>레위기 14:4</b> — 살아 있는 정결한 새 두 마리와 백향목과 홍색 실과 우슬초를 가져오게 하였으며, <b>관유</b>는 성막이나 제사장 위임에 쓰인다."},
{subj:"성경",year:"2021",no:2,q:"이스라엘 백성이 진을 치면서 회막을 중심으로 북쪽에 진을 친 지파는?",opts:["단 지파","유다 지파","에브라임 지파","르우벤 지파","잇사갈 지파"],a:0,e:"<b>민수기 2장</b> — 북쪽 진영의 선두는 <b>단 지파</b>이다 (동:유다, 남:르우벤, 서:에브라임)."},
{subj:"성경",year:"2021",no:3,q:"창세기 21장에 나오는 아브라함과 아비멜렉이 언약을 세운 ‘맹세의 우물’이란 이름 뜻을 가진 우물의 이름은?",opts:["에섹","싯나","르호봇","브엘세바","브엘라해로이"],a:3,e:"<b>창세기 21:31</b> — 두 사람이 거기서 서로 맹세하였으므로 그 곳을 <b>브엘세바</b>라 이름하였다."},
{subj:"성경",year:"2021",no:4,q:"이스라엘의 절기 중 안식일, 초하루, 유월절, 칠칠절, 나팔절, 속죄일, 장막절 등이 기록된 곳은?",opts:["레위기 21장","레위기 22장","레위기 23장","레위기 24장","레위기 25장"],a:2,e:"<b>레위기 23장</b> — 이스라엘의 '여호와의 절기'들이 총망라되어 기록된 핵심 장이다."},
{subj:"성경",year:"2021",no:5,q:"“이제 내가 알았도다 여호와는 모든 신보다 크시므로 이스라엘에게 교만하게 행하는 그들을 이기셨도다”는 누구의 고백인가?",opts:["드보라","모세","미리암","이드로","다윗"],a:3,e:"<b>출애굽기 18:11</b> — 모세의 장인 <b>이드로</b>가 이스라엘을 구원하신 하나님을 찬양하며 한 고백이다."},
{subj:"성경",year:"2021",no:6,q:"바벨론을 ‘여호와의 손에 잡혀 있어 온 세계가 취하게 하는 금잔’이라고 전한 예언자는 누구인가?",opts:["스가랴","이사야","예레미야","에스겔","다니엘"],a:2,e:"<b>예레미야 51:7</b> — 바벨론은 여호와의 손에 잡혀 있어 온 세계가 취하게 하는 금잔이라 뭇 민족이 그 포도주를 마심으로 미쳤도다."},
{subj:"성경",year:"2021",no:7,q:"“오직 나는 여호와의 영으로 말미암아 능력과 정의와 용기로 충만해져서 야곱의 허물과 이스라엘의 죄를 그들에게 보이리라”는 말씀에서 “나”는 누구인가?",opts:["호세아","미가","스바냐","요엘","아모스"],a:1,e:"<b>미가 3:8</b> — 미가 선지자의 고백이다."},
{subj:"성경",year:"2021",no:8,q:"여호와 앞에 정직하게 행하였으나 산당을 폐하지 않았고 아합왕의 딸과 자신의 아들을 결혼시킨 유다왕은?",opts:["아하스","아사","아비얌","요아스","여호사밧"],a:4,e:"<b>여호사밧</b>은 정직하게 행했으나 산당을 폐하지 않았고, 북이스라엘 아합의 딸 아달랴를 며느리로 삼는 실수를 했다."},
{subj:"성경",year:"2021",no:9,q:"에스겔서에 나오는 예루살렘의 가증한 것 4가지가 아닌 것은?",opts:["질투의 우상","바알과 아세라 신상","담무스를 위해 애곡하는 여인들","가증한 그림 앞에 향 피움","태양 예배자"],a:1,e:"<b>에스겔 8장</b> — 예루살렘 성전의 가증한 4가지는 투기(질투)의 우상, 가증한 우상 그림, 담무스를 위해 애곡하는 여인, 태양 예배자이다. <b>바알과 아세라 신상</b>은 직접 언급되지 않는다."},
{subj:"성경",year:"2021",no:10,q:"아가서는 모두 몇 장으로 구성되어 있는가?",opts:["4장","5장","6장","7장","8장"],a:4,e:"<b>아가서</b>는 총 <b>8장</b>으로 구성되어 있다."},
{subj:"성경",year:"2021",no:11,q:"“곧 우리 구주 홀로 하나이신 하나님께 우리 주 예수 그리스도로 말미암아 영광과 위엄과 권력과 권세가 영원 전부터 이제와 영원토록 있을지어다 아멘”으로 끝맺는 서신은?",opts:["베드로전서","베드로후서","유다서","갈라디아서","요한3서"],a:2,e:"<b>유다서 1:25</b> — 유다서의 마지막 송영 구절이다."},
{subj:"성경",year:"2021",no:12,q:"“믿음의 선한 싸움을 싸우라 영생을 취하라 이를 위하여 네가 부르심을 받았고 많은 증인 앞에서 선한 증언을 하였도다”는 말씀이 기록된 성경은?",opts:["고린도전서","고린도후서","디모데전서","디모데후서","데살로니가 후서"],a:2,e:"<b>디모데전서 6:12</b> — 바울이 디모데에게 권면한 말씀이다."},
{subj:"성경",year:"2021",no:13,q:"믿음의 역사, 사랑의 수고, 소망의 인내를 지킨 교회로 바울이 칭찬한 교회는?",opts:["갈라디아교회","고린도교회","데살로니가교회","안디옥교회","에베소교회"],a:2,e:"<b>데살로니가전서 1:3</b> — 바울이 <b>데살로니가교회</b> 성도들을 칭찬하는 내용이다."},
{subj:"성경",year:"2021",no:14,q:"디도서 1장의 감독에 대한 기준으로 제시되지 않은 것은?",opts:["거짓과 꾸밈이 없으며","급히 분내지 아니하며","술을 즐기지 아니하며","구타하지 아니하며","오직 나그네를 대접하여"],a:0,e:"<b>디도서 1:7-8</b> — 급히 분내지 아니하며, 술을 즐기지 아니하며, 구타하지 아니하며, 오직 나그네를 대접하며 등이 명시되어 있다. <b>거짓과 꾸밈이 없으며</b>는 포함되지 않는다."},
{subj:"성경",year:"2021",no:15,q:"예수 그리스도를 ‘새 언약의 대제사장’으로 언급하는 것은 히브리서 몇 장에 기록되어있는가?",opts:["11장","10장","9장","8장","7장"],a:3,e:"<b>히브리서 8장</b> — 예수 그리스도가 더 좋은 <b>새 언약의 중보자(대제사장)</b>이심을 강조하는 핵심 장이다."},
{subj:"성경",year:"2021",no:16,q:"에스겔과 함께 바벨론으로 끌려간 왕은?",opts:["여호야긴","여호야김","시드기야","요시야","므낫세"],a:0,e:"<b>에스겔 1:2</b> — 에스겔은 주전 597년 2차 포로 때 <b>여호야긴</b> 왕과 함께 바벨론으로 끌려갔다."},
{subj:"성경",year:"2021",no:17,q:"“비록 노아, 다니엘, (   ), 이 세 사람이 거기에 있을지라도 그들은 자기의 공의로 자기의 생명만 건지리라 나 주 여호와의 말이니라” 빈칸에 들어갈 인물은?",opts:["다윗","사무엘","욥","엘리야","히스기야"],a:2,e:"<b>에스겔 14:14</b> — 노아, 다니엘, <b>욥</b>."},
{subj:"성경",year:"2021",no:18,q:"누가복음에서 나오지 않는 비유는 무엇인가?",opts:["선한 사마리아인의 비유","불의한 청지기의 비유","최후심판의 비유(양과 염소)","부자와 나사로의 비유","과부와 재판장의 비유"],a:2,e:"<b>양과 염소의 비유(최후심판)</b>는 <b>마태복음 25장</b>에만 나오는 고유한 비유이다."},
{subj:"성경",year:"2021",no:19,q:"마가복음에서 “작은 자야 네 죄 사함을 받았느니라”는 말씀이 기록된 곳은?",opts:["2장 5절","4장 23절","6장 3절","6장 50절","9장 23절"],a:0,e:"<b>마가복음 2:5</b> — 가버나움에서 지붕을 뚫고 내려온 중풍병자에게 예수님이 하신 말씀이다."},
{subj:"성경",year:"2021",no:20,q:"“모든 계명 중에 첫째가 무엇이니이까?”라는 질문과 이에 대한 대답이 언급된 곳은?",opts:["마 22:34-40, 막 14:38-42, 눅 12:25-28","마 23:21-37, 막 12:32-38, 눅 10:25-28","마 22:34-40, 막 12:28-34, 눅 10:25-28","마 23:21-37, 막 12:32-38, 눅 12:25-28","마 22:21-37, 막 12:28-34, 눅 12:25-28"],a:2,e:"가장 큰 계명(하나님 사랑, 이웃 사랑)에 대한 질문과 대답은 <b>마태복음 22장, 마가복음 12장, 누가복음 10장</b>에 기록되어 있다."},
{subj:"성경",year:"2021",no:21,q:"병든 히스기야에게 사자들을 보내서 글과 예물을 보낸 바벨론 왕은?",opts:["느부갓네살","다리오","벨사살","고레스","므로닥발라단"],a:4,e:"<b>열왕기하 20:12</b> — 발라단의 아들 바벨론 왕 <b>브로닥발라단(므로닥발라단)</b>이 편지와 예물을 보냈다."},
{subj:"성경",year:"2021",no:22,q:"“그들이 먹여준 대로 배가 불렀고 배가 부르니 그들의 마음이 교만하여 이로 말미암아 나를 잊었느니라”는 말씀이 기록된 성경은?",opts:["미가","호세아","요엘","나훔","아모스"],a:1,e:"<b>호세아 13:6</b> — 풍요 속에서 교만하여 하나님을 잊은 북이스라엘을 책망하는 말씀이다."},
{subj:"성경",year:"2021",no:23,q:"하나님께서는 요엘에게 어디서 나팔을 불어 거룩한 금식을 정하고 성회를 소집하라고 하셨는가?",opts:["시온","미스바","벧엘","예루살렘","길갈"],a:0,e:"<b>요엘 2:15</b> — 너희는 <b>시온</b>에서 나팔을 불어 거룩한 금식일을 정하고 성회를 소집하라."},
{subj:"성경",year:"2021",no:24,q:"신명기의 장과 내용이 바르게 연결되지 않는 것은?",opts:["1장 – 정탐꾼","10장 – 십계명","13장 – 십일조 규례","15장 – 면제의 규례","19장 – 도피성"],a:2,e:"<b>신명기 14장</b>에 십일조 규례가 나온다. 신명기 13장은 거짓 선지자와 우상 숭배자에 대한 경고이다."},
{subj:"성경",year:"2021",no:25,q:"“광야에서 외치는 자의 소리가 있어 주의 길을 준비하라 그의 오실 길을 곧게 하라”(눅 3:4)는 말씀이 기록된 성경은?",opts:["예레미야 24장 3절","예레미야 26장 12절","이사야 40장 3절","이사야 60장 4절","이사야 30장 24절"],a:2,e:"<b>이사야 40:3</b> — 세례 요한의 사역을 예언한 말씀이다."},
{subj:"성경",year:"2021",no:26,q:"요한2서 1장 1절에서 수신자는 누구인가?",opts:["부녀와 그의 자녀들","흩어진 열두지파들","사랑하는 그리스도인","부르심을 받는 무리들","구원받은 하나님의 백성들"],a:0,e:"<b>요한2서 1:1</b> — 장로인 나는 택하심을 받은 <b>부녀와 그의 자녀들</b>에게 편지하노니."},
{subj:"성경",year:"2021",no:27,q:"신약성경 중 거짓교사에 대한 경고, 재림지연, 묵시적 종말에 관한 내용을 기록한 서신은?",opts:["베드로전서","베드로후서","유다서","요한2서","요한3서"],a:1,e:"<b>베드로후서</b> — 거짓 교사에 대한 경고와 주의 강림(재림) 지연 이유(하루가 천 년 같이 참으심) 등을 다루고 있다."},
{subj:"성경",year:"2021",no:28,q:"요한계시록에 나오는 일곱교회 중 다윗의 열쇠를 가지신 이가 “시험의 때를 면하게 하고, 이기는 자는 내 하나님 성전의 기둥이 되게 하겠다”고 약속하신 교회는?",opts:["서머나 교회","버가모 교회","두아디라 교회","사데교회","빌라델비아 교회"],a:4,e:"<b>요한계시록 3:7-12</b> — <b>빌라델비아 교회</b>에 주신 칭찬과 약속이다."},
{subj:"성경",year:"2021",no:29,q:"다음 중에서 마가복음에 등장하는 내용이 아닌 것은?",opts:["자라나는 씨의 비유","귀먹고 말더듬는 사람 치유","부자와 나사로의 이야기","벳새다 맹인 치유","벗은 몸으로 도망가는 청년"],a:2,e:"<b>부자와 나사로 이야기</b>는 <b>누가복음 16장</b>에만 기록된 고유한 비유이다."},
{subj:"성경",year:"2021",no:30,q:"사도행전에서 베드로와 관련된 사건이 아닌 것은?",opts:["루스드라에서 앉은뱅이 치유","아나니아, 삽비라 사건","중풍병자 애니아 치유","다비다(도르가)를 살림","산헤드린 앞 설교"],a:0,e:"<b>사도행전 14장</b> — 루스드라에서 나면서 걷지 못하게 된 자를 고친 사람은 <b>바울</b>이다."},
{subj:"성경",year:"2021",no:31,q:"게네사렛 호수가의 기적이 아닌 것은?",opts:["풍랑을 잔잔케 하심","거라사 지방의 귀신들린 사람치유","야이로의 딸을 살리심","중풍병자 치유","오천명을 먹이심(오병이어)"],a:3,e:"<b>마가복음 2장</b> — 가버나움 지붕을 뚫고 내린 <b>중풍병자 치유 사건</b>은 호숫가가 아니라 '집 안'에서 일어난 기적이다."},
{subj:"성경",year:"2021",no:32,q:"사도행전의 장과 내용이 바르게 연결되지 않는 것은?",opts:["2장 – 오순절성령강림 사건","3장 – 솔로몬 행각설교","4장 – 공회 앞에 선 베드로와 요한","10장 – 고넬료","11장 – 헤롯의 죽음"],a:4,e:"<b>사도행전 12장</b> — 헤롯(아그립바 1세)이 벌레에 먹혀 죽은 사건은 12장에 기록되어 있다. 11장은 안디옥 교회 설립 등이다."},
{subj:"성경",year:"2021",no:33,q:"“그리스도는 모든 믿는 자에게 의를 이루기 위하여 율법의 마침이 되시니라”는 말씀이 기록된 성경은?",opts:["로마서 8장 4절","로마서 8장 10절","로마서 8장 12절","로마서 10장 2절","로마서 10장 4절"],a:4,e:"<b>로마서 10:4</b> — 그리스도는 모든 믿는 자에게 의를 이루기 위하여 율법의 마침이 되시니라."},
// 교회사
{subj:"교회사",year:"2021",no:1,q:"도미티아누스 황제의 박해로 유배된 사도는 누구인가?",opts:["베드로","안드레","야고보","요한","마태"],a:3,e:"<b>요한</b>은 1세기 말 도미티아누스 황제의 박해 때 밧모 섬으로 유배되어 요한계시록을 기록했다."},
{subj:"교회사",year:"2021",no:2,q:"그리스도의 성육신을 부정하여 교회에 위협이 된 이단은?",opts:["영지주의","마르키온","몬타누스주의","도나투스주의","마니교"],a:0,e:"<b>영지주의</b>는 물질은 악하고 영은 선하다는 이원론을 바탕으로 그리스도의 성육신을 부정한 초대교회의 대표적 이단이다."},
{subj:"교회사",year:"2021",no:3,q:"19-20세기 경건주의, 전통주의, 전통 신앙부흥운동에 직접 또는 간접으로 영향을 미치지 않은 사람은?",opts:["슈패너","뵈메","프랑케","친첸도르프","웨슬리"],a:1,e:"<b>뵈메</b>는 17세기 독일의 기독교 신비주의자로, 19~20세기 경건주의나 부흥운동을 직접적으로 이끌거나 조직적인 영향을 끼친 인물은 아니다."},
{subj:"교회사",year:"2021",no:4,q:"프레드리히 2세는 이슬람 지도자와 평화조약을 체결하고, 예루살렘의 통치권을 넘겨받아 예루살렘에 무혈 입성하였다. 제 몇 차 십자군 원정 때였는가?",opts:["제4차 십자군 원정","제5차 십자군 원정","제6차 십자군 원정","제7차 십자군 원정","제8차 십자군 원정"],a:2,e:"프리드리히 2세가 외교적 교섭으로 예루살렘 통치권을 되찾은 것은 1229년 <b>제6차 십자군 원정</b> 때이다."},
{subj:"교회사",year:"2021",no:5,q:"19세기 초 그리스도교 진리를 옹호하며 ‘자유주의 신학의 아버지’라고 불린 사람은 누구인가?",opts:["프리드리히 슐라이어마허","드와이트 무디","폴 틸리히","루돌프 불트만","칼 바르트"],a:0,e:"<b>프리드리히 슐라이어마허</b>는 종교를 '절대 의존의 감정'으로 정의하며 자유주의 신학의 아버지로 불렸다."},
{subj:"교회사",year:"2021",no:6,q:"6개 언어 대조 성경인 헥사플라(Hexapla)를 편찬하였고, 켈수스 논박서 라는 변증서와 제1원리라는 조직신학서를 저술한 신학자는 누구인가?",opts:["터툴리아누스","플로티누스","오리게네스","클레멘스","이레나이우스"],a:2,e:"<b>오리게네스</b>는 6개 언어 대조 성경인 헥사플라를 편찬하고 최초의 조직신학서 『제1원리』를 저술했다."},
{subj:"교회사",year:"2021",no:7,q:"복음적 재세례파의 대표적 인물로 1496년 비트마르줌(네덜란드)에서 태어났고 네덜란드 초기 지도자 오베 필립스에게 재 세례와 재 안수를 받았던 사람은 누구인가?",opts:["부처","아리스코","크랜머","메노 시몬스","베르밀리"],a:3,e:"<b>메노 시몬스</b>는 네덜란드 출신의 평화적인 재세례파 지도자로 메노나이트의 창시자이다."},
{subj:"교회사",year:"2021",no:8,q:"그리티아누스 법령집과 관계가 없는 것은?",opts:["교황은 그리스도의 대리자다","교직자는 납세의 의무가 없다","1140년 편찬되었다","범죄자에게 주는 교회의 형벌은 출교다","교회법령 107개를 중심으로 편찬하였다"],a:3,e:"<b>범죄자에게 주는 교회의 형벌은 출교다</b>라는 일반적인 내용은 교황권 강화와 교직자 특권을 체계화한 그라티아누스 법령집의 핵심 특징 설명과는 거리가 멀다."},
{subj:"교회사",year:"2021",no:9,q:"1세기 말엽 자신을 신이라고 주장한 황제로, 그리스도인들을 박해하였고, 그 때문에 카타콤이 만들어지게 되었다. 그 황제는 누구인가?",opts:["도미티아누스","트라야누스","아우렐리우스","폴리카르포스","이그나티우스"],a:0,e:"<b>도미티아누스</b> 황제는 자신을 '주와 하나님'이라 부르게 강요하며 기독교를 극심하게 탄압했다."},
{subj:"교회사",year:"2021",no:10,q:"서방에서 수도원 제도를 확립한 수도사로 529년 몬테카시노 수도원을 세웠으며, 그가 작성한 <수도원 규칙>은 서방 수도원의 기본 뼈대를 결정지었다. 이 사람은 누구인가?",opts:["안토니우스","파코미우스","마르티누스","베네딕투스","아타나시우스"],a:3,e:"<b>베네딕투스</b>는 529년 몬테카시노 수도원을 세우고 서방 수도원 제도의 기본 뼈대인 수도원 규칙을 작성했다."},
{subj:"교회사",year:"2021",no:11,q:"다음 중 동방 정교회(Eastern Orthodoxy)의 신학적 특징이라고 보기 어려운 것은 무엇인가?",opts:["예배중심적, 교회중심적 신학","구원론에 있어서 인간의 신성화 강조","예배와 신앙생활에 있어서 성령에 대한 강조","강한 그리스도 중심적 신학","신적 본질의 형상화인 성상 공경 권장"],a:4,e:"동방 정교회는 이콘(평면 성화)을 중요시하지만, 신적 본질을 입체적으로 형상화한 <b>성상(조각상) 공경</b>은 금지한다."},
{subj:"교회사",year:"2021",no:12,q:"『세네카의 주해』는 누구의 저서인가?",opts:["칼뱅","루터","츠빙글리","얀 후스","사보나롤라"],a:0,e:"<b>칼뱅</b>은 23세 때 로마 철학자 세네카의 『관용론』에 대한 주석서인 『세네카의 주해』를 발표했다."},
{subj:"교회사",year:"2021",no:13,q:"종교개혁 이전의 개혁자 중에서 교회의 비일관성과 위선을 공박하고 『바보예찬』에서 교회의 타락을 혹독하게 비판한 사람은?",opts:["왈도","존 위클리프","베셀의 요한","토마스 브래드워딘","에라스무스"],a:4,e:"<b>에라스무스</b>는 『바보예찬(우신예찬)』을 저술하여 성직자들의 무지와 교회의 타락을 풍자하고 비판했다."},
{subj:"교회사",year:"2021",no:14,q:"서로 관계가 잘못 연결된 것을 고르시오.",opts:["YMCA  - 조지 윌리암","1953년 – 예장통합과 합동분리","1865년 – 토마스 선교사","무교회주의 – 우지무라 간조","1907년 – 한국 최초 목사 안수"],a:1,e:"예장 통합과 합동의 분리는 WCC 가입 문제 파동으로 인해 <b>1959년(제44회 총회)</b>에 일어났다 (1953년은 예장-기장 분리)."},
{subj:"교회사",year:"2021",no:15,q:"크리소스토무스와 관계가 없는 것은?",opts:["설교를 잘하여 황금의 입이라고 불림","안디옥 감독, 후에 콘스탄티노플의 대주교가 됨","특히 성찬을 중요시함","346년 안디옥에서 출생함","시편 찬송가 출간"],a:4,e:"황금의 입이라 불린 크리소스토무스와 달리, <b>시편 찬송가 출간</b>은 제네바에서 활동한 칼뱅과 관련된 특징이다."},
{subj:"교회사",year:"2021",no:16,q:"동서교회 분리원인 및 관련 내용이 아닌 것은?",opts:["사상과 문화의 문제","성령(필리오케 문제)","주후 1291년에 완전한 분리","성상숭배논쟁","로마교황과 콘스탄티노플 대주교 간의 교황쟁탈 문제"],a:2,e:"동방교회와 서방교회의 결정적이고 공식적인 대분열은 1291년이 아니라 <b>1054년</b>에 일어났다."},
{subj:"교회사",year:"2021",no:17,q:"칼뱅주의의 5대 교리가 아닌 것은?",opts:["인간의 전적타락","무조건적 선택","보편적 속죄","불가항력적 은총","성도의 견인"],a:2,e:"칼뱅주의 5대 교리(TULIP)에는 제한적 속죄가 포함되며, <b>보편적 속죄</b>는 아르미니우스주의의 주장이다."},
{subj:"교회사",year:"2021",no:18,q:"1562년 1월 가톨릭과 프로테스탄트가 평화적 합의를 통해 위그노의 자유로운 예배를 보장하도록 반포한 프랑스의 칙령은?",opts:["성 바르톨로뮤 칙령","위그노 칙령","낭트 칙령","생제르맹 칙령","퐁텐블루 칙령"],a:3,e:"1562년 위그노의 예배 자유를 일부 인정한 프랑스의 평화 칙령은 <b>생제르맹 칙령</b>이다."},
{subj:"교회사",year:"2021",no:19,q:"에비온주의자들이 가장 중요하게 생각하는 것 중 아닌 것은?",opts:["할례","안식일의 준수","성전제사","율법","삼위일체신앙"],a:4,e:"에비온주의는 예수의 신성을 부정하고 율법 준수를 강조한 유대교적 이단이므로 <b>삼위일체신앙</b>을 거부했다."},
{subj:"교회사",year:"2021",no:20,q:"히에로니무스의 라틴어 번역본 성경은?",opts:["70인역","탈굼","로마성경","불가타 성경","라틴어 성경"],a:3,e:"4세기 말 히에로니무스(제롬)가 라틴어로 번역하여 가톨릭의 표준 성경이 된 것은 <b>불가타 성경</b>이다."},
{subj:"교회사",year:"2021",no:21,q:"도미티아누스 황제의 박해로 순교를 당한 기독교 지도자는 누구인가?",opts:["사도 요한","사도 베드로","로마의 클레멘스","이레네우스","폴리캅"],a:2,e:"<b>로마의 클레멘스</b>는 도미티아누스(또는 트라야누스) 황제 치하에서 순교한 것으로 전해지는 기독교 지도자이다."},
{subj:"교회사",year:"2021",no:22,q:"1981년 4월 파리에서 모이는 만국평화 회담에 한국의 상황을 알리기 위해 특사로 파송된 사람은?",opts:["김규식","이승훈","이상재","장덕수","선우혁"],a:0,e:"1919년(문제의 1981년은 오타) 파리 만국평화회의에 신한청년당 대표로 파견된 기독교인은 <b>김규식</b>이다."},
{subj:"교회사",year:"2021",no:23,q:"동인도회사 소속 린제이 선장이 이끄는 암허스트호를 타고 1832년 7월 백령도 근처 섬에 상륙하여 주민들에게 성경, 전도문서, 의약품을 나눠주고 ‘양이’라는 사람에게 주기도문을 한글로 옮겨 쓰며 읽어주어 개신교 최초의 주기도문을 번역하게 한 선교사는 누구인가?",opts:["토마스","맥클래이","데이비스","레이놀즈","귀출라프"],a:4,e:"1832년 백령도 근처에 상륙하여 한문 성경을 나누어 주고 주기도문을 번역하게 한 선교사는 <b>귀츨라프</b>이다."},
{subj:"교회사",year:"2021",no:24,q:"1608년 프로테스탄트가 결성한 복음주의 연맹에 대항하여 1609년 가톨릭 동맹이 결성되어 1618년 프라하의 충돌이 일어났고 1648년까지 종교전쟁이 벌어졌다. 그 후 독일의 30년 전쟁을 종식하게 만든 조약은 무엇인가?",opts:["프라하 조약","베스트팔렌 조약","마르센 조약","베르뎅 조약","네르친스크 조약"],a:1,e:"독일의 30년 전쟁을 종식하고 칼뱅파의 신앙 자유까지 공식 인정한 조약은 <b>베스트팔렌 조약</b>이다."},
{subj:"교회사",year:"2021",no:25,q:"다음 중 네비우스 선교정책과 방법론과 관계가 없는 것은?",opts:["타인에게 복음의 선생이 되는 자립 전도","지도자와 조사의 지도력을 훈련하는 자립정치","선교사의 보조에 의존하지 않는 재정의 자립 보급","목회자나 지도자에게 조직적인 성경공부를 실시","소송문제가 발생할 시 선교사 중심으로 화해조정"],a:4,e:"네비우스 정책은 교회 내 치리나 소송 문제를 현지인 지도자들 스스로 해결하도록 했으므로 <b>선교사 중심으로 화해조정</b>한다는 것은 틀리다."},
{subj:"교회사",year:"2021",no:26,q:"이름과 사건에 해당하는 연도가 틀린 것은?",opts:["이수정 – 일본에서 성경번역 – 1883년","서상륜 – 황해도 송천에서 최초 교회 설립 - 1884년","언더우드 – 아펜젤러와 입국한 선교사 –1884년","알렌(부부 의료선교사 입국) - 1884년","장로회 조선노회 조직(제주도 이기풍 선교사 파송 결의) - 1907년"],a:2,e:"장로교 언더우드와 감리교 아펜젤러가 한국 제물포에 입국한 해는 1884년이 아니라 <b>1885년</b>이다."},
{subj:"교회사",year:"2021",no:27,q:"17세기 독일의 부흥운동을 이끌었던 경건주의 창설자는 누구인가?",opts:["존 웨슬레","조나단 에드워즈","필립 야곱 슈패너","패터슨","존 낙스"],a:2,e:"17세기 말 독일에서 콜레기아 피에타티스를 조직하며 경건주의 운동을 창설한 인물은 <b>필립 야곱 슈페너</b>이다."},
{subj:"교회사",year:"2021",no:28,q:"교단 총회에 여성안수 헌의가 처음 이루어진 때는 언제인가요?",opts:["제21회 총회","제22회 총회","제23회 총회","제24회 총회","제25회 총회"],a:1,e:"예장 총회에 여성 안수 문제가 처음으로 헌의된 것은 1933년 <b>제22회 총회</b>이다."},
{subj:"교회사",year:"2021",no:29,q:"데키우스가 로마 신들을 숭배할 것을 명하고 그 신들을 숭배한 사람들에게 증명서를 발급하였다. 초대교회 성도들은 십자가의 순교를 각오한 사람들과 박해에 굴복하고 신앙을 저버린 사람들로 나누어진다. 교회의 순수성을 지키기 위해 배교자들을 끝까지 추방해야 한다고 주장한 사람은 누구인가?",opts:["키프리아누스","노바티아누스","카이킬리아누스","펠릭스","디오클레티아누스"],a:1,e:"데키우스 황제의 박해 때 신앙을 부인한 배교자들을 끝까지 추방해야 한다며 엄격주의를 주장한 사람은 <b>노바티아누스</b>이다."},
{subj:"교회사",year:"2021",no:30,q:"다음 중 그레고리우스 1세 업적이 아닌 것은?",opts:["성직매매를 금지하였다","성직자 결혼을 금하였다","연옥설을 주장하였다","성모예배를 주장하였다","교회의 위계론을 주장하였다"],a:4,e:"<b>※ 정답 재확인 권장</b> — 가답안은 ⑤(교회 위계론은 위 디오니시우스 등에 더 가까움). 다만 ②'성직자 결혼 금지'를 그레고리우스 1세 본인의 업적으로 보기 어렵다는 견해(독신 의무화는 후대 그레고리우스 7세·라테란 공의회)도 있어 ②/⑤가 갈릴 수 있으니 시험 공식 정답 확인 요망."},
{subj:"교회사",year:"2021",no:31,q:"다음 중 니케아 회의와 관계가 없는 것은?",opts:["부활절 날짜 결정(춘분 후 만월 다음 첫주일)","주후 325년 개최","성부와 성자가 동일 본질임을 인정함","아타나시우스가 이단으로 정죄됨","교회정치에 관한 규정 20조 채택함"],a:3,e:"325년 니케아 공의회에서는 <b>아리우스</b>가 이단으로 정죄되었고, 아타나시우스는 정통파로 승리했다."},
{subj:"교회사",year:"2021",no:32,q:"터툴리아누스의 저서가 아닌 것은?",opts:["삼위일체론","이단논박","마르키온 논박","프락세아스 논박","이단들에 대한 항고"],a:0,e:"터툴리아누스는 삼위일체 용어를 처음 썼으나, 단행본 『삼위일체론(De Trinitate)』은 그의 저서가 아니다(아우구스티누스 등의 것)."},
{subj:"교회사",year:"2021",no:33,q:"20세기 후반에 들어서면서 로마 가톨릭교회가 ‘현대세계에의 적응’을 표어로 내세우며 동방정교회와 화해하고 프로테스탄트를 형제로 인정한 회의는?",opts:["제1차 바티칸 공의회","제2차 바티칸 공의회","제1차 라떼란 공의회","제2차 라떼란 공의회","제4차 라떼란 공의회"],a:1,e:"로마 가톨릭교회의 현대화(창문 열기)를 추진하고 개신교를 갈라진 형제로 포용한 회의는 <b>제2차 바티칸 공의회</b>이다."},
{subj:"헌법",year:"2021",no:1,q:"21세기 대한예수교장로교 신앙고백서의 내용 중 그리스도인의 사명에 해당하지 않는 것은?",opts:["교회가 하나임을 선포한다","세례와 성찬과 직제에 있어서 일치를 추구한다","교회의 순수성을 지키기 위해서 전통에서 벗어나지 않는다","인간을 착취하는 구조악들을 사도적 신앙으로 변혁해야 한다","모든 교회들과 더불어 선교와 사회봉사에 참여한다"],a:2,e:"<b>신앙고백서 제7부</b> — 교회의 순수성을 지키기 위해서 <b>전통에서 벗어나지 않는다</b>는 내용은 그리스도인의 사명으로 명시되어 있지 않다."},
{subj:"헌법",year:"2021",no:2,q:"다음 중 치리회에 대한 설명 중 틀린 것은?",opts:["각급 치리회는 헌법에 규정하는 바에 의하여 자체의 규칙을 제정할 수 없다","치리회는 교인으로 하여금 도덕과 영적 사건에 대하여 그리스도의 법에 복종케 하는 것이다","치리회는 당회, 노회, 총회로 구분한다","모든 치리회는 목사와 장로로 구성한다","치리회 간의 행정적인 결의 등이 상충될 때는 상급 치리회의 결의를 따른다"],a:0,e:"<b>정치 제63조 3항</b> — 각급 치리회는 헌법에 규정하는 바에 의하여 <b>자체의 규칙을 제정할 수 있다</b>."},
{subj:"헌법",year:"2021",no:3,q:"헌법 개정(정치, 권징, 예배와 예식)에 대한 내용으로 맞는 것은?",opts:["총회는 출석회원 과반수 찬성의 결의로 개정안을 작성하여 각 노회에 수의한다","각 노회에 수의한 개정안은 노회 3분의 2의 가결과 투표 총수의 과반을 얻어야 한다","각 노회는 수의된 개정안의 가부 투표수를 종합하여 즉시 총회장에게 보고한다","총회장은 개정안의 투표 결과를 수합하여 가결된 결과를 1개월 후에 공고한다","헌법(헌법시행규정 포함)은 개정한 지 1년 이내에는 개정할 수 없다"],a:2,e:"<b>정치 제102조 3항</b> — 각 노회는 가부투표수를 종합하여 <b>즉시 총회장에게 보고</b>한다. (①은 출석 2/3, ②는 노회 과반수+투표 과반, ④는 즉시 공고, ⑤는 개정 후 3년 이내 재개정 불가가 옳다.)"},
{subj:"헌법",year:"2021",no:4,q:"다음은 웨스트민스터 신앙고백에 나타난 교회에 관한 내용이다. 괄호 안에 알맞은 말은 무엇인가?<br>보편적이고 우주적인 교회는 ( )이다. 이 교회는 과거나 현재나 미래에 있어서 ( ) 되시는 그리스도를 중심하여 모이는 택함을 받은 모든 사람들로 구성된다. 그것은 그리스도의 ( )요, 그의 ( )이며, 만물 안에서 만물을 충만케 하시는 자의 ( )이시다.",opts:["불가시적 – 머리 - 신부 – 집 – 충만","가시적 – 머리 - 신부 – 집 – 충만","불가시적 – 머리 – 신부 – 가족 – 충만","가시적 – 머리 – 신부 – 몸 – 충민","불가시적 – 머리 – 신부 – 몸 – 충만"],a:4,e:"<b>웨스트민스터 제25장</b> — 보편적이고 우주적인 교회는 <b>불가시적</b>이다. 그리스도는 <b>머리</b>, 교회는 <b>신부</b>요 <b>몸</b>이며 <b>충만</b>이시다."},
{subj:"헌법",year:"2021",no:5,q:"교회의 직원에 대한 내용 중 맞지 않는 것은 무엇인가?",opts:["교회의 직원은 항존직과 임시직으로 구분한다","항존직은 장로, 집사, 권사이며 그 시무는 70세가 되는 해의 연말까지로 한다","타국 시민권자는 직원이 될 수 있다","장로는 두 가지가 있는데 설교와 치리를 겸한 자를 목사라 하고 치리만 하는 자를 장로라 한다","임시직은 전도사, 서리집사이며 시무 기간은 1년이고 연임할 수 있다"],a:2,e:"<b>정치 제21조 2항</b> — <b>타국 시민권자는 원칙적으로 직원이 될 수 없다</b> (법이 정한 특수한 예외 규정 외)."},
{subj:"헌법",year:"2021",no:6,q:"당회장에 관한 내용 중 맞지 않는 것은 무엇인가?",opts:["당회장은 노회가 임명하며 그 교회 시무목사(위임목사, 담임목사)가 된다","임시당회장은 당회장이 유고할 때 당회원 과반수의 결의(합의 혹은 연명)로 요청한 해 노회 목사를 노회가 파송한다","대리당회장은 당회장이 유고할 때 또는 기타 사정이 있을 때 당회장이 위임한 자 또는 당회원이 합의하여 청한 자로 당회장직을 대리케 할 수 있다. 대리당회장에게도 결의권이 있다","대리당회장은 은퇴목사에게도 맡길 수 있다","미조직 교회의 당회권은 당회장이 행사한다"],a:2,e:"<b>정치 제67조 3항</b> — 대리당회장에게는 <b>결의권이 없다</b>. (임시당회장은 당회장 결원 시 파송한다.)"},
{subj:"헌법",year:"2021",no:7,q:"노회 재판국의 심판 사건이 아닌 것은?",opts:["당회 재판국의 판결에 대한 항소사건","목사에 관한 소송사건 및 장로의 노회원 또는 총회원으로서의 행위에 관련된 소송사건","헌법이 정하는 행정쟁송사건","당회원이 청원한 위탁재판사건","당회 기소위원회의 불기소결정에 대한 항고사건"],a:3,e:"<b>권징 제20조</b> — 위탁재판은 당회원 개인이 아니라 <b>당회장</b>이 상회에 청원하는 사건이다."},
{subj:"헌법",year:"2021",no:8,q:"공동의회가 소집될 수 없는 경우는 무엇인가?",opts:["전체 교인 과반수의 청원이 있을 때","당회가 소집할 필요가 있을 때","제직회의 청원이 있을 때","상회의 지시가 있을 때","무흠 세례교인 3분의 1 이상의 청원이 있을 때"],a:0,e:"<b>정치 제90조</b> — 공동의회 소집 요건은 당회 필요, 제직회 청원, 무흠 세례교인 1/3 이상 청원, 상회 지시이다. <b>전체 교인 과반수 청원</b>은 해당하지 않는다."},
{subj:"헌법",year:"2021",no:9,q:"대한예수교장로회 헌법 정치원리에 해당되는 것은 무엇인가?",opts:["공회의 자격","거룩한 생활","양심의 자유","신앙의 자유","교회의 설립"],a:2,e:"<b>정치 제1장</b> — 정치원리에는 <b>양심의 자유</b>, 교회의 자유, 진리와 행위 등이 명시되어 있다."},
{subj:"헌법",year:"2021",no:10,q:"헌법상 목사의 의의에 맞는 것은 무엇인가?",opts:["목사는 축복을 베푸는 하나님의 대리자이다","목사는 모든 교인의 모범이 되어 교회를 치리하는 장로이다","목사는 교인들을 위로하는 상담자이다","목사는 교회재정을 총괄하는 대표자이다","목사는 하나님의 도를 맡은 파수꾼이다"],a:1,e:"<b>정치 제24조</b> — 목사는 모든 교인의 모범이 되어 <b>교회를 치리하는 장로</b>이다."},
{subj:"헌법",year:"2021",no:11,q:"책벌의 종류와 내용이 맞지 않는 것은 무엇인가?",opts:["견책 : 죄과를 꾸짖고 회개하게 한다","근신 : 2개월 이상 6개월 이내의 기간 죄과에 대한 반성문을 1회 이상 소속치리회장에게 제출하게 하고 행동을 삼가게 한다","수찬정지 : 6개월 이상 1년 이내의 기간 수찬을 정지한다","면직 : 직원의 신분을 박탈한다","시무해임 : 3개월 이상 1년 이내의 기간 치리권을 정지한다"],a:4,e:"<b>권징 제5조</b> — 치리권(행정권·권징권)을 정지하는 것은 <b>시무정지</b>이다. 시무해임은 설교권을 포함하여 교회의 모든 시무를 정지하는 것이다."},
{subj:"헌법",year:"2021",no:12,q:"직분자 자격 중 틀린 것은 무엇인가?",opts:["목사 : 무흠 세례교인 7년 경과, 30세 이상","전도사 : 무흠 세례교인 5년 경과, 25세 이상","장로 : 무흠 세례교인 7년 경과, 40세 이상","집사 : 무흠 세례교인 5년 경과, 35세 이상","권사 : 무흠 세례교인 5년 경과, 40세 이상"],a:4,e:"<b>정치 제53조</b> — 권사의 자격은 무흠 세례교인 5년 경과, <b>35세 이상</b> 여자이다."},
{subj:"헌법",year:"2021",no:13,q:"치리회는 교인으로 하여금 어디에 복종하게 하는가 ?",opts:["교회","그리스도의 법","정치","헌법","말씀"],a:1,e:"<b>정치 제63조</b> — 치리회는 교인으로 하여금 도덕과 영적 사건에 대하여 <b>그리스도의 법</b>에 복종케 하는 것이다."},
{subj:"헌법",year:"2021",no:14,q:"노회에 대한 설명 중 틀린 것은 무엇인가 ?",opts:["노회는 일정한 구역 안에 있는 시무 목사 30인 이상, 당회(조직교회) 30처 이상, 세례교인(입교인) 3,000명 이상이 있어야 조직할 수 있다","장로 총대는 서기가 총대 명부를 접수하면 회원권이 성립된다","노회의 개회성수는 목사와 장로 총대 전체의 출석 과반수로 개회할 수 있다","노회는 노회 구역안에 있는 각 지교회와 소속기관 및 단체를 총찰한다","노회는 소속 지교회와 산하기관의 부동산을 관리하고 재산문제로 사건이 발생하면 이를 처리해야 한다"],a:2,e:"<b>정치 제76조</b> — 노회의 개회성수는 전체 출석 과반수가 아니라 시무 목사와 장로 총대 <b>각 과반수</b>의 출석으로 개회한다."},
{subj:"헌법",year:"2021",no:15,q:"제직회에 대한 설명 중 틀린 것은 무엇인가 ?",opts:["제직회 회원은 시무목사, 장로, 집사, 권사, 서리집사로 한다","회장이 소집의 필요를 인정할 때 언제든지 소집할 수 있다","교회의 제직 1/3의 요청이 있다면 소집해야 한다","구제비의 수입과 지출, 그리고 특별헌금을 다루어야 한다","부동산 매매가 있을 시 반드시 제직회에서 다루어야 한다"],a:0,e:"<b>정치 제91조</b> — 제직회 회원은 시무목사, 장로, 안수집사, 권사, <b>전도사</b>, 서리집사이다. (※ 2번 보기의 '언제든지 소집' 또한 '1주일 전 광고' 원칙에 비추어 다툼 소지가 있으나, 시험 당시는 1번을 정답으로 처리함)"},
{subj:"헌법",year:"2021",no:16,q:"다음은 요리문답 제4문이다. 빈칸에 들어 갈 알맞은 말은 무엇인가?<br>“하나님은 그의 존재, 지혜, 능력, 거룩, 공의, 선하심, 그리고 진리에 있어서 ( ) 영원 불변하시는 영이십니다.”",opts:["무한하시고","정확무오하시고","변함이 없으시며","절대적이시며","명확하시며"],a:0,e:"<b>소요리문답 제4문</b> — 진리에 있어서 <b>무한하시고</b> 영원 불변하시는 영이십니다."},
{subj:"헌법",year:"2021",no:17,q:"웨스터민스터 신앙고백과 소요리문답은 영국의 “장기의회”에 의해 소집된 신학자 총회에서 몇 년에 작성된 것인가?",opts:["1633년","1643년","1653년","1663년","1673년"],a:1,e:"<b>웨스트민스터 신앙고백</b>은 <b>1643년</b> 영국 웨스트민스터 총회에서 초안 작성을 시작하여 완성되었다."},
{subj:"헌법",year:"2021",no:18,q:"회원권이 정지된 교인과 실종교인이 다시 돌아오면 본 교회에서 어떻게 복권시킬 수 있는가?",opts:["공동회의 결의","제직회 결의","당회의 결의","당회장의 선포","본인의 서약"],a:2,e:"<b>정치 제20조</b> — 회원권이 정지된 교인(6개월 경과)과 실종교인(1년 경과)이 돌아오면 <b>당회의 결의</b>로 복권시킬 수 있다."},
{subj:"헌법",year:"2021",no:19,q:"다음 중 헌법 상 목사의 직무가 아닌 것은?",opts:["하나님의 말씀으로 교훈한다","성례를 거행한다","교인들 축복한다","장로와 협력하여 치리권을 행사한다","교회를 치리한다"],a:4,e:"<b>정치 제25조</b> — 목사의 직무는 장로와 협력하여 치리권을 행사하는 것이며, 목사 단독으로 <b>교회를 치리한다</b>고 규정하지 않는다."},
{subj:"헌법",year:"2021",no:20,q:"다음 중 전도목사와 관계가 없는 것은 무엇인가?",opts:["총회나 노회 및 관계기관에서 교육, 문서 등을 통해 전도한다","국내외에서 연합기관과 개척지에 전도하는 목사이다","군대, 학원, 병원, 교도소에 전도하는 목사이다","사회복지시설(양로원, 보육원, 요양원 등), 산업기관 등에 전도하는 목사이다","국내 거주외국인 등에 전도하는 목사이다"],a:0,e:"<b>정치 제27조</b> — 총회나 노회 및 관계기관에서 교육, 문서 등 사업에 종사하는 목사는 <b>기관목사</b>이다."},
{subj:"헌법",year:"2021",no:21,q:"담임목사 청빙과 연임청원에 관한 내용 중 틀린 것은 무엇인가?",opts:["당회의 결의와 제직회의 출석회원 과반수의 찬성을 얻어야 한다","제직회 출석회원 과반수가 서명을 한 명단을 노회에 제출해야 한다","당회록 사본, 제직회 회의록 사본, 목사의 이력서를 첨부하여 노회에 제출해야 한다","연임청원은 당회록과 제직회의록을 첨부하여 임시당회장이 노회에 제출해야 한다","당회 미조직 교회는 연임청원시 제직회 회의록을 제출한다"],a:3,e:"<b>정치 제28조</b> — 연임청원 서류 제출은 임시당회장이 아니라 <b>대리당회장</b>이 노회에 제출해야 한다."},
{subj:"헌법",year:"2021",no:22,q:"세례교인(입교인)이 450명인 경우 당회에서 노회에 장로 총대를 몇 명 파송 할 수 있는가?",opts:["5인","4인","3인","2인","1인"],a:1,e:"<b>정치 제73조 3항</b> — 당회의 장로 총대: 100인까지 1인·101~200인 2인·201~400인 3인·<b>401~700인 4인</b>·701~1,000인 5인. 450명은 401~700 구간이라 <b>4인</b>. (경계가 100/200/400/700에서 끊기는 게 함정)"},
{subj:"헌법",year:"2021",no:23,q:"목사의 휴무에 관한 내용 중 틀린 것은 무엇인가?",opts:["목사의 휴무 기간이 3개월 이상일 경우 해당된다","당회의 결의와 노회의 허락을 받아야 한다","휴무 기간은 1년 이내로 한다","필요한 경우 1년 단위로 연장을 허락할 수 있고, 3년을 초과할 수 없다","연구기관이나 교육기관 등에서 연수하게 된 때는 예외이다"],a:4,e:"<b>정치 제36조</b> — 1~4번은 조문과 일치한다. ⑤는 틀림: 연구기관·교육기관 연수는 제36조 1항이 정한 <b>휴무 '사유'의 하나</b>이지 휴무 규정의 예외가 아니다."},
{subj:"헌법",year:"2021",no:24,q:"장로로 피택된 자는 몇 개월 이상 당회의 지도아래 교육을 받은 후 노회고시에 합격해야 하는가?",opts:["3개월 이상","4개월 이상","5개월 이상","6개월 이상","1년 이상"],a:1,e:"<b>정치 제42조</b> — 장로 피택자는 <b>4개월 이상</b> 당회의 지도를 받아야 한다."},
{subj:"헌법",year:"2021",no:25,q:"다음 장로의 선택과 임직에 관한 내용 중 틀린 것은?",opts:["장로의 선택은 당회의 결의로 노회의 허락을 받아야 한다","공동의회에서 출석회원의 3분의 2 이상의 득표로 선포한다","당회에서 후보자를 추천할 수 있다","장로의 선택을 위한 투표는 3차까지만 할 수 있다","노회고시에 합격한 자를 지교회는 장로임직을 행한다"],a:1,e:"<b>정치 제41조</b> — 공동의회 출석회원이 아니라 총 투표수의 3분의 2 이상 득표로 <b>선출</b>한다. ('선포'가 아님)"},
{subj:"헌법",year:"2021",no:26,q:"전도사의 자격 중 틀린 것은?",opts:["30세 이상 된 자","신학교 또는 성서학원 졸업자","노회 전도사고시에 합격한 자","무흠세례교인(입교인)으로 5년을 경과한 자","시무장로는 전도사직을 겸할 수 없다"],a:0,e:"<b>정치 제49조</b> — 전도사의 연령 자격은 30세 이상이 아니라 <b>25세 이상</b>이다."},
{subj:"헌법",year:"2021",no:27,q:"다음은 집사의 자격이다. 해당하지 않는 것은?",opts:["단정하고 일구이언을 하지 아니하는 자","깨끗한 양심에 믿음의 비밀을 가진 자","자기 가정을 잘 다스리는 자","무흠세례교인(입교인)으로 5년을 경과한 자","35세 이상 된 남자"],a:2,e:"<b>정치 제50조(안수집사 자격)</b> — '자기 가정을 잘 다스리는 자'는 안수집사 자격 조문에 없고 <b>목사(감독)의 자격</b>에 해당하는 표현이다."},
{subj:"헌법",year:"2021",no:28,q:"다음 중 ( )에 알맞은 말은?<br>당회 조직 후 시무장로가 1인도 없으면 1년 후 첫 노회부터 폐당회가 되고, 장로 2인 미달 또는 세례교인(입교인) 수가 ( ) 미달로 ( ) 경과한 후 첫 노회부터 당회가 폐지된다.",opts:["15인, 3년","20인, 3년","30인, 3년","15인, 2년","20인, 2년"],a:2,e:"<b>정치 제65조</b> — 장로 2인 미달 또는 세례교인 수 <b>30인 미달</b>로 <b>3년</b>이 경과하면 당회가 폐지된다."},
{subj:"헌법",year:"2021",no:29,q:"당회의 개회성수는 당회장을 포함한 당회원 ( )의 출석으로 한다. ( ) 알맞은 말은?",opts:["3분의 1","3분의 2","과반수","반수","전원"],a:2,e:"<b>정치 제66조</b> — 당회는 당회장을 포함한 당회원 <b>과반수</b>의 출석으로 개회한다."},
{subj:"헌법",year:"2021",no:30,q:"다음 중 공동의회의 결의 사항이 아닌 것은?",opts:["당회가 제시한 사항","예산 및 결산","직원 선거","상회가 지시한 사항","부동산 매매"],a:4,e:"<b>정치 제90조</b> — 부동산 매매는 공동의회가 아니라 <b>제직회의 결의 사항</b>이다."},
{subj:"헌법",year:"2021",no:31,q:"다음 중 권징의 사유가 되는 죄과가 아닌 것은?",opts:["성경상의 계명에 대한 중대한 위반행위","예배를 방해한 행위","이단적 행위와 이에 적극적으로 동조한 행위","직권을 남용하거나 직무를 유기한 행위","국가 재판에 의해 집행유예 이상의 형이 확정된 자"],a:4,e:"<b>권징 제3조 7항</b> — 국가 재판에 의해 <b>금고 이상의 형</b>이 확정된 범죄행위가 권징 사유이다. (집행유예는 해당 안 됨)"},
{subj:"헌법",year:"2021",no:32,q:"재판국장이 피고인을 소환할 때는 며칠 전에 통지해야 하는가?",opts:["7일 전","10일 전","15일 전","20일 전","30일 전"],a:1,e:"<b>권징 제43조</b> — 재판국장은 피고인을 소환할 때에는 <b>10일 전</b>에 통지하여야 한다."},
{subj:"헌법",year:"2021",no:33,q:"예배와 예식에 나타난 그리스도인들의 경건을 위한 중요한 기초는?",opts:["말씀","기도","영성","겸손","예배"],a:4,e:"<b>예배와 예식</b> — 그리스도인들의 경건은 예배에서 더욱 확실하게 경험된다. 그러므로 <b>예배</b>는 경건을 위한 중요한 기초이다."},
 
// ===================== 2022년도 기출 =====================
// 성경
{subj:"성경",year:"2022",no:1,q:"사람들이 여호와의 이름을 부른 때는 언제인가?",opts:["아담과 하와가 범죄하고 에덴 동산에서 쫓겨난 후부터","가인과 아벨이 여호와 하나님께 제사를 드릴 때부터","셋이 아들을 낳고 그의 이름을 에노스라고 부른 후부터","노아시대 홍수심판 후 방주에서 나온 후 제단을 쌓고 번제를 드린 때부터","아브람이 여호와의 명령을 따라 가나안 땅으로 간 후부터"],a:2,e:"<b>창세기 4:26</b> — 셋도 아들을 낳고 그의 이름을 <b>에노스</b>라 하였으며 그 때에 사람들이 비로소 여호와의 이름을 불렀더라."},
{subj:"성경",year:"2022",no:2,q:"이스라엘 자손들이 요단강을 건넌 후 유월절을 지킨 장소는?",opts:["기브온","에발산","여리고 평지","길갈","세겜"],a:2,e:"<b>여호수아 5:10</b> — 이스라엘 자손들이 길갈에 진 쳤고 그 달 십사일 저녁에는 <b>여리고 평지</b>에서 유월절을 지켰으며."},
{subj:"성경",year:"2022",no:3,q:"아합왕의 죄는 무엇인가?",opts:["벧엘과 단에 두 금송아지를 만들어 경배했다","사마리아에 바알과 아세라 상을 만들었다","레위 자손이 아닌 보통 사람으로 제사장을 삼았다","자기 마음대로 절기를 정하였다","남유다 왕국과 전쟁을 벌였다"],a:1,e:"<b>열왕기상 16:31-33</b> — 아합은 이세벨을 아내로 삼고 사마리아에 건축한 바알의 사당에 제단을 쌓으며 <b>아세라 상</b>을 만들었다. (나머지 보기는 여로보암의 죄)"},
{subj:"성경",year:"2022",no:4,q:"“너는 힘써 대장부가 되고 네 하나님 여호와의 명령을 지켜 그 길로 행하여 그 법률과 계명과 율례와 증거를 모세의 율법에 기록된 대로 지켜라. 그리하면 네가 무엇을 하든지 어디로 가든지 형통할지라”는 누가, 누구에게 한 말인가?",opts:["모세 → 여호수아","엘리야 → 엘리사","엘리 → 사무엘","기드온 → 300용사","다윗 → 솔로몬"],a:4,e:"<b>열왕기상 2:2-3</b> — <b>다윗</b>이 죽임이 임박하여 아들 <b>솔로몬</b>에게 남긴 유언이다."},
{subj:"성경",year:"2022",no:5,q:"창세기에서 족보가 나오지 않는 장은?",opts:["5장","10장","11장","21장","36장"],a:3,e:"<b>창세기 21장</b> — 이삭의 출생과 하갈/이스마엘이 쫓겨나는 내용이다. (5장: 아담 계보, 10장: 노아 아들들 계보, 11장: 셈의 계보, 36장: 에서 계보)"},
{subj:"성경",year:"2022",no:6,q:"출애굽기 1장 5절에 따르면 애굽에 내려간 야곱의 가족은 모두 몇 명이었나?",opts:["70명","75명","80명","85명","90명"],a:0,e:"<b>출애굽기 1:5</b> — 야곱의 허리에서 나온 사람이 모두 <b>칠십</b>이요."},
{subj:"성경",year:"2022",no:7,q:"“나무에 달린 자는 하나님께 저주를 받았음이니”라는 말이 기록되어 있는 책은?",opts:["창세기","레위기","출애굽기","민수기","신명기"],a:4,e:"<b>신명기 21:23</b> — 나무에 달린 자는 하나님께 저주를 받았음이니라. (바울이 갈라디아서 3:13에서 이 말씀을 인용함)"},
{subj:"성경",year:"2022",no:8,q:"므비보셋의 종의 이름과 다윗을 저주한 사람의 짝이 맞는 것은?",opts:["시므이, 아비새","시바, 시므이","시바, 아히도벨","후새, 아비멜렉","후새 시므이"],a:1,e:"<b>사무엘하 9장, 16장</b> — 사울의 손자 므비보셋의 종은 <b>시바</b>이고, 피난 가는 다윗을 향해 돌을 던지며 저주한 사람은 <b>시므이</b>이다."},
{subj:"성경",year:"2022",no:9,q:"요엘서에서 큰 군대로 비유된 곤충이 아닌 것은?",opts:["메뚜기","느치","황충","팥중이","여치"],a:4,e:"<b>요엘 1:4, 2:25</b> — 팥중이, 메뚜기, 느치, 황충이 언급되며 <b>여치</b>는 나오지 않는다."},
{subj:"성경",year:"2022",no:10,q:"스가랴가 유다 백성들에게 “너희가 좋게 여기거든 내 품삯을 내게 주고 그렇지 아니하거든 그만두라” 라고 말할 때에 그들이 은 얼마를 달아서 주었는가?",opts:["은 10개","은 20개","은 30개","은 40개","은 50개"],a:2,e:"<b>스가랴 11:12</b> — 그들이 곧 <b>은 삼십 개</b>를 달아서 내 품삯을 삼은지라. (가룟 유다가 예수님을 판 금액의 예언)"},
{subj:"성경",year:"2022",no:11,q:"“이는 물이 바다를 덮음같이 여호와의 영광을 인정하는 것이 세상에 가득함이니라” 는 하박국 몇 장 몇 절 인가?",opts:["1:14","2:4","2:14","3:4","3:14"],a:2,e:"<b>하박국 2:14</b> — 이는 물이 바다를 덮음 같이 여호와의 영광을 인정하는 것이 세상에 가득함이니라."},
{subj:"성경",year:"2022",no:12,q:"“지혜는 주의 이름을 경외함이니라 너희는 때가 예비되었나니 그것을 정하신 이가 누구인지 들을지니라” 라고 선포한 선지자는 누구인가?",opts:["아모스","오바댜","미가","나훔","스바냐"],a:2,e:"<b>미가 6:9</b> — 미가 선지자가 성읍을 향하여 외쳐 부른 말씀이다."},
{subj:"성경",year:"2022",no:13,q:"이사야가 히스기야 왕의 종처(腫處)에 붙이면 나으리라고 한 것은 무엇인가?",opts:["말씀","기름","몰약","무화과","감람나무열매"],a:3,e:"<b>이사야 38:21</b> — 이사야가 이르기를 한 뭉치 <b>무화과</b>를 가져다가 종처에 붙이면 왕이 나으리라 하였고."},
{subj:"성경",year:"2022",no:14,q:"“나의 힘이신 여호와여 내가 주를 사랑하나이다 여호와는 나의 반석이시요 나의 (     )시요 나를 건지시는 이시요 나의 하나님이시요 내가 그 안에 피할 나의 (     )시요 나의 (     )시요 나의 (    )이시요 나의 (    )이시로다“ (시편18:1-2)<br>빈 칸에 들어갈 말로 알맞은 것은 무엇인가?",opts:["요새-방패-바위-산성-구원의 뿔","방패-요새-산성-바위-구원의 뿔","바위-산성-요새-구원의 뿔-방패","요새-바위-방패-구원의 뿔-산성","산성-요새-바위-방패-구원의 뿔"],a:3,e:"<b>시편 18:2</b> — 여호와는 나의 반석이시요 나의 <b>요새</b>시요... 나의 <b>바위</b>시요 나의 <b>방패</b>시요 나의 <b>구원의 뿔</b>이시요 나의 <b>산성</b>이시로다."},
{subj:"성경",year:"2022",no:15,q:"솔로몬의 성전 봉헌 기도가 언급된 곳은 왕상 몇 장인가?",opts:["7장","8장","9장","10장","11장"],a:1,e:"<b>열왕기상 8장</b> — 언약궤를 성전으로 옮기고 솔로몬이 하나님께 올리는 장엄한 성전 봉헌 기도가 기록되어 있다."},
{subj:"성경",year:"2022",no:16,q:"“여호와 크고 두려우신 하나님이여 주를 사랑하고 주의 계명을 지키는 자 에게 언약을 지키시며 긍휼을 베푸시는 주여 간구하나이다”는 누구의 기도 인가?",opts:["느헤미야","에스라","모르드개","에스더","솔로몬"],a:0,e:"<b>느헤미야 1:5</b> — 예루살렘 성벽이 무너졌다는 소식을 듣고 <b>느헤미야</b>가 금식하며 올린 기도이다."},
{subj:"성경",year:"2022",no:17,q:"\"네 시작은 미약하였으나 네 나중은 심히 창대하리라\"는 누구의 말인가?",opts:["욥","소발","엘리후","빌닷","엘리바스"],a:3,e:"<b>욥기 8:7</b> — 욥의 친구인 수아 사람 <b>빌닷</b>이 한 말이다."},
{subj:"성경",year:"2022",no:18,q:"시편은 모두 몇 권으로 구성되어 있는가?",opts:["1권","2권","3권","4권","5권"],a:4,e:"<b>시편</b>은 모세오경과 같이 총 <b>5권</b>(제1권~제5권)으로 구성되어 있다."},
{subj:"성경",year:"2022",no:19,q:"“어떤 길은 사람이 보기에 바르나 필경은 사망의 길이니라” 잠언 몇 장에 기록되어 있는가?",opts:["13장","14장","15장","16장","17장"],a:1,e:"<b>잠언 14:12 = 16:25</b> — 이 구절은 두 곳에 토씨 하나 틀리지 않고 동일하게 나오므로 <b>14장(②)과 16장(④) 모두 정답</b>이다. (앱에서는 ②를 기준 정답으로 처리하나, ④도 옳음)"},
{subj:"성경",year:"2022",no:20,q:"음란한 고멜을 취해서 음란한 자식을 낳으라는 명령을 받은 선지자는?",opts:["호세아","요엘","아모스","스바냐","미가"],a:0,e:"<b>호세아 1:2</b> — 하나님이 <b>호세아</b>에게 음란한 여자를 맞이하여 음란한 자식들을 낳으라고 명하셨다."},
{subj:"성경",year:"2022",no:21,q:"예수님의 산상보훈의 팔 복중 연결이 잘못된 것은?",opts:["심령이 가난한 자 – 천국이 그들의 것","마음이 청결한 자 – 위로를 받음","온유한 자 – 땅을 기업으로 받음","긍휼히 여기는 자 – 긍휼히 여김을 받음","화평케 하는 자 – 하나님의 아들이라 일컬음을 받음"],a:1,e:"<b>마태복음 5:8</b> — 마음이 청결한 자는 <b>하나님을 볼 것임이요</b>. (위로를 받는 자는 '애통하는 자'이다.)"},
{subj:"성경",year:"2022",no:22,q:"마가복음 4장과 마태복음 13장에 공통적으로 언급된 비유는 무엇인가?",opts:["그물 비유","누룩 비유","진주비유","겨자씨 비유","숨겨진 보화 비유"],a:3,e:"<b>마가복음 4장, 마태복음 13장</b> — 씨 뿌리는 자 비유와 <b>겨자씨 비유</b>가 공통적으로 등장한다."},
{subj:"성경",year:"2022",no:23,q:"성령과 지혜가 충만하여 세운 일곱 집사 중에서 아닌 자는?",opts:["스데반","디몬","니골라","빌립","시므온"],a:4,e:"<b>사도행전 6:5</b> — 일곱 집사는 스데반, 빌립, 브로고로, 니가노르, 디몬, 바메나, 니골라이며 <b>시므온</b>은 포함되지 않는다."},
{subj:"성경",year:"2022",no:24,q:"“그리스도의 남은 고난을 그의 몸 된 교회를 위하여 내 육체에 채우노라”는 어느 서신에 기록되어 있는가?",opts:["갈라디아서","에베소서","빌립보서","골로새서","데살로니가전서"],a:3,e:"<b>골로새서 1:24</b> — 바울이 옥중에서 골로새 교회에 보낸 편지에 기록된 말씀이다."},
{subj:"성경",year:"2022",no:25,q:"생명의 성령의 법에 관하여는 로마서 몇 장에 기록되어 있는가?",opts:["6장","7장","8장","9장","10장"],a:2,e:"<b>로마서 8:2</b> — 이는 그리스도 예수 안에 있는 <b>생명의 성령의 법</b>이 죄와 사망의 법에서 너를 해방하였음이라."},
{subj:"성경",year:"2022",no:26,q:"야고보서 5장에서 기도의 교훈 중 나오는 구약의 인물은 누구인가?",opts:["모세","엘리야","엘리사","다윗","다니엘"],a:1,e:"<b>야고보서 5:17</b> — <b>엘리야</b>는 우리와 성정이 같은 사람이로되 그가 비가 오지 않기를 간절히 기도한즉..."},
{subj:"성경",year:"2022",no:27,q:"“만물의 마지막이 가까이 왔으니 그러므로 너희는 정신을 차리고 근신하여 기도하라”는 말씀은 베드로전서 몇 장에 나오는가?",opts:["1장","2장","3장","4장","5장"],a:3,e:"<b>베드로전서 4:7</b> — 만물의 마지막이 가까이 왔으니 그러므로 너희는 정신을 차리고 근신하여 기도하라."},
{subj:"성경",year:"2022",no:28,q:"“율법을 따라 거의 모든 물건이 피로써 정결하게 되나니 피 흘림이 없은즉 사함이 없느니라.”는 히브리서 몇 장 몇 절에 기록되어 있는가?",opts:["6:12","7:22","8:12","9:22","10:12"],a:3,e:"<b>히브리서 9:22</b> — 율법을 따라 거의 모든 물건이 피로써 정결하게 되나니 피 흘림이 없은즉 사함이 없느니라."},
{subj:"성경",year:"2022",no:29,q:"요한계시록의 “네가 죽도록 충성하라 그리하면 내가 생명의 관을 네게 주리라”는 어느 교회에게 주신 말씀인가?",opts:["에베소교회","안디옥 교회","서머나교회","버가모교회","두아디라교회"],a:2,e:"<b>요한계시록 2:10</b> — 환난과 궁핍을 겪는 <b>서머나 교회</b>에게 주신 칭찬과 위로의 말씀이다."},
{subj:"성경",year:"2022",no:30,q:"예수님의 유년 시절의 생활이 가장 많이 언급되어 있는 복음서는?",opts:["마태복음","마가복음","누가복음","요한복음","사도행전"],a:2,e:"<b>누가복음</b>은 다른 복음서에 없는 예수님의 탄생 배경, 목자들의 방문, 소년 시절 성전 방문(12살 때) 등이 상세히 기록되어 있다."},
{subj:"성경",year:"2022",no:31,q:"\"이는 참으로 이스라엘 사람이라 그 속에 간사한 것이 없도다\"는 예수님이 누구에게 한 말씀인가?",opts:["베드로","안드레","빌립","니고데모","나다나엘"],a:4,e:"<b>요한복음 1:47</b> — 예수께서 <b>나다나엘</b>이 자기에게 오는 것을 보시고 그를 가리켜 하신 말씀이다."},
{subj:"성경",year:"2022",no:32,q:"예수님에게 “아버지를 우리에게 보여 주옵소서.”라고 청한 제자는 누구인가?",opts:["빌립","안드레","야고보","바돌로매","도마"],a:0,e:"<b>요한복음 14:8</b> — <b>빌립</b>이 이르되 주여 아버지를 우리에게 보여 주옵소서 그리하면 족하겠나이다."},
{subj:"성경",year:"2022",no:33,q:"고린도교회 안에 존재하는 당파가 아닌 것은?",opts:["바나바","게바","바울","아볼로","그리스도"],a:0,e:"<b>고린도전서 1:12</b> — 고린도 교회 안에는 바울파, 아볼로파, 게바파, 그리스도파가 있었으며 <b>바나바파</b>는 없었다."},
// 교회사
{subj:"교회사",year:"2022",no:1,q:"영지주의자들과 달리 자신들의 교회를 세우고 최초로 정경화 작업을 하여 구약을 배제하고 누가복음과 바울서신들만 포함시킴으로 보편 교회의 정경화 작업을 가속화 시킨 이단은?",opts:["영지주의","마르시온주의","몬타누스주의","펠라기우스주의","아리우스주의"],a:1,e:"<b>마르시온주의</b>는 구약의 하나님을 열등한 신으로 보고 배격했으며, 자신들만의 축소된 정경(누가복음 일부와 바울서신)을 만들어 보편 교회의 정경화 작업을 자극했다."},
{subj:"교회사",year:"2022",no:2,q:"신약성서가 정경으로 결정된 연도와 장소는?",opts:["90년 얌니아","325년 니케아","381년 콘스탄티노플","397년 카르타고","451년 칼케돈"],a:3,e:"<b>397년 카르타고 공의회</b>에서 오늘날과 같은 신약성서 27권이 정경으로 최종 추인되었다. (90년 얌니아는 구약 정경 확정)"},
{subj:"교회사",year:"2022",no:3,q:"성부, 성자, 성령 하나님은 본질이 같지만 그 위격에서는 구분되고 그 위격에 있어서 성부는 성자가 아니며 성자는 성령이 아니며 성부는 성령이 아니다. 그리하여 “세 위격 한 본질(tres personae una substantia)”이라는 삼위일체의 근본개념을 형성한 서방교부는?",opts:["키프리아누스","터툴리아누스","오리게네스","히에로니무스","암브로시우스"],a:1,e:"<b>터툴리아누스</b>는 라틴어로 최초로 '삼위일체(Trinitas)'라는 용어를 사용하며 세 위격 한 본질의 개념을 정립했다."},
{subj:"교회사",year:"2022",no:4,q:"다음 중 십자군 원정(A.D. 1096-1291)의 동기와 관련이 없는 것은?",opts:["예루살렘 성지 회복에 대한 종교적 열망","동방교회에 대해 로마교회의 수위권을 과시하고자 하는 욕망","봉건영주들과 기사들 사이의 갈등을 밖으로 분출, 해소시키고자 하는 정치적 고려","레콩키스타 운동과의 연속성","비잔틴과 이슬람의 문화와 학문에 대한 대중의 동경"],a:4,e:"당시 서방 대중들은 이슬람 문화와 학문을 적대시했지 <b>동경</b>하지 않았다. 이슬람 학문 수용은 십자군 원정의 '동기'가 아니라 '결과적 영향' 중 하나이다."},
{subj:"교회사",year:"2022",no:5,q:"다음 중 동·서방 교회의 분열의 원인이라고 할 수 없는 것은?",opts:["서임권 논쟁","성상 숭배 논쟁","로마 교황과 콘스탄티노플 총대주교 간의 교권 다툼","동·서방 교회의 이질적인 언어와 문화","필리오퀘(filioque) 논쟁"],a:0,e:"<b>서임권 논쟁</b>은 11~12세기 서방 교회 내부에서 신성로마제국 황제와 로마 교황 간에 벌어진 권력 투쟁이다."},
{subj:"교회사",year:"2022",no:6,q:"칼뱅은 하나님께서 성도의 믿음을 돕기 위해 교회를 주셨고 그 안에 직분을 세우셨다고 말했다. 칼뱅이 말한 직분이 아닌 것은?",opts:["목사","장로","권사","교사","집사"],a:2,e:"칼뱅이 제네바 교회법규에서 제시한 4가지 직분은 목사, 교사(박사), 장로, 집사이다. <b>권사</b>는 한국 교회의 특수한 직분이다."},
{subj:"교회사",year:"2022",no:7,q:"독일 고백교회의 설립자 중의 한 사람으로 나치즘에 반대하며 『제자도의 대가(The Cost of Discipleship)』라는 책을 쓴 사람은?",opts:["몰트만","불트만","한스 큉","본회퍼","바르트"],a:3,e:"<b>디트리히 본회퍼</b>는 나치에 저항하다 순교했으며 『제자도의 대가』(나를 따르라)를 저술하여 값싼 은혜를 비판했다."},
{subj:"교회사",year:"2022",no:8,q:"웨스트민스터 신앙고백과 관계가 없는 것은?",opts:["청교도들과 영국 국교간 우호적인 분위기 속에서 제정됨","웨스트민스터 회의에서 제정됨","왕정에 반대하는 의회파가 중심이 되어 제정함","개혁교회의 신앙 및 제도와 헌법의 제정이라고 할 수 있음","신교는 성경 중심이고, 가톨릭은 교황 중심이라고 함"],a:0,e:"웨스트민스터 총회는 17세기 영국 내전 당시 찰스 1세(국교회 지지)와 의회파(청교도 중심)가 <b>치열하게 대립하고 내전을 벌이던 적대적 상황</b> 속에서 개최되었다."},
{subj:"교회사",year:"2022",no:9,q:"다음 중 제2차 바티칸 공의회(1962-1965)와 관계가 없는 것은?",opts:["평신도의 사도성 인정","요한 23세","가톨릭 교회의 현대화","교황 무오설 교리 확정","성서의 모국어 사용 인정"],a:3,e:"<b>교황 무오설</b>은 1870년 <b>제1차 바티칸 공의회</b>에서 확정된 교리이다."},
{subj:"교회사",year:"2022",no:10,q:"325년 니케아 공의회에서 결의한 내용이 아닌 것은?",opts:["부활절 날짜를 춘분 후 만월 다음 첫 주일로 정하였다.","성부는 성자와 동등하며 동일본질이며 영원한 분이시다.","아리우스를 이단으로 정죄하였다.","펠라기우스를 이단으로 정죄하였다.","황제의 권력이 교회 내부에 개입하는 악한 전례를 남겼다."],a:3,e:"원죄를 부정하고 인간의 자유의지를 강조한 <b>펠라기우스</b>는 431년 에베소 공의회(및 418년 카르타고 공의회 등)에서 정죄되었다."},
{subj:"교회사",year:"2022",no:11,q:"교회 밖에는 구원이 없다고 믿었기 때문에 데키우스 박해 시에 신앙의 변절자라도 회개하면 교회의 교제에 참여할 수 있도록 관용의 길을 열어 주고자 주장했던 사람은?",opts:["오리게네스","키프리아누스","암브로시우스","아타나시우스","노바티아누스"],a:1,e:"<b>키프리아누스</b>는 변절자(Lapsi)들을 영구 추방해야 한다는 노바티아누스의 엄격주의에 맞서, 회개와 적절한 권징 후 다시 받아들여야 한다고 주장했다."},
{subj:"교회사",year:"2022",no:12,q:"다음의 설명 중 교황 인노켄티우스 3세(재위 A.D. 1198-1216)에 관한 설명으로 틀린 것은?",opts:["제4차 라테란 공의회","도미니쿠스 수도회와 프란체스코 수도회와 같은 탁발 수도회 승인","영국의 존 왕과 프랑스의 필립 2세 왕을 파문함","황제 하인리히 4세와의 서임권 충돌","자신을 그리스도의 대리자로 확신하고 교황은 태양, 황제는 달이라고 주장함"],a:3,e:"황제 하인리히 4세와 '카노사의 굴욕(1077)'을 겪으며 서임권 투쟁을 벌인 교황은 인노켄티우스 3세가 아니라 <b>그레고리우스 7세</b>이다."},
{subj:"교회사",year:"2022",no:13,q:"동방 정교회(Eastern Orthodox church)에 대한 설명 중 틀린 것은?",opts:["제7차 공의회(787년)까지만을 인정하고, 공의회의 결의사항을 교리와 신앙의 근거로 삼는다.","최초의 5 총대주교좌(Pentarchy)는 로마, 콘스탄티노플, 알렉산드리아, 안티오키아, 예루살렘이다.","분열 이후 전통에 의하여 콘스탄티노플 총대주교에게 명예상의 수위권(primus inter pares)을 인정한다.","교황권과 필리오퀘(filioque) 문제로 1054년 라틴 서방교회와 영구적으로 분열하였다.","성경은 개신교와 마찬가지로 구약 39권과 신약 27권을 인정한다."],a:4,e:"<b>(인터넷 오답 수정 팩트체크)</b> 동방 정교회는 개신교 구약 39권 외에도 70인역에 포함된 <b>외경(제2경전)을 구약으로 인정</b>하므로 개신교와 성경 목록이 다르다."},
{subj:"교회사",year:"2022",no:14,q:"18세기 미국을 휩쓴 대각성 운동이 가져온 결과와 관계가 없는 것은?",opts:["외국 선교회의 창설","도덕심과 인도주의 향상","교회와 교단의 강력한 연합","복음주의적이고 초교파적인 활동이 생겨남","성경 반포 활발, 주일학교 운동 전개"],a:2,e:"제1차 대각성 운동은 영적 부흥을 이끌었으나, 신학적 견해 차이로 인해 구파(Old Lights)와 신파(New Lights)로 분열되는 등 오히려 <b>교단의 분열</b>을 초래하기도 했다."},
{subj:"교회사",year:"2022",no:15,q:"1618~1619년 사이 네덜란드 국회에서 진행된 회의로 칼뱅파와 알미니우스파 사이의 분쟁을 종결짓고 알미니우스의 도전으로부터 개혁파를 구한 회의는?",opts:["트렌트 회의","보름스 회의","아우구스부르크 회의","웨스트민스터 회의","도르트 회의"],a:4,e:"<b>도르트 회의</b>는 알미니우스주의를 정죄하고 칼뱅주의 5대 교리(TULIP)를 확립한 회의이다."},
{subj:"교회사",year:"2022",no:16,q:"1895년 미국의 뉴욕주 나이아가라 폭포 대회에서는 자유주의에 반대하여 기독교의 근본이념 5가지를 확정함으로써, 소위 근본주의가 태동되었다. 근본이념 5가지가 아닌 것은?",opts:["성경의 무오류성","성령 세례","십자가의 대속적 죽음","예수의 육체적 부활과 임박한 재림","예수 그리스도의 신성"],a:1,e:"근본주의 5대 교리는 성경 무오, 동정녀 탄생(신성), 대속적 죽음, 육체적 부활, 기적(또는 재림)이다. <b>성령 세례</b>는 오순절주의의 핵심 강조점이다."},
{subj:"교회사",year:"2022",no:17,q:"교조적 정통주의에 대한 반발로, 하나님의 영과의 직접적인 만남을 주장하였으며, 성령의 빛에 조명되면 몸을 떠는 신비적 체험을 중시한 퀘이커파(Quakers)를 창시한 사람은?",opts:["조지 폭스","필립 슈페너","친첸도르프","존 웨슬레","아우구스트 헤르만 프랑케"],a:0,e:"<b>조지 폭스</b>는 내면의 빛(Inner Light)을 강조하며 영국에서 퀘이커파를 창시했다."},
{subj:"교회사",year:"2022",no:18,q:"19세기 폭발적인 선교운동이 교회의 분열을 초래하자, 20세기에 교회들 간의 긴밀한 협력과 연합을 목표로 일어난 운동은?",opts:["경건주의 운동","복음주의 운동","사회개혁 운동","계몽주의 운동","에큐메니칼 운동"],a:4,e:"교회의 가시적 일치와 협력을 추구하는 <b>에큐메니칼 운동(교회 연합 운동)</b>에 대한 설명이다."},
{subj:"교회사",year:"2022",no:19,q:"성찬에 대한 칼뱅의 견해는 무엇인가?",opts:["화체설","공재설","기념설","영적임재설","임재설"],a:3,e:"가톨릭은 화체설, 루터는 공재설, 츠빙글리는 기념설, 칼뱅은 성령을 통해 그리스도께서 임재하신다는 <b>영적임재설</b>을 주장했다."},
{subj:"교회사",year:"2022",no:20,q:"이수정의 주요 활동 내역으로 보기 어려운 것은?",opts:["성경번역","미국에 선교사 요청","유학생 신앙공동체 형성","조선의 경제적 빈곤에 대한 경제 원조 요청","일본에서 세례를 받음"],a:3,e:"이수정은 일본에서 세례를 받고 마가복음을 번역했으며 미국 기독교계에 마게도냐인의 환상처럼 선교사를 요청했으나, <b>경제 원조를 요청</b>한 것은 아니다."},
{subj:"교회사",year:"2022",no:21,q:"우리나라에 파송된 선교사와 소속이 옳지 않은 것은?",opts:["맥켄지 – 캐나다장로회","언더우드 – 미국북장로회","데이비스 – 호주장로회","레이놀즈 – 미국남장로회","알렌 – 미국남장로회"],a:4,e:"제중원에서 활약한 최초의 의료 선교사 호러스 알렌은 미국 남장로회가 아니라 <b>미국 북장로회</b> 소속이다."},
{subj:"교회사",year:"2022",no:22,q:"일제가 만든 ‘개정사립학교 규칙’(1915)은 기독교학교에서 무엇을 금지시켰는가?",opts:["사도신경 및 주기도문 금지","찬송가 금지","태극기 게양 금지","정치활동 금지","성경교육과 예배 금지"],a:4,e:"1915년 포고된 개정사립학교 규칙은 정규 교과과정 내에서 종교교육, 즉 <b>성경교육과 예배를 금지</b>하여 기독교 학교를 탄압했다."},
{subj:"교회사",year:"2022",no:23,q:"1907년 9월 독노회 조직 후 첫 목사 안수를 받은 7인에 해당되지 않는 사람은?",opts:["한석진","길선주","이기풍","송인서","서상륜"],a:4,e:"1907년 평양신학교 1회 졸업생이자 최초의 7인 목사는 길선주, 방기창, 서경조, 송인서, 양전백, 이기풍, 한석진이다. <b>서상륜</b>은 서경조의 형으로 최초의 권서(전도자)이나 목사 안수를 받지는 않았다."},
{subj:"교회사",year:"2022",no:24,q:"우리나라에서 최초로 완역된 신구약성경(구역)이 출판된 연도는?",opts:["1908년","1911년","1914년","1919년","1920년"],a:1,e:"1900년 신약성경 완역에 이어 1910년에 구약이 완역되었고, 이를 합본하여 최초의 완역 신구약성경인 '구역'이 <b>1911년</b>에 출판되었다."},
{subj:"교회사",year:"2022",no:25,q:"“교회를 어머니로 가지지 않는 자는 하나님을 아버지로 모실 수 없다”고 주장한 사람은?",opts:["터툴리아누스","키프리아누스","오리게네스","아타나시우스","이레니우스"],a:1,e:"교회의 가시적 통일성과 권위를 강조하며 위와 같은 명언을 남긴 교부(감독)는 <b>키프리아누스</b>이다."},
{subj:"교회사",year:"2022",no:26,q:"중세교회라고 부를 수 있는 특징들을 교회에 부여한 인물은?",opts:["레오 1세","그레고리우스 1세","오토대제 1세","베네딕투스 9세","하인리히 4세"],a:1,e:"<b>그레고리우스 1세(대그레고리오)</b>는 연옥설, 성인 숭배, 교황권 강화 등 중세 가톨릭교회의 기초를 놓은 인물로 중세 교회의 출발점으로 평가받는다."},
{subj:"교회사",year:"2022",no:27,q:"종교개혁이 일어나게 된 원인과 관련이 없는 것은?",opts:["교황청의 부패","교황권 쇠퇴와 각국 국왕의 왕권 강화","상업 도시의 발달로 인한 도덕적 개선책 필요","성직자들의 착취로 농민들의 경제적 고통","종교적 각성으로 구원에 대한 관심 고조"],a:2,e:"종교개혁은 교황권 쇠퇴, 면벌부 판매 등 부패, 왕권(민족주의) 강화 등이 원인이었다. <b>상업 도시 발달로 인한 도덕적 개선</b>은 르네상스적 현상에 가깝고 종교개혁의 직접적 촉발 원인으로 보기 어렵다."},
{subj:"교회사",year:"2022",no:28,q:"존 녹스의 개혁정신이 아닌 것은?",opts:["교회는 국가에 복종","성경 절대 권위","만인제사장설","이신득의","하나님 절대주권"],a:0,e:"스코틀랜드의 종교개혁자 존 낙스는 폭군이나 우상숭배적 통치자(메리 여왕 등)에 대항하는 '저항권'을 주장했으므로 <b>교회는 국가에 복종</b>한다는 설명은 틀리다."},
{subj:"교회사",year:"2022",no:29,q:"서로 관계가 잘못 연결된 것은?",opts:["3천만을 그리스도에게 – 민족복음화 운동","1882년 최초 한글성경번역 – 존 로스","주기도문을 최초로 한글로 번역 – 귀츨라프","구세학당 - 언더우드","오산학교 – 안창호"],a:4,e:"오산학교를 세운 독립운동가는 <b>이승훈</b> 장로이다. 안창호는 대성학교를 설립했다."},
{subj:"교회사",year:"2022",no:30,q:"신사참배를 거부하여 1940년 9월에 투옥되고 1944년 4월에 옥사한 주기철 목사가 설교한 신사참배 거부를 위해 했던 설교의 제목은?",opts:["국기배례","일사각오","농민생활","측은지심","결사항전"],a:1,e:"주기철 목사의 순교 신앙을 대표하는 유명한 설교 제목은 <b>일사각오(一死覺悟)</b>이다."},
{subj:"교회사",year:"2022",no:31,q:"장로교회가 ‘합동’과 ‘통합’으로 분열된 직후, 통합교단이 합동교단과 관계복원을 위하여 세계교회협의회(WCC)에서 탈퇴했다가 다시 가입했는데, 그 연도는?",opts:["1965년","1966년","1967년","1968년","1969년"],a:4,e:"예장 통합은 합동과의 분열 과정(1959년)에서 보수파를 달래려 WCC를 일시 탈퇴했으나 합의가 무산되자 <b>1969년 제54회 총회</b>에서 공식적으로 WCC에 다시 가입했다."},
{subj:"교회사",year:"2022",no:32,q:"우리 교단에서 여성안수가 결의된 때는 몇 회기 총회인가?",opts:["제 77회 총회(1992)","제 78회 총회(1993)","제 79회 총회(1994)","제 80회 총회(1995)","제 81회 총회(1996)"],a:2,e:"예장 통합 총회는 <b>1994년 제79회 총회</b>에서 오랜 논의 끝에 여성 안수를 허락하기로 역사적인 결의를 하였다."},
{subj:"교회사",year:"2022",no:33,q:"데키우스가 로마 신들을 숭배할 것을 명하고 그 신들을 숭배한 사람들에게 증명서를 발급하였다. 당시 성도들은 십자가의 순교를 각오한 사람들과 박해에 굴복하고 신앙을 저버린 사람들로 나누어진다. 교회의 순수성을 지키기 위해 배교자들을 끝까지 추방해야 한다고 주장한 사람은?",opts:["키프리아누스","노바티아누스","카이킬리아누스","펠릭스","디오클레티아누스"],a:1,e:"박해 때 신앙을 부인한 변절자(Lapsi)들을 용서해서는 안 된다며 엄격주의를 주장하여 교회를 분열시킨 인물은 <b>노바티아누스</b>이다."},
// 헌법
{subj:"헌법",year:"2022",no:1,q:"신조에 대한 설명 중 옳은 것은?",opts:["성령이 직분을 행하실 때에 은혜를 베푸시는 방도는 성경과 성례와 기도이다","삼위는 한 하나님이시나 사역의 특성상 권능은 성부가 가장 크다","하나님의 창조세계에서 죄가 발생했음으로 죄의 궁극적인 근원은 창조에 있다","그리스도는 죄인을 구원하시기 위하여 죄인으로 세상에 오셨다","대한예수교장로회 헌법의 모든 규정은 성경에 근거하고 있다"],a:0,e:"<b>신조 제9조</b> — 성령께서 직분을 행하실 때에 은혜를 베푸시는 방도는 <b>말씀(성경)과 성례와 기도</b>이다. (성부는 권능이 동등하며, 죄의 근원은 창조가 아니고, 그리스도는 죄 없는 분으로 오셨다.)"},
{subj:"헌법",year:"2022",no:2,q:"권징에 대한 다음 설명 중 옳지 않은 것은?",opts:["권징은 교회의 질서를 유지하기 위한 것이다","권징은 신앙에 관한 것이다","권징은 도덕에 관한 것이다","권징은 국법에 관한 것이 아니다","국법으로 처벌받은 것은 어떤 경우에도 교회법으로 다시 권징할 수 없다"],a:4,e:"<b>권징 제3조</b> — 국가 재판에 의해 <b>금고 이상의 형이 확정된 범죄행위</b>는 교회의 권징 사유가 된다. (다시 권징할 수 없다가 틀림)"},
{subj:"헌법",year:"2022",no:3,q:"개회성수에 대한 다음의 설명 중 옳지 않은 것은?",opts:["당회의 개회성수는 당회원 과반수 출석이다","노회의 개회성수는 시무목사와 총대장로 각 과반수 출석이다","공동의회 개회는 회집된 회원으로 할 수 있다","제직회의 개회성수는 출석수이다","총회는 전국노회수 과반수의 참석과 회원(목사총대, 장로총대) 각 과반수의 출석으로 개회한다"],a:0,e:"<b>정치 제66조</b> — 당회의 개회성수는 <b>당회장(목사)을 포함한 당회원 과반수</b>의 출석으로 한다. ('당회장 포함' 조건이 빠져 오답으로 출제됨)"},
{subj:"헌법",year:"2022",no:4,q:"다음 중에서 책벌에 해당되지 않는 것은?",opts:["근신","시무정지","사직","출교","정직"],a:2,e:"<b>권징 제5조</b> — 교인의 책벌은 견책, 근신, 수찬정지, 출교이며, 직원의 책벌은 시무정지, 시무해임, 정직, 면직이다. <b>사직</b>은 스스로 직을 내려놓는 자의적 절차이지 책벌이 아니다."},
{subj:"헌법",year:"2022",no:5,q:"목사의 칭호에 대한 설명 중에 잘못된 것은?",opts:["위임목사는 지교회의 청빙으로 노회의 위임을 받은 목사다","담임목사는 노회의 허락을 받아 임시로 시무하는 목사다. 시무 기간은 3년이다","부목사는 위임목사를 보좌하는 목사다. 임기는 1년이며 연임할 수 있다","무임목사는 노회의 결의에 의한 시무처가 없는 목사다. 정당한 이유 없이 5년 이상을 계속 무임으로 있으면 목사의 직이 자동 해직된다","기관목사는 총회나 노회 및 관계 기관에서 교육, 문서 등 사업에 종사하는 목사다"],a:3,e:"<b>정치 제27조</b> — 무임목사가 정당한 이유 없이 <b>3년 이상</b> 계속 무임으로 있으면 목사의 직이 자동 해직(자동 사직)된다. (5년이 아님)"},
{subj:"헌법",year:"2022",no:6,q:"직원 선택에 관한 다음 설명 중 틀린 것은?",opts:["장로, 집사, 권사를 선택할 때 당회에서 후보자를 추천할 수 있다","당회에서 교육을 한 후에도 당회의 결의에 의하여 직원 임직을 보류할 수 있다","장로 투표는 한 노회 기간 동안 투표 횟수를 합하여 3차까지 할 수 있다","타 교단 소속 교회에서 이명한 장로는 노회 고시부의 면접 후 취임할 수 있다","목사, 장로, 집사, 권사를 신임 투표로 사임시킬 수 없다"],a:3,e:"<b>정치(헌법시행규정)</b> — 타 교단에서 이명한 장로는 '처음 선택할 때의 절차'(당회 청원·노회 허락·공동의회 신임 등)를 거쳐야 하며, '노회 고시부 면접 후 취임'만으로는 부족하다."},
{subj:"헌법",year:"2022",no:7,q:"다음 중 헌법의 구성 순서(차례)로 올바른 것은?",opts:["교리–예배와 예식–정치-권징","교리–정치–권징–예배와 예식","사도신경–신조–요리문답–신앙고백","정치–권징–행정쟁송–헌법시행규정","신조–정치–권징–예배모범"],a:1,e:"<b>예장통합 헌법 차례</b> — 제1편 교리, 제2편 <b>정치</b>, 제3편 <b>권징</b>, 제4편 <b>예배와 예식</b> 순으로 구성되어 있다."},
{subj:"헌법",year:"2022",no:8,q:"(   )안에 들어갈 것을 차례대로 적은 것은?<br>“담임목사의 청빙은 (   )의 결의와 (     )출석회원 (    )의 찬성을 얻어야 한다.”",opts:["당회, 공동의회, 과반수","당회, 공동의회, 3분의 2","노회, 공동의회, 과반수","당회, 제직회, 과반수","노회, 공동의회, 3분의 2"],a:3,e:"<b>정치 제28조</b> — 담임목사의 청빙은 <b>당회</b>의 결의와 <b>제직회</b> 출석회원 <b>과반수</b>의 찬성을 얻어야 한다."},
{subj:"헌법",year:"2022",no:9,q:"제직회에 관한 사항 중 잘못된 것은?",opts:["제직회 회원은 시무목사, 장로, 집사, 권사, 전도사, 서리집사로 한다","제직회 소집은 제직회장이 제직회 소집의 필요를 인정할 때 제직회장인 목사가 한다","제직회 소집은 교회 제직 과반수의 요청이 있을 때 제직회장인 목사가 한다","제직회 회장은 당회장이 되고 서기와 회계는 회에서 선정하며 필요에 따라 부서를 둘 수 있다","제직회 소집은 일주일 전에 광고하며, 개회성수는 출석수로 하고 결의는 과반수로 한다"],a:2,e:"<b>정치 제91조</b> — 제직회 소집은 교회 제직 <b>3분의 1 이상</b>의 요청이 있을 때 소집해야 한다. (과반수가 틀림)"},
{subj:"헌법",year:"2022",no:10,q:"(     )안에 들어갈 알맞은 것은?<br>“세례교인(입교인)된 교인의 권리는 성찬 참례권과 (     )이 있다. 단, (     )은 (     )세 이상으로 한다.”",opts:["공동의회 회원권, 성찬 참례권, 18","공동의회 회원권, 공동의회 회원권, 18","공동의회 회원권, 공동의회 회원권, 20","제직회 회원권, 제직회 회원권, 20","제직회 회원권, 성찬 참례권, 18"],a:1,e:"<b>정치 제16조</b> — 세례교인의 권리는 성찬 참례권과 <b>공동의회 회원권</b>이 있다. 단, <b>공동의회 회원권</b>은 <b>18세 이상</b>으로 한다."},
{subj:"헌법",year:"2022",no:11,q:"다음 중 제직회의 결의 사항이 아닌 것은 무엇인가?",opts:["공동의회에서 결정한 예산 집행","부동산 매매","재정에 관한 일반수지 예산 및 결산","구제비의 수입, 지출 및 특별 헌금 취급","세례교인 임명"],a:4,e:"<b>정치 제90조, 91조</b> — 세례교인의 문답과 입교(임명)는 제직회가 아니라 <b>당회의 고유 직무</b>이다."},
{subj:"헌법",year:"2022",no:12,q:"직원의 자격에 대한 설명 중 잘못된 것은 무엇인가?",opts:["목사의 자격은 무흠한 세례교인으로 10년을 경과한 자이어야 한다","담임목사는 노회의 허락을 받아 임시로 시무하는 목사다","장로의 자격은 무흠 세례교인으로 7년을 경과하고 40세 이상 된 자이어야 한다","집사는 무흠한 세례교인으로 5년을 경과하고 35세 이상 된 남자이어야 한다","권사는 무흠한 세례교인으로 5년을 경과하고 35세 이상 된 여자이어야 한다"],a:0,e:"<b>정치 제26조</b> — 목사의 자격은 무흠한 세례교인으로 <b>7년</b>을 경과한 자이어야 한다. (10년이 아님)"},
{subj:"헌법",year:"2022",no:13,q:"헌법정치 1장 1조의 내용이다. (   )안에 들어갈 것을 차례대로 적은 것은?<br>“(   )을 주재하는 이는 하나님뿐이시다. 그가 각인에게 (   )의 자유를 주어 신앙과 (   )에 대하여 (   )을 위반하거나 지나친 교훈이나 명령을 받지 않게 하셨다.”",opts:["교회, 신앙, 자유, 성경","양심, 마음, 사랑, 헌법","양심, 양심, 예배, 성경","양심, 신앙, 성경, 법률","양심, 양심, 행위, 성경"],a:2,e:"<b>정치 제1장 제1조</b> — <b>양심</b>을 주재하는 이는 하나님뿐이시다. 그가 각인에게 <b>양심</b>의 자유를 주어 신앙과 <b>예배</b>에 대하여 <b>성경</b>을 위반하거나 지나친 교훈이나 명령을 받지 않게 하셨다. (※ '행위'는 신조 제1조의 표현이며, 정치 제1조는 '예배'이다.)"},
{subj:"헌법",year:"2022",no:14,q:"행정쟁송의 종류가 아닌 것은 무엇인가?",opts:["총회특별재심 소송","결의취소 등의 소송","행정소송","치리회 간의 소송","선거무효소송 및 당선무효소송"],a:0,e:"<b>권징(행정쟁송 편)</b> — 행정쟁송의 종류는 행정소송, 결의취소 등의 소송, 치리회 간의 소송, 선거무효 소송 등이다. <b>총회특별재심 소송</b>은 일반 권징 재판의 불복 구제 절차이다."},
{subj:"헌법",year:"2022",no:15,q:"지교회를 설립하고자 할 때, 세례교인(입교인)이 몇 명 이상이 있어야 노회에 청원하여 허락을 받을 수 있는가?",opts:["10명","15명","20명","25명","30명"],a:1,e:"<b>정치 제10조</b> — 지교회를 설립하고자 할 때는 <b>세례교인(입교인) 15인 이상</b>이 있어야 노회에 청원하여 허락을 받을 수 있다."},
{subj:"헌법",year:"2022",no:16,q:"치리회에 대한 설명으로 잘못된 것은 무엇인가?",opts:["모든 치리회는 목사와 장로로 구성한다","치리회는 공동의회, 당회, 노회, 총회로 구분한다","각급 치리회는 고유한 특권이 있으나 순차대로 상급 치리회의 지도 감독을 받는다","치리회는 교회의 평화와 질서를 유지하며 행정과 권징의 권한을 행사한다","각급 치리회는 헌법이나 규칙에 대하여 이견이 있을 때는 상회의 유권적 해석에 의할 것이며 성경의 교훈대로 교회의 성결과 평화를 위하여 처리한다"],a:1,e:"<b>정치 제60조</b> — 치리회는 <b>당회, 노회, 총회</b>로 구분한다. (공동의회는 치리회가 아닌 평신도 최고 의결기구이다.)"},
{subj:"헌법",year:"2022",no:17,q:"다음은 니케아-콘스탄티노플 신조이다. (   ) 안에 알맞은 것은?<br>“우리는 또한 하나의 (   )하고 (   )이며 (   ) 교회를 믿습니다. 우리는 죄 사함을 위한 하나의 (   )만을 인정합니다. 우리는 죽은 자들의 (    )과 장차 임할 세상에서의 영생을 바라봅니다.”",opts:["거룩-보편적-사도적인-세례-부활","완전-보편적-사도적인-세례-부활","성결-보편적-사도적인-침례-부활","거룩-일반적-사도적인-침례-영생","완전-보편적-제사장적-세례-부활"],a:0,e:"<b>니케아-콘스탄티노플 신조</b> — 하나의 <b>거룩</b>하고 <b>보편적</b>이며 <b>사도적인</b> 교회를 믿습니다. <b>세례</b>만을 인정합니다. 죽은 자들의 <b>부활</b>을 바라봅니다."},
{subj:"헌법",year:"2022",no:18,q:"(   ) 안에 알맞은 것은?<br>“세례는 그리스도 안에서 (    )을 고백하는 자와 그들의 자녀에게 베푸는 것이요. 성찬은 그리스도의 (    )을 기념하여 (    )과 (   )에 참여하는 것이다.”(신조 제10조)",opts:["사랑, 부활, 포도주, 떡","믿음, 승천, 떡, 포도주","신앙, 죽으심, 떡, 잔","소망, 재림, 포도주, 떡","신앙, 임재, 떡, 잔"],a:2,e:"<b>신조 제10조</b> — 세례는 <b>신앙</b>을 고백하는 자에게 베풀고, 성찬은 그리스도의 <b>죽으심</b>을 기념하여 <b>떡</b>과 <b>잔</b>에 참여하는 것이다."},
{subj:"헌법",year:"2022",no:19,q:"노회가 지교회를 감독하는 치리권의 협조를 위하여 두는 것은 ?",opts:["당회","시찰회","노회","총회","선교회"],a:1,e:"<b>정치(노회 편)</b> — 노회는 지교회를 감독하는 치리권의 협조를 위하여 <b>시찰회</b>를 둔다."},
{subj:"헌법",year:"2022",no:20,q:"다음 신조에 대한 설명 중 (   ) 안에 들어갈 것은?<br>“(     )은 하나님의 말씀이니 (      )과 (     )에 대하여 (     )한 (     )의 법칙이다.”",opts:["성경–믿음–행위–정확–유일","신구약성경–신앙–교리–적확-하나","성경-구약-신약-공인-교리","사도신경-믿음-행위-요약-교리","신구약성경-신앙-행위-정확무오-유일"],a:4,e:"<b>신조 제1조</b> — <b>신구약성경</b>은 하나님의 말씀이니 <b>신앙</b>과 <b>행위</b>에 대하여 <b>정확무오</b>한 <b>유일</b>의 법칙이다."},
{subj:"헌법",year:"2022",no:21,q:"(   ) 안에 알맞은 것은?<br>“목사는 하나님의 말씀으로 (    )하며, (    )를 거행하고, 교인을 (    )하며, 장로와 협력하여 치리권을 행사한다.”",opts:["설교, 성례, 권면","설교, 장례, 축복","교훈, 세례, 권징","교훈, 주례, 축복","교훈, 성례, 축복"],a:4,e:"<b>정치 제25조</b> — 목사는 하나님의 말씀으로 <b>교훈</b>하며, <b>성례</b>를 거행하고, 교인을 <b>축복</b>하며, 장로와 협력하여 치리권을 행사한다."},
{subj:"헌법",year:"2022",no:22,q:"대한예수교장로회 신조가 아닌 것은?",opts:["신구약성경은 하나님의 말씀이니 신앙과 행위에 대하여 정확무오한 유일의 법칙이다","하나님은 한 분 뿐이시니 오직 그만 경배할 것이다","세상 모든 사람이 한 근원에서 났은즉 다 동포요 형제다","하나님의 본체에 삼위가 계시니 성부, 성자, 성령이시다","그리스도께서 정하신 법에 따라 총회 헌법을 제정, 치리하심을 믿는다"],a:4,e:"<b>12신조</b> — 총회 헌법 제정 및 치리에 관한 규정은 신조 본문이 아니라 장로교 정치 원리나 헌법 전문에 해당하는 내용이다."},
{subj:"헌법",year:"2022",no:23,q:"목사의 의의가 아닌 것은?",opts:["목사는 예수 그리스도의 양인 교인을 양육하는 목자이다","목사는 그리스도를 봉사하는 종 또는 사자이다","목사는 모든 교인의 모범이 되어 교회를 치리하는 장로이다","목사는 그리스도의 말씀으로 교인들을 깨우치는 교사이다","목사는 그리스도가 설립한 교회를 지키는 하나님의 도를 맡은 선지자이다"],a:4,e:"<b>정치 제24조</b> — 목사의 의의에서 목사를 '선지자'로 칭하지 않으며, 하나님의 도를 맡은 <b>청지기</b>로 정의한다."},
{subj:"헌법",year:"2022",no:24,q:"노회 재판국의 심판사항이 아닌 것은?",opts:["당회 재판국의 판결에 대한 항소사건","목사와 성도의 행위에 관련된 소송사건","헌법이 정하는 행정쟁송사건","당회장이 청원한 위탁재판사건","당회 기소위원회의 불기소결정에 대한 항고사건"],a:1,e:"<b>권징 제20조</b> — 노회 재판국은 목사에 관한 사건 및 <b>장로(성도가 아님)</b>의 노회원/총회원으로서의 행위에 관련된 소송사건을 심판한다."},
{subj:"헌법",year:"2022",no:25,q:"헌법에 명시된 당회가 비치할 명부가 아닌 것은 무엇인가?",opts:["헌금 대장 및 명부","세례교인(입교인) 명부","책벌 및 해벌 교인 명부","실종교인 명부","별세 명부"],a:0,e:"<b>정치 제71조</b> — 당회가 비치할 명부에는 세례교인, 유아세례교인, 책벌 및 해벌, 실종교인, 이명교인, 혼인, 별세 명부, 비품 대장, 부동산 대장 등이 있다. <b>헌금 대장 및 명부</b>는 당회가 아닌 제직회(재정부) 비치 서류에 가깝다."},
{subj:"헌법",year:"2022",no:26,q:"다음 중 권징의 목적이 아닌 것은?",opts:["하나님의 영광과 권위를 위하여","범죄를 미연에 방지하기 위하여","외부세력으로부터 교회를 지키기 위하여","교회의 신성과 질서를 유지하기 위하여","올바른 신앙생활을 하게 하기 위하여"],a:2,e:"<b>권징 제2조</b> — 권징의 목적은 하나님의 영광, 범죄 방지, 교회의 신성과 질서 유지, 올바른 신앙생활 인도 등이다. <b>외부세력으로부터 교회를 지키기 위함</b>은 명시되어 있지 않다."},
{subj:"헌법",year:"2022",no:27,q:"장로, 집사, 권사로 피택된 자가 받아야 하는 당회의 지도는 각 몇 개월인가?",opts:["장로-6개월, 집사/권사-4개월","장로-6개월, 집사/권사-3개월","장로-5개월, 집사/권사-3개월","장로-4개월, 집사/권사-3개월","장로-3개월, 집사/권사-2개월"],a:3,e:"<b>정치 제42조 등</b> — 임직 전 당회의 지도(교육) 기간은 장로는 <b>4개월 이상</b>, 집사와 권사는 <b>3개월 이상</b>이다."},
{subj:"헌법",year:"2022",no:28,q:"(   ) 안에 알맞은 것은?<br>“시무 중에 있는 목사가 3개월 이상 휴무를 원하는 경우 (    )의 결의와 (    )의 허락을 받아 휴무할 수 있다.”",opts:["임원회, 노회","제직회, 당회","공동의회, 노회","당회, 정치부","당회, 노회"],a:4,e:"<b>정치 제36조</b> — 시무목사가 3개월 이상 휴무하고자 할 때에는 <b>당회</b>의 결의와 <b>노회</b>의 허락을 받아야 한다."},
{subj:"헌법",year:"2022",no:29,q:"다음 중 대한예수교장로회 정치 원리에 해당되지 않는 것은?",opts:["양심의 자유","교회의 자유","진리와 행위","교회의 직원","교인의 자유"],a:4,e:"<b>정치 제1장</b> — 장로회 정치 원리는 1.양심의 자유, 2.교회의 자유, 3.진리와 행위, 4.교회의 직원, 5.치리권, 6.권징 등 6가지이다. <b>교인의 자유</b>는 포함되지 않는다."},
{subj:"헌법",year:"2022",no:30,q:"당회의 직무로서 옳지 않는 것은?",opts:["당회는 교인의 신앙과 행위를 통찰하며 세례, 입교할 자를 문답하며 세례식과 성찬식을 관장한다","당회는 예배를 주관하고 소속 기관과 단체를 감독하고 신령적 유익을 도모한다","당회는 장로, 집사, 권사를 임직한다","당회는 지교회의 토지, 가옥 등 부동산 그리고 교회의 헌금과 재정을 관리한다","당회는 범죄한 자를 소환 심문하고 증인의 증언을 청취하며 범죄한 증거가 명백할 때는 권징한다"],a:3,e:"<b>정치 제68조, 91조</b> — 당회는 지교회의 부동산을 '관리'하지만, 교회의 헌금과 재정 수지 예결산(관리)은 <b>제직회</b>의 직무이다."},
{subj:"헌법",year:"2022",no:31,q:"다음의 설명 중 옳지 않은 것은?",opts:["목사는 권징에 의하여 수찬정지나 시무정지 이상의 책벌을 한 번도 받은 사실이 없어야 임직할 수 있다","선교목사는 다른 민족에게 전도하기 위하여 외국에 파송한 목사다","은퇴목사는 정년이 되어 퇴임한 목사다","유학목사는 노회에서 허락받은 유학기간이 종료되면 노회의 연장허락을 받아야 한다","부목사의 청빙은 당회의 결의와 제직회 출석회원 과반수의 찬성을 얻어야 한다"],a:0,e:"<b>※ 정답 재확인 권장</b> — 가답안은 ①이나, 헌법은 '무흠'을 '시무정지 이상 책벌 받은 사실이 없음'으로 정의(제26조 무흠 규정)하므로 ①은 오히려 맞는 진술에 가깝다. 한편 ⑤는 부목사 청빙을 '제직회의 동의'가 아닌 '출석회원 과반수의 찬성'으로 서술해(제27조) 정답이 ⑤일 가능성이 있다. 시험 공식 정답 확인 요망."},
{subj:"헌법",year:"2022",no:32,q:"목사의 청빙에 관한 다음 설명 중 옳은 것은?",opts:["담임목사의 청빙은 당회의 결의와 공동의회 출석회원 과반수의 찬성을 얻어야 한다","노회의 폐회 중에는 위임(담임목사) 청빙에 한하여 노회 정치부의 결의를 거쳐 임원회가 승인할 수 있다","담임목사 연임 청원의 경우 제직 전원이 만장일치로 찬성하면 제직회를 본인이 인도할 수 있다","목사 청빙 승인은 노회 소집 통지서가 발송된 후에는 임원회와 정치부에서 할 수 있다","목사의 청빙 시 당회의 결의와 제직회 또는 공동의회 출석회원 만장일치의 찬성을 얻으면 모든 청빙 절차가 마무리된다"],a:1,e:"<b>정치 제29조</b> — 노회 폐회 중에는 목사 청빙을 <b>노회 정치부를 경유하여 임원회의 허락(승인)</b>으로 처리할 수 있다. (담임목사 청빙은 공동의회가 아니라 당회/제직회 관할임)"},
{subj:"헌법",year:"2022",no:33,q:"다음 중 공동의회의 필수 결의사항이 아닌 것은?",opts:["당회가 제시한 사항","예산 및 결산","직원선거","교회의 중요한 부동산 매각","상회가 지시한 사항"],a:3,e:"<b>정치 제90조, 제91조</b> — 예산 및 결산, 직원 선거, 당회/상회 지시 사항은 공동의회 결의 사항이나, <b>부동산 매매(매각)</b>는 제직회의 결의 사항이다."},

// ===================== 2023 기출문제 =====================

{subj:"성경",year:"2023",no:1,q:"괄호 안에 알맞은 말은 무엇인가?<br>“이는 멜기세덱이 아브라함을 만날 때에 레위는 이미 자기 조상의 (     )에 있었음이라”(히 7:10)",opts:["허리","무덤","족보","반열","기업"],a:0,e:"<b>히브리서 7:10</b> — 이는 멜기세덱이 아브라함을 만날 때에 레위는 이미 자기 조상의 <b>허리</b>에 있었음이라."},
{subj:"성경",year:"2023",no:2,q:"에스겔과 함께 바벨론으로 끌려간 왕은 누구인가?",opts:["여호야긴","여호야김","시드기야","요시야","므낫세"],a:0,e:"<b>에스겔 1:2</b> — <b>여호야긴</b> 왕이 사로잡힌 지 오 년 그 달 초닷새라."},
{subj:"성경",year:"2023",no:3,q:"괄호 안에 알맞은 말은 무엇인가?<br>“내 백성이 (      )이 없으므로 망하는도다 네가 (     )을 버렸으니 나도 너를 버려”(호4:6)",opts:["사랑","하나님","지식","진실","긍휼"],a:2,e:"<b>호세아 4:6</b> — 내 백성이 <b>지식</b>이 없으므로 망하는도다 네가 <b>지식</b>을 버렸으니 나도 너를 버려 내 제사장이 되지 못하게 할 것이요."},
{subj:"성경",year:"2023",no:4,q:"예수님이 4,000명을 먹이신 기사가 기록된 복음서는 무엇인가?",opts:["공관복음","4복음","마, 눅","마, 막","마, 요"],a:3,e:"<b>마태복음 15장, 마가복음 8장</b> — 떡 일곱 개와 생선 두어 마리로 4천 명을 먹이신 기적(칠병이어)은 <b>마태복음과 마가복음</b>에만 기록되어 있다."},
{subj:"성경",year:"2023",no:5,q:"누가복음에만 나오는 예수님의 비유는 무엇인가?",opts:["달란트","어리석은 부자","그물","알곡과 가라지","누룩"],a:1,e:"<b>누가복음 12장</b> — <b>어리석은 부자 비유</b>는 누가복음에만 나온다. (달란트/그물/알곡과 가라지는 마태, 누룩은 마태/누가)"},
{subj:"성경",year:"2023",no:6,q:"브리스길라와 아굴라 부부가 아볼로에게 복음을 가르친 곳은 어디인가?",opts:["광야","두란노","안디옥","데살로니가","에베소"],a:4,e:"<b>사도행전 18:24-26</b> — 알렉산드리아 출신 아볼로가 <b>에베소</b>에 이르렀을 때 브리스길라와 아굴라가 그를 데려다가 하나님의 도를 더 정확하게 풀어 이르렀다."},
{subj:"성경",year:"2023",no:7,q:"괄호 안에 알맞은 말은 무엇인가?<br>“여호와여 내 ( )에 파수꾼을 세우시고 내 ( )의 문을 지키소서”(시 141:3)",opts:["귀, 심장","귀, 입술","입, 입술","눈, 마음","눈, 발"],a:2,e:"<b>시편 141:3</b> — 여호와여 내 <b>입</b>에 파수꾼을 세우시고 내 <b>입술</b>의 문을 지키소서."},
{subj:"성경",year:"2023",no:8,q:"바울 사도 편지에서 “믿음의 역사, 사랑의 수고, 소망의 인내”로 칭찬받은 교회는 어디입니까?",opts:["갈라디아교회","고린도교회","데살로니가교회","안디옥교회","에베소교회"],a:2,e:"<b>데살로니가전서 1:3</b> — 너희의 믿음의 역사와 사랑의 수고와 우리 주 예수 그리스도에 대한 소망의 인내를... <b>데살로니가교회</b>를 향한 칭찬이다."},
{subj:"성경",year:"2023",no:9,q:"다윗이 사울을 피하여 도망할 때 진설병을 준 제사장의 이름은 무엇인가?",opts:["도엑","아비아달","아히멜렉","아비가일","미갈"],a:2,e:"<b>사무엘상 21장</b> — 다윗이 놉에 가서 제사장 <b>아히멜렉</b>에게 이르러 거룩한 떡(진설병)을 얻었다."},
{subj:"성경",year:"2023",no:10,q:"괄호 안에 알맞은 말은 무엇인가?<br>“사무엘이 돌을 취하여 (   )와 (   ) 사이에 세워 이르되 여호와께서 여기까지 우리를 도우셨다 하고 그 이름을 에벤에셀이라 하니라”(삼상 7:12)",opts:["미스바, 단","브엘세바, 단","여리고, 아이","브엘세바, 센","미스바, 센"],a:4,e:"<b>사무엘상 7:12</b> — 사무엘이 돌을 취하여 <b>미스바</b>와 <b>센</b> 사이에 세워 이르되 여호와께서 여기까지 우리를 도우셨다 하고..."},
{subj:"성경",year:"2023",no:11,q:"에스라 5장에서 성전 건축을 예언하고 격려한 선지자는 누구인가?",opts:["에스라-느헤미야","엘리야-엘리사","에스라-학개","느헤미야-예수아","학개-스가랴"],a:4,e:"<b>에스라 5:1</b> — 선지자들 곧 선지자 <b>학개</b>와 잇도의 손자 <b>스가랴</b>가..."},
{subj:"성경",year:"2023",no:12,q:"괄호 안에 알맞은 말은 무엇인가?<br>“예루살렘 딸들아 내가 비록 (    ) 아름다우니 (    )의 장막 같을지라도 솔로몬의 (    )과도 같구나”(아 1:5)",opts:["검으나, 양털, 휘장","검으나, 게달, 장막","검으나, 양털, 궁전","붉으나, 게달, 궁전","검으나, 게달, 휘장"],a:4,e:"<b>아가 1:5</b> — 예루살렘 딸들아 내가 비록 <b>검으나</b> 아름다우니 <b>게달</b>의 장막 같을지라도 솔로몬의 <b>휘장</b>과도 같구나."},
{subj:"성경",year:"2023",no:13,q:"괄호 안에 알맞은 말은 무엇인가?<br>“하나님의 (     )가 (     )로 (    )를 막는 사람들의 모든 경건하지 않음과 불의에 대하여 하늘로부터 나타나나니”(롬 1:18)",opts:["의, 불의, 진노","진노, 불의, 진리","공의, 진노, 불의","진노, 불의, 공의","진노, 불의, 의"],a:1,e:"<b>로마서 1:18</b> — 하나님의 <b>진노</b>가 <b>불의</b>로 <b>진리</b>를 막는 사람들의 모든 경건하지 않음과 불의에 대하여 하늘로부터 나타나나니."},
{subj:"성경",year:"2023",no:14,q:"로마서에서 유대인이 이방인보다 나은 이유는 무엇인가?",opts:["하나님의 말씀을 맡았기 때문","선택 받은 백성이라서","할례 받은 민족이라서","하나님의 자녀 됨으로","율법을 잘 지키는 민족이라서"],a:0,e:"<b>로마서 3:1-2</b> — 그런즉 유대인의 나음이 무엇이며 할례의 유익이 무엇이냐 범사에 많으니 우선은 그들이 <b>하나님의 말씀을 맡았음이니라</b>."},
{subj:"성경",year:"2023",no:15,q:"괄호 안에 알맞은 말은 무엇인가?<br>“유대인은 (     )을 구하고 헬라인은 (     )를 찾으나”(고전 1:22)",opts:["기적, 공의","표적, 지혜","표적, 공의","기적, 지혜","능력, 지혜"],a:1,e:"<b>고린도전서 1:22</b> — 유대인은 <b>표적</b>을 구하고 헬라인은 <b>지혜</b>를 찾으나."},
{subj:"성경",year:"2023",no:16,q:"괄호 안에 알맞은 말은 무엇인가?<br>“내가 예수 그리스도의 (     )으로 너희 무리를 얼마나 사모하는지 하나님이 내 (     )이시니라”(빌1:8)",opts:["생명, 보증","심장, 증인","심장, 증거","심장, 약속","생명, 증인"],a:1,e:"<b>빌립보서 1:8</b> — 내가 예수 그리스도의 <b>심장</b>으로 너희 무리를 얼마나 사모하는지 하나님이 내 <b>증인</b>이시니라."},
{subj:"성경",year:"2023",no:17,q:"레위기 23장에 나오는 절기가 아닌 것은?",opts:["유월절","무교절","초실절","수전절","오순절"],a:3,e:"<b>레위기 23장</b> — 이스라엘의 주요 절기(유월절, 무교절, 초실절, 칠칠절/오순절, 나팔절, 속죄일, 초막절)가 나온다. <b>수전절</b>은 신구약 중간기 마카비 혁명 이후에 생긴 명절이다."},
{subj:"성경",year:"2023",no:18,q:"모세의 노래는 신명기 몇 장에 기록되었는가?",opts:["30장","31장","32장","33장","34장"],a:2,e:"<b>신명기 32장</b> — 이스라엘 백성의 배교를 경고하며 모세가 부른 <b>모세의 노래</b>가 기록되어 있다. (33장은 모세의 축복)"},
{subj:"성경",year:"2023",no:19,q:"민수기 4장에서 이스라엘 진영이 이동할 때 성막의 휘장을 들고 회막과 그 덮개를 메는 일을 맡은 사람은 누구의 자손인가?",opts:["르우벤 자손","갓 자손","므낫세 자손","스블론 자손","게르손 자손"],a:4,e:"<b>민수기 4:25</b> — 곧 그들이 성막의 휘장들과 회막과 그 덮개와... <b>게르손 자손</b>이 멜 것은 이러하며."},
{subj:"성경",year:"2023",no:20,q:"사무엘하에서 다윗의 범죄에 대한 나단의 책망이 나오는 장은 어디인가?",opts:["9장","10장","11장","12장","13장"],a:3,e:"<b>사무엘하 12장</b> — 선지자 나단이 다윗에게 가서 '가난한 자의 암양 새끼' 비유를 통해 범죄를 책망하는 장이다."},
{subj:"성경",year:"2023",no:21,q:"엘리야 승천에 대한 기록은 열왕기하 몇 장에 나오는가?",opts:["2장","3장","5장","6장","7장"],a:0,e:"<b>열왕기하 2장</b> — 엘리야가 불수레와 불말을 타고 회오리바람으로 하늘로 승천하는 장면이 기록되어 있다."},
{subj:"성경",year:"2023",no:22,q:"“살구나무가지, 끓는가마, 무화과 두 광주리” 환상은 하나님께서 누구에게 보여주신 것인가?",opts:["이사야","예레미야","에스겔","아모스","호세아"],a:1,e:"<b>예레미야 1장, 24장</b> — 하나님이 <b>예레미야</b>를 부르시며 보여주신 환상들이다."},
{subj:"성경",year:"2023",no:23,q:"야곱이 하나님의 임재하심을 체험한 장소가 아닌 곳은?",opts:["벧엘","길르앗","브니엘","브엘세바","밧단아람"],a:1,e:"벧엘, 브니엘, 브엘세바, 밧단아람은 하나님이 직접 야곱에게 나타나신 곳이다. <b>길르앗</b>은 라반과 언약을 맺은 곳이며 하나님은 야곱이 아닌 라반의 꿈에 나타나셨다(창 31:24)."},
{subj:"성경",year:"2023",no:24,q:"레위기 14장에서 나병 환자의 1차 정결의식에 쓰이지 않는 것은?",opts:["산새","홍색실","우슬초","양","백향목"],a:3,e:"<b>레위기 14:4</b> — 산 새 두 마리와 백향목과 홍색 실과 우슬초를 가져오게 하였고, <b>양</b>(어린 숫양, 암양)은 8일째 되는 2차 정결의식에 드려진다."},
{subj:"성경",year:"2023",no:25,q:"혼인잔치 비유는 마태복음 몇 장에 기록되어 있는가?",opts:["13장","17장","22장","25장","27장"],a:2,e:"<b>마태복음 22장</b> — 임금이 아들을 위하여 베푼 <b>혼인 잔치 비유</b>가 기록되어 있다. (25장은 열 처녀 비유)"},
{subj:"성경",year:"2023",no:26,q:"바울의 편지 중 감사 인사가 없는 편지는 어느 것인가?",opts:["갈라디아서","에베소서","빌립보서","빌레몬서","골로새서"],a:0,e:"<b>갈라디아서</b> — 바울은 다른 서신들과 달리 문안 인사 후 감사 기도를 생략하고 곧바로 갈라디아 교회의 배교(다른 복음)를 책망한다."},
{subj:"성경",year:"2023",no:27,q:"다음 중 “주안에서의 기쁨”이 주제인 바울 서신은 어느 것인가?",opts:["갈라디아서","에베소서","빌립보서","골로새서","빌레몬서"],a:2,e:"<b>빌립보서</b> — 옥중 서신임에도 기쁨을 매우 강조하여 <b>'희락의 서신'</b>이라 불린다."},
{subj:"성경",year:"2023",no:28,q:"다음 중 “만물의 으뜸이신 그리스도”라는 주제로 한 바울서신은 무엇인가?",opts:["갈라디아서","에베소서","빌립보서","골로새서","빌레몬서"],a:3,e:"<b>골로새서</b> — 예수 그리스도의 탁월성(기독론)과 만물의 으뜸 되심을 가장 깊이 있게 다룬 서신이다."},
{subj:"성경",year:"2023",no:29,q:"다음 중 “네 이웃을 내 자신과 같이 사랑하라”는 말씀이 들어있지 않은 성경은 어디인가?",opts:["마태복음 22장","마가복음 12장","누가복음 12장","로마서 13장","갈라디아서 5장"],a:2,e:"<b>누가복음 12장</b> — 어리석은 부자 비유 등이 나오며 이웃 사랑 말씀은 없다. (누가복음은 10장 선한 사마리아인 비유 앞 구절에 나옴)"},
{subj:"성경",year:"2023",no:30,q:"“다른 이로써는 구원을 받을 수 없나니 천하 사람 중에 구원을 받을 만한 다른 이름을 우리에게 주신 일이 없음이라 하였더라”는 말씀은 어디에 기록되어 있는가?",opts:["행 3:11","행 3:12","행 4:11","행 4:12","행 5:11"],a:3,e:"<b>사도행전 4:12</b> — 공회 앞에 선 베드로가 담대히 선포한 복음의 핵심 구절이다."},
{subj:"성경",year:"2023",no:31,q:"“인자가 온 것은 섬김을 받으려 함이 아니라 도리어 섬기려 하고 자기 목숨을 많은 사람의 대속물로 주려 함이니라”는 말씀은 성경 어디에 기록 되어 있는가?",opts:["마 20:28, 막 9:45","마 20:28, 막 10:45","마 10:28, 막 9:45","마 10:28, 막 10:45","마 10:18, 막 9:35"],a:1,e:"<b>마태복음 20:28, 마가복음 10:45</b> — 세베대의 아들의 어머니가 청탁을 할 때 제자들에게 주신 교훈의 말씀이다."},
{subj:"성경",year:"2023",no:32,q:"우리가 다 실수가 많으니 만일 말에 실수가 없는 자라면 곧 “어떤 사람”이라고 하였는가?(약 3:2)",opts:["완전한 사람","완벽한 사람","탁월한 사람","온전한 사람","특별한 사람"],a:3,e:"<b>야고보서 3:2</b> — 우리가 다 실수가 많으니 만일 말에 실수가 없는 자라면 곧 <b>온전한 사람</b>이라 능히 온 몸도 굴레 씌우리라."},
{subj:"성경",year:"2023",no:33,q:"요한계시록에서 “네가 죽도록 충성하라 그리하면 내가 생명의 관을 네게 주리라”는 말씀은 어느 교회에 편지한 말씀인가?",opts:["에베소","서머나","버가모","두아디라","사데"],a:1,e:"<b>요한계시록 2:10</b> — 환난과 궁핍, 박해를 겪고 있는 <b>서머나 교회</b>를 향한 주님의 위로와 약속이다."},
{subj:"교회사",year:"2023",no:1,q:"장대현 교회에서 목사 안수를 받고 제주도로 파송된 최초의 제주도 선교사는 누구인가?",opts:["길선주","김익두","서경조","한석진","이기풍"],a:4,e:"<b>이기풍</b> — 1907년 독노회에서 안수를 받은 7인 목사 중 한 명으로, 총회의 결의로 제주도 첫 선교사로 파송되었다."},
{subj:"교회사",year:"2023",no:2,q:"대한예수교장로회 최초 총회조직 날짜는 언제인가?",opts:["1907년 9월 17일","1910년 10월 1일","1912년 9월 1일","1917년 9월 1일","1917년 9월 17일"],a:2,e:"<b>1912년 9월 1일</b> — 1907년 독노회가 발전하여 1912년 평양에서 최초로 조선예수교장로회 총회가 조직되었다."},
{subj:"교회사",year:"2023",no:3,q:"한국교회 최초로 한문 주기도문을 한글로 번역한 사람은 누구인가?",opts:["이수정","토마스","로스","귀츨라프","게일"],a:3,e:"<b>칼 귀츨라프</b> — 1832년 조선에 상륙하여 양이(양씨)의 도움을 받아 주기도문을 한글로 번역하였다."},
{subj:"교회사",year:"2023",no:4,q:"1884년 9월 20일 인천 제물포항에 첫 발을 디딘 최초의 내한 선교사는 누구인가?",opts:["언더우드","마포삼열","알렌","배위량","방위량"],a:2,e:"<b>알렌</b> — 언더우드와 아펜젤러(1885년)보다 앞서 1884년 갑신정변 무렵 입국하여 제중원을 세운 의료 선교사이다."},
{subj:"교회사",year:"2023",no:5,q:"일제의 신사참배를 거부하여 투옥, 옥사한 주기철 목사가 신사참배 거부에 관해 선포한 설교 제목은 무엇인가?",opts:["일사래위","일기당천","일사각오","정교분리","참배거부"],a:2,e:"<b>일사각오(一死覺悟)</b> — 주기철 목사의 순교 신앙을 대표하는 유명한 설교 제목이다."},
{subj:"교회사",year:"2023",no:6,q:"웨스트민스터 신앙고백과 관계가 없는 것은 무엇인가?",opts:["1643~1646년 영국에서 개최됨","칼뱅주의자들이 중심이 되어 제정함","개혁교회의 신앙 및 제도와 헌법의 제정이라 할 수 있음","청교도들과 영국국교 간 우호적인 분위기에서 제정됨","신교는 성경중심이고 가톨릭은 교황중심이라고 함"],a:3,e:"<b>내전 상황</b> — 의회파(청교도)와 왕당파(국교회) 간에 치열한 내전이 벌어지던 적대적 상황 속에서 개최되었으므로 '우호적인 분위기'는 틀렸다."},
{subj:"교회사",year:"2023",no:7,q:"자유주의 신학에 맞서 신정통주의를 주창한 신학자는 누구인가?",opts:["존 낙스","조나단 에드워즈","슐라이어마허","칼 바르트","불트만"],a:3,e:"<b>칼 바르트</b> — 로마서 강해를 통해 19세기 자유주의 신학에 철퇴를 가하고 신정통주의(말씀의 신학)를 주창하였다."},
{subj:"교회사",year:"2023",no:8,q:"부활절은 어느 회의에서 결정되었는가?",opts:["니케아 회의","칼케톤 회의","콘스탄티노플 회의","에베소 회의","카르타고 회의"],a:0,e:"<b>니케아 공의회(325년)</b> — 아리우스를 정죄하고, 부활절을 춘분 후 만월 다음 첫 주일로 통일하여 지키기로 결정했다."},
{subj:"교회사",year:"2023",no:9,q:"영지주의와 관계없는 내용은 무엇인가?",opts:["영지주의란 ‘지식’을 의미하는 그리스어 ‘그노시스’에서 나온 말이다.","1세기 말 지중해 연안의 종교와 철학 사상가들의 절충을 통해 만들어진 일종의 사색종교였다.","영혼은 선하고 물질은 악하다는 이원론적 태도를 취했다.","예수가 육체를 입는 것처럼 보일 뿐이라는 가현설을 주장했다.","아리스토텔레스 사상은 영지주의자들에게 결정적인 영향을 끼쳤다."],a:4,e:"<b>플라톤 철학</b> — 이데아(영)와 현상(물질)을 구분하는 플라톤의 이원론 철학이 영지주의에 결정적인 영향을 끼쳤다. 아리스토텔레스가 아니다."},
{subj:"교회사",year:"2023",no:10,q:"로마의 기독교 박해 이유와 관계가 없는 것은 무엇인가?",opts:["기독교 황제숭배 거부","로마의 윤리와 기독교 윤리의 충돌","로마 교회에 대한 비판","사교집단이라는 오해","유대인의 선동"],a:2,e:"<b>박해 원인</b> — 기독교인들이 로마제국을 비판한 것이 아니라, 황제 숭배를 거부하고 사교집단으로 오해받은 것이 박해의 핵심 이유였다."},
{subj:"교회사",year:"2023",no:11,q:"‘교회 안의 작은 교회’라는 경건한 소그룹 운동을 시도했으며, 평신도 사역의 중요성을 가르쳐 ‘만인제사장직’을 실현하려고 한 사람은 누구인가?",opts:["아른트","뵈메","조지폭스","베빙턴","슈페너"],a:4,e:"<b>필립 J. 슈페너</b> — 17세기 독일 경건주의 운동의 창설자로, 콜레기아 피에타티스(경건 모임)를 도입하였다."},
{subj:"교회사",year:"2023",no:12,q:"예수는 율법을 성취한 분이며 신의 자리에 높임을 받은 사람으로 이해하고, 예수를 믿는 동시에 율법을 준수해야 구원을 받을 수 있다고 주장한 모든 사상의 원조가 된 이단은 무엇인가?",opts:["몬타누스주의","마르키온주의","펠라기우스주의","에비온주의","도나투스주의"],a:3,e:"<b>에비온주의(에비온파)</b> — 할례와 율법 준수를 강요하며 예수의 신성을 부정하고 사람으로 평가절하한 유대교적 이단이다."},
{subj:"교회사",year:"2023",no:13,q:"다음 중 주일학교 운동의 창시자는 누구인가?",opts:["로버트 레이크스","토마스 아퀴나스","얀 후스","조나단 에드워즈","친첸도르프"],a:0,e:"<b>로버트 레이크스</b> — 1780년 영국의 평신도로서 길거리 빈민 아동들을 모아 가르치면서 주일학교 운동을 창설했다."},
{subj:"교회사",year:"2023",no:14,q:"자유주의 신학이 퍼져가는 가운데 종교를 ‘절대 의존의 감정’이라고 정의하면서 이성의 시대에서도 종교의 필요성을 주장했던 사람은 누구인가?",opts:["찰스 스펄전","조나단 에드워즈","슐라이어마허","친첸도르프","루터"],a:2,e:"<b>슐라이어마허</b> — 계몽주의와 이성 중심 시대에 종교의 독자적 영역(감정)을 변증하여 자유주의 신학의 아버지로 불린다."},
{subj:"교회사",year:"2023",no:15,q:"오늘날 장로교회의 성만찬론은 두 명의 종교개혁가의 사상에 따르고 있다. 두 명의 개혁가로 바르게 묶은 것은 무엇인가?",opts:["츠빙글리, 칼뱅","츠빙글리, 루터","칼뱅, 얀 후스","칼뱅, 루터","존 위클리프, 얀 후스"],a:0,e:"<b>츠빙글리와 칼뱅</b> — 장로교는 츠빙글리의 기념설 바탕 위에, 칼뱅의 영적 임재설을 핵심 교리로 삼아 성만찬을 이해한다."},
{subj:"교회사",year:"2023",no:16,q:"십자군 전쟁의 결과에 관한 설명으로 틀린 것은 무엇인가?",opts:["유럽 제국의 단결 촉구와 기독교 국가의 의식을 환기시켰다.","교황권이 쇠퇴하는 원인이 되었다.","새로운 무역활동의 무대를 제공함으로 서유럽에 번영을 가져오게 하였다.","전쟁으로 인해 동방과의 학문과 문화 교류가 어려워졌다.","이슬람 세력의 서방 침입을 저지하는데 성공하였다."],a:3,e:"<b>문화 교류 촉진</b> — 십자군 전쟁은 실패했으나 역설적으로 동방의 선진 학문(아리스토텔레스 철학 등)과 문화가 서방에 유입되어 르네상스를 자극했다."},
{subj:"교회사",year:"2023",no:17,q:"종교개혁이 일어나게 된 원인과 관련이 없는 것은 무엇인가?",opts:["상업 도시의 발달로 인한 도덕적 개선책 필요","각국 국왕의 왕권 강화","교황청의 부패","지방 교직의 착취로 농민들은 경제적 불안 상태","종교적 각성으로 구원에 대한 관심 고조"],a:0,e:"<b>도덕적 개선책 무관</b> — 상업 도시 발달로 도덕성이 개선되었다는 주장은 르네상스 흐름이며, 종교개혁을 촉발한 본질적인 원인(면벌부 등 부패)이 아니다."},
{subj:"교회사",year:"2023",no:18,q:"칼뱅과 관계없는 것은 무엇인가?",opts:["「기독교강요」를 저술함","스위스 제네바에서 출생함","현대 민주주의의 아버지라고 불리움","예정론을 강조","세르베테스를 화형시킴"],a:1,e:"<b>프랑스 출생</b> — 칼뱅은 스위스 제네바에서 종교개혁을 완성했으나, 출생은 프랑스 북부의 누아용(Noyon)이다."},
{subj:"교회사",year:"2023",no:19,q:"성직을 임명하는 교회의 권한은 무엇인가?",opts:["서임권","사도권","사제권","위임권","임직권"],a:0,e:"<b>서임권(Investiture)</b> — 중세 시대에 주교 등 고위 성직자를 임명하는 권리로, 이를 두고 교황(그레고리우스 7세)과 황제(하인리히 4세)가 크게 충돌했다."},
{subj:"교회사",year:"2023",no:20,q:"9세기 후반 미국 개신교의 뛰어난 복음전도자로서 죄에 의한 파괴, 그리스도의 구속, 성령에 의한 갱생의 내용이 담긴 부흥회 설교를 통해 미국과 영국을 뜨겁게 달구었고, 대중의 사랑을 받은 설교자는 누구인가?",opts:["죤 스토트","무디","빌리 그래함","토니 캠폴로","챨스 스펄젼"],a:1,e:"<b>D.L. 무디</b> — 19세기 후반(문제 지문의 9세기 후반은 19세기의 오타) 미국과 영국의 대중 부흥 운동을 이끈 세계적인 복음 전도자이다."},
{subj:"교회사",year:"2023",no:21,q:"교회 밖에는 구원이 없으며 교회를 어머니로 모시지 않는 자는 하나님을 아버지로 모실 수 없다고 믿으며 초대교회 박해에 굴복해서 비록 변절한 사람일지라도 회개하면 관용을 베풀어 교회에서 교제에 참여할 수 있도록 해야 한다고 주장한 사람은 누구인가?",opts:["노마티아누스","키프리아누스","몬타누스","디오클레티아누스","도나투스"],a:1,e:"<b>키프리아누스</b> — 노바티아누스의 영구 추방(엄격주의) 주장에 맞서, 배교자라 할지라도 회개하면 다시 품어야 함을 역설했다."},
{subj:"교회사",year:"2023",no:22,q:"마르키온주의와 관계가 없는 내용은 무엇인가?",opts:["2세기에 나타난 마르키온은 이단자라고 불렸다.","몬타누스주의의 계열에 속한 사상가 중 하나였다.","율법과 복음을 분리시켰다.","구약성서를 철저히 배격하였다.","누가복음과 바울서신만을 신앙의 표준인 성서로 인정했다."],a:1,e:"<b>서로 다른 이단</b> — 마르키온(구약 배격)과 몬타누스(시한부 종말·성령 직통 계시)는 초대교회의 대표적 이단이나 서로 계열이 다른 이단이다."},
{subj:"교회사",year:"2023",no:23,q:"삼위일체라는 신학적 용어를 최초로 사용한 서방 사람은 누구인가?",opts:["오리게네스","터툴리아누스","아우구스티누스","유스티누스","키프리아누스"],a:1,e:"<b>터툴리아누스</b> — 변증가 터툴리아누스가 신학적 개념을 라틴어로 삼위일체(Trinitas)라 명명했다."},
{subj:"교회사",year:"2023",no:24,q:"베스트팔렌 평화조약으로 종결된 전쟁은 무엇인가?",opts:["30년 전쟁","100년 전쟁","십자군 전쟁","위그노 전쟁","슈말칼덴 전쟁"],a:0,e:"<b>30년 전쟁(1618-1648)</b> — 이 조약으로 30년 간의 끔찍한 종교전쟁이 끝났고, 칼뱅파의 신앙의 자유가 최초로 공식 인정되었다."},
{subj:"교회사",year:"2023",no:25,q:"도미니쿠스 수도회가 강조한 분야는 무엇인가?",opts:["육체노동","학문탐구","신비주의","절대적 청빈","구제와 봉사"],a:1,e:"<b>도미니쿠스회</b> — 이단을 철저히 설득하고 개종시키기 위해 지적 무장을 매우 강조하여 토마스 아퀴나스 등 대학자를 배출했다."},
{subj:"교회사",year:"2023",no:26,q:"다음 중 칼 바르트와 관계없는 것은 무엇인가?",opts:["바르멘 선언","로마서 주석","하이델베르크 대학","신정통주의","교회교의학"],a:2,e:"<b>하이델베르크와 무관</b> — 바르트는 스위스 바젤, 독일 본 대학 등에서 주로 활동했다. 바르멘 선언과 교회교의학은 그의 대표적 업적이다."},
{subj:"교회사",year:"2023",no:27,q:"츠빙글리에 대한 설명으로 틀린 것은 무엇인가?",opts:["1484년 1월 1일 스위스에서 태어났다.","급진적인 재세례파에 반대하며 단순한 예식으로 성만찬을 진행하였다.","‘오직 하나님께 영광’이라는 개혁교회의 표어를 시작하였다.","취리히시의 사회와 정치적인 개혁을 위해 구휼법과 결혼법을 제정하였다.","루터와 함께 성만찬 시 그리스도의 육체적 임재가 이루어진다고 주장하였다."],a:4,e:"<b>성만찬 기념설</b> — 츠빙글리는 예수의 피와 살이 육체적으로 임재한다는 루터의 공재설을 정면 거부하고 성만찬은 영적 기념일 뿐이라 주장했다."},
{subj:"교회사",year:"2023",no:28,q:"개신교 선교사들의 입국 이전에 한국선교를 시도했던 사람으로 틀린 것은 누구인가?",opts:["귀츨라프","로버트 토마스","윌리엄스","모리슨","존 매킨타이어"],a:3,e:"<b>로버트 모리슨</b> — 중국 개신교 최초의 선교사로서 중국어 성경을 번역했으나, 한반도(조선)에 직접 선교를 시도하지는 않았다."},
{subj:"교회사",year:"2023",no:29,q:"1885년 4월에 제물포를 통해 우리나라에 입국한 언더우드와 아펜젤러는 누가 번역한 성경을 가지고 있었는가?",opts:["로스","매킨타이어","칼 귀츨라프","서상륜","이수정"],a:4,e:"<b>이수정 번역 마가복음</b> — 일본에 체류하던 이수정이 번역한 <마가복음서 언해>를 언더우드와 아펜젤러가 일본에서 받아 조선으로 들고 들어왔다."},
{subj:"교회사",year:"2023",no:30,q:"대한예수교장로회 통합교단과 합동교단의 분립은 몇 년도 총회에서 이루어졌는가?",opts:["1955년","1956년","1957년","1958년","1959년"],a:4,e:"<b>1959년 총회</b> — WCC(세계교회협의회) 가입 찬반 및 신학교 문제로 제44회 대전 총회에서 합동과 통합으로 분열되었다."},
{subj:"교회사",year:"2023",no:31,q:"1930년대 장로교회 여전도회전국연합회가 만주로 파송한 여성 선교사는 누구인가?",opts:["안대선","김순호","박에스더","서은숙","이경숙"],a:1,e:"<b>김순호</b> — 여전도회전국연합회 제4회 총회(1931년)에서 최초로 만주에 파송하기로 결의된 단독 여성 선교사이다."},
{subj:"교회사",year:"2023",no:32,q:"1907년에 장로회 교단에서 일어난 중요한 사건들이 아닌 것은 무엇인가?",opts:["평양 장대현 교회에서부터 회개운동이 시작되었다.","전국적인 부흥운동으로 100만인 구령운동이 일어났다.","독노회가 조직되어 12신조와 규칙을 채택하였다.","평양 장로회신학교에서 첫 번째 졸업생인 한국인 목사 6인이 안수를 받았다.","남감리교회 선교회 소속 선교사였던 하디의 회개 기도로 대부흥운동이 시작되었다."],a:1,e:"<b>100만인 구령운동은 1909~1910년 사건</b>이므로 1907년 사건이 아니다. (※ ④번의 목사 안수 인원은 6인이 아니라 <b>7인</b>이 맞으므로 지문에 오기가 있으나, 연도가 완전히 틀린 ②번이 출제 의도상 확실한 정답이다.)"},
{subj:"교회사",year:"2023",no:33,q:"한국 장로교회는 1907년 ‘소아회’라는 이름으로 주일학교를 시작하였다. 이 때 중심이 된 네 개의 교회 중 아닌 곳은 어디인가?",opts:["평양 장대현교회","장연 소래교회","선천 북교회","서울 연동교회","전주 서문교회"],a:1,e:"<b>한국 주일학교 초기 4대 교회</b> — 1907년 소아회(주일학교)가 태동한 중심 교회는 장대현교회, 선천 북교회, 서울 연동교회, 전주 서문교회이며 장연 소래교회는 해당되지 않는다."}, 
{subj:"헌법",year:"2023",no:1,q:"이 세상에 있어서 의롭다 하심과 양자로 삼으심과 거룩하게 하심과 그리고 이 세상에서 이것들을 곁따르거나 그것으로부터 나오는 혜택들이 아닌 것은 무엇인가?",opts:["하나님의 사랑에 대한 확신","양심의 평온","성령 안에서의 기쁨","용서와 인내","은혜의 증진과 견딤"],a:3,e:"<b>웨스트민스터 소요리문답 제36문</b> — 칭의, 양자됨, 성화에서 곁따라 나오는 유익은 하나님의 사랑에 대한 확신, 양심의 평안, 성령 안에서의 기쁨, 은혜의 증진과 끝까지 견딤이다. <b>용서와 인내</b>는 명시되어 있지 않다."},
{subj:"헌법",year:"2023",no:2,q:"다음 사항 중 옳지 않는 것을 고르시오.",opts:["지교회 설립 허가를 받으려면 세례교인(입교인) 15명 이상이 있어야 한다.","지교회 분립이나 합병은 당회와 공동의회의 결의로 노회의 허락을 받아야 한다.","지교회가 설립된 후 세례교인수가 15인 미만의 상태로 2년간 계속되면 노회는 이를 기도처로 변경한다.","지교회가 당회를 구성하면 조직교회가 될 수 있다.","지교회의 폐지는 당해 시찰위원회가 결의하고 노회의 허락을 받아야 한다."],a:4,e:"<b>정치 제12조</b> — 지교회의 폐지는 시찰위원회가 아니라 그 지교회의 <b>당회와 공동의회</b>의 결의로 노회의 허락을 받아야 한다."},
{subj:"헌법",year:"2023",no:3,q:"다음 중 옳은 것을 고르시오.",opts:["교인은 원입교인, 유아세례교인, 세례교인(입교인)으로 구분한다.","예수를 믿기로 결심하고 공동예배에 참석하는 자를 입교인이라 부른다.","세례교인은 유아 세례교인으로서 입교한 (15세 이상) 또는 원입교인(15세 이상)으로써 세례를 받은 자이다.","유아세례는 세례교인(입교인)의 자녀로 6세 이하이면 받을 수 있다","아동 세례는 7-15세 이하이면 받을 수 있다."],a:3,e:"<b>정치 제13조</b> — 유아세례는 세례교인의 자녀로 <b>6세 이하</b>이면 받을 수 있다. (아동세례는 7~12세, 세례교인 입교 연령은 13세 이상 [개정 2021.11.29])"},
{subj:"헌법",year:"2023",no:4,q:"목사에 관한 설명으로 맞지 않는 것은 무엇인가?",opts:["전도목사는 노회의 파송을 받는다.","선교목사는 총회의 파송을 받는다.","기관목사는 기관의 파송을 받는다.","유학목사는 노회의 허락을 받아야 한다.","무임목사는 노회의 결의에 의한 시무처가 없는 목사다."],a:2,e:"<b>정치 제27조</b> — 기관목사는 총회나 노회 및 관계기관에서 교육·문서 등 사업에 종사하는 목사이며, '기관의 파송'을 받는다는 규정은 없다. (전도목사=노회 파송, 선교목사=총회 파송)"},
{subj:"헌법",year:"2023",no:5,q:"[요리문답 1] “사람의 제일 되는 (     )은 (      )을 영화롭게 하고 영원토록 그를 즐거워하는 것입니다.” 괄호 안에 알맞은 말은 무엇인가?",opts:["목적, 천사들","목적, 하나님","사명, 인간","사명, 천사들","목적, 인간"],a:1,e:"<b>웨스트민스터 소요리문답 제1문</b> — 사람의 제일 되는 <b>목적</b>은 <b>하나님</b>을 영화롭게 하고 영원토록 그를 즐거워하는 것입니다."},
{subj:"헌법",year:"2023",no:6,q:"당회에 관한 설명 중 잘못된 것은 무엇인가?",opts:["당회 조직 후 장로 2인 미달 또는 세례교인(입교인)수가 30인 미달로 2년 경과한 후 첫 노회부터 당회가 폐지된다.","당회 조직 후 시무장로가 1인도 없으면 1년 후 첫 노회부터 폐당회가 된다.","당회는 지교회에서 시무하는 목사, 부목사, 장로 2인 이상으로 조직하되, 당회 조직은 세례 교인(입교인) 30인 이상이 있어야 한다.","대리당회장은 은퇴목사에게도 맡길 수 있다.","당회는 장로, 안수집사, 권사를 임직한다."],a:0,e:"<b>정치 제65조</b> — 당회 조직 후 장로 2인 미달, 세례교인 30인 미달 시 <b>3년</b>이 경과한 후 당회가 폐지된다. (2년이 아님)"},
{subj:"헌법",year:"2023",no:7,q:"장로의 직무에 대한 설명으로 가장 바르게 된 것은 무엇인가?",opts:["장로는 제직회의 택함을 받고 당회의 회원이 되어 목사와 협력하여 행정과 권징을 관장한다.","장로는 교회의 택함을 받고 치리회의 회원이 되어 목사와 협력하여 행정과 권징을 관장한다.","장로는 당회의 택함을 받고 노회의 회원이 되어 목사와 협력하여 행정과 권징을 관장한다.","장로는 교회의 택함을 받고 공동의회의 회원이 되어 목사와 협력하여 행정과 권징을 관장한다.","장로는 노회의 택함을 받고 당회의 회원이 되어 목사와 협력하여 행정과 권징을 관장한다."],a:1,e:"<b>정치 제40조</b> — 장로는 <b>교회의 택함</b>을 받고 <b>치리회의 회원</b>이 되어 목사와 협력하여 행정과 권징을 관장한다."},
{subj:"헌법",year:"2023",no:8,q:"공동의회의 결의사항이 아닌 것은 무엇인가?",opts:["교회 부동산 매입과 처분","예산과 결산","당회가 제시한 사항","직원 선거","상회가 지시한 사항"],a:0,e:"<b>정치 제90조, 제91조</b> — 교회 부동산의 매매(매입과 처분)는 공동의회가 아니라 <b>제직회의 결의 사항</b>이다."},
{subj:"헌법",year:"2023",no:9,q:"제직회의 결의사항이 아닌 것은 무엇인가?",opts:["공동의회에서 결정한 예산 집행","교인의 이명처리","부동산 매매","당회가 요청한 사항","재정에 관한 일반수지 예산 및 결산"],a:1,e:"<b>정치 제68조</b> — 교인의 이명 처리 등 신앙과 교적에 관한 사항은 <b>당회의 고유 직무</b>이다."},
{subj:"헌법",year:"2023",no:10,q:"권징의 사유가 되는 죄과가 아닌 것은 무엇인가?",opts:["직권을 남용하거나 직무를 유기한 행위","허위사실을 유포하여 교인 또는 직원의 명예를 훼손시킨 행위","재판국의 판결에 순응하지 아니하는 행위","파렴치한 행위로 국가 재판에 의해 금고 이상의 형이 확정된 양심 범죄 행위","치리회 석상, 제직회 또는 공동의회의 석상에서 폭언, 협박, 폭행, 상해, 재물손괴 행위"],a:3,e:"<b>권징 제3조</b> — 파렴치한 행위로 국가 재판에 의해 금고 이상의 형이 확정된 범죄행위가 권징 사유이나, <b>양심범은 제외한다</b>고 헌법에 명시되어 있다."},
{subj:"헌법",year:"2023",no:11,q:"괄호 안에 들어갈 것을 차례대로 적은 것은 무엇인가?<br>“교인이 신고 없이 교회를 떠나 의무를 행치 않고 (   )을 경과하면 회원권이 정지되고, (   )을 경과하면 실종교인이 된다.”",opts:["6개월 – 2년","1년 – 1년 6개월","1년 – 2년","1년 6개월 – 2년","6개월 – 1년"],a:4,e:"<b>정치 제18조</b> — <b>6개월</b> 경과 시 회원권 정지, <b>1년</b> 경과 시 실종교인이 된다."},
{subj:"헌법",year:"2023",no:12,q:"다음 중 회의의 개회성수가 잘못된 것은 무엇인가?",opts:["총회는 전국 노회 수 과반의 참석과 회원(목사 총대 및 장로 총대) 각 과반수의 출석으로 개회한다.","노회는 시무 목사와 총대 장로 각 과반수의 출석으로 개회한다.","당회는 당회장을 제외한 과반수의 출석으로 개회한다. 대리당회장도 성수에 포함되지 않는다.","제직회 개회는 출석수로, 결의는 과반수로 한다.","공동의회 개회는 회집된 회원으로 할 수 있다."],a:2,e:"<b>정치 제66조</b> — 당회는 당회장을 <b>포함한(제외한이 아님)</b> 과반수의 출석으로 개회한다."},
{subj:"헌법",year:"2023",no:13,q:"대한예수교장로회 정치원리가 아닌 것은 무엇인가?",opts:["진리와 행위","교회의 직원","양심의 자유","종교의 자유","치리권"],a:3,e:"<b>정치 제1장</b> — 정치 원리 6가지는 양심의 자유, 교회의 자유, 진리와 행위, 교회의 직원, 치리권, 권징이다. <b>종교의 자유</b>는 없다."},
{subj:"헌법",year:"2023",no:14,q:"“하나님이 제정하시고 우리 주 예수 그리스도에 의해서 복을 받은 제도이다. 이것은 인류의 행복과 복지를 위하여 제정되었고 성별된 것이다.”(웨스트민스터 신앙고백 제24장) 무엇에 관한 내용인가?",opts:["기독교의 성례","기독교의 할례","기독교의 결혼","기독교의 이혼","기독교의 재혼"],a:2,e:"<b>웨스트민스터 신앙고백 제24장</b> — 인류의 복지와 경건한 후손을 위해 제정된 <b>기독교의 결혼(혼인)</b>에 관한 내용이다."},
{subj:"헌법",year:"2023",no:15,q:"공동예배로 모이는 전도처 또는 기도처에 지교회를 설립하고자 하면, 노회에 청원하여 허락을 받아야 한다. 이 때 세례교인(입교인)이 몇 명 이상이 있어야 하는가?",opts:["3명 이상","5명 이상","10명 이상","15명 이상","20명 이상"],a:3,e:"<b>정치 제10조</b> — 지교회를 설립하려면 세례교인(입교인) <b>15인 이상</b>이 있어야 한다."},
{subj:"헌법",year:"2023",no:16,q:"장로는 상당한 식견과 통솔의 능력이 있고, 무흠 세례교인(입교인)으로 7년을 경과하고, 40세 이상 된 자 중에서, 당회의 결의로 노회의 허락을 받아 공동의회에서 선출한다. 이 때 공동의회 투표에서 얼마를 얻어야 선출될 수 있는가?",opts:["총 투표수의 3분의 2 이상","총 투표수의 과반수","출석회원의 3분의 2 이상","출석회원의 과반수","총 세례교인의 3분의 2 이상"],a:0,e:"<b>정치 제41조</b> — 공동의회에서 <b>총 투표수의 3분의 2 이상</b> 득표로 선출한다."},
{subj:"헌법",year:"2023",no:17,q:"안수집사와 권사는 무흠 세례교인(입교인)으로 5년을 경과하고, 35세 이상 된 각각 남자와 여자 중에서, 당회의 결의로 공동의회에서 투표수의 과반수 득표로 선출한다. 피택된 자는 얼마 동안 당회의 지도를 받아야 하는가?",opts:["2개월 이상","3개월 이상","4개월 이상","5개월 이상","6개월 이상"],a:1,e:"<b>정치 제55조 1항</b> — 안수집사와 권사 피택자는 임직 전 <b>3개월 이상</b> 당회의 지도를 받아야 한다. (장로는 4개월)"},
{subj:"헌법",year:"2023",no:18,q:"교회의 평화와 질서를 유지하며, 행정과 권징의 권한을 행사하기 위하여 당회, 노회, 총회로 구분되어 있는 것을 총괄하여 무엇이라고 지칭하는가?",opts:["치리회","공동의회","제직회","전권위원회","교회연합회"],a:0,e:"<b>정치 제60조</b> — 치리회는 당회, 노회, 총회로 구분하며 이를 총괄하여 <b>치리회</b>라 부른다."},
{subj:"헌법",year:"2023",no:19,q:"시무 중에 있는 목사의 휴무에 대하여 잘못된 것은 무엇인가?",opts:["해외유학을 하게 된 때","연구기관이나 교육기관 등에서 연수하게 된 때","신체, 정신상의 휴양을 요할 때","휴무기간은 2년 이내로 한다.","필요한 경우 1년 단위로 연장을 허락할 수 있으나 3년을 초과할 수 없다."],a:3,e:"<b>정치 제36조</b> — 목사의 휴무 기간은 <b>1년 이내</b>로 한다. (2년 이내가 틀림)"},
{subj:"헌법",year:"2023",no:20,q:"장로의 선택을 위한 투표는 ‘몇 차’까지만 할 수 있는가?",opts:["1","2","3","4","5"],a:2,e:"<b>정치 제41조</b> — 장로 투표는 한 노회 기간 동안 횟수를 합하여 <b>3차</b>까지만 할 수 있다."},
{subj:"헌법",year:"2023",no:21,q:"책벌의 종류와 내용이 맞지 않는 것은 무엇인가?",opts:["견책：죄과를 꾸짖고 회개하게 한다.","근신：2개월 이상 6개월 이내의 기간 죄과에 대한 반성문을 1회 이상 소속 치리회장에게 제출하게 하고, 행동을 삼가게 한다.","수찬정지：6개월 이상 1년 이내의 기간 수찬을 정지한다.","면직：직원의 신분을 박탈한다.","시무해임：3개월 이상 1년 이내의 기간 치리권(행정권과 권징권)을 정지한다."],a:4,e:"<b>권징 제5조</b> — 치리권(행정권과 권징권)을 정지하는 것은 <b>시무정지</b>이다. 시무해임은 그 직무에 한하여 모든 시무를 정지하는 것이다."},
{subj:"헌법",year:"2023",no:22,q:"“목사는 소속 (       )의 허락을 받아 전임할 수 있다.”에서 괄호 안에 알맞은 말은 무엇인가?",opts:["총회","노회","당회","제직회","공동의회"],a:1,e:"<b>정치 제34조</b> — 목사의 전임은 소속 <b>노회</b>의 허락을 받아야 한다."},
{subj:"헌법",year:"2023",no:23,q:"다음 중 헌법에 명시된 당회가 비치할 명부가 아닌 것은 무엇인가?",opts:["세례교인(입교인)명부","실종교인 명부","혼인명부","별세명부","재정 금전출납부"],a:4,e:"<b>정치 제71조</b> — <b>재정 금전출납부</b>는 당회 명부가 아니라 제직회(재정부)에서 주로 관리하는 장부이다."},
{subj:"헌법",year:"2023",no:24,q:"지교회의 분립과 합병은 지교회에서 제일 먼저 무엇을 받아야 하는가?",opts:["제직회와 당회 결의","당회와 공동회의 결의","공동회의와 시찰회 결의","제직회와 시찰회 결의","당회 결의와 노회 허락"],a:1,e:"<b>정치 제11조</b> — 지교회의 분립 및 합병은 당회와 공동의회의 결의(를 거쳐 노회의 허락)를 받아야 한다."},
{subj:"헌법",year:"2023",no:25,q:"헌법 예식서에 따른 예배와 예식에 명기된 목회기도의 요소가 아닌 것은 무엇인가?",opts:["경배","감사","자복","찬양","간구"],a:3,e:"<b>예배와 예식(목회기도)</b> — 목회기도의 요소는 경배, 감사, 자복, 간구, 중보이다. <b>찬양</b>은 목회기도의 요소가 아니라 별개의 예배 순서이다."},
{subj:"헌법",year:"2023",no:26,q:"괄호 안에 알맞은 단어는 무엇인가? “(     )가 있는 교회는 조직교회라고 하고, (     ) 없는 교회는 미조직 교회라고 한다.”",opts:["목사","제직회","당회","장로","부목사"],a:2,e:"<b>정치 제9조</b> — <b>당회</b>가 있는 교회를 조직교회라 하고, <b>당회</b>가 없는 교회를 미조직교회라 한다."},
{subj:"헌법",year:"2023",no:27,q:"다음 중 헌법에 명시된 교인의 권리는 무엇인가?",opts:["성찬 참례권과 공동의회 회원권","성찬 참례권과 예배 출석권","예배 출석권과 치리복종권","예배 출석권과 공동의회 회원권","성찬 참례권과 치리복종권"],a:0,e:"<b>정치 제16조</b> — 세례교인(입교인)의 권리는 <b>성찬 참례권</b>과 <b>공동의회 회원권</b>이다. (제15조는 교인의 '의무')"},
{subj:"헌법",year:"2023",no:28,q:"다음 중 헌법에 명시된 올바른 목사의 칭호가 아닌 것은 무엇인가?",opts:["위임목사","기관목사","전도목사","선교목사","군목목사"],a:4,e:"<b>정치 제27조</b> — 올바른 칭호 명칭은 군인들을 위해 일하는 <b>군종목사</b>이다. (군목목사는 명칭이 틀림)"},
{subj:"헌법",year:"2023",no:29,q:"권고 사임이 된 장로가 복직을 원하는 경우는 그 권고 사임사유가 해소되어야 하며, (  )의 찬성으로 결의하고 (  )의 복직결의를 받아야 한다. 괄호 안에 알맞은 말은 무엇인가?",opts:["당회원 3분의 2이상, 공동의회 회원수 3분의 2찬성","당회원 3분의 2이상, 공동의회 출석회원 3분의 2이상","당회원 과반수 이상, 제직회 회원수 과반수 이상","당회원 3분의 2이상 제직회 회원수 과반수 이상","당회원 과반수 이상 제직회 출석회원 과반수 이상"],a:1,e:"<b>정치 제47조 2항</b> — 권고사임 장로의 복직은 <b>당회원 3분의 2 이상</b>의 찬성으로 결의하고 <b>공동의회 출석회원 3분의 2 이상</b>의 복직 결의를 받아야 한다."},
{subj:"헌법",year:"2023",no:30,q:"다음은 니케아-콘스탄티노플 신조입니다. 괄호 안에 알맞은 말을 고르시오.<br>“우리는 또한 하나의 (    )하고 (    )이며 (    )교회를 믿습니다. 우리는 죄 사함을 위한 하나의 (    )만을 인정합니다. 우리는 죽은 자들의(    )과 장차 임할 세상에서의 영생을 바라봅니다.”",opts:["거룩 – 일반적 – 사도적인 – 침례 - 영생","완전 – 일반적 – 사도적인 – 세례 - 부활","성결 – 보편적 – 사도적인 – 침례 - 부활","완전 – 보편적 – 제사장적 – 세례 - 영생","거룩 – 보편적 – 사도적인 – 세례 - 부활"],a:4,e:"<b>니케아-콘스탄티노플 신조</b> — 하나의 <b>거룩</b>하고 <b>보편적</b>이며 <b>사도적인</b> 교회를 믿습니다. 하나의 <b>세례</b>, 죽은 자들의 <b>부활</b>을 바라봅니다."},
{subj:"헌법",year:"2023",no:31,q:"“원로 장로는 한 교회에서 20년 이상 장로로 시무하고 은퇴하는 경우에 (     ) 결의로 추대한다.”에서 괄호 안에 알맞은 말은 무엇인가?",opts:["공동의회의 투표 수 과반수","공동의회의 회원 수 과반수","공동의회의 출석회원 과반수","공동의회의 투표수 3분의2","공동의회의 출석회원 3분의2"],a:2,e:"<b>정치 제44조</b> — 원로장로는 한 교회에서 20년 이상 시무하고 은퇴할 때 공동의회의 <b>출석회원 과반수</b>의 결의로 추대한다. (원로'목사'는 공동의회 출석 2/3 추대로 다름)"},
{subj:"헌법",year:"2023",no:32,q:"“서리집사 임명은 신실한 세례교인(입교인)으로서 1년을 경과하고 교회에 등록한 후 (  ) 교인의 의무를 성실하게 이행한자 중에서 당회의 결의를 거처 당회장이 임명한다.”에서 괄호 안에 알맞은 말은 무엇인가?",opts:["등록즉시","2개월 이상","3개월 이상","6개월","1년 이상"],a:4,e:"<b>정치 제59조</b> — 무흠 세례교인으로 1년을 경과하고 교회에 등록한 후 <b>1년 이상</b> 교인의 의무를 성실히 이행한 자 중에서 당회의 결의를 거쳐 당회장이 임명한다."},
{subj:"헌법",year:"2023",no:33,q:"다음 중 공동의회의 소집에 관한 내용 중 틀린 것은 무엇인가?",opts:["당회장이 소집할 필요가 있을 때","당회의 결의로 소집한다. (상회의 지시가 있을 때는 예외)","제직회 청원이 있을 때 소집한다.","무흠세례교인(입교인) 3분의1 이상 청원이 있을 때","상회의 지시가 있을 때 청원한다."],a:0,e:"<b>정치 제90조</b> — '당회장이' 단독으로 필요를 인정하여 소집하는 것이 아니라 <b>당회의 결의</b>로 소집한다."},
