<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>목사고시 학습 — 예장통합 기출</title>
<style>
  :root{
    --ink:#1c1a17;
    --paper:#f4efe6;
    --paper-2:#ece4d6;
    --card:#fbf8f1;
    --line:#d8cdb9;
    --burgundy:#7a2230;
    --burgundy-soft:#9c3a48;
    --gold:#b08545;
    --green:#3f6b48;
    --green-soft:#e3efe3;
    --red:#a23030;
    --red-soft:#f6e3e0;
    --muted:#7c7363;
    --shadow:0 1px 2px rgba(40,30,15,.06),0 8px 24px rgba(40,30,15,.07);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{-webkit-text-size-adjust:100%}
  body{
    font-family:"Apple SD Gothic Neo","Malgun Gothic","Noto Sans KR",sans-serif;
    background:var(--paper);
    color:var(--ink);
    line-height:1.65;
    letter-spacing:-.01em;
    padding-bottom:80px;
  }
  .wrap{max-width:760px;margin:0 auto;padding:0 18px}

  /* Header */
  header{
    border-bottom:2px solid var(--ink);
    padding:30px 0 18px;
    margin-bottom:18px;
  }
  .kicker{
    font-size:12px;letter-spacing:.22em;text-transform:uppercase;
    color:var(--burgundy);font-weight:700;margin-bottom:8px;
  }
  h1{
    font-family:Georgia,"Times New Roman",serif;
    font-size:30px;font-weight:700;letter-spacing:-.02em;line-height:1.2;
  }
  h1 .sub{display:block;font-size:15px;font-weight:400;color:var(--muted);
    font-family:inherit;margin-top:6px;letter-spacing:0}

  /* Progress strip */
  .stats{
    display:flex;gap:0;margin:16px 0 0;border:1px solid var(--line);
    border-radius:10px;overflow:hidden;background:var(--card);box-shadow:var(--shadow);
  }
  .stat{flex:1;padding:11px 8px;text-align:center;border-right:1px solid var(--line)}
  .stat:last-child{border-right:none}
  .stat .n{font-size:21px;font-weight:700;font-family:Georgia,serif;display:block;line-height:1}
  .stat .l{font-size:11px;color:var(--muted);margin-top:4px}
  .stat.ok .n{color:var(--green)}
  .stat.bad .n{color:var(--red)}

  /* Controls */
  .controls{margin:18px 0 6px}
  .ctrl-row{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:9px;align-items:center}
  .ctrl-label{font-size:11px;color:var(--muted);width:46px;flex-shrink:0;font-weight:600}
  .chip{
    font:inherit;font-size:13px;padding:6px 13px;border:1px solid var(--line);
    background:var(--card);color:var(--ink);border-radius:30px;cursor:pointer;
    transition:all .15s;white-space:nowrap;
  }
  .chip:hover{border-color:var(--gold)}
  .chip.on{background:var(--ink);color:var(--paper);border-color:var(--ink)}
  .chip.freq.on{background:var(--gold);border-color:var(--gold);color:#fff}

  .mode-tabs{display:flex;gap:0;margin:14px 0 4px;background:var(--paper-2);
    border-radius:10px;padding:4px;border:1px solid var(--line)}
  .mode-tab{flex:1;text-align:center;padding:9px;font:inherit;font-size:14px;font-weight:600;
    border:none;background:none;color:var(--muted);cursor:pointer;border-radius:7px;transition:all .15s}
  .mode-tab.on{background:var(--burgundy);color:#fff;box-shadow:var(--shadow)}

  .toolbar{display:flex;justify-content:space-between;align-items:center;
    margin:16px 0 12px;font-size:13px;color:var(--muted)}
  .toolbar .pos{font-weight:600;color:var(--ink)}
  .btn-sm{font:inherit;font-size:12px;padding:5px 10px;border:1px solid var(--line);
    background:var(--card);border-radius:7px;cursor:pointer;color:var(--muted)}
  .btn-sm:hover{color:var(--burgundy);border-color:var(--burgundy-soft)}

  /* Card */
  .card{
    background:var(--card);border:1px solid var(--line);border-radius:14px;
    padding:24px 22px;box-shadow:var(--shadow);position:relative;
  }
  .card-top{display:flex;gap:7px;align-items:center;margin-bottom:14px;flex-wrap:wrap}
  .tag{font-size:11px;font-weight:700;padding:3px 9px;border-radius:5px;letter-spacing:.02em}
  .tag.subj{background:var(--ink);color:var(--paper)}
  .tag.subj.history{background:#3a4a63}
  .tag.subj.law{background:#5a4a3a}
  .tag.year{background:var(--paper-2);color:var(--muted);border:1px solid var(--line)}
  .tag.freq{background:var(--gold);color:#fff}

  .q{font-size:17.5px;font-weight:600;line-height:1.6;margin-bottom:18px;
    word-break:keep-all}
  .q .qnum{color:var(--burgundy);font-family:Georgia,serif;margin-right:4px}

  .opts{display:flex;flex-direction:column;gap:8px}
  .opt{
    text-align:left;font:inherit;font-size:15.5px;padding:12px 15px;
    border:1px solid var(--line);background:var(--paper);border-radius:9px;
    cursor:pointer;transition:all .13s;line-height:1.5;word-break:keep-all;
    display:flex;gap:10px;align-items:flex-start;
  }
  .opt .marker{font-weight:700;color:var(--muted);flex-shrink:0;font-family:Georgia,serif}
  .opt:hover{border-color:var(--gold);background:var(--card)}
  .opt.correct{background:var(--green-soft);border-color:var(--green);color:#274d2e}
  .opt.correct .marker{color:var(--green)}
  .opt.wrong{background:var(--red-soft);border-color:var(--red);color:#7a2020}
  .opt.wrong .marker{color:var(--red)}
  .opt.dim{opacity:.5}
  .opt:disabled{cursor:default}

  /* Flashcard reveal */
  .reveal-btn{
    width:100%;font:inherit;font-size:15px;font-weight:600;padding:14px;
    margin-top:4px;border:1.5px dashed var(--gold);background:transparent;
    color:var(--burgundy);border-radius:10px;cursor:pointer;transition:all .15s;
  }
  .reveal-btn:hover{background:rgba(176,133,69,.08)}

  .answer-box{margin-top:16px;border-top:1px dashed var(--line);padding-top:16px;
    display:none}
  .answer-box.show{display:block;animation:fade .25s}
  @keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
  .ans-label{font-size:12px;color:var(--muted);font-weight:600;letter-spacing:.05em;margin-bottom:5px}
  .ans-val{font-size:16px;font-weight:700;color:var(--green);margin-bottom:12px}
  .explain{font-size:14.5px;color:#46403a;background:var(--paper-2);
    padding:13px 15px;border-radius:9px;border-left:3px solid var(--gold);line-height:1.65;
    word-break:keep-all}
  .explain b{color:var(--burgundy)}

  /* self-grade buttons (flashcard) */
  .grade-row{display:flex;gap:9px;margin-top:14px}
  .grade{flex:1;font:inherit;font-size:14px;font-weight:600;padding:12px;border-radius:9px;
    cursor:pointer;border:1px solid transparent;transition:all .13s}
  .grade.know{background:var(--green-soft);color:var(--green);border-color:#bcd9bf}
  .grade.know:hover{background:#d2e7d4}
  .grade.dunno{background:var(--red-soft);color:var(--red);border-color:#e8c5c0}
  .grade.dunno:hover{background:#f0d4cf}

  /* Nav */
  .nav{display:flex;gap:10px;margin-top:18px}
  .nav button{flex:1;font:inherit;font-size:15px;font-weight:600;padding:13px;
    border:1px solid var(--ink);background:var(--card);border-radius:10px;cursor:pointer;
    transition:all .13s}
  .nav button:hover:not(:disabled){background:var(--ink);color:var(--paper)}
  .nav button.primary{background:var(--burgundy);color:#fff;border-color:var(--burgundy)}
  .nav button.primary:hover{background:var(--burgundy-soft)}
  .nav button:disabled{opacity:.35;cursor:default}

  .empty{text-align:center;padding:50px 20px;color:var(--muted)}
  .empty .big{font-size:40px;margin-bottom:12px}

  footer{text-align:center;font-size:11.5px;color:var(--muted);margin-top:28px;
    padding-top:16px;border-top:1px solid var(--line);line-height:1.7}
  footer b{color:var(--burgundy)}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="kicker">대한예수교장로회 · 통합</div>
    <h1>목사고시 학습 노트
      <span class="sub">기출 문제은행 · 능동 회상 &amp; 빈출 정리</span>
    </h1>
    <div class="stats">
      <div class="stat"><span class="n" id="st-total">0</span><span class="l">전체</span></div>
      <div class="stat ok"><span class="n" id="st-known">0</span><span class="l">아는 것</span></div>
      <div class="stat bad"><span class="n" id="st-wrong">0</span><span class="l">틀린/모름</span></div>
      <div class="stat"><span class="n" id="st-seen">0</span><span class="l">본 문제</span></div>
    </div>
  </header>

  <div class="controls">
    <div class="ctrl-row">
      <span class="ctrl-label">과목</span>
      <button class="chip subj-f on" data-subj="all">전체</button>
      <button class="chip subj-f" data-subj="성경">성경</button>
      <button class="chip subj-f" data-subj="교회사">교회사</button>
      <button class="chip subj-f" data-subj="헌법">헌법</button>
    </div>
    <div class="ctrl-row">
      <span class="ctrl-label">필터</span>
      <button class="chip freq" data-filter="freq">⭐ 빈출만</button>
      <button class="chip" data-filter="wrong">틀린 것만</button>
      <button class="chip" data-filter="shuffle">🔀 섞기</button>
    </div>
  </div>

  <div class="mode-tabs">
    <button class="mode-tab on" data-mode="flash">학습 (회상)</button>
    <button class="mode-tab" data-mode="quiz">시험 (채점)</button>
  </div>

  <div class="toolbar">
    <span class="pos" id="pos">— / —</span>
    <button class="btn-sm" id="reset">진행 초기화</button>
  </div>

  <div id="stage"></div>
</div>

<footer>
  <b>공부법:</b> 보기를 보기 전에 먼저 답을 떠올려 보세요(능동 회상). 모르면 솔직히 "모름"으로 표시해
  <b>틀린 것만</b> 모아 반복하는 게 핵심입니다.<br>
  ※ 답·해설은 학습을 돕기 위한 것이니 교재와 한 번씩 대조해 검증하세요. 진행 상황은 이 브라우저에 자동 저장됩니다.
</footer>

<script>
/* ============================================================
   문제은행
   각 항목: {subj, year, q, opts:[...], a:정답인덱스(0-base), e:해설, freq:빈출여부}
   필요하면 아래 배열에 같은 형식으로 계속 추가하면 됩니다.
   ============================================================ */
const BANK = [
/* ---------------- 성경 ---------------- */
{subj:"성경",year:"빈출",freq:true,q:"바울이 \"믿음의 역사, 사랑의 수고, 소망의 인내\"로 칭찬한 교회는?",
 opts:["갈라디아교회","데살로니가교회","고린도교회","안디옥교회","에베소교회"],a:1,
 e:"<b>데살로니가전서 1:3</b>. 거의 매년 출제되는 단골 문항. '소망의 인내'를 지킨 교회 = 데살로니가."},
{subj:"성경",year:"빈출",freq:true,q:"마태복음 13장과 마가복음 4장에 공통으로 나오는 비유는?",
 opts:["그물 비유","누룩 비유","진주 비유","겨자씨 비유","숨겨진 보화 비유"],a:3,
 e:"두 복음서의 천국 비유 중 <b>겨자씨</b>가 공통. 그물·진주·보화는 마태에만 나옴."},
{subj:"성경",year:"빈출",freq:true,q:"요한복음에서 예수님의 \"나는 ~이다(에고 에이미)\"가 <u>아닌</u> 것은?",
 opts:["생명의 떡","세상의 빛","양의 문","세상의 소금","선한 목자"],a:3,
 e:"'세상의 소금'은 산상수훈(마5:13)이며 요한복음의 에고 에이미 선언이 아님. '진리의 빛'도 같은 함정으로 출제됨."},
{subj:"성경",year:"빈출",freq:true,q:"예수님의 탄생을 기록한 복음서는?",
 opts:["마, 요","막, 눅","눅, 요","막, 요","마, 눅"],a:4,
 e:"탄생 기사는 <b>마태·누가</b>에만 있음. 마가는 사역부터, 요한은 로고스 선재로 시작."},
{subj:"성경",year:"빈출",freq:true,q:"예수님께서 야이로의 집으로 가시던 도중에 고쳐주신 병자는?",
 opts:["중풍병자","두 소경","혈루증을 앓는 여인","38년 병자","귀신들린 아이"],a:2,
 e:"막5장. 야이로의 딸을 살리러 가시던 길에 <b>혈루증 여인</b>을 고치심(이야기 속 이야기 구조)."},
{subj:"성경",year:"빈출",freq:true,q:"잠언에 \"작고도 가장 지혜로운 것 넷\"에 해당하지 <u>않는</u> 것은? (보기에 따라 답이 바뀜)",
 opts:["개미","사반","도마뱀","거머리 / 벌","메뚜기"],a:3,
 e:"잠 30:24-28의 넷 = <b>개미·사반·메뚜기·도마뱀</b>. '거머리'(30:15)나 '벌'은 여기 없음 → 보기에 끼는 그것이 답. 목록 자체를 외우세요."},
{subj:"성경",year:"빈출",q:"누가복음에만 나오는 예수님의 비유는?",
 opts:["가라지 비유","달란트 비유","어리석은 부자의 비유","씨 뿌리는 비유","겨자씨 비유"],a:2,
 e:"<b>어리석은 부자</b>(눅12), 선한 사마리아인, 잃은 동전, 탕자, 부자와 나사로 등이 누가 고유 비유."},
{subj:"성경",year:"2025",q:"소제물에 반드시 들어가야 할 것은?",
 opts:["꿀","소금","유향","누룩","기름"],a:1,
 e:"레 2:13 <b>소금 언약</b> — '네 모든 소제물에 소금을 치라'. 반대로 <b>꿀·누룩</b>은 금지(레2:11)."},
{subj:"성경",year:"2025",q:"모세는 몇 세에, 어디에서 죽었는가? (신 34장)",
 opts:["120세 — 벧브올 맞은편 모압 땅","130세 — 벧브올 맞은편 모압 땅","120세 — 세일 산","130세 — 세일 산","140세 — 요단 동편(미상)"],a:0,
 e:"<b>120세</b>, 벧브올 맞은편 모압 땅에서 죽고 장사됨. 눈이 흐리지 않고 기력이 쇠하지 않았다고 기록."},
{subj:"성경",year:"빈출",q:"사람들이 비로소 여호와의 이름을 부른 때는?",
 opts:["아담이 하와를 보았을 때","아벨이 제사를 드렸을 때","셋이 에노스를 낳았을 때","노아가 홍수 계시를 받았을 때","아브라함이 가나안으로 떠날 때"],a:2,
 e:"창 4:26 — 셋이 아들을 낳아 <b>에노스</b>라 하고, 그 때에 사람들이 비로소 여호와의 이름을 불렀음."},
{subj:"성경",year:"빈출",q:"\"오직 정의를 물 같이, 공의를 마르지 않는 강 같이 흐르게 할지어다\"는 어디에 있는가?",
 opts:["아모스 3:12","미가 3:8","아모스 5:24","미가 6:6","요엘 2:13"],a:2,
 e:"<b>아모스 5:24</b>. 형식적 제사보다 정의·공의를 강조한 대표 구절."},
{subj:"성경",year:"빈출",q:"베드로전서 2:9의 그리스도인 정체성 — 빈칸 순서로 맞는 것은? (택하신 ()이요 ()같은 제사장들이요 ()요 그의 소유가 된 ()이니… 아름다운 ()을 선포)",
 opts:["민족-왕-자녀된자-백성-소식","나라-왕-구원받은자녀-나라-덕","기업-금-거룩한나라-자녀-복음","족속-금-구원받은자녀-백성-복음","족속-왕-거룩한 나라-백성-덕"],a:4,
 e:"<b>택하신 족속 / 왕 같은 제사장들 / 거룩한 나라 / 그의 소유가 된 백성 / 아름다운 덕</b>을 선포."},
{subj:"성경",year:"빈출",q:"\"주 예수를 믿으라 그리하면 너와 네 집이 구원을 받으리라\"가 기록된 곳은?",
 opts:["사도행전 1:8","사도행전 9:31","사도행전 12:24","사도행전 16:31","사도행전 20:24"],a:3,
 e:"<b>행 16:31</b> — 빌립보 간수에게 바울과 실라가 한 말."},
{subj:"성경",year:"2025",q:"요한계시록을 기록한 장소는?",
 opts:["바보 섬","구브로 섬","사모 섬","그레데","밧모 섬"],a:4,
 e:"사도 요한이 <b>밧모 섬</b>에 유배 중 계시를 받아 기록(계 1:9)."},
{subj:"성경",year:"빈출",q:"성령의 아홉 가지 열매(갈 5:22-23) — 순서대로 맞는 첫 세 가지는?",
 opts:["사랑·희락·화평","사랑·오래참음·자비","믿음·소망·사랑","의·평강·희락","사랑·화평·온유"],a:0,
 e:"<b>사랑·희락·화평·오래참음·자비·양선·충성·온유·절제</b> 순. 주관식으로도 자주 나오니 순서까지 암기."},

 e:"\"사람의 제일 되는 <b>목적</b>은 <b>하나님</b>을 영화롭게 하고 영원토록 그를 즐거워하는 것\"."},
{subj:"헌법",year:"빈출",q:"목사에 관한 소송 및 장로의 노회원·총회원으로서의 행위 관련 소송의 재판 관할은?",
 opts:["당회재판국","시찰회재판국","노회재판국","총회재판국","수습전권위원회"],a:2,
 e:"목사 소송·장로의 상회원 행위 관련 소송은 <b>노회재판국</b> 관할."},
{subj:"헌법",year:"빈출",q:"권징 제4조 3항 — \"재판은 ()과 헌법 또는 헌법시행규정에 의해 공정하게 행하여야 한다\"의 빈칸은?",
 opts:["노회 규칙","총회 결의","성경","교회 내규","국법"],a:2,
 e:"재판은 <b>성경</b>과 헌법(시행규정)에 의해 공정하게. 권징의 최종 근거는 성경."},
{subj:"헌법",year:"빈출",q:"노회의 개회 성수는?",
 opts:["목사와 장로 총대 전체 과반수","시무목사와 총대장로 각 과반수 출석","목사 3분의 1 이상","총대장로 과반수","시무목사 과반수"],a:1,
 e:"노회 = <b>회원(시무목사와 총대장로) 각 과반수</b>의 출석으로 개회."},
{subj:"헌법",year:"빈출",q:"근신의 책벌 기간과 내용으로 맞는 것은?",
 opts:["1개월 이상 3개월 이내","2개월 이상 6개월 이내, 반성문 1회 이상 제출","3개월 이상 6개월 이내","6개월 이상 1년 이내","기간 없음"],a:1,
 e:"근신 = <b>2개월 이상 6개월 이내</b>, 반성문 1회 이상 소속 치리회장에게 제출 + 행동 삼감."},
];

/* ============================================================
   앱 로직
   ============================================================ */
const SUBJ_CLASS = {"성경":"","교회사":"history","헌법":"law"};
let state = {
  subj:"all", freqOnly:false, wrongOnly:false, shuffled:false,
  mode:"flash", idx:0, answered:false,
  list:[],
};
let progress = {}; // id -> {seen,known,wrong}

// persistence (works on GitHub Pages; degrades gracefully)
const STORE_KEY = "moksaProgress_v1";
function load(){ try{const r=localStorage.getItem(STORE_KEY); if(r) progress=JSON.parse(r);}catch(e){} }
function save(){ try{localStorage.setItem(STORE_KEY,JSON.stringify(progress));}catch(e){} }
function pid(item){ return item.subj+"|"+item.q.slice(0,40); }

function buildList(){
  let arr = BANK.map((b,i)=>({...b,_i:i}));
  if(state.subj!=="all") arr = arr.filter(x=>x.subj===state.subj);
  if(state.freqOnly) arr = arr.filter(x=>x.freq);
  if(state.wrongOnly) arr = arr.filter(x=>{const p=progress[pid(x)]; return p&&p.wrong;});
  if(state.shuffled){ for(let k=arr.length-1;k>0;k--){const j=Math.floor(Math.random()*(k+1));[arr[k],arr[j]]=[arr[j],arr[k]];} }
  state.list = arr;
  if(state.idx>=arr.length) state.idx=0;
}

function renderStats(){
  let known=0,wrong=0,seen=0;
  Object.values(progress).forEach(p=>{ if(p.seen)seen++; if(p.known)known++; if(p.wrong)wrong++; });
  document.getElementById("st-total").textContent=BANK.length;
  document.getElementById("st-known").textContent=known;
  document.getElementById("st-wrong").textContent=wrong;
  document.getElementById("st-seen").textContent=seen;
}

function render(){
  buildList();
  renderStats();
  const stage=document.getElementById("stage");
  const pos=document.getElementById("pos");

  if(state.list.length===0){
    pos.textContent="0 / 0";
    stage.innerHTML='<div class="empty"><div class="big">🗂️</div>조건에 맞는 문제가 없습니다.<br>필터를 바꿔보세요.</div>';
    return;
  }
  state.answered=false;
  const item=state.list[state.idx];
  pos.textContent=(state.idx+1)+" / "+state.list.length;
  const p=progress[pid(item)]||{};

  let tags='<span class="tag subj '+SUBJ_CLASS[item.subj]+'">'+item.subj+'</span>';
  tags+='<span class="tag year">'+item.year+'</span>';
  if(item.freq) tags+='<span class="tag freq">⭐ 빈출</span>';

  let opts=item.opts.map((o,i)=>{
    const mk=["①","②","③","④","⑤"][i]||(i+1);
    return '<button class="opt" data-oi="'+i+'"><span class="marker">'+mk+'</span><span>'+o+'</span></button>';
  }).join("");

  if(state.mode==="flash"){
    stage.innerHTML=
      '<div class="card"><div class="card-top">'+tags+'</div>'+
      '<div class="q"><span class="qnum">Q.</span>'+item.q+'</div>'+
      '<div class="opts" id="opts">'+opts+'</div>'+
      '<button class="reveal-btn" id="reveal">정답·해설 보기</button>'+
      '<div class="answer-box" id="abox">'+
        '<div class="ans-label">정답</div>'+
        '<div class="ans-val">'+(["①","②","③","④","⑤"][item.a])+' '+item.opts[item.a]+'</div>'+
        '<div class="explain">'+item.e+'</div>'+
        '<div class="grade-row">'+
          '<button class="grade dunno" id="g-dunno">✗ 아직 모름</button>'+
          '<button class="grade know" id="g-know">✓ 알겠음</button>'+
        '</div>'+
      '</div></div>'+
      navHTML();
    document.getElementById("reveal").onclick=()=>{
      document.getElementById("abox").classList.add("show");
      document.getElementById("reveal").style.display="none";
      // mark correct option
      const ob=document.querySelectorAll("#opts .opt");
      ob[item.a].classList.add("correct");
    };
    document.getElementById("g-know").onclick=()=>{grade(item,true);};
    document.getElementById("g-dunno").onclick=()=>{grade(item,false);};
  } else {
    stage.innerHTML=
      '<div class="card"><div class="card-top">'+tags+'</div>'+
      '<div class="q"><span class="qnum">Q.</span>'+item.q+'</div>'+
      '<div class="opts" id="opts">'+opts+'</div>'+
      '<div class="answer-box" id="abox">'+
        '<div class="explain">'+item.e+'</div>'+
      '</div></div>'+
      navHTML();
    document.querySelectorAll("#opts .opt").forEach(btn=>{
      btn.onclick=()=>{
        if(state.answered) return;
        state.answered=true;
        const chosen=parseInt(btn.dataset.oi);
        const correct=item.a;
        const ob=document.querySelectorAll("#opts .opt");
        ob.forEach((b,i)=>{ b.disabled=true; if(i!==correct&&i!==chosen) b.classList.add("dim"); });
        ob[correct].classList.add("correct");
        if(chosen!==correct){ btn.classList.add("wrong"); }
        document.getElementById("abox").classList.add("show");
        grade(item, chosen===correct, true);
      };
    });
  }
  wireNav();
}

function navHTML(){
  return '<div class="nav">'+
    '<button id="prev"'+(state.idx===0?' disabled':'')+'>← 이전</button>'+
    '<button class="primary" id="next">'+(state.idx===state.list.length-1?'처음으로':'다음 →')+'</button>'+
    '</div>';
}
function wireNav(){
  document.getElementById("prev").onclick=()=>{ if(state.idx>0){state.idx--;render();window.scrollTo({top:0,behavior:'smooth'});} };
  document.getElementById("next").onclick=()=>{ state.idx=(state.idx+1)%state.list.length; render(); window.scrollTo({top:0,behavior:'smooth'}); };
}

function grade(item, known, silent){
  const id=pid(item);
  const p=progress[id]||{seen:false,known:false,wrong:false};
  p.seen=true;
  if(known){ p.known=true; p.wrong=false; }
  else { p.wrong=true; p.known=false; }
  progress[id]=p; save(); renderStats();
  if(!silent){ // flashcard: auto-advance
    setTimeout(()=>{ state.idx=(state.idx+1)%state.list.length; render(); window.scrollTo({top:0,behavior:'smooth'}); },180);
  }
}

// controls
document.querySelectorAll(".subj-f").forEach(c=>c.onclick=()=>{
  document.querySelectorAll(".subj-f").forEach(x=>x.classList.remove("on"));
  c.classList.add("on"); state.subj=c.dataset.subj; state.idx=0; render();
});
document.querySelectorAll(".chip[data-filter]").forEach(c=>c.onclick=()=>{
  const f=c.dataset.filter;
  if(f==="freq"){ state.freqOnly=!state.freqOnly; c.classList.toggle("on"); }
  if(f==="wrong"){ state.wrongOnly=!state.wrongOnly; c.classList.toggle("on"); }
  if(f==="shuffle"){ state.shuffled=!state.shuffled; c.classList.toggle("on"); }
  state.idx=0; render();
});
document.querySelectorAll(".mode-tab").forEach(t=>t.onclick=()=>{
  document.querySelectorAll(".mode-tab").forEach(x=>x.classList.remove("on"));
  t.classList.add("on"); state.mode=t.dataset.mode; render();
});
document.getElementById("reset").onclick=()=>{
  if(confirm("진행 상황(아는 것/틀린 것 기록)을 모두 지울까요?")){ progress={}; save(); state.idx=0; render(); }
};

// keyboard
document.addEventListener("keydown",e=>{
  if(e.key==="ArrowRight"){ const n=document.getElementById("next"); if(n)n.click(); }
  if(e.key==="ArrowLeft"){ const p=document.getElementById("prev"); if(p&&!p.disabled)p.click(); }
  if(e.key===" "&&state.mode==="flash"){ const r=document.getElementById("reveal"); if(r&&r.style.display!=="none"){e.preventDefault();r.click();} }
});

load(); render();
</script>
</body>
</html>
