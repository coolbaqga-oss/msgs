<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>목사고시 실전 CBT — 예장통합</title>
<style>
  :root {
    --ink: #1c1a17;
    --paper: #f4efe6;
    --paper-2: #ece4d6;
    --card: #fbf8f1;
    --line: #d8cdb9;
    --burgundy: #7a2230;
    --burgundy-soft: #9c3a48;
    --gold: #b08545;
    --green: #3f6b48;
    --green-soft: #e3efe3;
    --red: #a23030;
    --red-soft: #f6e3e0;
    --muted: #7c7363;
    --shadow: 0 1px 2px rgba(40,30,15,.06), 0 8px 24px rgba(40,30,15,.07);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { -webkit-text-size-adjust: 100%; }
  body {
    font-family: "Apple SD Gothic Neo", "Malgun Gothic", "Noto Sans KR", sans-serif;
    background: var(--paper);
    color: var(--ink);
    line-height: 1.65;
    letter-spacing: -0.01em;
  }
  .app-container {
    max-width: 640px;
    margin: 0 auto;
    padding: 20px;
    padding-bottom: 80px;
  }
  header {
    border-bottom: 2px solid var(--ink);
    padding-bottom: 15px;
    margin-bottom: 15px;
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
  }
  h1 { font-size: 1.5rem; color: var(--burgundy); letter-spacing: -0.03em; margin-bottom: 5px;}
  
  /* 과목별 대시보드 */
  .dashboard {
    display: flex; gap: 5px; margin-bottom: 20px;
    background: var(--card); border: 1px solid var(--line);
    border-radius: 8px; padding: 10px; box-shadow: var(--shadow);
  }
  .dash-item {
    flex: 1; text-align: center; border-right: 1px solid var(--line);
  }
  .dash-item:last-child { border-right: none; }
  .dash-title { font-size: 0.75rem; color: var(--muted); }
  .dash-score { font-size: 1.1rem; font-weight: bold; color: var(--burgundy); }
  
  .filters {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 20px;
  }
  .chip {
    padding: 6px 12px;
    background: var(--paper-2);
    border: 1px solid var(--line);
    border-radius: 20px;
    font-size: 0.9rem;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s;
  }
  .chip.on {
    background: var(--burgundy);
    color: #fff;
    border-color: var(--burgundy);
  }
  
  .mode-tab {
    flex: 1;
    padding: 10px;
    text-align: center;
    background: var(--paper-2);
    border: 1px solid var(--line);
    cursor: pointer;
    font-weight: bold;
    color: var(--muted);
  }
  .mode-tab:first-child { border-radius: 8px 0 0 8px; }
  .mode-tab:last-child { border-radius: 0 8px 8px 0; }
  .mode-tab.on {
    background: var(--ink);
    color: #fff;
    border-color: var(--ink);
  }

  /* 카드 디자인 */
  .card {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 24px;
    box-shadow: var(--shadow);
    margin-bottom: 20px;
  }
  .q-meta { font-size: 0.85rem; color: var(--gold); font-weight: bold; margin-bottom: 10px; }
  .q-text { font-size: 1.2rem; font-weight: 600; margin-bottom: 20px; word-break: keep-all; }
  
  .options { display: flex; flex-direction: column; gap: 10px; }
  .opt {
    padding: 14px 16px;
    background: #fff;
    border: 1px solid var(--line);
    border-radius: 8px;
    cursor: pointer;
    transition: 0.2s;
    font-size: 1.05rem;
  }
  .opt:hover { border-color: var(--gold); background: var(--paper-2); }
  .opt.correct { background: var(--green-soft); border-color: var(--green); color: var(--green); font-weight: bold; }
  .opt.wrong { background: var(--red-soft); border-color: var(--red); color: var(--red); text-decoration: line-through; }
  .opt.dim { opacity: 0.5; cursor: not-allowed; }
  .opt.selected { background: var(--burgundy-soft); color: white; border-color: var(--burgundy); }
  
  .ans-box {
    margin-top: 20px;
    padding: 16px;
    background: var(--paper-2);
    border-left: 4px solid var(--gold);
    border-radius: 0 8px 8px 0;
    font-size: 0.95rem;
    display: none;
    animation: fadeIn 0.3s;
  }
  
  /* 50:50 듀얼 버튼 */
  .nav-btns { display: flex; gap: 10px; margin-top: 20px; }
  .nav-btn {
    flex: 1;
    padding: 14px;
    background: var(--card);
    color: var(--ink);
    border: 1px solid var(--line);
    border-radius: 8px;
    font-size: 1.05rem;
    font-weight: bold;
    cursor: pointer;
    transition: 0.2s;
  }
  .nav-btn.primary { background: var(--ink); color: #fff; border-color: var(--ink); }
  .nav-btn.primary:hover { background: var(--burgundy); border-color: var(--burgundy); }
  .nav-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* 시험모드 전용 CSS */
  .exam-timer {
    background: var(--burgundy);
    color: white;
    padding: 10px;
    text-align: center;
    font-size: 1.2rem;
    font-weight: bold;
    border-radius: 8px;
    margin-bottom: 20px;
    position: sticky;
    top: 10px;
    z-index: 100;
    box-shadow: var(--shadow);
  }
  .exam-submit-btn {
    display: block;
    width: 100%;
    padding: 15px;
    background: var(--ink);
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 1.1rem;
    font-weight: bold;
    margin-top: 30px;
    margin-bottom: 40px;
    cursor: pointer;
  }
  .exam-result-box {
    background: var(--card);
    border: 2px solid var(--burgundy);
    padding: 20px;
    border-radius: 8px;
    text-align: center;
    margin-bottom: 20px;
  }
  .wrong-badge {
    display: inline-block;
    background: var(--red-soft);
    color: var(--red);
    padding: 2px 8px;
    border-radius: 12px;
    font-size: 0.8rem;
    margin-left: 10px;
  }

  /* 토스트 알림 */
  #toast {
    visibility: hidden;
    min-width: 250px;
    background-color: var(--burgundy);
    color: #fff;
    text-align: center;
    border-radius: 8px;
    padding: 16px;
    position: fixed;
    z-index: 1000;
    left: 50%;
    bottom: 30px;
    transform: translateX(-50%);
    font-size: 0.95rem;
    box-shadow: var(--shadow);
  }
  #toast.show {
    visibility: visible;
    animation: fadein 0.5s, fadeout 0.5s 2.5s;
  }
  @keyframes fadein { from { bottom: 0; opacity: 0; } to { bottom: 30px; opacity: 1; } }
  @keyframes fadeout { from { bottom: 30px; opacity: 1; } to { bottom: 0; opacity: 0; } }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>

<div class="app-container">
  <header>
    <div>
      <div class="kicker">대한예수교장로회 · 통합</div>
      <h1>목사고시 실전 CBT</h1>
    </div>
    <button id="reset" style="background:transparent; border:none; color:var(--muted); text-decoration:underline; cursor:pointer;">기록 초기화</button>
  </header>

  <!-- 과목별 정답률 대시보드 -->
  <div class="dashboard">
    <div class="dash-item"><div class="dash-title">성경 정답률</div><div class="dash-score" id="score-bible">0%</div></div>
    <div class="dash-item"><div class="dash-title">교회사 정답률</div><div class="dash-score" id="score-history">0%</div></div>
    <div class="dash-item"><div class="dash-title">헌법 정답률</div><div class="dash-score" id="score-law">0%</div></div>
  </div>

  <!-- 필터 옵션 -->
  <div class="filters">
    <button class="chip year-f on" data-year="all">전체 연도</button>
    <button class="chip year-f" data-year="2015">2015 기출</button>
    <button class="chip year-f" data-year="2016">2016 기출</button>
    <button class="chip year-f" data-year="2017">2017 기출</button>
    <button class="chip year-f" data-year="2018">2018 기출</button>
    <button class="chip year-f" data-year="2019">2019 기출</button>
    <button class="chip year-f" data-year="2020">2020 기출</button>
    <button class="chip year-f" data-year="2025">2025 기출</button>
    
    <div style="width:100%; height:4px;"></div>
    
    <button class="chip subj-f on" data-subj="all">전체 과목</button>
    <button class="chip subj-f" data-subj="성경">성경</button>
    <button class="chip subj-f" data-subj="교회사">교회사</button>
    <button class="chip subj-f" data-subj="헌법">헌법</button>
    
    <div style="width:100%; height:4px;"></div>
    
    <button class="chip" data-filter="freq">⭐ 빈출 2배수</button>
    <button class="chip" data-filter="wrong">내가 틀린 문제</button>
    <button class="chip" data-filter="shuffle">🔀 랜덤 섞기</button>
    <button class="chip" style="border-color:var(--burgundy); color:var(--burgundy); font-weight:bold;" data-filter="wrongnote">🔥 약점 TOP(3회 이상)</button>
  </div>

  <!-- ✨ 카테고리(모드) 3분할 -->
  <div class="filters" style="display:flex; margin-bottom:20px;">
    <button class="mode-tab on" data-mode="study">학습 모드</button>
    <button class="mode-tab" data-mode="yearly">📚 연도별 기출</button>
    <button class="mode-tab" style="color:var(--red);" data-mode="exam">⏳ 실전 모의고사</button>
  </div>

  <!-- 콘텐츠 렌더링 영역 -->
  <div id="content-area"></div>
</div>

<!-- 토스트 알림창 -->
<div id="toast"></div>

<script>
// ==========================================
// 1. 데이터베이스 영역
// ==========================================
const allQuestions = [
  // =========================================================================
  // 💡 여기에 기존에 가지고 계신 기출문제 데이터를 그대로 복사해서 붙여넣으세요!
  // (렌더링 시간 단축을 위해 배열을 비워두었습니다)
  // =========================================================================
 // ===================== 2015년도 기출 =====================
  {subj:"성경",year:"2015",no:1,q:"다음 중 연결이 맞지 않는 것은?",opts:["창세기 4장 — 가인의 족보","창세기 5장 — 아담의 족보","창세기 6장 — 노아의 족보","창세기 9장 — 노아 아들들의 족보"],a:3,e:"노아 아들들(셈·함·야벳)의 족보는 <b>창세기 10장</b>(열국 분포). 창9장은 노아 언약. 창6:9 '노아의 족보', 창5장 아담 계보, 창4장 가인 후손."},
  {subj:"성경",year:"2015",no:2,q:"출애굽기 17장에 나타난 중요한 2가지 사건은?",opts:["므리바 사건 — 아말렉과의 전쟁","므리바 사건 — 만나를 주심","만나를 주심 — 지도자를 세움","아말렉과의 전쟁 — 지도자를 세움"],a:0,e:"출17장: 르비딤(맛사·<b>므리바</b>)에서 반석의 물 + <b>아말렉</b>과의 전쟁. 만나는 16장, 천부장 세움은 18장(이드로)."},
  {subj:"성경",year:"2015",no:3,q:"사사와 한 일이 맞지 않는 것은?",opts:["기드온 — 300명 용사","아비멜렉 — 맷돌 위짝에 맞아 죽음","입다 — 기생의 아들","드보라 — 시스라를 죽임"],a:3,e:"시스라를 죽인 이는 <b>야엘</b>(장막 말뚝, 삿4:21). 드보라는 바락과 함께한 사사."},
  {subj:"성경",year:"2015",no:4,q:"다음 중 연결이 잘못된 것은?",opts:["엘리야 — 수넴 여인의 아들을 살림","엘리야 — 까마귀로 먹을 것을 공급받음","엘리사 — 대머리","엘리사 — 선지자 가정의 빚 갚으려 그릇에 기름을 채움"],a:0,e:"수넴 여인의 아들을 살린 이는 <b>엘리사</b>(왕하4장). 엘리야가 살린 것은 사르밧 과부의 아들(왕상17장)."},
  {subj:"성경",year:"2015",no:5,q:"에스겔서에서 마른 뼈가 살아난 사건과 성전에서 물이 나와 강을 이루는 내용이 기록된 장은?",opts:["33장, 45장","7장, 40장","37장, 47장","31장, 45장"],a:2,e:"마른 뼈 환상 = <b>겔 37장</b>, 성전 문지방에서 흐르는 생명수 강 = <b>겔 47장</b>."},
  {subj:"성경",year:"2015",no:6,q:"다니엘이 사자굴에 들어갈 때 어인을 찍고 조서를 내린 왕은?",opts:["다리오","느부갓네살","벨사살","고레스"],a:0,e:"<b>다리오</b> 왕(단 6장). 느부갓네살=금신상·풀무불(3장), 벨사살=벽의 글씨(5장)."},
  {subj:"성경",year:"2015",no:7,q:"에베소서 6장에 나온 내용이 아닌 것은?",opts:["남편과 아내","부모와 자녀","종과 상전","하나님의 전신갑주"],a:0,e:"엡6장 = 자녀-부모, 종-상전, <b>하나님의 전신갑주</b>. '남편과 아내'는 엡5장."},
  {subj:"교회사",year:"2015",no:1,q:"초대교회 이단 중 유대교적 이단은?",opts:["에비온파","말시온파","영지주의","마니교"],a:0,e:"<b>에비온파</b> — 율법 준수 강조, 예수를 사람으로 봄. 말시온=구약 배격, 영지주의·마니교=이원론."},
  {subj:"교회사",year:"2015",no:2,q:"헬라 교부 중 이단을 배격하는 5권의 저서가 있고, 구약을 신약과 동등한 비중으로 논한 최초의 인물은?",opts:["클레멘트","이레니우스","오리겐","터툴리안"],a:1,e:"<b>이레니우스</b> — '이단논박(Adversus Haereses)' 5권. 영지주의 반박, 구약·신약 연속성 강조."},
  {subj:"교회사",year:"2015",no:5,q:"주후 800년경, 어거스틴의 『신의 도성』을 읽고 기독교 제국을 건설하려 했으며 십일조를 법제화하고 사도신경·주기도문·십계명을 널리 보급한 황제는?",opts:["콘스탄티누스","샤를마뉴","인노센트 3세","그레고리 1세"],a:1,e:"<b>샤를마뉴(카롤루스 대제)</b> — 800년 서로마 황제 대관. 카롤링거 르네상스, 교구제 개선."},
  {subj:"교회사",year:"2015",no:6,q:"종교개혁 전 개혁자 중 교회의 위선을 공박하고 『바보예찬』에서 교회의 타락을 비판한 사람은?",opts:["에라스무스","후스","위클리프","사보나롤라"],a:0,e:"<b>에라스무스</b>. '알을 낳은 자는 에라스무스, 부화시킨 자는 루터'."},
  {subj:"교회사",year:"2015",no:7,q:"빈칸 인물 연결 — '스위스 북부는 [ ]에 의해 취리히 중심으로, 남부는 베른 중심으로 [ ]에 의해 일어났고, [ ]은 제네바에서 성공했다.'",opts:["츠빙글리 - 파렐 - 칼뱅","파렐 - 츠빙글리 - 칼뱅","칼뱅 - 뮌처 - 츠빙글리","츠빙글리 - 베자 - 칼뱅"],a:0,e:"취리히=<b>츠빙글리</b>, 베른 일대=<b>파렐</b>, 제네바 성공=<b>칼뱅</b>(파렐의 권유로 정착)."},
  {subj:"교회사",year:"2015",no:8,q:"루터의 3대 논문 중 '교황청의 삼중 보루가 파괴되었다, 모든 신자는 다 사제다(만인사제주의)'를 담은 논문은?",opts:["교회의 바벨론 포로","로마 교황권에 관하여","독일 크리스천 귀족에게 고함","크리스천의 자유에 대하여"],a:2,e:"<b>독일 크리스천 귀족에게 고함</b> — 영적/세속, 성경 해석권, 공의회 소집권의 '세 담(보루)'을 무너뜨림."},
  {subj:"교회사",year:"2015",no:9,q:"칼뱅이 국가 구축의 필요 요소로 강조한 세 가지가 아닌 것은?",opts:["국가의 공직자","국가의 법","정교분리의 원칙","국민의 순종"],a:2,e:"칼뱅의 3요소 = 공직자(위정자)·법·백성(순종). <b>정교분리</b>는 해당 없음(교회·국가 협력 모델)."},
  {subj:"교회사",year:"2015",no:11,q:"스코틀랜드 종교개혁자로 갤리선 노예 19개월을 겪고, '스코틀랜드 신앙고백서'와 '공동의 예배모범'을 지은 사람은?",opts:["위클리프","존 낙스","토마스 크랜머","패트릭 해밀턴"],a:1,e:"<b>존 낙스</b> — 칼뱅 신학의 영향. 스코틀랜드 장로교의 기초."},
  {subj:"교회사",year:"2015",no:12,q:"18세기 경건주의 운동의 교회사적 공헌으로 잘못 설명한 것은?",opts:["교리논쟁용이 아니라 성령의 지도 아래 기도·명상하며 경건한 삶을 위해 성경을 읽음","교리 설교보다 주석 설교를, 구약보다 신약을 강조하고 중세 수도원운동을 강조함","목사후보생 교육을 강조하고 평신도의 위치를 높임","찬송가를 많이 만들고 해외 선교를 강조함"],a:1,e:"경건주의는 <b>중세 수도원운동을 강조하지 않음</b>. 나머지(주석 설교·신약 강조·평신도·찬송·선교)는 공헌이 맞음."},
  {subj:"교회사",year:"2015",no:13,q:"교회사 시대구분과 특징 연결이 잘못된 것은?",opts:["16세기 — 종교개혁 시대","18세기 — 경건주의, 교파 절대주의 시대","19세기 — 유럽의 세속화, 위대한 선교의 세기","20세기 — 에큐메니칼 운동"],a:1,e:"<b>교파(신조) 절대주의는 17세기 정통주의 시대</b>. 18세기는 경건주의·계몽주의 시대."},
  {subj:"교회사",year:"2015",no:14,q:"다음 중 틀린 것은?",opts:["1907.9.17 평양 장대현교회에서 독노회가 조직됨","독노회에서 평양신학교 1회 졸업 7인을 목사로 장립함","첫 독노회는 이기풍을 중국 산동성 선교사로 파송했고, 선교부 조직을 제일 중요 안건으로 다룸","'한국 장로교 첫 모임(독노회)은 사실상 선교사를 보내는 모임'이라고 블레어가 말함"],a:2,e:"이기풍은 <b>제주도</b> 선교사로 파송됨(중국 산동 파송은 1912년 총회 결정). 나머지는 맞음."},

  {subj:"성경",year:"2016",no:6,q:"예수님께서 제자들에게 가르쳐 주신 기도(주기도문)가 나타나는 곳은?",opts:["마 6장, 눅 11장","마 7장, 눅 11장","마 6장, 눅 12장","마 7장, 눅 12장"],a:0,e:"주기도문 = <b>마태복음 6장</b>(산상수훈), <b>누가복음 11장</b>."},

  {subj:"성경",year:"2016",no:9,q:"요한계시록 '네가 죽도록 충성하라 그리하면 내가 생명의 관을 네게 주리라'는 어느 교회에게 주신 말씀인가?",opts:["에베소교회","서머나교회","버가모교회","두아디라교회"],a:1,e:"<b>서머나교회</b>(계 2:10). 환난·궁핍 중에도 충성한, 책망이 없는 교회."},
  {subj:"교회사",year:"2016",no:1,q:"다음 중 고대교회의 기독교 이단사상과 거리가 먼 것은?",opts:["영지주의","아리우스","말시온","몬타니즘"],a:1,e:"영지주의·마르키온(말시온)·몬타니즘은 2세기 초대교회 이단으로 함께 묶임. <b>아리우스(주의)</b>는 4세기 삼위일체 논쟁이라 시대·범주가 다름. ※ 교재 확인 권장."},
  {subj:"교회사",year:"2016",no:2,q:"콘스탄틴 대제가 밀라노 칙령을 선언하기까지 있었던 기독교 10대 박해와 관계가 없는 사람은?",opts:["도미티아누스","네로","헤롯","유스티누스"],a:3,e:"네로·도미티아누스는 박해 황제, 헤롯도 초대교회를 박해(행12장, 야고보 처형). <b>유스티누스</b>는 박해자가 아니라 변증가·순교자. ※ '헤롯'을 답으로 보는 견해도 있어 교재 확인 권장."},
  {subj:"교회사",year:"2016",no:3,q:"콘스탄틴 대제의 업적과 관계없는 것은?",opts:["교회를 적극 보호하고 이단을 멀리함","기독교 정신에 입각해 많은 법률을 제정함","교회의 법률을 국가가 인정함","에베소 종교회의를 소집하여 기독론 논쟁을 종식시킴"],a:3,e:"콘스탄틴이 소집한 것은 <b>니케아 공의회(325)</b>. 에베소 공의회(431)는 테오도시우스 2세 때."},
  {subj:"교회사",year:"2016",no:4,q:"현대교회사에 신학의 새 지평을 연 칼 바르트와 관련이 먼 것은?",opts:["합리주의 신학","말씀의 신학","변증법적 신학","위기의 신학"],a:0,e:"바르트 = 말씀의 신학·변증법적 신학·위기의 신학(신정통주의). <b>합리주의 신학</b>은 그가 반대한 자유주의 계열."},
  {subj:"교회사",year:"2016",no:5,q:"근세교회사의 세 가지 사상적·신앙적 내용과 거리가 먼 것은?",opts:["정통주의 신학","계몽주의 사조","경건주의 운동","자유주의 신학"],a:3,e:"근세교회사 3대 축 = 정통주의·경건주의·합리주의(계몽주의). <b>자유주의 신학</b>은 19세기(근대) 흐름."},
  {subj:"교회사",year:"2016",no:6,q:"로마교회가 독일교회에 부과하여 수탈한 것들 중 관계가 없는 것은?",opts:["첫수입세","팔리움","인두세","부임세"],a:2,e:"교회가 부과한 것: 첫수입세(아나타)·팔리움 비용·부임세 등. <b>인두세</b>는 세속(국가) 세금."},
  {subj:"교회사",year:"2016",no:7,q:"십자군 전쟁의 실패 원인과 거리가 먼 것은?",opts:["십자군의 중심인 교황에게 군사 통솔권이 없었다","출전한 왕과 귀족들의 권력다툼이 계속되었다","순수한 종교성 대신 불순한 동기와 행동이 있었다","잘 훈련된 군인들이었지만 회교도 공격을 막지 못했다"],a:3,e:"실패 원인 = 통솔권 부재·내부 권력다툼·불순한 동기. <b>'잘 훈련된 군인'</b>이라는 서술은 사실과 달라 실패 원인이 아님."},
  {subj:"교회사",year:"2016",no:8,q:"칼빈이 말한 교회의 4중직과 관계가 없는 것은?",opts:["목사","전도사","장로","교사"],a:1,e:"칼뱅의 4중직 = 목사·교사·장로·집사. <b>전도사</b>는 해당 없음."},

  {subj:"교회사",year:"2016",no:10,q:"인간이 만든 것은 마귀의 것이라 여겨 교회를 부정하고 병역의무를 거부하는 이단 종파는?",opts:["안식교","여호와증인","우주교회","크리스찬 사이언스"],a:1,e:"<b>여호와의 증인</b> — 수혈·병역 거부 등으로 알려짐."},
  {subj:"교회사",year:"2016",no:11,q:"세계 여러 나라에 NCC가 발족하도록 영향을 준 회의는?",opts:["1854년 뉴욕회의","1910년 에딘버러 선교회의","1854년 런던회의","1921년 국제 선교회의"],a:1,e:"<b>1910년 에든버러 세계선교사대회</b> — 현대 에큐메니칼 운동(WCC·NCC)의 출발점."},

  {subj:"교회사",year:"2016",no:13,q:"다음 설명에 해당하는 사람은? ('황금의 입' / 안디옥 감독 후 콘스탄티노플 대주교 / 성찬 중시 / 346년 안디옥 출생)",opts:["어거스틴","암브로시우스","크리소스톰","제롬"],a:2,e:"<b>요한 크리소스토무스</b>(황금의 입) — 뛰어난 설교자, 콘스탄티노플 대주교."},
  {subj:"교회사",year:"2016",no:14,q:"제네바의 방종을 바로잡고자 훈련규범·교육시설·성만찬 제도·결혼예식 공개를 강조했고, 반대파의 어려움 속에서도 제네바에서 목회한 종교개혁자는?",opts:["츠빙글리","칼빈","루터","후스"],a:1,e:"<b>칼뱅</b> — 제네바를 개혁의 도시로 삼아 교회 규율과 제도를 세움."},
  {subj:"교회사",year:"2016",no:15,q:"간수의 부축을 받으며 부인과의 최후 면회에서 '어머님을 잘 모셔주오 / 따스한 숭늉이 먹고 싶소 / 조선교회를 위해 기도하겠소 / 평양 돌박산에 묻어주오'라는 유언을 남긴 사람은?",opts:["길선주","주기철","김익두","최권능"],a:1,e:"<b>주기철</b> 목사 — 신사참배 거부로 옥중 순교."},

  {subj:"교회사",year:"2019",no:20,q:"자유주의 신학이 퍼져가는 가운데 종교를 '절대 의존의 감정'이라고 정의하면서 이성의 시대에서도 종교의 필요성을 주장했던 사람은 누구입니까?",opts:["루터","찰스 스펄전","슐라이에르마허","조나단 에드워즈","진젠 도르프"],a:2,e:"<b>슐라이어마허</b>."},
  {subj:"교회사",year:"2019",no:21,q:"자유주의 신학에 맞서 신정통주의를 주창한 신학자는 누구입니까?",opts:["존 낙스","조나단 에드워즈","야콥 슈페너","칼 바르트","불트만"],a:3,e:"<b>칼 바르트</b>."},
  {subj:"교회사",year:"2019",no:22,q:"로버트 토마스(Robert J. Thomas) 선교사에 관한 내용 중 틀린 것은 무엇입니까?",opts:["미국 웨일즈 지방 출신, 한국 개신교의 최초의 순교자이다.","미국 상선 제너럴 셔먼호를 타고 대동강을 거슬러 올라 왔다.","박춘권의 칼에 의해 순교하였다.","박춘권은 예수를 믿고 신자가 되어 안주교회의 영수가 되었다.","토마스 선교사에 의해 전해진 성경을 집에 벽지로 발랐던 박영식의 집은 평양 최초의 교회인 널다리골 예배당이 되었다."],a:0,e:"토마스는 <b>영국</b> 웨일즈 출신이다."},
  {subj:"교회사",year:"2019",no:23,q:"변화하는 시대 속에서 기존 교회의 한계를 느끼고 메도디스트(Methodist) 운동을 시작하고 감리교를 창설한 사람은 누구입니까?",opts:["찰스 피니","존 네비우스","존 웨슬레","윌리엄 캐리","존 낙스"],a:2,e:"<b>존 웨슬리</b>."},

  {subj:"교회사",year:"2019",no:25,q:"1885년 한국 최초의 근대식 병원인 광혜원을 세운 사람은 누구인가?",opts:["언더우드","토마스","아펜젤러","알렌","존 로스"],a:3,e:"<b>알렌</b>(광혜원/제중원)."},
  {subj:"교회사",year:"2019",no:26,q:"3.1운동이 기독교적인 차원에서 갖게 되는 의미들을 설명한 것 중 옳지 않은 것은 무엇입니까?",opts:["3.1운동은 한민족의 독립을 넘어 동양과 세계의 평화를 주장하였고 인류의 공존과 호혜를 강조하는 성숙의 모습을 보여 주었다.","3.1운동은 기독교의 평화적 비폭력 저항운동이 나타나고 있다.","3.1운동은 한국교회의 민족운동과 애국적 신앙의 모습을 보여주고 있다.","3.1운동은 일제 치하의 정교분리론을 적극적으로 지지한 운동이라 할 수 있다.","한국교회가 민족의 고난에 적극 참여하며 박해를 받음으로 민족 동반자의 종교로 인정받게 되었다."],a:3,e:"3.1운동은 <b>정교분리론을 적극 지지</b>했다는 설명은 옳지 않음."},
  {subj:"교회사",year:"2019",no:27,q:"1833년 7월 존 케이블이 '국민적 배신'이라는 설교를 함으로 시작된 종교 운동으로, 일명 '소책자 운동'으로 불리는 운동은 무슨 운동입니까?",opts:["경건주의 운동","대각성 운동","옥스퍼드 운동","십자군 운동","오순절 운동"],a:2,e:"<b>옥스퍼드 운동</b>."},
  {subj:"교회사",year:"2019",no:28,q:"선교지 분할 정책 '예양협정(Comity Arrangement)'에 대해서 틀린 것은 무엇입니까?",opts:["같은 지역에서 선교의 경쟁적 구도를 만들기 위한 협정이다.","미국 북장로교회는 평안도, 황해도, 경기도, 경상북도 지역을 맡았다.","남장로교회는 전라도, 충청도 지역을 맡았다.","캐나다장로교회는 함경도 지역을 맡았다.","호주장로교회는 경남과 부산을 담당하여 선교하기로 합의하였다."],a:0,e:"예양협정은 선교 <b>경쟁을 피하기 위한</b> 협정이다."},
  {subj:"교회사",year:"2019",no:29,q:"조선기독교의 아버지라 불리우며 한국 최초의 새벽기도 실시로 1907년 대부흥의 영적 토대를 만든 사람은 누구입니까?",opts:["손양원","이기풍","방기창","송인서","길선주"],a:4,e:"<b>길선주</b>."},
  {subj:"교회사",year:"2019",no:30,q:"장대현 교회에서 노회 조직 시 목사 안수를 받고 제주도에 파송된 최초의 제주도 선교사는 누구인가?",opts:["길선주","이기풍","김익두","한석진","서경조"],a:1,e:"<b>이기풍</b> 목사."},
  {subj:"교회사",year:"2019",no:31,q:"제임스 게일 선교사에 대한 소개 중 틀린 것은 무엇입니까?",opts:["토론토 대학 YMCA의 후원으로 1888년 12월 부산에 도착한 캐나다 선교사다.","한문에 능통한 이창직을 만나 한글을 배웠다.","게일이 1895년 완역한 《천로역정》은 한국어로 번역된 최초의 서양서적이었다.","장대현교회 초대 담임목사로도 사역하였다.","구운몽, 춘향전, 심청전 등을 영어로 번역하였다."],a:3,e:"게일은 연동교회에서 사역했으며 <b>장대현교회 초대 담임목사</b>는 틀림."},
  {subj:"교회사",year:"2019",no:32,q:"신학교 졸업생들의 목사안수를 위한 노회 창립의 필요성이 대두된 시기에 1907년 9월 17일 장대현 교회에서 독립노회가 개최되게 됩니다. 이 때 초대 노회장은 누가 선출되었습니까?",opts:["길선주","마펫","언더우드","알렌","김익두"],a:1,e:"초대 독노회장은 <b>마포삼열(마펫)</b>."},
  {subj:"교회사",year:"2019",no:33,q:"1912년 9월 1일 조선 예수교 장로회 총회의 초대 총회장은 누구입니까?",opts:["언더우드","마포삼열","길선주","김익두","알렌"],a:0,e:"초대 총회장 <b>언더우드</b>."},
  {subj:"헌법",year:"2019",no:1,q:"목사의 칭호가 아닌 것은 무엇입니까?",opts:["위임목사","임시목사","부목사","담임목사","선교목사"],a:1,e:"제27조 — <b>'임시목사'</b>는 칭호가 아님(담임목사로 대체)."},
  {subj:"헌법",year:"2019",no:2,q:"장로와 관련된 내용 중 틀린 것은 무엇입니까?",opts:["장로는 교회의 택함을 받고 치리회의 회원이 되어 목사와 협력하여 행정과 권징을 관장한다.","장로는 교회의 신령상 관계를 살핀다.","장로는 교인들이 교리를 오해하거나 도덕적으로 부패하지 않도록 교인을 권면한다.","장로는 권면하였으나 회개하지 않는 자가 있으면 당회에 보고한다.","장로는 개인으로는 그 당회 아래 있고 직무상에는 노회 아래 있다."],a:4,e:"⑤는 <b>목사후보생</b>에 대한 설명이지 장로가 아님."},
  {subj:"헌법",year:"2019",no:3,q:"노회에 대한 설명 중 잘못된 것은 무엇입니까?",opts:["노회는 그리스도의 몸된 교회에 여러 지교회가 있으므로 서로 협력하여 교리를 보전하고 행정과 권징을 위하여 노회가 있다.","노회는 각 당회록을 검사하며 교회 권징에 대한 문의를 해석하여 답변한다.","노회는 노회록을 정확히 작성하여 연 1차씩 총회의 검사를 받는다.","노회는 회원(시무목사와 총대장로) 각 과반수의 출석으로 개회한다.","노회는 과반수의 결의로 회원권(결의권, 선거권, 피선거권)을 제한 할 수 있다."],a:4,e:"회원권 제한은 <b>단순 과반수 결의로 할 수 없음</b>."},
  {subj:"헌법",year:"2019",no:4,q:"직원의 자격에 관한 설명 중 연결이 잘못된 것은 무엇입니까?",opts:["장로는 무흠 세례교인으로 7년 경과하고 40세 이상 된 자로 한다.","권사는 무흠 세례교인으로 5년 경과하고 30세 이상 된 자로 한다.","전도사는 무흠 세례교인으로 5년 경과하고 25세 이상 된 자로 한다.","집사는 무흠 세례교인으로 5년 경과하고 35세 이상 된 자로 한다.","서리집사는 무흠 세례교인으로 1년 경과하고 25세 이상 된 자로 한다."],a:1,e:"권사는 <b>35세 이상</b>('30세'는 틀림)."},
  {subj:"헌법",year:"2019",no:5,q:"다음 중 회의의 개회성수가 잘못된 것은 무엇입니까?",opts:["총회는 전국 노회 수 과반의 참석과 회원(목사 총대 및 장로 총대) 각 과반수의 출석으로 개회한다.","노회는 시무 목사와 총대 장로 각 과반수의 출석으로 개회한다.","당회는 당회장을 제외한 과반수의 출석으로 개회한다. 대리 당회장도 성수에 포함되지 않는다.","제직회 개회는 출석수로, 결의는 과반수로 한다.","공동의회 개회는 회집된 회원으로 할 수 있다."],a:2,e:"제66조 — 당회 개회성수는 당회장을 <b>'포함한' 과반수</b>."},
  {subj:"헌법",year:"2019",no:6,q:"12신조 중 \u201c죽은 자가 마지막 날에 ( )을 얻고 그리스도의 ( ) 앞에서 이 세상에서 선악 간에 행한 바를 따라 보응을 받을 것이다.\u201d에서 빈 칸에 들어갈 말은 무엇입니까?",opts:["부활함, 보좌","영생함, 심판대","구원함, 보좌","상급, 영광","면류관, 권세"],a:0,e:"신조 — <b>'부활함을 얻고 그리스도의 심판하시는 보좌 앞에서'</b>."},
  {subj:"헌법",year:"2019",no:7,q:"대한예수교장로회 헌법 정치 원리에 해당되는 것은 무엇입니까?",opts:["공회의 자격","거룩한 생활","양심의 자유","신앙의 자유","교회의 설립"],a:2,e:"정치 원리 = <b>양심의 자유</b>(③). '신앙의 자유'는 함정."},
  {subj:"헌법",year:"2019",no:8,q:"다음 중 전도사와 관련된 설명으로 옳은 것은 무엇입니까?",opts:["20세 이상 되어야 한다.","성서학원 졸업자도 가능하다.","무흠 세례교인(입교인)으로 7년을 경과한 자","필요시에는 시무장로가 전도사를 겸할 수 있다.","미조직 교회에서는 노회장의 허락으로 제직회 임시 회장이 될 수 있다."],a:1,e:"제49조 — 전도사는 25세 이상, <b>신학교 또는 성서학원 졸업자</b>, 무흠 5년."},
  {subj:"헌법",year:"2019",no:9,q:"다음 중 교인 명부에서 제명하여 교회 출석을 금지시키는 책벌은?",opts:["수찬정지","견책","면직","정직","출교"],a:4,e:"<b>출교</b> — 교인명부에서 제명하여 교회 출석을 금함."},
  {subj:"헌법",year:"2019",no:10,q:"다음 중 바르게 연결된 것은 무엇입니까?",opts:["제직회 결의 사항 – 직원 선거","임시노회 – 통지한 안건만 처리한다.","공동의회 결의 사항 – 구제비의 수입, 지출 및 특별 헌금 취급","노회 회원 총수 – 1,500명 이내","당회의 노회 총대장로 파송 규정 인원 – 100인까지 2인"],a:1,e:"<b>임시노회는 통지한 안건만 처리(②)</b>가 옳음."},
  {subj:"헌법",year:"2019",no:11,q:"12신조입니다. 틀린 것은 무엇입니까?",opts:["성부와 성자로부터 오신 성령이 사람으로 하여금 구원에 참여하게 하신다.","우리의 조상이 선악 간에 택할 자유가 있었는데 시험을 받아 하나님께 범죄 하였다.","그리스도가 세우신 성례는 세례와 성찬이다.","삼위는 한 하나님이시다. 본체는 하나요 권능과 영광이 동등이시다.","신구약성경은 하나님의 말씀이니 계시와 영감에 대하여 정확 무오한 유일의 법칙이다."],a:4,e:"신조 제1조는 '신앙과 행위(본분)에 대하여 정확무오한 유일의 법칙'이다. <b>'계시와 영감에 대하여'</b>는 틀림."},
  {subj:"헌법",year:"2019",no:12,q:"다음은 교인의 구분에 대한 것 중에서 맞는 것은 무엇입니까?",opts:["교인은 원입교인, 유아세례교인, 학습교인, 세례교인(입교인)으로 구분한다.","원입교인은 예수 믿기로 결심하고 공동예배에 참석하는 15세 이상인 자이다.","유아세례교인은 예수 그리스도를 고백하는 2세 미만 유아세례를 받은 자이다.","세례교인(입교인)은 유아세례교인으로서 입교한 자(15세 이상) 또는 원입교인(15세 이상)으로서 세례를 받은 자이다.","세례교인(입교인)은 학습교인이 15세 이상으로서 세례를 받은 자이다."],a:3,e:"<b>출제 당시 기준 ④가 정답.</b> 현행(2021 개정)은 13세 이상이다."},
  {subj:"헌법",year:"2019",no:13,q:"집사, 권사로 선택된 자는 당회 지도 아래 몇 개월의 교양을 받아야 합니까?",opts:["6개월","5개월","4개월","3개월","2개월"],a:3,e:"안수집사·권사는 <b>3개월 이상</b> 교육."},
  {subj:"헌법",year:"2019",no:14,q:"헌법상 목사의 의의에 맞는 것은 무엇입니까?",opts:["목사는 축복을 베푸는 하나님의 대리자이다.","목사는 모든 교인의 모범이 되어 교회를 치리하는 장로이다.","목사는 교인들을 위로하는 상담자이다.","목사는 교회 재정을 총괄하는 대표자이다.","목사는 하나님의 도를 맡은 파수꾼이다."],a:1,e:"제24조 — <b>'모든 교인의 모범이 되어 교회를 치리하는 장로'</b>."},
  {subj:"헌법",year:"2019",no:15,q:"헌법 개정(정치, 권징, 예배와 예식)에 맞는 것은 무엇입니까?",opts:["총회는 출석회원 과반수 찬성의 결의로 개정안을 작성하여 각 노회에 수의한다.","헌법(헌법시행규정 포함)은 개정한 지 3년 이내에는 개정할 수 없다.","각 노회는 수의된 안건을 투표하여 과반수 찬성으로 총회장에게 보고한다.","헌법개정위원은 총회장이 직권으로 선정하여 개정안을 작성케 한다.","개정헌법은 공포한 날로부터 반드시 1년 간 연구케 한 후 시행한다."],a:1,e:"제102조 — <b>개정 후 3년 이내 재개정 불가(②가 맞음)</b>."},
  {subj:"헌법",year:"2019",no:16,q:"교인에 관한 부분 중에서 맞는 것은 무엇입니까?",opts:["교인의 의무는 공동예배 출석과 봉헌과 전도와 교회 치리에 복종하는 것이다.","세례교인(입교인) 된 교인은 성찬 참례권과 공동의회 회원권이 있다.","공동의회의 회원권은 15세 이상 세례교인으로 한다.","교인은 다른 교회로 이명하고자 하는 경우에는 6개월 이내에 담임목사에게 이명 청원을 하여야 한다.","교인이 신고 없이 교회를 떠나 의무를 행치 않고 6개월을 경과하면 실종교인이 된다."],a:1,e:"제15조 교인의 의무엔 '전도'가 없음. <b>세례교인의 성찬 참례권·공동의회 회원권(②)이 맞음.</b>"},
  {subj:"헌법",year:"2019",no:17,q:"교회에 관한 부분 중에서 맞는 것은 무엇입니까?",opts:["당회가 있는 교회를 조직교회라 하고 당회가 없는 교회를 기도처라 한다.","지 교회를 설립코자 하려면 세례교인(입교인) 20인 이상이 있어 노회에 청원하여 허락을 받아 설립한다.","지 교회의 분립 및 합병은 그 지 교회의 당회와 공동의회의 결의로 노회의 허락을 받아야 한다.","지교회의 폐지는 그 지교회의 당회와 공동의회의 결의로 노회의 허락을 받아야 한다.","지 교회가 설립된 후 세례교인(입교인)의 수가 20인 미만의 상태로 1년간 계속되는 경우에는 노회는 이를 기도처로 변경한다."],a:2,e:"<b>분립·합병은 당회와 공동의회 결의로 노회 허락(③)이 맞음.</b>"},
  {subj:"헌법",year:"2019",no:18,q:"목사의 청빙과 연임청원에 맞는 것은 무엇입니까?",opts:["조직교회는 위임목사만을 청빙 할 수 있다.","위임목사의 청빙은 당회의 결의와 공동의회의 3분의 2 이상의 찬성을 얻어야 한다.","담임목사의 청빙은 당회의 결의와 공동의회의 출석회원 과반수의 찬성을 얻어야 한다.","담임목사의 연임청원은 반드시 제직회에서 투표로 결의 하여야 한다.","부목사의 계속청원은 당회의 결의와 제직회 출석회원 과반수의 찬성을 얻어야 한다."],a:1,e:"<b>위임목 청빙 = 당회 결의 + 공동의회 출석 2/3 이상 찬성(②)이 맞음.</b>"},
  {subj:"헌법",year:"2019",no:19,q:"당회장에 대해 틀린 것은 무엇입니까?",opts:["당회장은 노회에서 임명한다.","임시당회장은 당회장이 결원되었을 때 당회원 과반수의 결의(합의 혹은 연명)로 요청한 해 노회 목사를 노회가 파송한다.","대리 당회장은 결의권이 있다.","대리 당회장은 당회장이 유고할 때 또는 기타 사정이 있을 때 당회장이 위임한 자 또는 당회원이 합의하여 청한 자로 당회장직을 대리케 할 수 있다.","은퇴목사에게는 임시당회장을 맡길 수 없다."],a:2,e:"제67조 — 대리당회장은 결의권이 <b>없다</b>."},
  {subj:"헌법",year:"2019",no:20,q:"제직회의 결의사항이 아닌 것은 무엇입니까?",opts:["공동회의에서 결정한 예산집행","교인의 이명처리","부동산 매매","당회가 요청한 사항","재정에 관한 일반수지 예산 및 결산"],a:1,e:"<b>'교인의 이명처리'</b>는 당회 사항이다."},
  {subj:"헌법",year:"2019",no:21,q:"노회가 지교회를 감독하는 치리권의 협조를 위하여 두는 것은 무엇입니까?",opts:["총회","노회","시찰회","당회","연합회"],a:2,e:"<b>시찰회(시찰위원회)</b>."},
  {subj:"헌법",year:"2019",no:22,q:"권징의 사유가 되는 죄과가 아닌 것은 무엇입니까?",opts:["성경상의 계명에 대한 중대한 위반행위","예배를 방해한 행위","이단적 행위와 이에 적극적으로 동조한 행위","허위사실을 유포하여 교인 또는 직원의 명예를 훼손시킨 행위","교인에게 금품을 수수한 행위"],a:4,e:"제43조 11항은 '사건 담당직원이 사건과 관련하여 금품을 수수한 행위'이다. <b>'교인에게 금품을 수수한 행위'</b>는 권징 사유 명문이 아니다."},
  {subj:"헌법",year:"2019",no:23,q:"책벌에 있어서 교인에게 과하는 벌이 아닌 것은?",opts:["견책","근신","수찬정지","출교","정직"],a:4,e:"교인 벌 = 견책·근신·수찬정지·출교. <b>'정직'</b>은 직원 벌."},
  {subj:"헌법",year:"2019",no:24,q:"공동의회에 관한 부분 중에서 맞는 것은 무엇입니까?",opts:["공동회의 회원은 15세 이상 세례교인(입교인) 이상이다.","원로목사는 공동의회의 투표하여 출석회원 3분의 2 이상의 득표 결의로 추대한다.","원로장로는 공동의회에서 투표하여 출석회원 3분의 2 이상의 득표 결의로 추대한다.","예산과 결산은 공동의회 결의사항이다.","공동회의에서 인선은 무기명 비밀투표로 하지 않아도 된다."],a:3,e:"<b>예산과 결산은 공동의회 결의사항(④)이 맞음.</b>"},
  {subj:"헌법",year:"2019",no:25,q:"노회의 분립, 합병 및 폐지에 관한 부분 중 맞는 것은 무엇입니까?",opts:["노회가 분립코자 하면 재적 목사, 장로 각 3분의 2 이상의 결의가 있어야 한다.","노회가 분립코자 하면 노회 재산, 기관, 분할 구역에 속한 교회명단을 총회 규칙부에 청원한다.","노회가 합병코자 하면 목사, 장로 각 3분의 2 이상의 결의로 총회에 청원한다.","노회가 설립된 후 설립기준 미달로 3년이 경과되면 노회가 폐지된다.","노회의 분립과 합병에 대한 결의는 총회 특별대책회의에서 할 수 있다."],a:2,e:"<b>노회 합병은 목사·장로 각 3분의 2 이상의 결의로 총회에 청원한다(③).</b>"},
  {subj:"헌법",year:"2019",no:26,q:"책벌의 종류와 내용이 맞지 않는 것은 무엇입니까?",opts:["견책：죄과를 꾸짖고 회개하게 한다.","근신：2개월 이상 6개월 이내의 기간 죄과에 대한 반성문을 1회 이상 소속 치리회장에게 제출하게 하고 행동을 삼가게 한다.","수찬정지：6개월 이상 1년 이내의 기간 수찬을 정지한다.","면직：직원의 신분을 박탈한다.","시무해임：3개월 이상 1년 이내의 기간 치리권(행정권과 권징권)을 정지한다."],a:4,e:"치리권 정지는 '시무정지'의 내용. 시무해임은 '그 직무에 한하여 <b>모든 시무 정지</b>'이다."},
  {subj:"헌법",year:"2019",no:27,q:"권징에 대한 설명 중 맞는 것은 무엇입니까?",opts:["예수 그리스도께서 제직회에 준 권한을 행사하며 그 법도를 시행하는 것이다.","교인과 직원, 각 치리회가 예배를 방해한 행위로는 권징 할 수 없다.","책벌 중 근신이 가장 낮은 수준의 책벌이다.","항소의 재소 기간은 판결문을 송부 받은 날로부터 10일로 한다.","권징은 당회, 시찰회, 노회, 총회에서만 할 수 있다."],a:3,e:"<b>항소 재소 기간은 판결문 송부일로부터 20일이므로 ④는 틀림. 당시 정답표 ④가 맞음으로 처리된 적이 있으나 헌법은 20일임.</b> (기출 원문 유지)."},
  {subj:"헌법",year:"2019",no:28,q:"노회는 일정한 구역 안에 있는 세례교인(입교인) 3000인 이상과 시무목사 ( )인 이상과 당회 ( )처(조직교회) 이상 있어야 조직할 수 있는가?",opts:["20, 20","20, 30","30, 30","30, 40","40, 40"],a:2,e:"제73조 — 시무목사 30인, 당회 30처, 세례교인 3000인."},
  {subj:"헌법",year:"2019",no:29,q:"고소, 고발 및 기소에 관하여 틀린 것은 무엇입니까?",opts:["당회 기소위원회는 당회에서 선임된 기소위원 1인 내지 2인으로 구성한다.","치리회장이 고소장(고발장)을 받은 때에는 20일 이내에 이를 기소위원회에 이첩하여야 한다.","고소기간은 죄과를 범한 자를 알게 된 날로부터 2년을 경과하면 고소하지 못한다.","고소를 취하한 자는 동일한 내용에 대하여 다시 고소하지 못한다.","고소 및 고발은 피고소인(피고발인)의 소속 치리회장에게 서면으로 해야 한다."],a:1,e:"치리회장이 고소장(고발장)을 받은 때에는 <b>10일 이내</b>에 기소위원회에 이첩하여야 한다."},
  {subj:"헌법",year:"2019",no:30,q:"당회에 관한 부분 중에서 맞는 것은 무엇입니까?",opts:["당회는 교인의 신앙과 행위를 통찰하며 세례, 입교할 자를 문답하며 세례식과 성찬식을 관장한다.","당회는 지교회의 현금 및 동산을 관리한다.","당회는 범죄한 자를 소환 심문하고 범죄한 증거가 명백할 때는 공동의회에 회부한다.","당회는 당회장이 소집하되 연 3차 이상을 회집하여야 한다.","당회장이 당회 소집을 할 때 당회원 3분의 2 이상의 찬성이 있어야 한다."],a:0,e:"제68조1 — <b>신앙·행위 통찰, 세례·입교 문답, 세례식·성찬식 관장(①)</b>이 맞음."},
  {subj:"헌법",year:"2019",no:31,q:"헌법에 명시된 당회가 비치할 명부가 아닌 것은?",opts:["헌금 대장 및 명부","세례교인(입교인) 명부","책벌 및 해벌 교인 명부","실종 교인 명부","별세 명부"],a:0,e:"제71조 명부에 <b>'헌금 대장 및 명부'</b>는 없음."},
  {subj:"헌법",year:"2019",no:32,q:"원심판결에 항소이유가 아닌 것은 무엇입니까?",opts:["판결에 영향을 미친 헌법 또는 규정의 위반이 있는 때","판결재판국의 구성이 헌법 또는 규정에 위반한 때","국가 재판에서 승소하여 재심 청구가 필요한 때","판결에 이유를 붙이지 아니하거나 이유에 모순이 있는 때","사실의 오인에 있어 판결에 영향을 미친 때"],a:2,e:"<b>'국가 재판 승소·재심 청구'</b>는 항소이유가 아님."},
  {subj:"헌법",year:"2019",no:33,q:"노회에 대한 설명 중 맞는 것은 무엇입니까?",opts:["노회는 회원(시무목사와 총대장로) 3분의 1 이상의 출석으로 개회한다.","정기노회는 개회 2개월 전에 소집을 통지하여야 한다.","노회는 노회 소속 목사와 당회에서 파송한 총대장로로 조직한다.","임시노회는 목사, 장로 각 3인 이상의 청원에 의하여 소집한다.","노회는 임원회 회의록을 작성하여 연 1차씩 총회의 검사를 받아야 한다."],a:2,e:"노회는 <b>노회 소속 목사와 당회 파송 총대장로로 조직(③)</b>이 맞음."},

{subj:"교회사",year:"2020",no:29,q:"19세기 초 소위 이성주의자들의 그리스도교 비판에 대항하여 그리스도교 진리를 옹호하고 나선 사람은?",opts:["로즈마리 류터","슐라이어마허","구티에레스","카를슈타트","한스 뎅크"],a:1,e:"슐라이어마허 — 종교를 '절대 의존의 감정'으로 정의하며 옹호."},
{subj:"교회사",year:"2020",no:30,q:"다음 중 기독교가 로마로부터 박해를 받았던 이유로서 거리가 먼 것은?",opts:["유대인들의 선동","로마 이교도들의 선동","기독교의 황제숭배 거부","사교집단으로 오해받음","기독교 윤리와 로마의 윤리 충돌"],a:1,e:"제국 차원 박해의 본질은 황제숭배 거부·사교 오해 등. 이교도의 국지적 선동(②)은 핵심 이유와 거리가 멂. ※ 확인 권장."},
{subj:"교회사",year:"2020",no:31,q:"예수님은 '참 하나님이시며 참 인간이시다', '신성과 인성은 그리스도 안에서 혼합되거나 변화되지 않고 분열되거나 분리되지 않는다'라는 결정이 내려진 공의회는 다음 중 어느 것인가?",opts:["제1차 에큐메니칼 공의회","제2차 에큐메니칼 공의회","제3차 에큐메니칼 공의회","제4차 에큐메니칼 공의회","제5차 에큐메니칼 공의회"],a:3,e:"칼케돈 공의회(451) = 제4차 에큐메니칼 공의회, 양성론 확립."},
{subj:"교회사",year:"2020",no:32,q:"세계선교에 헌신한 선교사와 선교지 그리고 연관된 선교회 중 틀린 것은?",opts:["조지 스미스-아프리카–모라비아파","아도니람 저드슨–일본–미국침례교 해외선교","윌리엄 케리–인도–런던선교회","허드슨 테일러–중국–중국내지선교회","페터슨-남양군도–미국전도회"],a:1,e:"아도니람 저드슨은 미얀마(버마) 선교사이지 일본이 아님."},
{subj:"교회사",year:"2020",no:33,q:"중세 후기 전체에서 프란체스코 학파의 대들보이자 토마스 아퀴나스의 가장 강력한 비판자로 알려진 인물은 누구인가?",opts:["에티엔느 탕피에르","그라티아누스","아벨라르","다키아의 보에티우스","요한 둔스 스코투스"],a:4,e:"둔스 스코투스 — 프란체스코회 신학자, 주의주의로 아퀴나스에 대립."},

{subj:"헌법",year:"2020",no:1,q:"당회의 결의로 노회의 허락을 받아 공동의회에서 총투표수의 3분의 2 이상 득표로 선출된 피택 장로는 당회 지도 아래 몇 개월의 교육을 받아야 하는가?",opts:["6개월","5개월","4개월","3개월","2개월"],a:2,e:"제41조 — 피택 장로는 4개월 이상 당회 지도."},
{subj:"헌법",year:"2020",no:2,q:"다음 중 전도사에 대한 설명으로 옳은 것은?",opts:["20세 이상 된 자로서 신학교 또는 성서학원 졸업자","무흠 세례교인(입교인)으로 7년을 경과한 자","전도사는 당회 또는 당회장이 관리하는 지교회에서 시무하는 유급 교역자이다.","필요시에는 시무장로가 전도사를 겸할 수 있다.","미조직 교회에서는 노회장의 허락으로 제직회 임시회장이 될 수 있다."],a:2,e:"제48조 — 전도사는 당회/당회장이 관리하는 지교회의 유급 교역자. ①은 25세, ②는 5년."},
{subj:"헌법",year:"2020",no:3,q:"다음 중 제직회의 결의 사항이 아닌 것은?",opts:["공동의회에서 결정한 예산집행","재정에 관한 일반수지 예산 및 결산","당회가 요청한 사항","각 기관의 수입, 지출 내용","부동산 매매"],a:3,e:"'각 기관의 수입·지출 내용'은 제직회 결의사항이 아님. ▶[개정 2012.11.16] 제직회 결의사항에서 각 기관의 독자 수입·지출이 제외됨."},
{subj:"헌법",year:"2020",no:4,q:"대한예수교장로회 신조에 대한 설명이 옳지 못한 것은?",opts:["신구약성경은 하나님의 말씀이니 신앙과 행위에 대하여 정확 무오한 유일의 법칙이다.","하나님은 한 분뿐이시니 오직 그만 경배할 것이다.","하나님의 본체에 삼위가 계시니, 성부, 성자, 성령이시다.","그리스도가 세우신 성례는 세례와 성찬이다.","그리스도께서 정하신 법에 따라 총회 헌법을 제정, 치리하심을 믿는다."],a:4,e:"12신조 원문에 '총회 헌법 제정·치리' 문구는 없음 → ⑤."},
{subj:"헌법",year:"2020",no:5,q:"대한예수교장로회 신앙고백서에 나온 내용이 아닌 것은?",opts:["성경","구원","교회","국가","재림"],a:4,e:"예장통합 신앙고백서 10장: 성경·하나님·예수그리스도·성령·인간·구원·교회·국가·선교·종말. '재림' 독립 장은 없음."},
{subj:"헌법",year:"2020",no:6,q:"치리회에 대하여 틀린 것은?",opts:["치리회는 당회, 노회, 총회로 구분한다.","각급 치리회는 헌법에 규정하는 바에 의하여 자체의 규정을 제정할 수 있다.","각급 치리회는 각기 사건을 법대로 처리하기 위하여 관할 범위를 정한다.","치리회는 교회의 평화와 질서를 유지하며 행정과 권한을 행사한다.","고소장, 소장이나 접수서류(진정서, 탄원서, 건의서)에 대하여는 치리회(폐회 중에는 임원회)가 처리할 수 있다."],a:4,e:"▶제63조6 원문: '고소(고발)장, 소장이 아닌 접수서류(진정서·탄원서·건의서)에 대하여는 치리회(폐회 중 임원회)가 처리할 수 있다.' ⑤는 '아닌'을 '이나'로 바꿔 재판 관할 원칙을 왜곡 → 오답. (④는 '권징'이 '권한'으로 표기된 오타성 문장.)"},
{subj:"헌법",year:"2020",no:7,q:"노회에 대하여 잘못된 것은?",opts:["노회는 일정한 구역 안에 있는 시무 목사 30인 이상, 당회(조직교회) 30처 이상, 세례교인(입교인) 3,000명 이상이 있어야 조직할 수 있다.","장로 총대는 당회에서 파송 규정에 따라 파송하며 서기가 총대 명부를 접수하면 회원권이 성립된다.","노회는 회원(시무 목사와 총대장로) 각 과반수의 출석으로 개회하며, 노회는 시무 목사와 총대 장로의 숫자가 같아야 한다.","노회 직무는 지교회의 장로선택, 임직을 허락하며 장로와 전도사의 자격 고시를 한다.","정기노회는 예정한 시일과 장소에 회집하되 개회 1개월 전에 소집을 통지하여야 한다."],a:2,e:"노회 개회는 목사·장로 각 과반수 출석이면 되고, 시무목사와 총대장로의 숫자가 같아야 한다는 동수 규정은 없음 → ③."},
{subj:"헌법",year:"2020",no:8,q:"세례교인(입교인)된 교인은 성찬 참례권과 ( )이 있다. 단, ( )은 ( )세 이상으로 한다. ( )안에 들어갈 알맞은 답은?",opts:["공동의회 회원권, 성찬 참례권, 18","공동의회 회원권, 공동의회 회원권, 18","공동의회 회원권, 공동의회 회원권, 20","제직회 회원권, 제직회 회원권, 20","제직회 회원권, 성찬 참례권, 18"],a:1,e:"제16조 — 성찬 참례권과 공동의회 회원권, 공동의회 회원권은 18세 이상."},
{subj:"헌법",year:"2020",no:9,q:"다음 중 목사의 자격과 거리가 먼 것은?",opts:["신앙이 진실하고 행위가 복음에 적합한 자.","가정을 잘 다스리고 타인의 존경을 받는 자.","무흠한 세례교인(입교인)으로 5년을 경과한 자.","30세 이상 된 자로서 총회 직영 신학대학원을 졸업한 후 2년 이상 교역 경험을 가진 자. 다만, 군목과 선교목사는 예외로 한다.","총회 목사고시에 합격한 자."],a:2,e:"제26조 — 목사 자격은 무흠 세례교인 7년 경과(5년이 아님)."},
{subj:"헌법",year:"2020",no:10,q:"공동의회 설명으로 바르지 않은 것은?",opts:["공동의회 회원은 그 지교회 무흠 세례교인(입교인) 중 18세 이상인 자로 한다.","공동의회의 결의는 다른 규정에 명시된 사항이 아닌 것은 재석 3분의 2로 결의하고 인선은 무기명 비밀투표로 한다.","공동의회는 당회의 결의로 당회장이 소집하되 일시, 장소, 안건을 한 주일 전에 교회에 광고한다.","공동의회 개회는 회집된 회원으로 할 수 있다.","공동의회의 의장과 서기는 당회장과 당회 서기로 한다."],a:1,e:"제90조 — 공동의회 일반 결의는 재석 '과반수'(3분의 2가 아님)."},
{subj:"헌법",year:"2020",no:11,q:"제직회에 관한 사항 중 잘못된 것은?",opts:["제직회 회원은 목사, 장로, 안수집사, 권사, 전도사로 한다. (서리집사 제외)","제직회 소집은 제직회장이 제직회 소집의 필요를 인정할 때 한다.","제직회 소집은 일주일 전에 광고하며, 개회성수는 출석수로 한다.","제직회 회장은 당회장이 되고 서기와 회계는 회에서 선정한다.","제직회 소집은 교회 제직 3분의 1의 요청이 있을 때 제직회장이 해야 한다."],a:0,e:"제91조 — 제직회 회원에 1년 임기 임시직인 '서리집사'도 포함됨. '서리집사 제외'는 틀림."},
{subj:"헌법",year:"2020",no:12,q:"책벌과 그 설명이 바르게 된 것은?",opts:["시무정지: 3개월 이상 1년 이내의 기간 치리권(행정권과 권징권)을 정지 한다.","시무해임: 6개월 이상 1년 이내의 기간 교회의 시무를 해임한다.","수찬정지: 3개월 이상 1년 이내의 기간 수찬을 정지한다.","근신: 3개월 이상 6개월 이내의 기간 죄과에 대해 반성문을 쓰게 한다.","견책: 죄과를 꾸짖고 회개하게 하며 반성문을 쓰게 한다."],a:0,e:"①이 맞음. 시무해임은 3개월~1년, 수찬정지는 6개월~1년, 근신은 2개월~6개월, 견책은 반성문을 쓰지 않음."},
{subj:"헌법",year:"2020",no:13,q:"헌법에 명시된 목사의 의의가 아닌 것은?",opts:["목사는 예수 그리스도의 양인 교인을 양육하는 목자이다.","목사는 그리스도를 봉사하는 종 또는 사자이다.","목사는 모든 교인의 모범이 되어 교회를 치리하는 장로이다.","목사는 구원의 복된 소식을 전하는 전도인이다.","목사는 하나님의 도를 맡은 사도이다."],a:4,e:"제24조 — 목사는 하나님의 도를 맡은 '청지기'이지 '사도'가 아님."},
{subj:"헌법",year:"2020",no:14,q:"목사의 청빙절차 중 틀린 것은?",opts:["위임목사의 청빙은 당회의 결의와 공동의회 출석회원 3분의 2 이상의 찬성을 얻어야 한다.","담임목사는 당회의 결의와 제직회 출석회원 과반수의 찬성을 얻어야 한다.","연임청원은 당회록과 제직회 결의록을 첨부하여 연임청원서를 담임목사가 노회에 제출한다.","기관목사의 청빙은 그 기관의 결의로 대표자가 청빙서를 노회에 제출하여야 한다.","부목사의 청빙은 당회의 결의와 제직회의 동의를 얻어야 한다."],a:2,e:"제28조 — 연임청원서는 목사 본인이 아니라 '대리당회장'이 노회에 제출."},
{subj:"헌법",year:"2020",no:15,q:"당회에 관한 설명 중 잘못된 것은?",opts:["당회는 지교회에서 시무하는 목사, 부목사, 장로 2인 이상으로 조직하되, 당회 조직은 세례교인(입교인) 30인 이상이 있어야 한다.","당회 조직 후 시무장로가 1인도 없으면 1년 후 첫 노회부터 폐당회가 된다.","당회 조직 후 장로 2인 미달 또는 세례교인(입교인)수가 30인 미달로 2년 경과한 후 첫 노회부터 당회가 폐지된다.","대리당회장은 은퇴목사에게도 이를 맡길 수 있다.","당회는 장로, 집사, 권사를 임직한다."],a:2,e:"제65조 — 장로 2인 미달·세례교인 30인 미달로 '3년' 경과 후 당회 폐지(2년이 아님). [개정 2012.11.16]"},
{subj:"헌법",year:"2020",no:16,q:"노회에 대한 설명 중 맞는 것은?",opts:["노회는 그리스도의 몸 된 교회에 여러 지교회가 있으므로 서로 협력하여 교리를 보전하고, 행정과 권징을 위하여 있다.","노회는 일정한 구역 안에 있는 시무목사 30인 이상과 당회 30처 이상과 세례교인 2,000인 이상이 있어야 조직할 수 있다.","위임목사, 담임목사, 공로목사, 부목사, 전도목사, 기관목사, 선교목사, 선교동역자는 회원권이 있다.","노회는 노회 소속 목사와 노회에 소속된 개 교회 장로 총수로 조직 한다.","노회는 회원(시무목사와 총대장로)의 출석수로 개회한다."],a:0,e:"①이 맞음(제72조). 세례교인 3,000인, 공로목사는 언권회원, 조직은 총대장로, 개회는 각 과반수."},
{subj:"헌법",year:"2020",no:17,q:"요리문답 \u201c말씀이 우리를 구원에 이르게 하는 효과 있는 것이 되게 하려면 우리가 말씀을 어떻게 읽고 들어야 하는가\u201d에 관한 답 중 틀린 것은?",opts:["우리가 부지런함과 준비와 기도로서 열중해야 한다.","믿음과 사랑으로 받아들여야 한다.","받은 말씀을 마음에 간직한다.","받은 말씀을 읽고 묵상한다.","받은 말씀을 우리 생활 속에 실천한다."],a:3,e:"웨스트민스터 소요리문답 90문에 '읽고 묵상한다'는 명시 항목이 아님."},
{subj:"헌법",year:"2020",no:18,q:"재판국원의 제척사유가 아닌 것은?",opts:["국원이 이해관계로 인하여 불공평한 재판을 할 우려가 있는 경우","국원이 피해자인 경우","국원이 피고인 또는 피해자와 친족관계에 있거나 있었던 경우","국원이 당해 사건에 관하여 증인 감정인이 된 경우","국원이 고소인(고발인) 또는 피고소인(피고발인)인 경우"],a:0,e:"권징 제8조 — '불공평한 재판 우려'는 당연 제척 사유가 아니라 당사자가 요청하는 '기피 사유'."},
{subj:"헌법",year:"2020",no:19,q:"당회가 비치할 명부가 아닌 것은 무엇인가?",opts:["세례교인 명부와 유아세례교인 명부","책벌 및 해벌 교인 명부와 실종교인 명부","제직 명부","이명교인 명부와 혼인 명부","별세 명부와 비품 대장 및 교회의 부동산 대장"],a:2,e:"제71조 비치 명부에 '제직 명부'는 규정되어 있지 않음."},
{subj:"헌법",year:"2020",no:20,q:"'신조' 8항에 따르면 성부와 성자로부터 오신 성령은 사람으로 하여금 어디에 참여하게 하는가?",opts:["은혜","은사","영생","구원","천국"],a:3,e:"신조 8항 — '구원에 참여하게 하신다'."},
{subj:"헌법",year:"2020",no:21,q:"교회에 대한 설명 중 틀린 것은?",opts:["당회가 있는 교회를 조직교회라 하고 당회가 없는 교회를 미조직교회라 한다.","지 교회를 설립하려면 세례교인(입교인) 15인 이상이 있어 노회에 청원하여 허락을 받아야 한다.","지 교회의 분립 및 합병은 그 지 교회의 당회와 공동의회의 결의로 노회의 허락을 받아야 한다.","지 교회의 폐지는 당해 시찰위원회를 경유하여 노회의 허락을 받아야 한다.","지 교회가 설립된 후 세례교인(입교인)의 수가 15인 미만의 상태로 1년간 계속되는 경우에는 노회는 이를 기도처로 변경한다."],a:4,e:"제12조 — 15인 미만 상태가 '2년'간 계속될 때 기도처로 변경(1년이 아님)."},
{subj:"헌법",year:"2020",no:22,q:"목사에 관한 설명 중 틀린 것은?",opts:["전도목사의 임기는 시무처와 노회의 정한 바에 의한다.","기관목사의 임기는 그 기관의 정한 바에 의한다.","선교목사의 파송은 총회가 한다.","교육목사의 임기는 시무처와 노회의 정한 바에 의한다.","원로목사의 예우는 지교회의 형편에 따른다."],a:3,e:"제27조 — 교육목사의 임기는 1년이며 매년 연임 청원을 해야 함(시무처·노회가 임의로 정하는 것이 아님)."},
{subj:"헌법",year:"2020",no:23,q:"고발기간과 취하에 대한 설명이다. ( )에 들어갈 알맞은 것은? '고발은 죄과를 범한 자를 알게 된 날로부터 ( )을 경과하거나, 죄과가 있은 날로부터 ( )을 경과하면 고발하지 못한다.'",opts:["3개월, 6개월","6개월, 1년","1년, 1년 6개월","1년, 2년","2년, 3년"],a:3,e:"권징 제52조 — 알게 된 날로부터 1년, 죄과가 있은 날로부터 2년."},
{subj:"헌법",year:"2020",no:24,q:"당회장 결원 시 임시당회장을 노회에 요청하지 않을 경우 얼마가 경과하면 노회에서 임시당회장을 직접 파송할 수 있는가?",opts:["즉시","3주","2개월","3개월","6개월"],a:3,e:"당회장 결원 후 3개월간 요청이 없으면 노회(임원회)가 직권으로 파송 가능."},
{subj:"헌법",year:"2020",no:25,q:"장로에 관한 설명 중 틀린 것은?",opts:["장로, 집사, 권사를 선택할 때 당회에서 후보자를 추천할 수 있다.","당회에서 교육을 한 후에도 당회의 결의에 의하여 직원 임직을 보류할 수 있다.","장로 투표는 한 노회 기간 동안 투표 횟수를 합하여 3차까지 할 수 있다.","목사, 장로, 집사, 권사를 신임 투표로 사임시킬 수 없다.","타 교단 소속 교회에서 이명한 장로는 노회 고시부의 면접 후 취임할 수 있다."],a:4,e:"타 교단에서 이명한 장로가 시무장로가 되려면 공동의회 과반수 득표 및 취임 절차를 밟아야 함 → ⑤."},
{subj:"헌법",year:"2020",no:26,q:"예배와 예식 편에 있는 교회예식에 해당되지 않는 것은?",opts:["임직예식","결혼예식","봉헌예식","장례예식","성찬예식"],a:4,e:"세례와 성찬은 예식이 아니라 예수님이 제정하신 '성례전'으로 구분 → ⑤."},
{subj:"헌법",year:"2020",no:27,q:"군목과 선교목사의 임직식은 노회의 위임을 받아 어디에서 주관할 수 있는가?",opts:["파송교회 및 기관단체","노회선교부(국내선교부)","노회 임원회","총회 파송부서","시무 군부대 및 선교처"],a:2,e:"제33조 예외 — 군목·선교목사의 임직식은 노회의 위임을 받아 노회 임원회가 주관할 수 있음."},
{subj:"헌법",year:"2020",no:28,q:"시무 중에 있는 목사가 몇 개월 이상 휴무를 원할 때 당회와 노회의 허락을 받아야 하는가?",opts:["1개월","2개월","3개월","4개월","6개월"],a:2,e:"제36조 — 3개월 이상 휴무 시 당회 결의와 노회 허락 필요."},
{subj:"헌법",year:"2020",no:29,q:"치리회에 과하는 벌은 무엇인가?",opts:["상회 총대파송 정지","견책","근신","수찬정지","정직"],a:0,e:"견책·근신·수찬정지 등은 개인에게 과하는 벌. 치리회에 과하는 유일한 벌은 상회 총대파송 정지."},
{subj:"헌법",year:"2020",no:30,q:"치리회는 교인으로 하여금 어디에 복종하게 하는 것인가?",opts:["그리스도의 법","교리","정치","헌법","말씀"],a:0,e:"제63조 — '교인으로 하여금 도덕과 영적 사건에 대하여 그리스도의 법에 복종케' 함."},
{subj:"헌법",year:"2020",no:31,q:"총회 총대 파송비율은 각 노회 당 몇 인을 기본수로 배정해야 하는가?",opts:["각 2인","각 3인","각 4인","각 5인","각 6인"],a:2,e:"제84조 — 각 노회당 목사·장로 각 4인을 기본수로 배정."},
{subj:"헌법",year:"2020",no:32,q:"권징책벌 중 상회 파송 정지에 관한 내용 중 틀린 것은?",opts:["교회직원은 1~3년 이내로 한다.","노회와 총회 직원은 2~3년 이내로 한다.","총회 산하단체, 기관 이사는 3~5년 이내로 한다.","총회 기관이사는 2~3년 이내로 한다.","각급 치리회의 파송 정지는 1~3년으로 한다."],a:3,e:"권징 제5조 — 총회 산하단체·기관 이사의 파송 정지는 3~5년 이내(2~3년이 아님) → ④."},
{subj:"헌법",year:"2020",no:33,q:"총회 출석 회원 3분의 2 이상의 가결로 개정안을 작성, 각 노회 3분의 2 이상의 가결과 투표 총수의 3분의 2 이상의 가표를 얻어야 개정할 수 있는 헌법은 무엇인가?",opts:["정치","권징","교리","예배와 예식","재판규정"],a:2,e:"제103조 — 정치·권징·예배와 예식은 노회 과반수로 가능하나, '교리'의 개정은 노회 3분의 2 가결과 투표 3분의 2 이상 찬성이 필요."},

{subj:"성경",year:"2021",no:1,q:"레위기 14장에서 정결함을 받을 나병환자가 제사장에게 가져가야 할 것이 아닌 것은?",opts:["관유","백향목","홍색실","우슬초","살아있는 정결한 새 두마리"],a:0,e:"<b>레위기 14:4</b> — 살아 있는 정결한 새 두 마리와 백향목과 홍색 실과 우슬초를 가져오게 하였으며, <b>관유</b>는 성막이나 제사장 위임에 쓰인다."},
{subj:"성경",year:"2021",no:2,q:"이스라엘 백성이 진을 치면서 회막을 중심으로 북쪽에 진을 친 지파는?",opts:["단 지파","유다 지파","에브라임 지파","르우벤 지파","잇사갈 지파"],a:0,e:"<b>민수기 2장</b> — 북쪽 진영의 선두는 <b>단 지파</b>이다 (동:유다, 남:르우벤, 서:에브라임)."},
{subj:"성경",year:"2021",no:3,q:"창세기 21장에 나오는 아브라함과 아비멜렉이 언약을 세운 ‘맹세의 우물’이란 이름 뜻을 가진 우물의 이름은?",opts:["에섹","싯나","르호봇","브엘세바","브엘라해로이"],a:3,e:"<b>창세기 21:31</b> — 두 사람이 거기서 서로 맹세하였으므로 그 곳을 <b>브엘세바</b>라 이름하였다."},
{subj:"성경",year:"2021",no:4,q:"이스라엘의 절기 중 안식일, 초하루, 유월절, 칠칠절, 나팔절, 속죄일, 장막절 등이 기록된 곳은?",opts:["레위기 21장","레위기 22장","레위기 23장","레위기 24장","레위기 25장"],a:2,e:"<b>레위기 23장</b> — 이스라엘의 '여호와의 절기'들이 총망라되어 기록된 핵심 장이다."},
{subj:"성경",year:"2021",no:5,q:"“이제 내가 알았도다 여호와는 모든 신보다 크시므로 이스라엘에게 교만하게 행하는 그들을 이기셨도다”는 누구의 고백인가?",opts:["드보라","모세","미리암","이드로","다윗"],a:3,e:"<b>출애굽기 18:11</b> — 모세의 장인 <b>이드로</b>가 이스라엘을 구원하신 하나님을 찬양하며 한 고백이다."},
{subj:"성경",year:"2021",no:6,q:"바벨론을 ‘여호와의 손에 잡혀 있어 온 세계가 취하게 하는 금잔’이라고 전한 예언자는 누구인가?",opts:["스가랴","이사야","예레미야","에스겔","다니엘"],a:2,e:"<b>예레미야 51:7</b> — 바벨론은 여호와의 손에 잡혀 있어 온 세계가 취하게 하는 금잔이라 뭇 민족이 그 포도주를 마심으로 미쳤도다."},
{subj:"성경",year:"2021",no:7,q:"“오직 나는 여호와의 영으로 말미암아 능력과 정의와 용기로 충만해져서 야곱의 허물과 이스라엘의 죄를 그들에게 보이리라”는 말씀에서 “나”는 누구인가?",opts:["호세아","미가","스바냐","요엘","아모스"],a:1,e:"<b>미가 3:8</b> — 미가 선지자의 고백이다."},
{subj:"성경",year:"2021",no:8,q:"여호와 앞에 정직하게 행하였으나 산당을 폐하지 않았고 아합왕의 딸과 자신의 아들을 결혼시킨 유다왕은?",opts:["아하스","아사","아비얌","요아스","여호사밧"],a:4,e:"<b>여호사밧</b>은 정직하게 행했으나 산당을 폐하지 않았고, 북이스라엘 아합의 딸 아달랴를 며느리로 삼는 실수를 했다."},
{subj:"성경",year:"2021",no:9,q:"에스겔서에 나오는 예루살렘의 가증한 것 4가지가 아닌 것은?",opts:["질투의 우상","바알과 아세라 신상","담무스를 위해 애곡하는 여인들","가증한 그림 앞에 향 피움","태양 예배자"],a:1,e:"<b>에스겔 8장</b> — 예루살렘 성전의 가증한 4가지는 투기(질투)의 우상, 가증한 우상 그림, 담무스를 위해 애곡하는 여인, 태양 예배자이다. <b>바알과 아세라 신상</b>은 직접 언급되지 않는다."},
{subj:"성경",year:"2021",no:10,q:"아가서는 모두 몇 장으로 구성되어 있는가?",opts:["4장","5장","6장","7장","8장"],a:4,e:"<b>아가서</b>는 총 <b>8장</b>으로 구성되어 있다."},
{subj:"성경",year:"2021",no:11,q:"“곧 우리 구주 홀로 하나이신 하나님께 우리 주 예수 그리스도로 말미암아 영광과 위엄과 권력과 권세가 영원 전부터 이제와 영원토록 있을지어다 아멘”으로 끝맺는 서신은?",opts:["베드로전서","베드로후서","유다서","갈라디아서","요한3서"],a:2,e:"<b>유다서 1:25</b> — 유다서의 마지막 송영 구절이다."},
{subj:"성경",year:"2021",no:12,q:"“믿음의 선한 싸움을 싸우라 영생을 취하라 이를 위하여 네가 부르심을 받았고 많은 증인 앞에서 선한 증언을 하였도다”는 말씀이 기록된 성경은?",opts:["고린도전서","고린도후서","디모데전서","디모데후서","데살로니가 후서"],a:2,e:"<b>디모데전서 6:12</b> — 바울이 디모데에게 권면한 말씀이다."},
{subj:"성경",year:"2021",no:13,q:"믿음의 역사, 사랑의 수고, 소망의 인내를 지킨 교회로 바울이 칭찬한 교회는?",opts:["갈라디아교회","고린도교회","데살로니가교회","안디옥교회","에베소교회"],a:2,e:"<b>데살로니가전서 1:3</b> — 바울이 <b>데살로니가교회</b> 성도들을 칭찬하는 내용이다."},
{subj:"성경",year:"2021",no:14,q:"디도서 1장의 감독에 대한 기준으로 제시되지 않은 것은?",opts:["거짓과 꾸밈이 없으며","급히 분내지 아니하며","술을 즐기지 아니하며","구타하지 아니하며","오직 나그네를 대접하여"],a:0,e:"<b>디도서 1:7-8</b> — 급히 분내지 아니하며, 술을 즐기지 아니하며, 구타하지 아니하며, 오직 나그네를 대접하며 등이 명시되어 있다. <b>거짓과 꾸밈이 없으며</b>는 포함되지 않는다."},
{subj:"성경",year:"2021",no:15,q:"예수 그리스도를 ‘새 언약의 대제사장’으로 언급하는 것은 히브리서 몇 장에 기록되어있는가?",opts:["11장","10장","9장","8장","7장"],a:3,e:"<b>히브리서 8장</b> — 예수 그리스도가 더 좋은 <b>새 언약의 중보자(대제사장)</b>이심을 강조하는 핵심 장이다."},
{subj:"성경",year:"2021",no:16,q:"에스겔과 함께 바벨론으로 끌려간 왕은?",opts:["여호야긴","여호야김","시드기야","요시야","므낫세"],a:0,e:"<b>에스겔 1:2</b> — 에스겔은 주전 597년 2차 포로 때 <b>여호야긴</b> 왕과 함께 바벨론으로 끌려갔다."},
{subj:"성경",year:"2021",no:17,q:"“비록 노아, 다니엘, (   ), 이 세 사람이 거기에 있을지라도 그들은 자기의 공의로 자기의 생명만 건지리라 나 주 여호와의 말이니라” 빈칸에 들어갈 인물은?",opts:["다윗","사무엘","욥","엘리야","히스기야"],a:2,e:"<b>에스겔 14:14</b> — 노아, 다니엘, <b>욥</b>."},
{subj:"성경",year:"2021",no:18,q:"누가복음에서 나오지 않는 비유는 무엇인가?",opts:["선한 사마리아인의 비유","불의한 청지기의 비유","최후심판의 비유(양과 염소)","부자와 나사로의 비유","과부와 재판장의 비유"],a:2,e:"<b>양과 염소의 비유(최후심판)</b>는 <b>마태복음 25장</b>에만 나오는 고유한 비유이다."},
{subj:"성경",year:"2021",no:19,q:"마가복음에서 “작은 자야 네 죄 사함을 받았느니라”는 말씀이 기록된 곳은?",opts:["2장 5절","4장 23절","6장 3절","6장 50절","9장 23절"],a:0,e:"<b>마가복음 2:5</b> — 가버나움에서 지붕을 뚫고 내려온 중풍병자에게 예수님이 하신 말씀이다."},
{subj:"성경",year:"2021",no:20,q:"“모든 계명 중에 첫째가 무엇이니이까?”라는 질문과 이에 대한 대답이 언급된 곳은?",opts:["마 22:34-40, 막 14:38-42, 눅 12:25-28","마 23:21-37, 막 12:32-38, 눅 10:25-28","마 22:34-40, 막 12:28-34, 눅 10:25-28","마 23:21-37, 막 12:32-38, 눅 12:25-28","마 22:21-37, 막 12:28-34, 눅 12:25-28"],a:2,e:"가장 큰 계명(하나님 사랑, 이웃 사랑)에 대한 질문과 대답은 <b>마태복음 22장, 마가복음 12장, 누가복음 10장</b>에 기록되어 있다."},
{subj:"성경",year:"2021",no:21,q:"병든 히스기야에게 사자들을 보내서 글과 예물을 보낸 바벨론 왕은?",opts:["느부갓네살","다리오","벨사살","고레스","므로닥발라단"],a:4,e:"<b>열왕기하 20:12</b> — 발라단의 아들 바벨론 왕 <b>브로닥발라단(므로닥발라단)</b>이 편지와 예물을 보냈다."},
{subj:"성경",year:"2021",no:22,q:"“그들이 먹여준 대로 배가 불렀고 배가 부르니 그들의 마음이 교만하여 이로 말미암아 나를 잊었느니라”는 말씀이 기록된 성경은?",opts:["미가","호세아","요엘","나훔","아모스"],a:1,e:"<b>호세아 13:6</b> — 풍요 속에서 교만하여 하나님을 잊은 북이스라엘을 책망하는 말씀이다."},
{subj:"성경",year:"2021",no:23,q:"하나님께서는 요엘에게 어디서 나팔을 불어 거룩한 금식을 정하고 성회를 소집하라고 하셨는가?",opts:["시온","미스바","벧엘","예루살렘","길갈"],a:0,e:"<b>요엘 2:15</b> — 너희는 <b>시온</b>에서 나팔을 불어 거룩한 금식일을 정하고 성회를 소집하라."},
{subj:"성경",year:"2021",no:24,q:"신명기의 장과 내용이 바르게 연결되지 않는 것은?",opts:["1장 – 정탐꾼","10장 – 십계명","13장 – 십일조 규례","15장 – 면제의 규례","19장 – 도피성"],a:2,e:"<b>신명기 14장</b>에 십일조 규례가 나온다. 신명기 13장은 거짓 선지자와 우상 숭배자에 대한 경고이다."},
{subj:"성경",year:"2021",no:25,q:"“광야에서 외치는 자의 소리가 있어 주의 길을 준비하라 그의 오실 길을 곧게 하라”(눅 3:4)는 말씀이 기록된 성경은?",opts:["예레미야 24장 3절","예레미야 26장 12절","이사야 40장 3절","이사야 60장 4절","이사야 30장 24절"],a:2,e:"<b>이사야 40:3</b> — 세례 요한의 사역을 예언한 말씀이다."},
{subj:"성경",year:"2021",no:26,q:"요한2서 1장 1절에서 수신자는 누구인가?",opts:["부녀와 그의 자녀들","흩어진 열두지파들","사랑하는 그리스도인","부르심을 받는 무리들","구원받은 하나님의 백성들"],a:0,e:"<b>요한2서 1:1</b> — 장로인 나는 택하심을 받은 <b>부녀와 그의 자녀들</b>에게 편지하노니."},
{subj:"성경",year:"2021",no:27,q:"신약성경 중 거짓교사에 대한 경고, 재림지연, 묵시적 종말에 관한 내용을 기록한 서신은?",opts:["베드로전서","베드로후서","유다서","요한2서","요한3서"],a:1,e:"<b>베드로후서</b> — 거짓 교사에 대한 경고와 주의 강림(재림) 지연 이유(하루가 천 년 같이 참으심) 등을 다루고 있다."},
{subj:"성경",year:"2021",no:28,q:"요한계시록에 나오는 일곱교회 중 다윗의 열쇠를 가지신 이가 “시험의 때를 면하게 하고, 이기는 자는 내 하나님 성전의 기둥이 되게 하겠다”고 약속하신 교회는?",opts:["서머나 교회","버가모 교회","두아디라 교회","사데교회","빌라델비아 교회"],a:4,e:"<b>요한계시록 3:7-12</b> — <b>빌라델비아 교회</b>에 주신 칭찬과 약속이다."},
{subj:"성경",year:"2021",no:29,q:"다음 중에서 마가복음에 등장하는 내용이 아닌 것은?",opts:["자라나는 씨의 비유","귀먹고 말더듬는 사람 치유","부자와 나사로의 이야기","벳새다 맹인 치유","벗은 몸으로 도망가는 청년"],a:2,e:"<b>부자와 나사로 이야기</b>는 <b>누가복음 16장</b>에만 기록된 고유한 비유이다."},
{subj:"성경",year:"2021",no:30,q:"사도행전에서 베드로와 관련된 사건이 아닌 것은?",opts:["루스드라에서 앉은뱅이 치유","아나니아, 삽비라 사건","중풍병자 애니아 치유","다비다(도르가)를 살림","산헤드린 앞 설교"],a:0,e:"<b>사도행전 14장</b> — 루스드라에서 나면서 걷지 못하게 된 자를 고친 사람은 <b>바울</b>이다."},
{subj:"성경",year:"2021",no:31,q:"게네사렛 호수가의 기적이 아닌 것은?",opts:["풍랑을 잔잔케 하심","거라사 지방의 귀신들린 사람치유","야이로의 딸을 살리심","중풍병자 치유","오천명을 먹이심(오병이어)"],a:3,e:"<b>마가복음 2장</b> — 가버나움 지붕을 뚫고 내린 <b>중풍병자 치유 사건</b>은 호숫가가 아니라 '집 안'에서 일어난 기적이다."},
{subj:"성경",year:"2021",no:32,q:"사도행전의 장과 내용이 바르게 연결되지 않는 것은?",opts:["2장 – 오순절성령강림 사건","3장 – 솔로몬 행각설교","4장 – 공회 앞에 선 베드로와 요한","10장 – 고넬료","11장 – 헤롯의 죽음"],a:4,e:"<b>사도행전 12장</b> — 헤롯(아그립바 1세)이 벌레에 먹혀 죽은 사건은 12장에 기록되어 있다. 11장은 안디옥 교회 설립 등이다."},
{subj:"성경",year:"2021",no:33,q:"“그리스도는 모든 믿는 자에게 의를 이루기 위하여 율법의 마침이 되시니라”는 말씀이 기록된 성경은?",opts:["로마서 8장 4절","로마서 8장 10절","로마서 8장 12절","로마서 10장 2절","로마서 10장 4절"],a:4,e:"<b>로마서 10:4</b> — 그리스도는 모든 믿는 자에게 의를 이루기 위하여 율법의 마침이 되시니라."}

// 교회사
{subj:"교회사",year:"2021",no:1,q:"도미티아누스 황제의 박해로 유배된 사도는 누구인가?",opts:["베드로","안드레","야고보","요한","마태"],a:3,e:"<b>요한</b>은 1세기 말 도미티아누스 황제의 박해 때 밧모 섬으로 유배되어 요한계시록을 기록했다."},
{subj:"교회사",year:"2021",no:2,q:"그리스도의 성육신을 부정하여 교회에 위협이 된 이단은?",opts:["영지주의","마르키온","몬타누스주의","도나투스주의","마니교"],a:0,e:"<b>영지주의</b>는 물질은 악하고 영은 선하다는 이원론을 바탕으로 그리스도의 성육신을 부정한 초대교회의 대표적 이단이다."},
{subj:"교회사",year:"2021",no:3,q:"19-20세기 경건주의, 전통주의, 전통 신앙부흥운동에 직접 또는 간접으로 영향을 미치지 않은 사람은?",opts:["슈패너","뵈메","프랑케","친첸도르프","웨슬리"],a:1,e:"<b>뵈메</b>는 17세기 독일의 기독교 신비주의자로, 19~20세기 경건주의나 부흥운동을 직접적으로 이끌거나 조직적인 영향을 끼친 인물은 아니다."},
{subj:"교회사",year:"2021",no:4,q:"프레드리히 2세는 이슬람 지도자와 평화조약을 체결하고, 예루살렘의 통치권을 넘겨받아 예루살렘에 무혈 입성하였다. 제 몇 차 십자군 원정 때였는가?",opts:["제4차 십자군 원정","제5차 십자군 원정","제6차 십자군 원정","제7차 십자군 원정","제8차 십자군 원정"],a:2,e:"프리드리히 2세가 외교적 교섭으로 예루살렘 통치권을 되찾은 것은 1229년 <b>제6차 십자군 원정</b> 때이다."},
{subj:"교회사",year:"2021",no:5,q:"19세기 초 그리스도교 진리를 옹호하며 ‘자유주의 신학의 아버지’라고 불린 사람은 누구인가?",opts:["프리드리히 슐라이어마허","드와이트 무디","폴 틸리히","루돌프 불트만","칼 바르트"],a:0,e:"<b>프리드리히 슐라이어마허</b>는 종교를 '절대 의존의 감정'으로 정의하며 자유주의 신학의 아버지로 불렸다."},
{subj:"교회사",year:"2021",no:6,q:"6개 언어 대조 성경인 헥사플라(Hexapla)를 편찬하였고, 켈수스 논박서 라는 변증서와 제1원리라는 조직신학서를 저술한 신학자는 누구인가?",opts:["터툴리아누스","플로티누스","오리게네스","클레멘스","이레나이우스"],a:2,e:"<b>오리게네스</b>는 6개 언어 대조 성경인 헥사플라를 편찬하고 최초의 조직신학서 『제1원리』를 저술했다."},
{subj:"교회사",year:"2021",no:7,q:"복음적 재세례파의 대표적 인물로 1496년 비트마르줌(네덜란드)에서 태어났고 네덜란드 초기 지도자 오베 필립스에게 재 세례와 재 안수를 받았던 사람은 누구인가?",opts:["부처","아리스코","크랜머","메노 시몬스","베르밀리"],a:3,e:"<b>메노 시몬스</b>는 네덜란드 출신의 평화적인 재세례파 지도자로 메노나이트의 창시자이다."},
{subj:"교회사",year:"2021",no:8,q:"그리티아누스 법령집과 관계가 없는 것은?",opts:["교황은 그리스도의 대리자다","교직자는 납세의 의무가 없다","1140년 편찬되었다","범죄자에게 주는 교회의 형벌은 출교다","교회법령 107개를 중심으로 편찬하였다"],a:3,e:"<b>범죄자에게 주는 교회의 형벌은 출교다</b>라는 일반적인 내용은 교황권 강화와 교직자 특권을 체계화한 그라티아누스 법령집의 핵심 특징 설명과는 거리가 멀다."},
{subj:"교회사",year:"2021",no:9,q:"1세기 말엽 자신을 신이라고 주장한 황제로, 그리스도인들을 박해하였고, 그 때문에 카타콤이 만들어지게 되었다. 그 황제는 누구인가?",opts:["도미티아누스","트라야누스","아우렐리우스","폴리카르포스","이그나티우스"],a:0,e:"<b>도미티아누스</b> 황제는 자신을 '주와 하나님'이라 부르게 강요하며 기독교를 극심하게 탄압했다."},
{subj:"교회사",year:"2021",no:10,q:"서방에서 수도원 제도를 확립한 수도사로 529년 몬테카시노 수도원을 세웠으며, 그가 작성한 <수도원 규칙>은 서방 수도원의 기본 뼈대를 결정지었다. 이 사람은 누구인가?",opts:["안토니우스","파코미우스","마르티누스","베네딕투스","아타나시우스"],a:3,e:"<b>베네딕투스</b>는 529년 몬테카시노 수도원을 세우고 서방 수도원 제도의 기본 뼈대인 수도원 규칙을 작성했다."},
{subj:"교회사",year:"2021",no:11,q:"다음 중 동방 정교회(Eastern Orthodoxy)의 신학적 특징이라고 보기 어려운 것은 무엇인가?",opts:["예배중심적, 교회중심적 신학","구원론에 있어서 인간의 신성화 강조","예배와 신앙생활에 있어서 성령에 대한 강조","강한 그리스도 중심적 신학","신적 본질의 형상화인 성상 공경 권장"],a:4,e:"동방 정교회는 이콘(성화)을 중요시하지만, 신적 본질을 입체적으로 형상화한 <b>성상 공경 권장</b>은 엄격히 금지한다."},
{subj:"교회사",year:"2021",no:12,q:"『세네카의 주해』는 누구의 저서인가?",opts:["칼뱅","루터","츠빙글리","얀 후스","사보나롤라"],a:0,e:"<b>칼뱅</b>은 23세 때 로마 철학자 세네카의 『관용론』에 대한 주석서인 『세네카의 주해』를 발표했다."},
{subj:"교회사",year:"2021",no:13,q:"종교개혁 이전의 개혁자 중에서 교회의 비일관성과 위선을 공박하고 『바보예찬』에서 교회의 타락을 혹독하게 비판한 사람은?",opts:["왈도","존 위클리프","베셀의 요한","토마스 브래드워딘","에라스무스"],a:4,e:"<b>에라스무스</b>는 『바보예찬(우신예찬)』을 저술하여 성직자들의 무지와 교회의 타락을 풍자하고 비판했다."},
{subj:"교회사",year:"2021",no:14,q:"서로 관계가 잘못 연결된 것을 고르시오.",opts:["YMCA  - 조지 윌리암","1953년 – 예장통합과 합동분리","1865년 – 토마스 선교사","무교회주의 – 우지무라 간조","1907년 – 한국 최초 목사 안수"],a:1,e:"예장 통합과 합동의 분리는 WCC 가입 문제 파동으로 인해 <b>1959년(제44회 총회)</b>에 일어났다 (1953년은 예장-기장 분리)."},
{subj:"교회사",year:"2021",no:15,q:"크리소스토무스와 관계가 없는 것은?",opts:["설교를 잘하여 황금의 입이라고 불림","안디옥 감독, 후에 콘스탄티노플의 대주교가 됨","특히 성찬을 중요시함","346년 안디옥에서 출생함","시편 찬송가 출간"],a:4,e:"황금의 입이라 불린 크리소스토무스와 달리, <b>시편 찬송가 출간</b>은 제네바에서 활동한 칼뱅과 관련된 특징이다."},
{subj:"교회사",year:"2021",no:16,q:"동서교회 분리원인 및 관련 내용이 아닌 것은?",opts:["사상과 문화의 문제","성령(필리오케 문제)","주후 1291년에 완전한 분리","성상숭배논쟁","로마교황과 콘스탄티노플 대주교 간의 교황쟁탈 문제"],a:2,e:"동방교회와 서방교회의 결정적이고 공식적인 대분열은 1291년이 아니라 <b>1054년</b>에 일어났다."},
{subj:"교회사",year:"2021",no:17,q:"칼뱅주의의 5대 교리가 아닌 것은?",opts:["인간의 전적타락","무조건적 선택","보편적 속죄","불가항력적 은총","성도의 견인"],a:2,e:"칼뱅주의 5대 교리(TULIP)에는 제한적 속죄가 포함되며, <b>보편적 속죄</b>는 아르미니우스주의의 주장이다."},
{subj:"교회사",year:"2021",no:18,q:"1562년 1월 가톨릭과 프로테스탄트가 평화적 합의를 통해 위그노의 자유로운 예배를 보장하도록 반포한 프랑스의 칙령은?",opts:["성 바르톨로뮤 칙령","위그노 칙령","낭트 칙령","생제르맹 칙령","퐁텐블루 칙령"],a:3,e:"1562년 위그노의 예배 자유를 일부 인정한 프랑스의 평화 칙령은 <b>생제르맹 칙령</b>이다."},
{subj:"교회사",year:"2021",no:19,q:"에비온주의자들이 가장 중요하게 생각하는 것 중 아닌 것은?",opts:["할례","안식일의 준수","성전제사","율법","삼위일체신앙"],a:4,e:"에비온주의는 예수의 신성을 부정하고 율법 준수를 강조한 유대교적 이단이므로 <b>삼위일체신앙</b>을 거부했다."},
{subj:"교회사",year:"2021",no:20,q:"히에로니무스의 라틴어 번역본 성경은?",opts:["70인역","탈굼","로마성경","불가타 성경","라틴어 성경"],a:3,e:"4세기 말 히에로니무스(제롬)가 라틴어로 번역하여 가톨릭의 표준 성경이 된 것은 <b>불가타 성경</b>이다."},
{subj:"교회사",year:"2021",no:21,q:"도미티아누스 황제의 박해로 순교를 당한 기독교 지도자는 누구인가?",opts:["사도 요한","사도 베드로","로마의 클레멘스","이레네우스","폴리캅"],a:2,e:"<b>로마의 클레멘스</b>는 도미티아누스(또는 트라야누스) 황제 치하에서 순교한 것으로 전해지는 기독교 지도자이다."},
{subj:"교회사",year:"2021",no:22,q:"1981년 4월 파리에서 모이는 만국평화 회담에 한국의 상황을 알리기 위해 특사로 파송된 사람은?",opts:["김규식","이승훈","이상재","장덕수","선우혁"],a:0,e:"1919년(문제의 1981년은 오타) 파리 만국평화회의에 신한청년당 대표로 파견된 기독교인은 <b>김규식</b>이다."},
{subj:"교회사",year:"2021",no:23,q:"동인도회사 소속 린제이 선장이 이끄는 암허스트호를 타고 1832년 7월 백령도 근처 섬에 상륙하여 주민들에게 성경, 전도문서, 의약품을 나눠주고 ‘양이’라는 사람에게 주기도문을 한글로 옮겨 쓰며 읽어주어 개신교 최초의 주기도문을 번역하게 한 선교사는 누구인가?",opts:["토마스","맥클래이","데이비스","레이놀즈","귀출라프"],a:4,e:"1832년 백령도 근처에 상륙하여 한문 성경을 나누어 주고 주기도문을 번역하게 한 선교사는 <b>귀츨라프</b>이다."},
{subj:"교회사",year:"2021",no:24,q:"1608년 프로테스탄트가 결성한 복음주의 연맹에 대항하여 1609년 가톨릭 동맹이 결성되어 1618년 프라하의 충돌이 일어났고 1648년까지 종교전쟁이 벌어졌다. 그 후 독일의 30년 전쟁을 종식하게 만든 조약은 무엇인가?",opts:["프라하 조약","베스트팔렌 조약","마르센 조약","베르뎅 조약","네르친스크 조약"],a:1,e:"독일의 30년 전쟁을 종식하고 칼뱅파의 신앙 자유까지 공식 인정한 조약은 <b>베스트팔렌 조약</b>이다."},
{subj:"교회사",year:"2021",no:25,q:"다음 중 네비우스 선교정책과 방법론과 관계가 없는 것은?",opts:["타인에게 복음의 선생이 되는 자립 전도","지도자와 조사의 지도력을 훈련하는 자립정치","선교사의 보조에 의존하지 않는 재정의 자립 보급","목회자나 지도자에게 조직적인 성경공부를 실시","소송문제가 발생할 시 선교사 중심으로 화해조정"],a:4,e:"네비우스 정책은 교회 내 치리나 소송 문제를 현지인 지도자들 스스로 해결하도록 했으므로 <b>선교사 중심으로 화해조정</b>한다는 것은 틀리다."},
{subj:"교회사",year:"2021",no:26,q:"이름과 사건에 해당하는 연도가 틀린 것은?",opts:["이수정 – 일본에서 성경번역 – 1883년","서상륜 – 황해도 송천에서 최초 교회 설립 - 1884년","언더우드 – 아펜젤러와 입국한 선교사 –1884년","알렌(부부 의료선교사 입국) - 1884년","장로회 조선노회 조직(제주도 이기풍 선교사 파송 결의) - 1907년"],a:2,e:"장로교 언더우드와 감리교 아펜젤러가 한국 제물포에 입국한 해는 1884년이 아니라 <b>1885년</b>이다."},
{subj:"교회사",year:"2021",no:27,q:"17세기 독일의 부흥운동을 이끌었던 경건주의 창설자는 누구인가?",opts:["존 웨슬레","조나단 에드워즈","필립 야곱 슈패너","패터슨","존 낙스"],a:2,e:"17세기 말 독일에서 콜레기아 피에타티스를 조직하며 경건주의 운동을 창설한 인물은 <b>필립 야곱 슈페너</b>이다."},
{subj:"교회사",year:"2021",no:28,q:"교단 총회에 여성안수 헌의가 처음 이루어진 때는 언제인가요?",opts:["제21회 총회","제22회 총회","제23회 총회","제24회 총회","제25회 총회"],a:1,e:"예장 총회에 여성 안수 문제가 처음으로 헌의된 것은 1933년 <b>제22회 총회</b>이다."},
{subj:"교회사",year:"2021",no:29,q:"데키우스가 로마 신들을 숭배할 것을 명하고 그 신들을 숭배한 사람들에게 증명서를 발급하였다. 초대교회 성도들은 십자가의 순교를 각오한 사람들과 박해에 굴복하고 신앙을 저버린 사람들로 나누어진다. 교회의 순수성을 지키기 위해 배교자들을 끝까지 추방해야 한다고 주장한 사람은 누구인가?",opts:["키프리아누스","노바티아누스","카이킬리아누스","펠릭스","디오클레티아누스"],a:1,e:"데키우스 황제의 박해 때 신앙을 부인한 배교자들을 끝까지 추방해야 한다며 엄격주의를 주장한 사람은 <b>노바티아누스</b>이다."},
{subj:"교회사",year:"2021",no:30,q:"다음 중 그레고리우스 1세 업적이 아닌 것은?",opts:["성직매매를 금지하였다","성직자 결혼을 금하였다","연옥설을 주장하였다","성모예배를 주장하였다","교회의 위계론을 주장하였다"],a:4,e:"그레고리우스 1세는 중세 교황권의 기초를 놓았으나, 천상과 지상의 <b>교회 위계론</b>을 사상적으로 최초/강력하게 정립한 것은 위 디오니시우스 등에 가깝다."},
{subj:"교회사",year:"2021",no:31,q:"다음 중 니케아 회의와 관계가 없는 것은?",opts:["부활절 날짜 결정(춘분 후 만월 다음 첫주일)","주후 325년 개최","성부와 성자가 동일 본질임을 인정함","아타나시우스가 이단으로 정죄됨","교회정치에 관한 규정 20조 채택함"],a:3,e:"325년 니케아 공의회에서는 <b>아리우스</b>가 이단으로 정죄되었고, 아타나시우스는 정통파로 승리했다."},
{subj:"교회사",year:"2021",no:32,q:"터툴리아누스의 저서가 아닌 것은?",opts:["삼위일체론","이단논박","마르키온 논박","프락세아스 논박","이단들에 대한 항고"],a:0,e:"터툴리아누스는 삼위일체 용어를 처음 썼으나, 방대한 단행본 저서인 <b>『삼위일체론』</b>을 남긴 사람은 아우구스티누스(어거스틴)이다."},
{subj:"교회사",year:"2021",no:33,q:"20세기 후반에 들어서면서 로마 가톨릭교회가 ‘현대세계에의 적응’을 표어로 내세우며 동방정교회와 화해하고 프로테스탄트를 형제로 인정한 회의는?",opts:["제1차 바티칸 공의회","제2차 바티칸 공의회","제1차 라떼란 공의회","제2차 라떼란 공의회","제4차 라떼란 공의회"],a:1,e:"로마 가톨릭교회의 현대화(창문 열기)를 추진하고 개신교를 갈라진 형제로 포용한 회의는 <b>제2차 바티칸 공의회</b>이다."}

// 헌법
{subj:"헌법",year:"2021",no:1,q:"21세기 대한예수교장로교 신앙고백서의 내용 중 그리스도인의 사명에 해당하지 않는 것은?",opts:["교회가 하나임을 선포한다","세례와 성찬과 직제에 있어서 일치를 추구한다","교회의 순수성을 지키기 위해서 전통에서 벗어나지 않는다","인간을 착취하는 구조악들을 사도적 신앙으로 변혁해야 한다","모든 교회들과 더불어 선교와 사회봉사에 참여한다"],a:2,e:"<b>신앙고백서 제7부</b> — 교회의 순수성을 지키기 위해서 <b>전통에서 벗어나지 않는다</b>는 내용은 그리스도인의 사명으로 명시되어 있지 않다."},
{subj:"헌법",year:"2021",no:2,q:"다음 중 치리회에 대한 설명 중 틀린 것은?",opts:["각급 치리회는 헌법에 규정하는 바에 의하여 자체의 규칙을 제정할 수 없다","치리회는 교인으로 하여금 도덕과 영적 사건에 대하여 그리스도의 법에 복종케 하는 것이다","치리회는 당회, 노회, 총회로 구분한다","모든 치리회는 목사와 장로로 구성한다","치리회 간의 행정적인 결의 등이 상충될 때는 상급 치리회의 결의를 따른다"],a:0,e:"<b>정치 제63조 3항</b> — 각급 치리회는 헌법에 규정하는 바에 의하여 <b>자체의 규칙을 제정할 수 있다</b>."},
{subj:"헌법",year:"2021",no:3,q:"헌법 개정(정치, 권징, 예배와 예식)에 대한 내용으로 맞는 것은?",opts:["총회는 출석회원 과반수 찬성의 결의로 개정안을 작성하여 각 노회에 수의한다","각 노회에 수의한 개정안은 노회 3분의 2의 가결과 투표 총수의 과반을 얻어야 한다","각 노회는 수의된 개정안의 가부 투표수를 종합하여 즉시 총회장에게 보고한다","총회장은 개정안의 투표 결과를 수합하여 가결된 결과를 1개월 후에 공고한다","헌법(헌법시행규정 포함)은 개정한 지 1년 이내에는 개정할 수 없다"],a:2,e:"<b>정치 제102조 3항</b> — 각 노회는 가부투표수를 종합하여 <b>즉시 총회장에게 보고</b>한다. (①은 출석 2/3, ②는 노회 과반수+투표 과반, ④는 즉시 공고, ⑤는 개정 후 3년 이내 재개정 불가가 옳다.)"},
{subj:"헌법",year:"2021",no:4,q:"다음은 웨스트민스터 신앙고백에 나타난 교회에 관한 내용이다. 괄호 안에 알맞은 말은 무엇인가?<br>보편적이고 우주적인 교회는 ( )이다. 이 교회는 과거나 현재나 미래에 있어서 ( ) 되시는 그리스도를 중심하여 모이는 택함을 받은 모든 사람들로 구성된다. 그것은 그리스도의 ( )요, 그의 ( )이며, 만물 안에서 만물을 충만케 하시는 자의 ( )이시다.",opts:["불가시적 – 머리 - 신부 – 집 – 충만","가시적 – 머리 - 신부 – 집 – 충만","불가시적 – 머리 – 신부 – 가족 – 충만","가시적 – 머리 – 신부 – 몸 – 충민","불가시적 – 머리 – 신부 – 몸 – 충만"],a:4,e:"<b>웨스트민스터 제25장</b> — 보편적이고 우주적인 교회는 <b>불가시적</b>이다. 그리스도는 <b>머리</b>, 교회는 <b>신부</b>요 <b>몸</b>이며 <b>충만</b>이시다."},
{subj:"헌법",year:"2021",no:5,q:"교회의 직원에 대한 내용 중 맞지 않는 것은 무엇인가?",opts:["교회의 직원은 항존직과 임시직으로 구분한다","항존직은 장로, 집사, 권사이며 그 시무는 70세가 되는 해의 연말까지로 한다","타국 시민권자는 직원이 될 수 있다","장로는 두 가지가 있는데 설교와 치리를 겸한 자를 목사라 하고 치리만 하는 자를 장로라 한다","임시직은 전도사, 서리집사이며 시무 기간은 1년이고 연임할 수 있다"],a:2,e:"<b>정치 제21조 2항</b> — <b>타국 시민권자는 원칙적으로 직원이 될 수 없다</b> (법이 정한 특수한 예외 규정 외)."},
{subj:"헌법",year:"2021",no:6,q:"당회장에 관한 내용 중 맞지 않는 것은 무엇인가?",opts:["당회장은 노회가 임명하며 그 교회 시무목사(위임목사, 담임목사)가 된다","임시당회장은 당회장이 유고할 때 당회원 과반수의 결의(합의 혹은 연명)로 요청한 해 노회 목사를 노회가 파송한다","대리당회장은 당회장이 유고할 때 또는 기타 사정이 있을 때 당회장이 위임한 자 또는 당회원이 합의하여 청한 자로 당회장직을 대리케 할 수 있다. 대리당회장에게도 결의권이 있다","대리당회장은 은퇴목사에게도 맡길 수 있다","미조직 교회의 당회권은 당회장이 행사한다"],a:2,e:"<b>정치 제67조 3항</b> — 대리당회장에게는 <b>결의권이 없다</b>. (임시당회장은 당회장 결원 시 파송한다.)"},
{subj:"헌법",year:"2021",no:7,q:"노회 재판국의 심판 사건이 아닌 것은?",opts:["당회 재판국의 판결에 대한 항소사건","목사에 관한 소송사건 및 장로의 노회원 또는 총회원으로서의 행위에 관련된 소송사건","헌법이 정하는 행정쟁송사건","당회원이 청원한 위탁재판사건","당회 기소위원회의 불기소결정에 대한 항고사건"],a:3,e:"<b>권징 제20조</b> — 위탁재판은 당회원 개인이 아니라 <b>당회장</b>이 상회에 청원하는 사건이다."},
{subj:"헌법",year:"2021",no:8,q:"공동의회가 소집될 수 없는 경우는 무엇인가?",opts:["전체 교인 과반수의 청원이 있을 때","당회가 소집할 필요가 있을 때","제직회의 청원이 있을 때","상회의 지시가 있을 때","무흠 세례교인 3분의 1 이상의 청원이 있을 때"],a:0,e:"<b>정치 제90조</b> — 공동의회 소집 요건은 당회 필요, 제직회 청원, 무흠 세례교인 1/3 이상 청원, 상회 지시이다. <b>전체 교인 과반수 청원</b>은 해당하지 않는다."},
{subj:"헌법",year:"2021",no:9,q:"대한예수교장로회 헌법 정치원리에 해당되는 것은 무엇인가?",opts:["공회의 자격","거룩한 생활","양심의 자유","신앙의 자유","교회의 설립"],a:2,e:"<b>정치 제1장</b> — 정치원리에는 <b>양심의 자유</b>, 교회의 자유, 진리와 행위 등이 명시되어 있다."},
{subj:"헌법",year:"2021",no:10,q:"헌법상 목사의 의의에 맞는 것은 무엇인가?",opts:["목사는 축복을 베푸는 하나님의 대리자이다","목사는 모든 교인의 모범이 되어 교회를 치리하는 장로이다","목사는 교인들을 위로하는 상담자이다","목사는 교회재정을 총괄하는 대표자이다","목사는 하나님의 도를 맡은 파수꾼이다"],a:1,e:"<b>정치 제24조</b> — 목사는 모든 교인의 모범이 되어 <b>교회를 치리하는 장로</b>이다."},
{subj:"헌법",year:"2021",no:11,q:"책벌의 종류와 내용이 맞지 않는 것은 무엇인가?",opts:["견책 : 죄과를 꾸짖고 회개하게 한다","근신 : 2개월 이상 6개월 이내의 기간 죄과에 대한 반성문을 1회 이상 소속치리회장에게 제출하게 하고 행동을 삼가게 한다","수찬정지 : 6개월 이상 1년 이내의 기간 수찬을 정지한다","면직 : 직원의 신분을 박탈한다","시무해임 : 3개월 이상 1년 이내의 기간 치리권을 정지한다"],a:4,e:"<b>권징 제5조</b> — 치리권(행정권·권징권)을 정지하는 것은 <b>시무정지</b>이다. 시무해임은 설교권을 포함하여 교회의 모든 시무를 정지하는 것이다."},
{subj:"헌법",year:"2021",no:12,q:"직분자 자격 중 틀린 것은 무엇인가?",opts:["목사 : 무흠 세례교인 7년 경과, 30세 이상","전도사 : 무흠 세례교인 5년 경과, 25세 이상","장로 : 무흠 세례교인 7년 경과, 40세 이상","집사 : 무흠 세례교인 5년 경과, 35세 이상","권사 : 무흠 세례교인 5년 경과, 40세 이상"],a:4,e:"<b>정치 제53조</b> — 권사의 자격은 무흠 세례교인 5년 경과, <b>35세 이상</b> 여자이다."},
{subj:"헌법",year:"2021",no:13,q:"치리회는 교인으로 하여금 어디에 복종하게 하는가 ?",opts:["교회","그리스도의 법","정치","헌법","말씀"],a:1,e:"<b>정치 제63조</b> — 치리회는 교인으로 하여금 도덕과 영적 사건에 대하여 <b>그리스도의 법</b>에 복종케 하는 것이다."},
{subj:"헌법",year:"2021",no:14,q:"노회에 대한 설명 중 틀린 것은 무엇인가 ?",opts:["노회는 일정한 구역 안에 있는 시무 목사 30인 이상, 당회(조직교회) 30처 이상, 세례교인(입교인) 3,000명 이상이 있어야 조직할 수 있다","장로 총대는 서기가 총대 명부를 접수하면 회원권이 성립된다","노회의 개회성수는 목사와 장로 총대 전체의 출석 과반수로 개회할 수 있다","노회는 노회 구역안에 있는 각 지교회와 소속기관 및 단체를 총찰한다","노회는 소속 지교회와 산하기관의 부동산을 관리하고 재산문제로 사건이 발생하면 이를 처리해야 한다"],a:2,e:"<b>정치 제76조</b> — 노회의 개회성수는 전체 출석 과반수가 아니라 시무 목사와 장로 총대 <b>각 과반수</b>의 출석으로 개회한다."},
{subj:"헌법",year:"2021",no:15,q:"제직회에 대한 설명 중 틀린 것은 무엇인가 ?",opts:["제직회 회원은 시무목사, 장로, 집사, 권사, 서리집사로 한다","회장이 소집의 필요를 인정할 때 언제든지 소집할 수 있다","교회의 제직 1/3의 요청이 있다면 소집해야 한다","구제비의 수입과 지출, 그리고 특별헌금을 다루어야 한다","부동산 매매가 있을 시 반드시 제직회에서 다루어야 한다"],a:0,e:"<b>정치 제91조</b> — 제직회 회원은 시무목사, 장로, 안수집사, 권사, <b>전도사</b>, 서리집사이다. (※ 2번 보기의 '언제든지 소집' 또한 '1주일 전 광고' 원칙에 비추어 다툼 소지가 있으나, 시험 당시는 1번을 정답으로 처리함)"},
{subj:"헌법",year:"2021",no:16,q:"다음은 요리문답 제4문이다. 빈칸에 들어 갈 알맞은 말은 무엇인가?<br>“하나님은 그의 존재, 지혜, 능력, 거룩, 공의, 선하심, 그리고 진리에 있어서 ( ) 영원 불변하시는 영이십니다.”",opts:["무한하시고","정확무오하시고","변함이 없으시며","절대적이시며","명확하시며"],a:0,e:"<b>소요리문답 제4문</b> — 진리에 있어서 <b>무한하시고</b> 영원 불변하시는 영이십니다."},
{subj:"헌법",year:"2021",no:17,q:"웨스터민스터 신앙고백과 소요리문답은 영국의 “장기의회”에 의해 소집된 신학자 총회에서 몇 년에 작성된 것인가?",opts:["1633년","1643년","1653년","1663년","1673년"],a:1,e:"<b>웨스트민스터 신앙고백</b>은 <b>1643년</b> 영국 웨스트민스터 총회에서 초안 작성을 시작하여 완성되었다."},
{subj:"헌법",year:"2021",no:18,q:"회원권이 정지된 교인과 실종교인이 다시 돌아오면 본 교회에서 어떻게 복권시킬 수 있는가?",opts:["공동회의 결의","제직회 결의","당회의 결의","당회장의 선포","본인의 서약"],a:2,e:"<b>정치 제20조</b> — 회원권이 정지된 교인(6개월 경과)과 실종교인(1년 경과)이 돌아오면 <b>당회의 결의</b>로 복권시킬 수 있다."},
{subj:"헌법",year:"2021",no:19,q:"다음 중 헌법 상 목사의 직무가 아닌 것은?",opts:["하나님의 말씀으로 교훈한다","성례를 거행한다","교인들 축복한다","장로와 협력하여 치리권을 행사한다","교회를 치리한다"],a:4,e:"<b>정치 제25조</b> — 목사의 직무는 장로와 협력하여 치리권을 행사하는 것이며, 목사 단독으로 <b>교회를 치리한다</b>고 규정하지 않는다."},
{subj:"헌법",year:"2021",no:20,q:"다음 중 전도목사와 관계가 없는 것은 무엇인가?",opts:["총회나 노회 및 관계기관에서 교육, 문서 등을 통해 전도한다","국내외에서 연합기관과 개척지에 전도하는 목사이다","군대, 학원, 병원, 교도소에 전도하는 목사이다","사회복지시설(양로원, 보육원, 요양원 등), 산업기관 등에 전도하는 목사이다","국내 거주외국인 등에 전도하는 목사이다"],a:0,e:"<b>정치 제27조</b> — 총회나 노회 및 관계기관에서 교육, 문서 등 사업에 종사하는 목사는 <b>기관목사</b>이다."},
{subj:"헌법",year:"2021",no:21,q:"담임목사 청빙과 연임청원에 관한 내용 중 틀린 것은 무엇인가?",opts:["당회의 결의와 제직회의 출석회원 과반수의 찬성을 얻어야 한다","제직회 출석회원 과반수가 서명을 한 명단을 노회에 제출해야 한다","당회록 사본, 제직회 회의록 사본, 목사의 이력서를 첨부하여 노회에 제출해야 한다","연임청원은 당회록과 제직회의록을 첨부하여 임시당회장이 노회에 제출해야 한다","당회 미조직 교회는 연임청원시 제직회 회의록을 제출한다"],a:3,e:"<b>정치 제28조</b> — 연임청원 서류 제출은 임시당회장이 아니라 <b>대리당회장</b>이 노회에 제출해야 한다."},
{subj:"헌법",year:"2021",no:22,q:"세례교인(입교인)이 450명인 경우 당회에서 노회에 장로 총대를 몇 명 파송 할 수 있는가?",opts:["5인","4인","3인","2인","1인"],a:1,e:"<b>정치 노회 총대 규정 (2021년 출제 기준)</b> — 당시 시험 기준에 따라 <b>4인</b>으로 정답 처리되었다. (※ 노회 총대장로 파송 인원은 시행규정 개정으로 달라질 수 있어 현행 규정 확인 권장)"},
{subj:"헌법",year:"2021",no:23,q:"목사의 휴무에 관한 내용 중 틀린 것은 무엇인가?",opts:["목사의 휴무 기간이 3개월 이상일 경우 해당된다","당회의 결의와 노회의 허락을 받아야 한다","휴무 기간은 1년 이내로 한다","필요한 경우 1년 단위로 연장을 허락할 수 있고, 3년을 초과할 수 없다","연구기관이나 교육기관 등에서 연수하게 된 때는 예외이다"],a:4,e:"<b>정치 제36조</b> — 1~4번은 조문과 일치한다. ⑤는 틀림: 연구기관·교육기관 연수는 제36조 1항이 정한 <b>휴무 '사유'의 하나</b>이지 휴무 규정의 예외가 아니다."},
{subj:"헌법",year:"2021",no:24,q:"장로로 피택된 자는 몇 개월 이상 당회의 지도아래 교육을 받은 후 노회고시에 합격해야 하는가?",opts:["3개월 이상","4개월 이상","5개월 이상","6개월 이상","1년 이상"],a:1,e:"<b>정치 제42조</b> — 장로 피택자는 <b>4개월 이상</b> 당회의 지도를 받아야 한다."},
{subj:"헌법",year:"2021",no:25,q:"다음 장로의 선택과 임직에 관한 내용 중 틀린 것은?",opts:["장로의 선택은 당회의 결의로 노회의 허락을 받아야 한다","공동의회에서 출석회원의 3분의 2 이상의 득표로 선포한다","당회에서 후보자를 추천할 수 있다","장로의 선택을 위한 투표는 3차까지만 할 수 있다","노회고시에 합격한 자를 지교회는 장로임직을 행한다"],a:1,e:"<b>정치 제41조</b> — 공동의회 출석회원이 아니라 총 투표수의 3분의 2 이상 득표로 <b>선출</b>한다. ('선포'가 아님)"},
{subj:"헌법",year:"2021",no:26,q:"전도사의 자격 중 틀린 것은?",opts:["30세 이상 된 자","신학교 또는 성서학원 졸업자","노회 전도사고시에 합격한 자","무흠세례교인(입교인)으로 5년을 경과한 자","시무장로는 전도사직을 겸할 수 없다"],a:0,e:"<b>정치 제49조</b> — 전도사의 연령 자격은 30세 이상이 아니라 <b>25세 이상</b>이다."},
{subj:"헌법",year:"2021",no:27,q:"다음은 집사의 자격이다. 해당하지 않는 것은?",opts:["단정하고 일구이언을 하지 아니하는 자","깨끗한 양심에 믿음의 비밀을 가진 자","자기 가정을 잘 다스리는 자","무흠세례교인(입교인)으로 5년을 경과한 자","35세 이상 된 남자"],a:2,e:"<b>정치 제50조(안수집사 자격)</b> — '자기 가정을 잘 다스리는 자'는 안수집사 자격 조문에 없고 <b>목사(감독)의 자격</b>에 해당하는 표현이다."},
{subj:"헌법",year:"2021",no:28,q:"다음 중 ( )에 알맞은 말은?<br>당회 조직 후 시무장로가 1인도 없으면 1년 후 첫 노회부터 폐당회가 되고, 장로 2인 미달 또는 세례교인(입교인) 수가 ( ) 미달로 ( ) 경과한 후 첫 노회부터 당회가 폐지된다.",opts:["15인, 3년","20인, 3년","30인, 3년","15인, 2년","20인, 2년"],a:2,e:"<b>정치 제65조</b> — 장로 2인 미달 또는 세례교인 수 <b>30인 미달</b>로 <b>3년</b>이 경과하면 당회가 폐지된다."},
{subj:"헌법",year:"2021",no:29,q:"당회의 개회성수는 당회장을 포함한 당회원 ( )의 출석으로 한다. ( ) 알맞은 말은?",opts:["3분의 1","3분의 2","과반수","반수","전원"],a:2,e:"<b>정치 제66조</b> — 당회는 당회장을 포함한 당회원 <b>과반수</b>의 출석으로 개회한다."},
{subj:"헌법",year:"2021",no:30,q:"다음 중 공동의회의 결의 사항이 아닌 것은?",opts:["당회가 제시한 사항","예산 및 결산","직원 선거","상회가 지시한 사항","부동산 매매"],a:4,e:"<b>정치 제90조</b> — 부동산 매매는 공동의회가 아니라 <b>제직회의 결의 사항</b>이다."},
{subj:"헌법",year:"2021",no:31,q:"다음 중 권징의 사유가 되는 죄과가 아닌 것은?",opts:["성경상의 계명에 대한 중대한 위반행위","예배를 방해한 행위","이단적 행위와 이에 적극적으로 동조한 행위","직권을 남용하거나 직무를 유기한 행위","국가 재판에 의해 집행유예 이상의 형이 확정된 자"],a:4,e:"<b>권징 제3조 7항</b> — 국가 재판에 의해 <b>금고 이상의 형</b>이 확정된 범죄행위가 권징 사유이다. (집행유예는 해당 안 됨)"},
{subj:"헌법",year:"2021",no:32,q:"재판국장이 피고인을 소환할 때는 며칠 전에 통지해야 하는가?",opts:["7일 전","10일 전","15일 전","20일 전","30일 전"],a:1,e:"<b>권징 제43조</b> — 재판국장은 피고인을 소환할 때에는 <b>10일 전</b>에 통지하여야 한다."},
{subj:"헌법",year:"2021",no:33,q:"예배와 예식에 나타난 그리스도인들의 경건을 위한 중요한 기초는?",opts:["말씀","기도","영성","겸손","예배"],a:4,e:"<b>예배와 예식</b> — 그리스도인들의 경건은 예배에서 더욱 확실하게 경험된다. 그러므로 <b>예배</b>는 경건을 위한 중요한 기초이다."}
 
// ===================== 2022년도 기출 =====================
  // 성경
{subj:"성경",year:"2022",no:1,q:"사람들이 여호와의 이름을 부른 때는 언제인가?",opts:["아담과 하와가 범죄하고 에덴 동산에서 쫓겨난 후부터","가인과 아벨이 여호와 하나님께 제사를 드릴 때부터","셋이 아들을 낳고 그의 이름을 에노스라고 부른 후부터","노아시대 홍수심판 후 방주에서 나온 후 제단을 쌓고 번제를 드린 때부터","아브람이 여호와의 명령을 따라 가나안 땅으로 간 후부터"],a:2,e:"<b>창세기 4:26</b> — 셋도 아들을 낳고 그의 이름을 <b>에노스</b>라 하였으며 그 때에 사람들이 비로소 여호와의 이름을 불렀더라."},
{subj:"성경",year:"2022",no:2,q:"이스라엘 자손들이 요단강을 건넌 후 유월절을 지킨 장소는?",opts:["기브온","에발산","여리고 평지","길갈","세겜"],a:2,e:"<b>여호수아 5:10</b> — 이스라엘 자손들이 길갈에 진 쳤고 그 달 십사일 저녁에는 <b>여리고 평지</b>에서 유월절을 지켰으며."},
{subj:"성경",year:"2022",no:3,q:"아합왕의 죄는 무엇인가?",opts:["벧엘과 단에 두 금송아지를 만들어 경배했다","사마리아에 바알과 아세라 상을 만들었다","레위 자손이 아닌 보통 사람으로 제사장을 삼았다","자기 마음대로 절기를 정하였다","남유다 왕국과 전쟁을 벌였다"],a:1,e:"<b>열왕기상 16:31-33</b> — 아합은 이세벨을 아내로 삼고 사마리아에 건축한 바알의 사당에 제단을 쌓으며 <b>아세라 상</b>을 만들었다. (나머지 보기는 여로보암의 죄)"},
{subj:"성경",year:"2022",no:4,q:"“너는 힘써 대장부가 되고 네 하나님 여호와의 명령을 지켜 그 길로 행하여 그 법률과 계명과 율례와 증거를 모세의 율법에 기록된 대로 지켜라. 그리하면 네가 무엇을 하든지 어디로 가든지 형통할지라”는 누가, 누구에게 한 말인가?",opts:["모세 → 여호수아","엘리야 → 엘리사","엘리 → 사무엘","기드온 → 300용사","다윗 → 솔로몬"],a:4,e:"<b>열왕기상 2:2-3</b> — <b>다윗</b>이 죽임이 임박하여 아들 <b>솔로몬</b>에게 남긴 유언이다."},
{subj:"성경",year:"2022",no:5,q:"창세기에서 족보가 나오지 않는 장은?",opts:["5장","10장","11장","21장","36장"],a:3,e:"<b>창세기 21장</b> — 이삭의 출생과 하갈/이스마엘이 쫓겨나는 내용이다. (5장: 아담 계보, 10장: 노아 아들들 계보, 11장: 셈의 계보, 36장: 에서 계보)"},
{subj:"성경",year:"2022",no:6,q:"출애굽기 1장 5절에 따르면 애굽에 내려간 야곱의 가족은 모두 몇 명이었나?",opts:["70명","75명","80명","85명","90명"],a:0,e:"<b>출애굽기 1:5</b> — 야곱의 허리에서 나온 사람이 모두 <b>칠십</b>이요."},
{subj:"성경",year:"2022",no:7,q:"“나무에 달린 자는 하나님께 저주를 받았음이니”라는 말이 기록되어 있는 책은?",opts:["창세기","레위기","출애굽기","민수기","신명기"],a:4,e:"<b>신명기 21:23</b> — 나무에 달린 자는 하나님께 저주를 받았음이니라. (바울이 갈라디아서 3:13에서 이 말씀을 인용함)"},
{subj:"성경",year:"2022",no:8,q:"므비보셋의 종의 이름과 다윗을 저주한 사람의 짝이 맞는 것은?",opts:["시므이, 아비새","시바, 시므이","시바, 아히도벨","후새, 아비멜렉","후새 시므이"],a:1,e:"<b>사무엘하 9장, 16장</b> — 사울의 손자 므비보셋의 종은 <b>시바</b>이고, 피난 가는 다윗을 향해 돌을 던지며 저주한 사람은 <b>시므이</b>이다."},
{subj:"성경",year:"2022",no:9,q:"요엘서에서 큰 군대로 비유된 곤충이 아닌 것은?",opts:["메뚜기","느치","황충","팥중이","여치"],a:4,e:"<b>요엘 1:4, 2:25</b> — 팥중이, 메뚜기, 느치, 황충이 언급되며 <b>여치</b>는 나오지 않는다."},
{subj:"성경",year:"2022",no:10,q:"스가랴가 유다 백성들에게 “너희가 좋게 여기거든 내 품삯을 내게 주고 그렇지 아니하거든 그만두라” 라고 말할 때에 그들이 은 얼마를 달아서 주었는가?",opts:["은 10개","은 20개","은 30개","은 40개","은 50개"],a:2,e:"<b>스가랴 11:12</b> — 그들이 곧 <b>은 삼십 개</b>를 달아서 내 품삯을 삼은지라. (가룟 유다가 예수님을 판 금액의 예언)"},
{subj:"성경",year:"2022",no:11,q:"“이는 물이 바다를 덮음같이 여호와의 영광을 인정하는 것이 세상에 가득함이니라” 는 하박국 몇 장 몇 절 인가?",opts:["1:14","2:4","2:14","3:4","3:14"],a:2,e:"<b>하박국 2:14</b> — 이는 물이 바다를 덮음 같이 여호와의 영광을 인정하는 것이 세상에 가득함이니라."},
{subj:"성경",year:"2022",no:12,q:"“지혜는 주의 이름을 경외함이니라 너희는 때가 예비되었나니 그것을 정하신 이가 누구인지 들을지니라” 라고 선포한 선지자는 누구인가?",opts:["아모스","오바댜","미가","나훔","스바냐"],a:2,e:"<b>미가 6:9</b> — 미가 선지자가 성읍을 향하여 외쳐 부른 말씀이다."},
{subj:"성경",year:"2022",no:13,q:"이사야가 히스기야 왕의 종처(腫處)에 붙이면 나으리라고 한 것은 무엇인가?",opts:["말씀","기름","몰약","무화과","감람나무열매"],a:3,e:"<b>이사야 38:21</b> — 이사야가 이르기를 한 뭉치 <b>무화과</b>를 가져다가 종처에 붙이면 왕이 나으리라 하였고."},
{subj:"성경",year:"2022",no:14,q:"“나의 힘이신 여호와여 내가 주를 사랑하나이다 여호와는 나의 반석이시요 나의 (     )시요 나를 건지시는 이시요 나의 하나님이시요 내가 그 안에 피할 나의 (     )시요 나의 (     )시요 나의 (    )이시요 나의 (    )이시로다“ (시편18:1-2)<br>빈 칸에 들어갈 말로 알맞은 것은 무엇인가?",opts:["요새-방패-바위-산성-구원의 뿔","방패-요새-산성-바위-구원의 뿔","바위-산성-요새-구원의 뿔-방패","요새-바위-방패-구원의 뿔-산성","산성-요새-바위-방패-구원의 뿔"],a:3,e:"<b>시편 18:2</b> — 여호와는 나의 반석이시요 나의 <b>요새</b>시요... 나의 <b>바위</b>시요 나의 <b>방패</b>시요 나의 <b>구원의 뿔</b>이시요 나의 <b>산성</b>이시로다."},
{subj:"성경",year:"2022",no:15,q:"솔로몬의 성전 봉헌 기도가 언급된 곳은 왕상 몇 장인가?",opts:["7장","8장","9장","10장","11장"],a:1,e:"<b>열왕기상 8장</b> — 언약궤를 성전으로 옮기고 솔로몬이 하나님께 올리는 장엄한 성전 봉헌 기도가 기록되어 있다."},
{subj:"성경",year:"2022",no:16,q:"“여호와 크고 두려우신 하나님이여 주를 사랑하고 주의 계명을 지키는 자 에게 언약을 지키시며 긍휼을 베푸시는 주여 간구하나이다”는 누구의 기도 인가?",opts:["느헤미야","에스라","모르드개","에스더","솔로몬"],a:0,e:"<b>느헤미야 1:5</b> — 예루살렘 성벽이 무너졌다는 소식을 듣고 <b>느헤미야</b>가 금식하며 올린 기도이다."},
{subj:"성경",year:"2022",no:17,q:"\"네 시작은 미약하였으나 네 나중은 심히 창대하리라\"는 누구의 말인가?",opts:["욥","소발","엘리후","빌닷","엘리바스"],a:3,e:"<b>욥기 8:7</b> — 욥의 친구인 수아 사람 <b>빌닷</b>이 한 말이다."},
{subj:"성경",year:"2022",no:18,q:"시편은 모두 몇 권으로 구성되어 있는가?",opts:["1권","2권","3권","4권","5권"],a:4,e:"<b>시편</b>은 모세오경과 같이 총 <b>5권</b>(제1권~제5권)으로 구성되어 있다."},
{subj:"성경",year:"2022",no:19,q:"“어떤 길은 사람이 보기에 바르나 필경은 사망의 길이니라” 잠언 몇 장에 기록되어 있는가?",opts:["13장","14장","15장","16장","17장"],a:1,e:"이 구절은 <b>잠언 14:12</b>과 <b>16:25</b>에 토씨 하나 틀리지 않고 똑같이 두 번 등장하므로 <b>14장(②)과 16장(④) 모두 정답</b>이 될 수 있다."},
{subj:"성경",year:"2022",no:20,q:"음란한 고멜을 취해서 음란한 자식을 낳으라는 명령을 받은 선지자는?",opts:["호세아","요엘","아모스","스바냐","미가"],a:0,e:"<b>호세아 1:2</b> — 하나님이 <b>호세아</b>에게 음란한 여자를 맞이하여 음란한 자식들을 낳으라고 명하셨다."},
{subj:"성경",year:"2022",no:21,q:"예수님의 산상보훈의 팔 복중 연결이 잘못된 것은?",opts:["심령이 가난한 자 – 천국이 그들의 것","마음이 청결한 자 – 위로를 받음","온유한 자 – 땅을 기업으로 받음","긍휼히 여기는 자 – 긍휼히 여김을 받음","화평케 하는 자 – 하나님의 아들이라 일컬음을 받음"],a:1,e:"<b>마태복음 5:8</b> — 마음이 청결한 자는 <b>하나님을 볼 것임이요</b>. (위로를 받는 자는 '애통하는 자'이다.)"},
{subj:"성경",year:"2022",no:22,q:"마가복음 4장과 마태복음 13장에 공통적으로 언급된 비유는 무엇인가?",opts:["그물 비유","누룩 비유","진주비유","겨자씨 비유","숨겨진 보화 비유"],a:3,e:"<b>마가복음 4장, 마태복음 13장</b> — 씨 뿌리는 자 비유와 <b>겨자씨 비유</b>가 공통적으로 등장한다."},
{subj:"성경",year:"2022",no:23,q:"성령과 지혜가 충만하여 세운 일곱 집사 중에서 아닌 자는?",opts:["스데반","디몬","니골라","빌립","시므온"],a:4,e:"<b>사도행전 6:5</b> — 일곱 집사는 스데반, 빌립, 브로고로, 니가노르, 디몬, 바메나, 니골라이며 <b>시므온</b>은 포함되지 않는다."},
{subj:"성경",year:"2022",no:24,q:"“그리스도의 남은 고난을 그의 몸 된 교회를 위하여 내 육체에 채우노라”는 어느 서신에 기록되어 있는가?",opts:["갈라디아서","에베소서","빌립보서","골로새서","데살로니가전서"],a:3,e:"<b>골로새서 1:24</b> — 바울이 옥중에서 골로새 교회에 보낸 편지에 기록된 말씀이다."},
{subj:"성경",year:"2022",no:25,q:"생명의 성령의 법에 관하여는 로마서 몇 장에 기록되어 있는가?",opts:["6장","7장","8장","9장","10장"],a:2,e:"<b>로마서 8:2</b> — 이는 그리스도 예수 안에 있는 <b>생명의 성령의 법</b>이 죄와 사망의 법에서 너를 해방하였음이라."},
{subj:"성경",year:"2022",no:26,q:"야고보서 5장에서 기도의 교훈 중 나오는 구약의 인물은 누구인가?",opts:["모세","엘리야","엘리사","다윗","다니엘"],a:1,e:"<b>야고보서 5:17</b> — <b>엘리야</b>는 우리와 성정이 같은 사람이로되 그가 비가 오지 않기를 간절히 기도한즉..."},
{subj:"성경",year:"2022",no:27,q:"“만물의 마지막이 가까이 왔으니 그러므로 너희는 정신을 차리고 근신하여 기도하라”는 말씀은 베드로전서 몇 장에 나오는가?",opts:["1장","2장","3장","4장","5장"],a:3,e:"<b>베드로전서 4:7</b> — 만물의 마지막이 가까이 왔으니 그러므로 너희는 정신을 차리고 근신하여 기도하라."},
{subj:"성경",year:"2022",no:28,q:"“율법을 따라 거의 모든 물건이 피로써 정결하게 되나니 피 흘림이 없은즉 사함이 없느니라.”는 히브리서 몇 장 몇 절에 기록되어 있는가?",opts:["6:12","7:22","8:12","9:22","10:12"],a:3,e:"<b>히브리서 9:22</b> — 율법을 따라 거의 모든 물건이 피로써 정결하게 되나니 피 흘림이 없은즉 사함이 없느니라."},
{subj:"성경",year:"2022",no:29,q:"요한계시록의 “네가 죽도록 충성하라 그리하면 내가 생명의 관을 네게 주리라”는 어느 교회에게 주신 말씀인가?",opts:["에베소교회","안디옥 교회","서머나교회","버가모교회","두아디라교회"],a:2,e:"<b>요한계시록 2:10</b> — 환난과 궁핍을 겪는 <b>서머나 교회</b>에게 주신 칭찬과 위로의 말씀이다."},
{subj:"성경",year:"2022",no:30,q:"예수님의 유년 시절의 생활이 가장 많이 언급되어 있는 복음서는?",opts:["마태복음","마가복음","누가복음","요한복음","사도행전"],a:2,e:"<b>누가복음</b>은 다른 복음서에 없는 예수님의 탄생 배경, 목자들의 방문, 소년 시절 성전 방문(12살 때) 등이 상세히 기록되어 있다."},
{subj:"성경",year:"2022",no:31,q:"\"이는 참으로 이스라엘 사람이라 그 속에 간사한 것이 없도다\"는 예수님이 누구에게 한 말씀인가?",opts:["베드로","안드레","빌립","니고데모","나다나엘"],a:4,e:"<b>요한복음 1:47</b> — 예수께서 <b>나다나엘</b>이 자기에게 오는 것을 보시고 그를 가리켜 하신 말씀이다."},
{subj:"성경",year:"2022",no:32,q:"예수님에게 “아버지를 우리에게 보여 주옵소서.”라고 청한 제자는 누구인가?",opts:["빌립","안드레","야고보","바돌로매","도마"],a:0,e:"<b>요한복음 14:8</b> — <b>빌립</b>이 이르되 주여 아버지를 우리에게 보여 주옵소서 그리하면 족하겠나이다."},
{subj:"성경",year:"2022",no:33,q:"고린도교회 안에 존재하는 당파가 아닌 것은?",opts:["바나바","게바","바울","아볼로","그리스도"],a:0,e:"<b>고린도전서 1:12</b> — 고린도 교회 안에는 바울파, 아볼로파, 게바파, 그리스도파가 있었으며 <b>바나바파</b>는 없었다."}
