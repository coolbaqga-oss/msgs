<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>목사고시 기출문제(2015-2025)</title>
<style>
  :root {
    --ink: #1c1a17;
    --paper: #f4efe6;
    --paper-2: #ece4d6;
    --card: #fbf8f1;
    --line: #d8cdb9;
    --burgundy: #7a2230;
    --burgundy-soft: #9c3a48;
    --gold: #b08545;
    --green: #3f6b48;
    --green-soft: #e3efe3;
    --red: #a23030;
    --red-soft: #f6e3e0;
    --muted: #7c7363;
    --shadow: 0 1px 2px rgba(40,30,15,.06), 0 8px 24px rgba(40,30,15,.07);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: "Apple SD Gothic Neo", "Malgun Gothic", "Noto Sans KR", sans-serif;
    background: var(--paper); color: var(--ink); line-height: 1.65;
  }
  .app-container { max-width: 640px; margin: 0 auto; padding: 20px 20px calc(120px + env(safe-area-inset-bottom)); }
  header { border-bottom: 2px solid var(--ink); padding-bottom: 15px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: flex-end; flex-wrap: wrap; gap: 8px 16px; }
  .title-block { min-width: 0; }
  h1 { font-size: 1.4rem; color: var(--burgundy); white-space: nowrap; line-height: 1.15; }
  .subtitle { font-size: 0.8rem; color: var(--muted); margin-top: 3px; letter-spacing: 0.03em; }
  .header-actions { display: flex; align-items: flex-end; gap: 14px; font-size: 0.78rem; flex-wrap: wrap; margin-left: auto; }
  .hdr-link { background: none; border: none; cursor: pointer; text-decoration: underline; white-space: nowrap; padding: 2px 0; color: var(--ink); font-size: 0.78rem; }
  .hdr-link.gold { color: var(--gold); }
  .hdr-link.red { color: var(--red); }

  .dashboard { display: flex; gap: 5px; margin-bottom: 15px; background: var(--card); border: 1px solid var(--line); border-radius: 8px; padding: 10px; box-shadow: var(--shadow); }
  .dash-item { flex: 1; text-align: center; border-right: 1px solid var(--line); }
  .dash-item:last-child { border-right: none; }
  .dash-title { font-size: 0.72rem; color: var(--muted); }
  .dash-score { font-size: 1.05rem; font-weight: bold; color: var(--burgundy); }

  /* 전체 정복률 진행 바 */
  .mastery { background: var(--card); border: 1px solid var(--line); border-radius: 8px; padding: 13px 16px; margin-bottom: 15px; box-shadow: var(--shadow); }
  .mastery-head { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 9px; }
  .mastery-label { font-size: 0.78rem; color: var(--muted); }
  .mastery-val { font-size: 0.95rem; font-weight: bold; color: var(--burgundy); }
  .mastery-track { height: 10px; background: var(--paper-2); border-radius: 6px; overflow: hidden; }
  .mastery-fill { height: 100%; width: 0%; background: linear-gradient(90deg, var(--burgundy), var(--gold)); border-radius: 6px; transition: width 0.45s ease; }
  .dash-sub { font-size: 0.65rem; color: var(--muted); }

  .filters-group { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
  .filters { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
  .chip {
    padding: 6px 12px; background: var(--paper-2); border: 1px solid var(--line);
    border-radius: 20px; font-size: 0.85rem; color: var(--muted); cursor: pointer; transition: 0.2s;
  }
  .chip.on { background: var(--burgundy); color: #fff; border-color: var(--burgundy); }
  .chip.pick.on::before { content: "✓ "; }

  .adv-wrap { position: relative; }
  .adv-toggle { background: var(--paper-2); border: 1px dashed var(--line); color: var(--muted); }
  #adv-panel {
    display: none; position: absolute; right: 0; top: 42px; z-index: 10;
    background: var(--paper-2); padding: 12px; border-radius: 10px; border: 1px solid var(--line);
    box-shadow: var(--shadow); min-width: 240px; gap: 10px; flex-direction: column;
  }
  #adv-panel.show { display: flex; }
  @media (max-width: 480px) {
    #adv-panel { left: 0; right: 0; width: 100%; }
  }

  #search-box { width: 100%; padding: 12px; border: 1px solid var(--line); border-radius: 8px; font-size: 0.95rem; }

  .mode-tabs { display: flex; margin-bottom: 20px; border-radius: 8px; overflow: hidden; border: 1px solid var(--line); }
  .mode-tab { flex: 1; padding: 12px; text-align: center; background: var(--paper-2); cursor: pointer; font-weight: bold; border: none; color: var(--muted); }
  .mode-tab.on { background: var(--ink); color: #fff; }

  .card { background: var(--card); border: 1px solid var(--line); border-radius: 12px; padding: 24px; box-shadow: var(--shadow); margin-bottom: 20px; }
  .q-meta { font-size: 0.85rem; color: var(--gold); font-weight: bold; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; gap: 10px; }
  .meta-right { display: flex; align-items: center; gap: 10px; }
  .meta-link { font-size: 0.8rem; color: var(--muted); text-decoration: underline; cursor: pointer; }
  .star { cursor: pointer; }
  .q-text { font-size: 1.15rem; font-weight: 600; margin-bottom: 12px; word-break: keep-all; overflow-wrap: anywhere; }
  .opt {
    display: block; width: 100%; text-align: left; padding: 14px 16px; margin-bottom: 8px;
    background: #fff; border: 1px solid var(--line); border-radius: 8px; cursor: pointer; font-size: 1rem;
    word-break: keep-all; overflow-wrap: anywhere;
  }
  .opt.selected { background: var(--burgundy-soft); color: white; border-color: var(--burgundy); }
  .opt.correct { background: var(--green-soft); border-color: var(--green); color: var(--green); font-weight: bold; }
  .opt.wrong { background: var(--red-soft); border-color: var(--red); color: var(--red); text-decoration: line-through; }

  /* 보기 소거 */
  .opt-row { display: flex; align-items: stretch; gap: 8px; margin-bottom: 8px; }
  .opt-row .opt { margin-bottom: 0; flex: 1; min-width: 0; }
  .opt-x {
    flex-shrink: 0; width: 40px; border: 1px solid var(--line); border-radius: 8px;
    background: #fff; color: var(--muted); font-size: 0.95rem; cursor: pointer; line-height: 1;
  }
  .opt-x:active { transform: translateY(1px); }
  .opt-x.on { background: var(--ink); color: #fff; border-color: var(--ink); }
  .opt.eliminated { opacity: .4; text-decoration: line-through; background: var(--paper-2); color: var(--muted); }

  /* 학습모드: 화면 하단 고정 이전/다음 바 */
  .study-nav {
    display: none; position: fixed; left: 0; right: 0; bottom: 0; z-index: 900; gap: 10px;
    padding: 12px 16px max(24px, calc(12px + env(safe-area-inset-bottom)));
    background: rgba(255,255,255,0.96); -webkit-backdrop-filter: blur(6px); backdrop-filter: blur(6px);
    border-top: 1px solid var(--line);
  }
  .study-nav.show { display: flex; max-width: 640px; margin: 0 auto; }
  .snav-btn {
    flex: 1; padding: 15px; border-radius: 10px; font-weight: bold; font-size: 1rem;
    border: 1px solid var(--line); background: var(--card); color: var(--ink); cursor: pointer;
  }
  .snav-btn.primary { background: var(--ink); color: #fff; border-color: var(--ink); }
  .snav-btn:active { transform: translateY(1px); }

  /* 유틸리티 바: 글자 크기 + 백업 표시 */
  .util-bar { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin: 4px 0 14px; flex-wrap: wrap; }
  .font-ctrl { display: flex; align-items: center; gap: 6px; }
  .font-lbl { font-size: 0.75rem; color: var(--muted); }
  .font-btn { padding: 3px 10px; border: 1px solid var(--line); border-radius: 6px; background: #fff; color: var(--ink); font-size: 0.8rem; cursor: pointer; }
  .font-btn:active { transform: translateY(1px); }
  .backup-note { font-size: 0.72rem; color: var(--muted); }
  .backup-note.warn { color: var(--red); }

  /* 글자 크기 스케일: 문제·보기·해설에 적용 */
  .q-text { font-size: calc(1.15rem * var(--fscale, 1)); }
  .opt { font-size: calc(1rem * var(--fscale, 1)); }
  .fb-exp { font-size: calc(0.88rem * var(--fscale, 1)); }

  /* 오답노트 리스트 뷰 */
  .rv-head { font-weight: bold; color: var(--burgundy); margin: 4px 2px 12px; font-size: 1.05rem; }
  .rv-chips { display: flex; gap: 6px; margin-bottom: 14px; flex-wrap: wrap; }
  .rv-chip { padding: 7px 13px; border: 1px solid var(--line); border-radius: 20px; background: #fff; color: var(--muted); font-size: 0.85rem; cursor: pointer; }
  .rv-chip.on { background: var(--burgundy); color: #fff; border-color: var(--burgundy); }
  .rv-group { font-weight: bold; color: var(--burgundy); margin: 20px 2px 10px; font-size: 1rem; border-bottom: 1px solid var(--line); padding-bottom: 6px; }
  .rv-card { padding: 16px; }
  .rv-meta { font-size: 0.78rem; color: var(--muted); margin-bottom: 8px; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .rv-tag { background: var(--paper-2); border: 1px solid var(--line); border-radius: 12px; padding: 1px 8px; color: var(--ink); }
  .rv-ok  { color: var(--green); font-weight: bold; }
  .rv-bad { color: var(--red);   font-weight: bold; }
  .rv-q { font-size: calc(1.02rem * var(--fscale, 1)); font-weight: 600; margin-bottom: 10px; word-break: keep-all; overflow-wrap: anywhere; }
  .rv-opts { display: flex; flex-direction: column; gap: 5px; margin-bottom: 10px; }
  .rv-opt { font-size: calc(0.92rem * var(--fscale, 1)); padding: 8px 10px; border: 1px solid var(--line); border-radius: 6px; color: var(--muted); overflow-wrap: anywhere; }
  .rv-opt.correct { background: var(--green-soft); border-color: var(--green); color: var(--green); font-weight: bold; }
  .rv-exp { font-size: calc(0.85rem * var(--fscale, 1)); line-height: 1.6; background: var(--paper-2); border-radius: 8px; padding: 10px 12px; margin-bottom: 10px; color: var(--ink); }
  .rv-go { width: 100%; padding: 10px; border: 1px solid var(--burgundy); border-radius: 8px; background: #fff; color: var(--burgundy); font-weight: bold; font-size: 0.85rem; cursor: pointer; }
  .rv-go:active { transform: translateY(1px); }

  /* 문제 번호 점프 */
  .q-counter { cursor: pointer; text-decoration: underline dotted; text-underline-offset: 3px; }
  .jump-wrap { display: inline-flex; align-items: center; gap: 6px; }
  .jump-input { width: 64px; padding: 4px 6px; border: 1px solid var(--burgundy); border-radius: 6px; font-size: 0.9rem; text-align: center; }
  .jump-btn { padding: 4px 10px; border: none; border-radius: 6px; background: var(--burgundy); color: #fff; font-size: 0.85rem; cursor: pointer; }
  .jump-btn.ghost { background: #fff; color: var(--muted); border: 1px solid var(--line); }

  .ans-box { margin: 10px 0 12px; padding: 14px; background: var(--paper-2); border-left: 4px solid var(--gold); display: none; border-radius: 8px; }

  /* 듀오링고식 피드백 패널 (보기 바로 아래, 인라인) */
  .fb-panel { margin-top: 14px; padding: 16px; border-radius: 12px; animation: fbPop .18s ease; }
  @keyframes fbPop { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  .fb-panel.ok  { background: var(--green-soft); border: 1px solid var(--green); }
  .fb-panel.bad { background: var(--red-soft);   border: 1px solid var(--red); }
  .fb-head { display: flex; align-items: center; gap: 9px; margin-bottom: 10px; }
  .fb-icon { width: 26px; height: 26px; border-radius: 50%; color: #fff; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
  .fb-panel.ok  .fb-icon { background: var(--green); }
  .fb-panel.bad .fb-icon { background: var(--red); }
  .fb-title { font-size: 1rem; font-weight: bold; }
  .fb-panel.ok  .fb-title { color: var(--green); }
  .fb-panel.bad .fb-title { color: var(--red); }
  .fb-exp { font-size: 0.88rem; line-height: 1.6; margin-bottom: 12px; color: var(--ink);
    background: rgba(255,255,255,.72); border-radius: 8px; padding: 10px 12px; }
  .fb-exp:empty { display: none; }
  .fb-tags { display: flex; gap: 6px; margin-bottom: 14px; flex-wrap: wrap; }
  .fb-tag { font-size: 0.78rem; padding: 6px 13px; background: #fff; border: 1px solid var(--line); border-radius: 20px; color: var(--red); cursor: pointer; }
  .fb-tag:active { transform: translateY(1px); }
  .fb-gemini { width: 100%; padding: 12px; border: 1px solid #5b6ee0; border-radius: 10px; background: #eef0ff; color: #3b46b0; font-weight: bold; font-size: 0.9rem; cursor: pointer; margin-bottom: 9px; }
  .fb-gemini:active { transform: translateY(1px); }
  .fb-next { width: 100%; padding: 15px; border: none; border-radius: 12px; color: #fff; font-weight: bold; font-size: 0.95rem; cursor: pointer; transition: transform .05s, box-shadow .05s; }
  .fb-panel.ok  .fb-next { background: var(--green); box-shadow: 0 4px 0 #2c4d33; }
  .fb-panel.bad .fb-next { background: var(--red);   box-shadow: 0 4px 0 #7a1d1d; }
  .fb-next:active { transform: translateY(3px); box-shadow: none; }
  .opt.answered { pointer-events: none; }
  .tag-wrap { display: none; margin-top: 12px; padding-top: 10px; border-top: 1px dashed var(--line); }
  .tag-title { font-size: 0.85rem; color: var(--muted); margin-bottom: 8px; }
  .tag-area { display: flex; gap: 8px; flex-wrap: wrap; }
  .tag-btn { padding: 8px 12px; border-radius: 8px; border: 1px solid var(--line); cursor: pointer; font-size: 0.85rem; font-weight: 600; }
  .tag-btn.t1 { background: #fff3c4; border-color: #e2c36a; }
  .tag-btn.t2 { background: #dff0ff; border-color: #7ab4e4; }
  .tag-btn.t3 { background: #ffe0e0; border-color: #e38b8b; }

  .nav-btns { display: flex; gap: 8px; margin-bottom: 15px; }
  .nav-btn { flex: 1; padding: 14px; border-radius: 8px; font-weight: bold; cursor: pointer; border: 1px solid var(--line); background: var(--card); }
  .nav-btn.primary { background: var(--ink); color: #fff; }

  /* 학습모드: 보기란 양옆 세로 이전/다음 버튼 */
  .study-row { display: flex; align-items: stretch; gap: 8px; }
  .study-row .card { flex: 1; margin-bottom: 0; min-width: 0; }
  .side-nav { flex-shrink: 0; width: 42px; border: 1px solid var(--line); border-radius: 10px;
    background: var(--card); color: var(--ink); font-size: 1.7rem; font-weight: bold; cursor: pointer;
    display: flex; align-items: center; justify-content: center; line-height: 1; }
  .side-nav.primary { background: var(--ink); color: #fff; border-color: var(--ink); }
  .side-nav:active { transform: translateY(1px); }

  /* 학습모드: 필터 접기/펼치기 토글 바 */
  .filter-toggle { display: none; width: 100%; padding: 9px; margin-bottom: 12px;
    border: 1px dashed var(--line); border-radius: 8px; background: var(--paper-2);
    color: var(--muted); font-size: 0.85rem; cursor: pointer; }
  .filter-toggle:active { transform: translateY(1px); }

  .exam-timer { background: var(--burgundy); color: white; padding: 10px; text-align: center; font-weight: bold; border-radius: 8px; }
  .no-timer { background: var(--paper-2); color: var(--muted); border: 1px dashed var(--line); }
  #toast { visibility: hidden; position: fixed; top: 12px; left: 50%; transform: translateX(-50%); background: var(--burgundy); color: white; padding: 10px 20px; border-radius: 30px; z-index: 1000; pointer-events: none; white-space: nowrap; }
  #toast.show { visibility: visible; animation: fadeInOut 1.8s; }
  #toast.ok  { background: var(--green); }   /* 정답 - 초록 */
  #toast.bad { background: var(--red); }      /* 오답 - 빨강 */
  @keyframes fadeInOut { 0%, 100% { opacity: 0; } 15%, 85% { opacity: 1; } }

  /* 업데이트 내역 */
  .ver-btn { background:none; border:none; cursor:pointer; color:var(--muted); text-decoration:underline; position:relative; font-size:0.75rem; white-space:nowrap; }
  .ver-dot { position:absolute; top:-3px; right:-7px; width:7px; height:7px; border-radius:50%; background:var(--red); display:none; }
  .ver-dot.show { display:block; }
  .cl-overlay { display:none; position:fixed; inset:0; background:rgba(20,15,8,.45); z-index:2000; align-items:center; justify-content:center; padding:18px; }
  .cl-overlay.show { display:flex; }
  .cl-box { background:var(--card); border-radius:14px; max-width:430px; width:100%; max-height:80vh; overflow:auto; box-shadow:var(--shadow); }
  .cl-head { display:flex; justify-content:space-between; align-items:center; padding:15px 18px; border-bottom:1px solid var(--line); font-weight:bold; color:var(--burgundy); position:sticky; top:0; background:var(--card); }
  .cl-head button { background:none; border:none; font-size:1.1rem; cursor:pointer; color:var(--muted); line-height:1; }
  .cl-entry { padding:14px 18px; border-bottom:1px solid var(--line); }
  .cl-entry:last-child { border-bottom:none; }
  .cl-ver { font-weight:bold; color:var(--burgundy); font-size:0.95rem; margin-bottom:7px; display:flex; align-items:center; gap:8px; }
  .cl-date { font-size:0.72rem; color:var(--muted); font-weight:normal; }
  .cl-new { font-size:0.68rem; background:var(--red); color:#fff; border-radius:10px; padding:1px 7px; font-weight:bold; }
  .cl-entry.seen { opacity:.55; }
  .cl-entry.seen .cl-ver { color:var(--muted); }
  .cl-note { font-size:0.9rem; margin:3px 0; padding-left:13px; position:relative; }
  .cl-note::before { content:"·"; position:absolute; left:3px; }

  /* 초기화 선택 모달 */
  .reset-opt { width:100%; text-align:left; padding:14px; border:1px solid var(--line); border-radius:10px; background:#fff; cursor:pointer; }
  .reset-opt:active { transform:translateY(1px); }
  .reset-opt.danger { border-color:var(--red); }
  .reset-opt-t { font-weight:bold; font-size:0.98rem; margin-bottom:4px; color:var(--ink); }
  .reset-opt.danger .reset-opt-t { color:var(--red); }
  .reset-opt-d { font-size:0.8rem; color:var(--muted); line-height:1.5; }
  .cl-banner { display:none; background:var(--burgundy); color:#fff; padding:10px 14px; border-radius:8px; margin-bottom:14px; align-items:center; justify-content:space-between; gap:10px; font-size:0.9rem; }
  .cl-banner.show { display:flex; }
  .cl-banner .cl-see { background:#fff; color:var(--burgundy); border:none; border-radius:6px; padding:5px 11px; font-weight:bold; cursor:pointer; font-size:0.83rem; white-space:nowrap; }
  .cl-banner .cl-x { background:none; border:none; color:#fff; font-size:1.05rem; cursor:pointer; padding:0 2px; line-height:1; }
</style>
</head>
<body>

<div class="app-container">
  <header>
    <div class="title-block">
      <h1>목사고시 기출문제</h1>
      <div class="subtitle">2015–2025</div>
    </div>
    <div class="header-actions">
      <button class="ver-btn" id="ver-btn" onclick="openChangelog()"><span id="ver-label">v15(260623)</span><span class="ver-dot" id="ver-dot"></span></button>
      <button class="hdr-link gold" onclick="refreshApp()">새로고침</button>
      <button class="hdr-link" onclick="backupProgress()">백업</button>
      <button class="hdr-link" onclick="restoreProgress()">복원</button>
      <button class="hdr-link red" onclick="openResetMenu()">초기화</button>
      <input type="file" id="restore-file" style="display:none;" onchange="handleRestore(event)">
    </div>
  </header>

  <div class="util-bar">
    <div class="font-ctrl">
      <span class="font-lbl">글자</span>
      <button class="font-btn" onclick="adjustFont(-1)">가-</button>
      <button class="font-btn" onclick="adjustFont(1)">가+</button>
    </div>
    <div class="backup-note" id="backup-note"></div>
  </div>

  <div class="cl-banner" id="cl-banner">
    <span>✨ 업데이트되었습니다!</span>
    <span style="display:flex; gap:6px; align-items:center;">
      <button class="cl-see" onclick="openChangelog()">변경사항 보기</button>
      <button class="cl-x" onclick="dismissBanner()">✕</button>
    </span>
  </div>

  <div class="dashboard">
    <div class="dash-item"><div class="dash-title">성경 정답률</div><div class="dash-score" id="score-bible">0%</div></div>
    <div class="dash-item"><div class="dash-title">교회사 정답률</div><div class="dash-score" id="score-history">0%</div></div>
    <div class="dash-item"><div class="dash-title">헌법 정답률</div><div class="dash-score" id="score-law">0%</div></div>
  </div>
  <div class="mastery">
    <div class="mastery-head">
      <span class="mastery-label">전체 정복률</span>
      <span class="mastery-val" id="mastery-val">0% (0/0)</span>
    </div>
    <div class="mastery-track"><div class="mastery-fill" id="mastery-fill"></div></div>
  </div>

  <button class="filter-toggle" id="filter-toggle" onclick="toggleFilters()">🔍 과목·연도·검색 필터 ▾</button>
  <div class="filters-group">
    <div class="filters" id="year-chips"></div>
    <div class="filters">
      <button class="chip subj-f on" data-subj="all">전체 과목</button>
      <button class="chip subj-f" data-subj="성경">성경</button>

function fmtVer(n, date) { return `v${n}(${date})`; }
function getSeenBuild() { return parseInt(localStorage.getItem("mok_seenbuild") || "0", 10) || 0; }
function unseenEntries() { const s = getSeenBuild(); return CHANGELOG.filter(e => e.n > s); }
function hasUnseen() { return unseenEntries().length > 0; }

function updateVerBadge() {
  const label = document.getElementById("ver-label");
  if (label) label.textContent = fmtVer(BUILD, BUILD_DATE);
  const dot = document.getElementById("ver-dot");
  if (dot) dot.classList.toggle("show", hasUnseen());
}

function renderChangelog() {
  const seen = getSeenBuild();
  const body = document.getElementById("cl-body");
  body.innerHTML = CHANGELOG.map(e => {
    const isNew = e.n > seen;
    const badge = isNew ? '<span class="cl-new">🆕 NEW</span>' : "";
    const notes = e.notes.map(n => `<div class="cl-note">${n}</div>`).join("");
    return `<div class="cl-entry${isNew ? "" : " seen"}">
      <div class="cl-ver">${fmtVer(e.n, e.date)} ${badge}</div>
      ${notes}
    </div>`;
  }).join("");
}

function openChangelog() {
  renderChangelog();                               // 🆕 강조는 '연 시점' 기준으로 먼저 렌더
  localStorage.setItem("mok_seenbuild", String(BUILD));  // 그 다음 '봤음' 처리
  document.getElementById("changelog-modal").classList.add("show");
  dismissBanner();
  updateVerBadge();
}
function closeChangelog() { document.getElementById("changelog-modal").classList.remove("show"); }
function closeChangelogBg(e) { if (e.target.id === "changelog-modal") closeChangelog(); }

function dismissBanner() {
  const b = document.getElementById("cl-banner");
  if (b) b.classList.remove("show");
}
function showUpdateBannerIfNeeded() {
  if (hasUnseen()) {
    const b = document.getElementById("cl-banner");
    if (b) b.classList.add("show");
  }
}

  {subj:"성경",year:"2015",no:4,q:"다음 중 연결이 잘못된 것은?",opts:["엘리야 — 수넴 여인의 아들을 살림","엘리야 — 까마귀로 먹을 것을 공급받음","엘리사 — 대머리","엘리사 — 선지자 가정의 빚 갚으려 그릇에 기름을 채움"],a:0,e:"수넴 여인의 아들을 살린 이는 <b>엘리사</b>(왕하4장). 엘리야가 살린 것은 사르밧 과부의 아들(왕상17장)."},
  {subj:"성경",year:"2015",no:5,q:"에스겔서에서 마른 뼈가 살아난 사건과 성전에서 물이 나와 강을 이루는 내용이 기록된 장은?",opts:["33장, 45장","7장, 40장","37장, 47장","31장, 45장"],a:2,e:"마른 뼈 환상 = <b>겔 37장</b>, 성전 문지방에서 흐르는 생명수 강 = <b>겔 47장</b>."},
  {subj:"성경",year:"2015",no:6,q:"다니엘이 사자굴에 들어갈 때 어인을 찍고 조서를 내린 왕은?",opts:["다리오","느부갓네살","벨사살","고레스"],a:0,e:"<b>다리오</b> 왕(단 6장). 느부갓네살=금신상·풀무불(3장), 벨사살=벽의 글씨(5장)."},
  {subj:"성경",year:"2015",no:7,q:"에베소서 6장에 나온 내용이 아닌 것은?",opts:["남편과 아내","부모와 자녀","종과 상전","하나님의 전신갑주"],a:0,e:"엡6장 = 자녀-부모, 종-상전, <b>하나님의 전신갑주</b>. '남편과 아내'는 엡5장."},
  {subj:"교회사",year:"2015",no:1,q:"초대교회 이단 중 유대교적 이단은?",opts:["에비온파","말시온파","영지주의","마니교"],a:0,e:"<b>에비온파</b> — 율법 준수 강조, 예수를 사람으로 봄. 말시온=구약 배격, 영지주의·마니교=이원론."},
  {subj:"교회사",year:"2015",no:2,q:"헬라 교부 중 이단을 배격하는 5권의 저서가 있고, 구약을 신약과 동등한 비중으로 논한 최초의 인물은?",opts:["클레멘트","이레니우스","오리겐","터툴리안"],a:1,e:"<b>이레니우스</b> — '이단논박(Adversus Haereses)' 5권. 영지주의 반박, 구약·신약 연속성 강조."},
  {subj:"교회사",year:"2015",no:5,q:"주후 800년경, 어거스틴의 『신의 도성』을 읽고 기독교 제국을 건설하려 했으며 십일조를 법제화하고 사도신경·주기도문·십계명을 널리 보급한 황제는?",opts:["콘스탄티누스","샤를마뉴","인노센트 3세","그레고리 1세"],a:1,e:"<b>샤를마뉴(카롤루스 대제)</b> — 800년 서로마 황제 대관. 카롤링거 르네상스, 교구제 개선."},
  {subj:"교회사",year:"2015",no:6,q:"종교개혁 전 개혁자 중 교회의 위선을 공박하고 『바보예찬』에서 교회의 타락을 비판한 사람은?",opts:["에라스무스","후스","위클리프","사보나롤라"],a:0,e:"<b>에라스무스</b>. '알을 낳은 자는 에라스무스, 부화시킨 자는 루터'."},
  {subj:"교회사",year:"2015",no:7,q:"빈칸 인물 연결 — '스위스 북부는 [ ]에 의해 취리히 중심으로, 남부는 베른 중심으로 [ ]에 의해 일어났고, [ ]은 제네바에서 성공했다.'",opts:["츠빙글리 - 파렐 - 칼뱅","파렐 - 츠빙글리 - 칼뱅","칼뱅 - 뮌처 - 츠빙글리","츠빙글리 - 베자 - 칼뱅"],a:0,e:"취리히=<b>츠빙글리</b>, 베른 일대=<b>파렐</b>, 제네바 성공=<b>칼뱅</b>(파렐의 권유로 정착)."},
  {subj:"교회사",year:"2015",no:8,q:"루터의 3대 논문 중 '교황청의 삼중 보루가 파괴되었다, 모든 신자는 다 사제다(만인사제주의)'를 담은 논문은?",opts:["교회의 바벨론 포로","로마 교황권에 관하여","독일 크리스천 귀족에게 고함","크리스천의 자유에 대하여"],a:2,e:"<b>독일 크리스천 귀족에게 고함</b> — 영적/세속, 성경 해석권, 공의회 소집권의 '세 담(보루)'을 무너뜨림."},
  {subj:"교회사",year:"2015",no:9,q:"칼뱅이 국가 구축의 필요 요소로 강조한 세 가지가 아닌 것은?",opts:["국가의 공직자","국가의 법","정교분리의 원칙","국민의 순종"],a:2,e:"칼뱅의 3요소 = 공직자(위정자)·법·백성(순종). <b>정교분리</b>는 해당 없음(교회·국가 협력 모델)."},
  {subj:"교회사",year:"2015",no:11,q:"스코틀랜드 종교개혁자로 갤리선 노예 19개월을 겪고, '스코틀랜드 신앙고백서'와 '공동의 예배모범'을 지은 사람은?",opts:["위클리프","존 낙스","토마스 크랜머","패트릭 해밀턴"],a:1,e:"<b>존 낙스</b> — 칼뱅 신학의 영향. 스코틀랜드 장로교의 기초."},
  {subj:"교회사",year:"2015",no:12,q:"18세기 경건주의 운동의 교회사적 공헌으로 잘못 설명한 것은?",opts:["교리논쟁용이 아니라 성령의 지도 아래 기도·명상하며 경건한 삶을 위해 성경을 읽음","교리 설교보다 주석 설교를, 구약보다 신약을 강조하고 중세 수도원운동을 강조함","목사후보생 교육을 강조하고 평신도의 위치를 높임","찬송가를 많이 만들고 해외 선교를 강조함"],a:1,e:"경건주의는 <b>중세 수도원운동을 강조하지 않음</b>. 나머지(주석 설교·신약 강조·평신도·찬송·선교)는 공헌이 맞음."},
  {subj:"교회사",year:"2015",no:13,q:"교회사 시대구분과 특징 연결이 잘못된 것은?",opts:["16세기 — 종교개혁 시대","18세기 — 경건주의, 교파 절대주의 시대","19세기 — 유럽의 세속화, 위대한 선교의 세기","20세기 — 에큐메니칼 운동"],a:1,e:"<b>교파(신조) 절대주의는 17세기 정통주의 시대</b>. 18세기는 경건주의·계몽주의 시대."},
  {subj:"교회사",year:"2015",no:14,q:"다음 중 틀린 것은?",opts:["1907.9.17 평양 장대현교회에서 독노회가 조직됨","독노회에서 평양신학교 1회 졸업 7인을 목사로 장립함","첫 독노회는 이기풍을 중국 산동성 선교사로 파송했고, 선교부 조직을 제일 중요 안건으로 다룸","'한국 장로교 첫 모임(독노회)은 사실상 선교사를 보내는 모임'이라고 블레어가 말함"],a:2,e:"이기풍은 <b>제주도</b> 선교사로 파송됨(중국 산동 파송은 1912년 총회 결정). 나머지는 맞음."},

 // ===================== 2016년도 기출 =====================
  {subj:"성경",year:"2016",no:5,q:"'성전에 올라가는 노래'라는 제목이 붙은 시편은?",opts:["시 120-134편","시 121-135편","시 121-134편","시 120-135편"],a:0,e:"성전에 올라가는 노래(성전에 오르는 노래) = <b>시편 120-134편</b>, 모두 15편."},
  {subj:"성경",year:"2016",no:6,q:"예수님께서 제자들에게 가르쳐 주신 기도(주기도문)가 나타나는 곳은?",opts:["마 6장, 눅 11장","마 7장, 눅 11장","마 6장, 눅 12장","마 7장, 눅 12장"],a:0,e:"주기도문 = <b>마태복음 6장</b>(산상수훈), <b>누가복음 11장</b>."},
  {subj:"성경",year:"2016",no:7,q:"안디옥 교회의 교사나 선지자가 아닌 사람은?",opts:["바나바","사울","루기오","브로고로"],a:3,e:"행13:1 안디옥 교회: 바나바·시므온(니게르)·루기오·마나엔·사울. <b>브로고로</b>는 행6장 일곱 집사 중 한 명."},
  {subj:"성경",year:"2016",no:9,q:"요한계시록 '네가 죽도록 충성하라 그리하면 내가 생명의 관을 네게 주리라'는 어느 교회에게 주신 말씀인가?",opts:["에베소교회","서머나교회","버가모교회","두아디라교회"],a:1,e:"<b>서머나교회</b>(계 2:10). 환난·궁핍 중에도 충성한, 책망이 없는 교회."},
  {subj:"교회사",year:"2016",no:1,q:"다음 중 고대교회의 기독교 이단사상과 거리가 먼 것은?",opts:["영지주의","아리우스","말시온","몬타니즘"],a:1,e:"영지주의·마르키온(말시온)·몬타니즘은 2세기 초대교회 이단으로 함께 묶임. <b>아리우스(주의)</b>는 4세기 삼위일체 논쟁이라 시대·범주가 다름. ※ 교재 확인 권장."},
  {subj:"교회사",year:"2016",no:2,q:"콘스탄틴 대제가 밀라노 칙령을 선언하기까지 있었던 기독교 10대 박해와 관계가 없는 사람은?",opts:["도미티아누스","네로","헤롯","유스티누스"],a:3,e:"네로·도미티아누스는 박해 황제, 헤롯도 초대교회를 박해(행12장, 야고보 처형). <b>유스티누스</b>는 박해자가 아니라 변증가·순교자. ※ '헤롯'을 답으로 보는 견해도 있어 교재 확인 권장."},
  {subj:"교회사",year:"2016",no:3,q:"콘스탄틴 대제의 업적과 관계없는 것은?",opts:["교회를 적극 보호하고 이단을 멀리함","기독교 정신에 입각해 많은 법률을 제정함","교회의 법률을 국가가 인정함","에베소 종교회의를 소집하여 기독론 논쟁을 종식시킴"],a:3,e:"콘스탄틴이 소집한 것은 <b>니케아 공의회(325)</b>. 에베소 공의회(431)는 테오도시우스 2세 때."},
  {subj:"교회사",year:"2016",no:4,q:"현대교회사에 신학의 새 지평을 연 칼 바르트와 관련이 먼 것은?",opts:["합리주의 신학","말씀의 신학","변증법적 신학","위기의 신학"],a:0,e:"바르트 = 말씀의 신학·변증법적 신학·위기의 신학(신정통주의). <b>합리주의 신학</b>은 그가 반대한 자유주의 계열."},
  {subj:"교회사",year:"2016",no:5,q:"근세교회사의 세 가지 사상적·신앙적 내용과 거리가 먼 것은?",opts:["정통주의 신학","계몽주의 사조","경건주의 운동","자유주의 신학"],a:3,e:"근세교회사 3대 축 = 정통주의·경건주의·합리주의(계몽주의). <b>자유주의 신학</b>은 19세기(근대) 흐름."},
  {subj:"교회사",year:"2016",no:6,q:"로마교회가 독일교회에 부과하여 수탈한 것들 중 관계가 없는 것은?",opts:["첫수입세","팔리움","인두세","부임세"],a:2,e:"교회가 부과한 것: 첫수입세(아나타)·팔리움 비용·부임세 등. <b>인두세</b>는 세속(국가) 세금."},
  {subj:"교회사",year:"2016",no:7,q:"십자군 전쟁의 실패 원인과 거리가 먼 것은?",opts:["십자군의 중심인 교황에게 군사 통솔권이 없었다","출전한 왕과 귀족들의 권력다툼이 계속되었다","순수한 종교성 대신 불순한 동기와 행동이 있었다","잘 훈련된 군인들이었지만 회교도 공격을 막지 못했다"],a:3,e:"실패 원인 = 통솔권 부재·내부 권력다툼·불순한 동기. <b>'잘 훈련된 군인'</b>이라는 서술은 사실과 달라 실패 원인이 아님."},
  {subj:"교회사",year:"2016",no:8,q:"칼빈이 말한 교회의 4중직과 관계가 없는 것은?",opts:["목사","전도사","장로","교사"],a:1,e:"칼뱅의 4중직 = 목사·교사·장로·집사. <b>전도사</b>는 해당 없음."},

  {subj:"교회사",year:"2019",no:26,q:"3.1운동이 기독교적인 차원에서 갖게 되는 의미들을 설명한 것 중 옳지 않은 것은 무엇입니까?",opts:["3.1운동은 한민족의 독립을 넘어 동양과 세계의 평화를 주장하였고 인류의 공존과 호혜를 강조하는 성숙의 모습을 보여 주었다.","3.1운동은 기독교의 평화적 비폭력 저항운동이 나타나고 있다.","3.1운동은 한국교회의 민족운동과 애국적 신앙의 모습을 보여주고 있다.","3.1운동은 일제 치하의 정교분리론을 적극적으로 지지한 운동이라 할 수 있다.","한국교회가 민족의 고난에 적극 참여하며 박해를 받음으로 민족 동반자의 종교로 인정받게 되었다."],a:3,e:"3.1운동은 <b>정교분리론을 적극 지지</b>했다는 설명은 옳지 않음."},
  {subj:"교회사",year:"2019",no:27,q:"1833년 7월 존 케이블이 '국민적 배신'이라는 설교를 함으로 시작된 종교 운동으로, 일명 '소책자 운동'으로 불리는 운동은 무슨 운동입니까?",opts:["경건주의 운동","대각성 운동","옥스퍼드 운동","십자군 운동","오순절 운동"],a:2,e:"<b>옥스퍼드 운동</b>."},
  {subj:"교회사",year:"2019",no:28,q:"선교지 분할 정책 '예양협정(Comity Arrangement)'에 대해서 틀린 것은 무엇입니까?",opts:["같은 지역에서 선교의 경쟁적 구도를 만들기 위한 협정이다.","미국 북장로교회는 평안도, 황해도, 경기도, 경상북도 지역을 맡았다.","남장로교회는 전라도, 충청도 지역을 맡았다.","캐나다장로교회는 함경도 지역을 맡았다.","호주장로교회는 경남과 부산을 담당하여 선교하기로 합의하였다."],a:0,e:"예양협정은 선교 <b>경쟁을 피하기 위한</b> 협정이다."},
  {subj:"교회사",year:"2019",no:29,q:"조선기독교의 아버지라 불리우며 한국 최초의 새벽기도 실시로 1907년 대부흥의 영적 토대를 만든 사람은 누구입니까?",opts:["손양원","이기풍","방기창","송인서","길선주"],a:4,e:"<b>길선주</b>."},
  {subj:"교회사",year:"2019",no:30,q:"장대현 교회에서 노회 조직 시 목사 안수를 받고 제주도에 파송된 최초의 제주도 선교사는 누구인가?",opts:["길선주","이기풍","김익두","한석진","서경조"],a:1,e:"<b>이기풍</b> 목사."},
  {subj:"교회사",year:"2019",no:31,q:"제임스 게일 선교사에 대한 소개 중 틀린 것은 무엇입니까?",opts:["토론토 대학 YMCA의 후원으로 1888년 12월 부산에 도착한 캐나다 선교사다.","한문에 능통한 이창직을 만나 한글을 배웠다.","게일이 1895년 완역한 《천로역정》은 한국어로 번역된 최초의 서양서적이었다.","장대현교회 초대 담임목사로도 사역하였다.","구운몽, 춘향전, 심청전 등을 영어로 번역하였다."],a:3,e:"게일은 연동교회에서 사역했으며 <b>장대현교회 초대 담임목사</b>는 틀림."},
  {subj:"교회사",year:"2019",no:32,q:"신학교 졸업생들의 목사안수를 위한 노회 창립의 필요성이 대두된 시기에 1907년 9월 17일 장대현 교회에서 독립노회가 개최되게 됩니다. 이 때 초대 노회장은 누가 선출되었습니까?",opts:["길선주","마펫","언더우드","알렌","김익두"],a:1,e:"초대 독노회장은 <b>마포삼열(마펫)</b>."},
  {subj:"교회사",year:"2019",no:33,q:"1912년 9월 1일 조선 예수교 장로회 총회의 초대 총회장은 누구입니까?",opts:["언더우드","마포삼열","길선주","김익두","알렌"],a:0,e:"초대 총회장 <b>언더우드</b>."},
  {subj:"헌법",year:"2019",no:1,q:"목사의 칭호가 아닌 것은 무엇입니까?",opts:["위임목사","임시목사","부목사","담임목사","선교목사"],a:1,e:"제27조 — <b>'임시목사'</b>는 칭호가 아님(담임목사로 대체)."},
  {subj:"헌법",year:"2019",no:2,q:"장로와 관련된 내용 중 틀린 것은 무엇입니까?",opts:["장로는 교회의 택함을 받고 치리회의 회원이 되어 목사와 협력하여 행정과 권징을 관장한다.","장로는 교회의 신령상 관계를 살핀다.","장로는 교인들이 교리를 오해하거나 도덕적으로 부패하지 않도록 교인을 권면한다.","장로는 권면하였으나 회개하지 않는 자가 있으면 당회에 보고한다.","장로는 개인으로는 그 당회 아래 있고 직무상에는 노회 아래 있다."],a:4,e:"⑤는 <b>목사후보생</b>에 대한 설명이지 장로가 아님."},
  {subj:"헌법",year:"2019",no:3,q:"노회에 대한 설명 중 잘못된 것은 무엇입니까?",opts:["노회는 그리스도의 몸된 교회에 여러 지교회가 있으므로 서로 협력하여 교리를 보전하고 행정과 권징을 위하여 노회가 있다.","노회는 각 당회록을 검사하며 교회 권징에 대한 문의를 해석하여 답변한다.","노회는 노회록을 정확히 작성하여 연 1차씩 총회의 검사를 받는다.","노회는 회원(시무목사와 총대장로) 각 과반수의 출석으로 개회한다.","노회는 과반수의 결의로 회원권(결의권, 선거권, 피선거권)을 제한 할 수 있다."],a:4,e:"회원권 제한은 <b>단순 과반수 결의로 할 수 없음</b>."},
  {subj:"헌법",year:"2019",no:4,q:"직원의 자격에 관한 설명 중 연결이 잘못된 것은 무엇입니까?",opts:["장로는 무흠 세례교인으로 7년 경과하고 40세 이상 된 자로 한다.","권사는 무흠 세례교인으로 5년 경과하고 30세 이상 된 자로 한다.","전도사는 무흠 세례교인으로 5년 경과하고 25세 이상 된 자로 한다.","집사는 무흠 세례교인으로 5년 경과하고 35세 이상 된 자로 한다.","서리집사는 무흠 세례교인으로 1년 경과하고 25세 이상 된 자로 한다."],a:1,e:"권사는 <b>35세 이상</b>('30세'는 틀림)."},
  {subj:"헌법",year:"2019",no:5,q:"다음 중 회의의 개회성수가 잘못된 것은 무엇입니까?",opts:["총회는 전국 노회 수 과반의 참석과 회원(목사 총대 및 장로 총대) 각 과반수의 출석으로 개회한다.","노회는 시무 목사와 총대 장로 각 과반수의 출석으로 개회한다.","당회는 당회장을 제외한 과반수의 출석으로 개회한다. 대리 당회장도 성수에 포함되지 않는다.","제직회 개회는 출석수로, 결의는 과반수로 한다.","공동의회 개회는 회집된 회원으로 할 수 있다."],a:2,e:"제66조 — 당회 개회성수는 당회장을 <b>'포함한' 과반수</b>."},
  {subj:"헌법",year:"2019",no:6,q:"12신조 중 \u201c죽은 자가 마지막 날에 ( )을 얻고 그리스도의 ( ) 앞에서 이 세상에서 선악 간에 행한 바를 따라 보응을 받을 것이다.\u201d에서 빈 칸에 들어갈 말은 무엇입니까?",opts:["부활함, 보좌","영생함, 심판대","구원함, 보좌","상급, 영광","면류관, 권세"],a:0,e:"신조 — <b>'부활함을 얻고 그리스도의 심판하시는 보좌 앞에서'</b>."},
  {subj:"헌법",year:"2019",no:7,q:"대한예수교장로회 헌법 정치 원리에 해당되는 것은 무엇입니까?",opts:["공회의 자격","거룩한 생활","양심의 자유","신앙의 자유","교회의 설립"],a:2,e:"정치 원리 = <b>양심의 자유</b>(③). '신앙의 자유'는 함정."},
  {subj:"헌법",year:"2019",no:8,q:"다음 중 전도사와 관련된 설명으로 옳은 것은 무엇입니까?",opts:["20세 이상 되어야 한다.","성서학원 졸업자도 가능하다.","무흠 세례교인(입교인)으로 7년을 경과한 자","필요시에는 시무장로가 전도사를 겸할 수 있다.","미조직 교회에서는 노회장의 허락으로 제직회 임시 회장이 될 수 있다."],a:1,e:"제49조 — 전도사는 25세 이상, <b>신학교 또는 성서학원 졸업자</b>, 무흠 5년."},
  {subj:"헌법",year:"2019",no:9,q:"다음 중 교인 명부에서 제명하여 교회 출석을 금지시키는 책벌은?",opts:["수찬정지","견책","면직","정직","출교"],a:4,e:"<b>출교</b> — 교인명부에서 제명하여 교회 출석을 금함."},
  {subj:"헌법",year:"2019",no:10,q:"다음 중 바르게 연결된 것은 무엇입니까?",opts:["제직회 결의 사항 – 직원 선거","임시노회 – 통지한 안건만 처리한다.","공동의회 결의 사항 – 구제비의 수입, 지출 및 특별 헌금 취급","노회 회원 총수 – 1,500명 이내","당회의 노회 총대장로 파송 규정 인원 – 100인까지 2인"],a:1,e:"<b>임시노회는 통지한 안건만 처리(②)</b>가 옳음."},
  {subj:"헌법",year:"2019",no:11,q:"12신조입니다. 틀린 것은 무엇입니까?",opts:["성부와 성자로부터 오신 성령이 사람으로 하여금 구원에 참여하게 하신다.","우리의 조상이 선악 간에 택할 자유가 있었는데 시험을 받아 하나님께 범죄 하였다.","그리스도가 세우신 성례는 세례와 성찬이다.","삼위는 한 하나님이시다. 본체는 하나요 권능과 영광이 동등이시다.","신구약성경은 하나님의 말씀이니 계시와 영감에 대하여 정확 무오한 유일의 법칙이다."],a:4,e:"신조 제1조는 '신앙과 행위(본분)에 대하여 정확무오한 유일의 법칙'이다. <b>'계시와 영감에 대하여'</b>는 틀림."},
  {subj:"헌법",year:"2019",no:12,q:"다음은 교인의 구분에 대한 것 중에서 맞는 것은 무엇입니까?",opts:["교인은 원입교인, 유아세례교인, 학습교인, 세례교인(입교인)으로 구분한다.","원입교인은 예수 믿기로 결심하고 공동예배에 참석하는 15세 이상인 자이다.","유아세례교인은 예수 그리스도를 고백하는 2세 미만 유아세례를 받은 자이다.","세례교인(입교인)은 유아세례교인으로서 입교한 자(15세 이상) 또는 원입교인(15세 이상)으로서 세례를 받은 자이다.","세례교인(입교인)은 학습교인이 15세 이상으로서 세례를 받은 자이다."],a:3,e:"<b>출제 당시 기준 ④가 정답.</b> 현행(2021 개정)은 13세 이상이다."},
  {subj:"헌법",year:"2019",no:13,q:"집사, 권사로 선택된 자는 당회 지도 아래 몇 개월의 교양을 받아야 합니까?",opts:["6개월","5개월","4개월","3개월","2개월"],a:3,e:"안수집사·권사는 <b>3개월 이상</b> 교육."},
  {subj:"헌법",year:"2019",no:14,q:"헌법상 목사의 의의에 맞는 것은 무엇입니까?",opts:["목사는 축복을 베푸는 하나님의 대리자이다.","목사는 모든 교인의 모범이 되어 교회를 치리하는 장로이다.","목사는 교인들을 위로하는 상담자이다.","목사는 교회 재정을 총괄하는 대표자이다.","목사는 하나님의 도를 맡은 파수꾼이다."],a:1,e:"제24조 — <b>'모든 교인의 모범이 되어 교회를 치리하는 장로'</b>."},
  {subj:"헌법",year:"2019",no:15,q:"헌법 개정(정치, 권징, 예배와 예식)에 맞는 것은 무엇입니까?",opts:["총회는 출석회원 과반수 찬성의 결의로 개정안을 작성하여 각 노회에 수의한다.","헌법(헌법시행규정 포함)은 개정한 지 3년 이내에는 개정할 수 없다.","각 노회는 수의된 안건을 투표하여 과반수 찬성으로 총회장에게 보고한다.","헌법개정위원은 총회장이 직권으로 선정하여 개정안을 작성케 한다.","개정헌법은 공포한 날로부터 반드시 1년 간 연구케 한 후 시행한다."],a:1,e:"제102조 — <b>개정 후 3년 이내 재개정 불가(②가 맞음)</b>."},
  {subj:"헌법",year:"2019",no:16,q:"교인에 관한 부분 중에서 맞는 것은 무엇입니까?",opts:["교인의 의무는 공동예배 출석과 봉헌과 전도와 교회 치리에 복종하는 것이다.","세례교인(입교인) 된 교인은 성찬 참례권과 공동의회 회원권이 있다.","공동의회의 회원권은 15세 이상 세례교인으로 한다.","교인은 다른 교회로 이명하고자 하는 경우에는 6개월 이내에 담임목사에게 이명 청원을 하여야 한다.","교인이 신고 없이 교회를 떠나 의무를 행치 않고 6개월을 경과하면 실종교인이 된다."],a:1,e:"제15조 교인의 의무엔 '전도'가 없음. <b>세례교인의 성찬 참례권·공동의회 회원권(②)이 맞음.</b>"},
  {subj:"헌법",year:"2019",no:17,q:"교회에 관한 부분 중에서 맞는 것은 무엇입니까?",opts:["당회가 있는 교회를 조직교회라 하고 당회가 없는 교회를 기도처라 한다.","지 교회를 설립코자 하려면 세례교인(입교인) 20인 이상이 있어 노회에 청원하여 허락을 받아 설립한다.","지 교회의 분립 및 합병은 그 지 교회의 당회와 공동의회의 결의로 노회의 허락을 받아야 한다.","지교회의 폐지는 그 지교회의 당회와 공동의회의 결의로 노회의 허락을 받아야 한다.","지 교회가 설립된 후 세례교인(입교인)의 수가 20인 미만의 상태로 1년간 계속되는 경우에는 노회는 이를 기도처로 변경한다."],a:2,e:"<b>분립·합병은 당회와 공동의회 결의로 노회 허락(③)이 맞음.</b>"},
  {subj:"헌법",year:"2019",no:18,q:"목사의 청빙과 연임청원에 맞는 것은 무엇입니까?",opts:["조직교회는 위임목사만을 청빙 할 수 있다.","위임목사의 청빙은 당회의 결의와 공동의회의 3분의 2 이상의 찬성을 얻어야 한다.","담임목사의 청빙은 당회의 결의와 공동의회의 출석회원 과반수의 찬성을 얻어야 한다.","담임목사의 연임청원은 반드시 제직회에서 투표로 결의 하여야 한다.","부목사의 계속청원은 당회의 결의와 제직회 출석회원 과반수의 찬성을 얻어야 한다."],a:1,e:"<b>위임목 청빙 = 당회 결의 + 공동의회 출석 2/3 이상 찬성(②)이 맞음.</b>"},
  {subj:"헌법",year:"2019",no:19,q:"당회장에 대해 틀린 것은 무엇입니까?",opts:["당회장은 노회에서 임명한다.","임시당회장은 당회장이 결원되었을 때 당회원 과반수의 결의(합의 혹은 연명)로 요청한 해 노회 목사를 노회가 파송한다.","대리 당회장은 결의권이 있다.","대리 당회장은 당회장이 유고할 때 또는 기타 사정이 있을 때 당회장이 위임한 자 또는 당회원이 합의하여 청한 자로 당회장직을 대리케 할 수 있다.","은퇴목사에게는 임시당회장을 맡길 수 없다."],a:2,e:"제67조 — 대리당회장은 결의권이 <b>없다</b>."},
  {subj:"헌법",year:"2019",no:20,q:"제직회의 결의사항이 아닌 것은 무엇입니까?",opts:["공동회의에서 결정한 예산집행","교인의 이명처리","부동산 매매","당회가 요청한 사항","재정에 관한 일반수지 예산 및 결산"],a:1,e:"<b>'교인의 이명처리'</b>는 당회 사항이다."},
  {subj:"헌법",year:"2019",no:21,q:"노회가 지교회를 감독하는 치리권의 협조를 위하여 두는 것은 무엇입니까?",opts:["총회","노회","시찰회","당회","연합회"],a:2,e:"<b>시찰회(시찰위원회)</b>."},
  {subj:"헌법",year:"2019",no:22,q:"권징의 사유가 되는 죄과가 아닌 것은 무엇입니까?",opts:["성경상의 계명에 대한 중대한 위반행위","예배를 방해한 행위","이단적 행위와 이에 적극적으로 동조한 행위","허위사실을 유포하여 교인 또는 직원의 명예를 훼손시킨 행위","교인에게 금품을 수수한 행위"],a:4,e:"제43조 11항은 '사건 담당직원이 사건과 관련하여 금품을 수수한 행위'이다. <b>'교인에게 금품을 수수한 행위'</b>는 권징 사유 명문이 아니다."},
  {subj:"헌법",year:"2019",no:23,q:"책벌에 있어서 교인에게 과하는 벌이 아닌 것은?",opts:["견책","근신","수찬정지","출교","정직"],a:4,e:"교인 벌 = 견책·근신·수찬정지·출교. <b>'정직'</b>은 직원 벌."},
  {subj:"헌법",year:"2019",no:24,q:"공동의회에 관한 부분 중에서 맞는 것은 무엇입니까?",opts:["공동회의 회원은 15세 이상 세례교인(입교인) 이상이다.","원로목사는 공동의회의 투표하여 출석회원 3분의 2 이상의 득표 결의로 추대한다.","원로장로는 공동의회에서 투표하여 출석회원 3분의 2 이상의 득표 결의로 추대한다.","예산과 결산은 공동의회 결의사항이다.","공동회의에서 인선은 무기명 비밀투표로 하지 않아도 된다."],a:3,e:"<b>④ 예산·결산은 공동의회 결의사항</b> (정치 제90조 5항).<br>① 회원은 <b>18세</b> 이상 세례교인(15세 아님) ② 원로목사=당회 결의+공동의회 투표(2/3 정족수 명시 없음) ③ 원로장로=<b>과반수</b>(2/3 아님) ⑤ 인선은 <b>무기명 비밀투표 필수</b>."},
  {subj:"헌법",year:"2019",no:25,q:"노회의 분립, 합병 및 폐지에 관한 부분 중 맞는 것은 무엇입니까?",opts:["노회가 분립코자 하면 재적 목사, 장로 각 3분의 2 이상의 결의가 있어야 한다.","노회가 분립코자 하면 노회 재산, 기관, 분할 구역에 속한 교회명단을 총회 규칙부에 청원한다.","노회가 합병코자 하면 목사, 장로 각 3분의 2 이상의 결의로 총회에 청원한다.","노회가 설립된 후 설립기준 미달로 3년이 경과되면 노회가 폐지된다.","노회의 분립과 합병에 대한 결의는 총회 특별대책회의에서 할 수 있다."],a:2,e:"<b>노회 합병은 목사·장로 각 3분의 2 이상의 결의로 총회에 청원한다(③).</b>"},
  {subj:"헌법",year:"2019",no:26,q:"책벌의 종류와 내용이 맞지 않는 것은 무엇입니까?",opts:["견책：죄과를 꾸짖고 회개하게 한다.","근신：2개월 이상 6개월 이내의 기간 죄과에 대한 반성문을 1회 이상 소속 치리회장에게 제출하게 하고 행동을 삼가게 한다.","수찬정지：6개월 이상 1년 이내의 기간 수찬을 정지한다.","면직：직원의 신분을 박탈한다.","시무해임：3개월 이상 1년 이내의 기간 치리권(행정권과 권징권)을 정지한다."],a:4,e:"치리권 정지는 '시무정지'의 내용. 시무해임은 '그 직무에 한하여 <b>모든 시무 정지</b>'이다."},
  {subj:"헌법",year:"2019",no:27,q:"권징에 대한 설명 중 맞는 것은 무엇입니까?",opts:["예수 그리스도께서 제직회에 준 권한을 행사하며 그 법도를 시행하는 것이다.","교인과 직원, 각 치리회가 예배를 방해한 행위로는 권징 할 수 없다.","책벌 중 근신이 가장 낮은 수준의 책벌이다.","항소의 재소 기간은 판결문을 송부 받은 날로부터 10일로 한다.","권징은 당회, 시찰회, 노회, 총회에서만 할 수 있다."],a:3,e:"<b>항소 재소 기간은 판결문 송부일로부터 20일이므로 ④는 틀림. 당시 정답표 ④가 맞음으로 처리된 적이 있으나 헌법은 20일임.</b> (기출 원문 유지)."},
  {subj:"헌법",year:"2019",no:28,q:"노회는 일정한 구역 안에 있는 세례교인(입교인) 3000인 이상과 시무목사 ( )인 이상과 당회 ( )처(조직교회) 이상 있어야 조직할 수 있는가?",opts:["20, 20","20, 30","30, 30","30, 40","40, 40"],a:2,e:"제73조 — 시무목사 30인, 당회 30처, 세례교인 3000인."},
  {subj:"헌법",year:"2019",no:29,q:"고소, 고발 및 기소에 관하여 틀린 것은 무엇입니까?",opts:["당회 기소위원회는 당회에서 선임된 기소위원 1인 내지 2인으로 구성한다.","치리회장이 고소장(고발장)을 받은 때에는 20일 이내에 이를 기소위원회에 이첩하여야 한다.","고소기간은 죄과를 범한 자를 알게 된 날로부터 2년을 경과하면 고소하지 못한다.","고소를 취하한 자는 동일한 내용에 대하여 다시 고소하지 못한다.","고소 및 고발은 피고소인(피고발인)의 소속 치리회장에게 서면으로 해야 한다."],a:1,e:"치리회장이 고소장(고발장)을 받은 때에는 <b>10일 이내</b>에 기소위원회에 이첩하여야 한다."},
  {subj:"헌법",year:"2019",no:30,q:"당회에 관한 부분 중에서 맞는 것은 무엇입니까?",opts:["당회는 교인의 신앙과 행위를 통찰하며 세례, 입교할 자를 문답하며 세례식과 성찬식을 관장한다.","당회는 지교회의 현금 및 동산을 관리한다.","당회는 범죄한 자를 소환 심문하고 범죄한 증거가 명백할 때는 공동의회에 회부한다.","당회는 당회장이 소집하되 연 3차 이상을 회집하여야 한다.","당회장이 당회 소집을 할 때 당회원 3분의 2 이상의 찬성이 있어야 한다."],a:0,e:"제68조1 — <b>신앙·행위 통찰, 세례·입교 문답, 세례식·성찬식 관장(①)</b>이 맞음."},
  {subj:"헌법",year:"2019",no:31,q:"헌법에 명시된 당회가 비치할 명부가 아닌 것은?",opts:["헌금 대장 및 명부","세례교인(입교인) 명부","책벌 및 해벌 교인 명부","실종 교인 명부","별세 명부"],a:0,e:"제71조 명부에 <b>'헌금 대장 및 명부'</b>는 없음."},
  {subj:"헌법",year:"2019",no:32,q:"원심판결에 항소이유가 아닌 것은 무엇입니까?",opts:["판결에 영향을 미친 헌법 또는 규정의 위반이 있는 때","판결재판국의 구성이 헌법 또는 규정에 위반한 때","국가 재판에서 승소하여 재심 청구가 필요한 때","판결에 이유를 붙이지 아니하거나 이유에 모순이 있는 때","사실의 오인에 있어 판결에 영향을 미친 때"],a:2,e:"<b>'국가 재판 승소·재심 청구'</b>는 항소이유가 아님."},
  {subj:"헌법",year:"2019",no:33,q:"노회에 대한 설명 중 맞는 것은 무엇입니까?",opts:["노회는 회원(시무목사와 총대장로) 3분의 1 이상의 출석으로 개회한다.","정기노회는 개회 2개월 전에 소집을 통지하여야 한다.","노회는 노회 소속 목사와 당회에서 파송한 총대장로로 조직한다.","임시노회는 목사, 장로 각 3인 이상의 청원에 의하여 소집한다.","노회는 임원회 회의록을 작성하여 연 1차씩 총회의 검사를 받아야 한다."],a:2,e:"노회는 <b>노회 소속 목사와 당회 파송 총대장로로 조직(③)</b>이 맞음."},

// ===================== 2020년도 기출 (성경 32 + 교회사 33 + 헌법 33, 원문 그대로) =====================
// 성경
{subj:"성경",year:"2020",no:1,q:"창세기에 나타난 예수 그리스도의 예표 중 맞지 않는 것은?",opts:["복의 근원","규가 요셉을 떠나지 아니함","가죽옷","멜기세덱","번제물 이삭"],a:1,e:"창49:10은 '규가 유다를 떠나지 아니하며'. 요셉이 아니라 유다."},
{subj:"성경",year:"2020",no:2,q:"경계를 침범하지 않겠다는 언약의 증거로 라반과 야곱이 쌓은 돌무더기를 가리켜 야곱은 무엇이라 불렀는가?",opts:["갈르엣","여갈사하두다","밧단 아람","마하나임","가데스"],a:0,e:"창31:47 — 야곱은 '갈르엣', 라반은 '여갈사하두다'."},

{subj:"헌법",year:"2020",no:3,q:"다음 중 제직회의 결의 사항이 아닌 것은?",opts:["공동의회에서 결정한 예산집행","재정에 관한 일반수지 예산 및 결산","당회가 요청한 사항","각 기관의 수입, 지출 내용","부동산 매매"],a:3,e:"'각 기관의 수입·지출 내용'은 제직회 결의사항이 아님. ▶[개정 2012.11.16] 제직회 결의사항에서 각 기관의 독자 수입·지출이 제외됨."},
{subj:"헌법",year:"2020",no:4,q:"대한예수교장로회 신조에 대한 설명이 옳지 못한 것은?",opts:["신구약성경은 하나님의 말씀이니 신앙과 행위에 대하여 정확 무오한 유일의 법칙이다.","하나님은 한 분뿐이시니 오직 그만 경배할 것이다.","하나님의 본체에 삼위가 계시니, 성부, 성자, 성령이시다.","그리스도가 세우신 성례는 세례와 성찬이다.","그리스도께서 정하신 법에 따라 총회 헌법을 제정, 치리하심을 믿는다."],a:4,e:"12신조 원문에 '총회 헌법 제정·치리' 문구는 없음 → ⑤."},
{subj:"헌법",year:"2020",no:5,q:"대한예수교장로회 신앙고백서에 나온 내용이 아닌 것은?",opts:["성경","구원","교회","국가","재림"],a:4,e:"예장통합 신앙고백서 10장: 성경·하나님·예수그리스도·성령·인간·구원·교회·국가·선교·종말. '재림' 독립 장은 없음."},
{subj:"헌법",year:"2020",no:6,q:"치리회에 대하여 틀린 것은?",opts:["치리회는 당회, 노회, 총회로 구분한다.","각급 치리회는 헌법에 규정하는 바에 의하여 자체의 규정을 제정할 수 있다.","각급 치리회는 각기 사건을 법대로 처리하기 위하여 관할 범위를 정한다.","치리회는 교회의 평화와 질서를 유지하며 행정과 권한을 행사한다.","고소장, 소장이나 접수서류(진정서, 탄원서, 건의서)에 대하여는 치리회(폐회 중에는 임원회)가 처리할 수 있다."],a:4,e:"▶제63조6 원문: '고소(고발)장, 소장이 아닌 접수서류(진정서·탄원서·건의서)에 대하여는 치리회(폐회 중 임원회)가 처리할 수 있다.' ⑤는 '아닌'을 '이나'로 바꿔 재판 관할 원칙을 왜곡 → 오답. (④는 '권징'이 '권한'으로 표기된 오타성 문장.)"},
{subj:"헌법",year:"2020",no:7,q:"노회에 대하여 잘못된 것은?",opts:["노회는 일정한 구역 안에 있는 시무 목사 30인 이상, 당회(조직교회) 30처 이상, 세례교인(입교인) 3,000명 이상이 있어야 조직할 수 있다.","장로 총대는 당회에서 파송 규정에 따라 파송하며 서기가 총대 명부를 접수하면 회원권이 성립된다.","노회는 회원(시무 목사와 총대장로) 각 과반수의 출석으로 개회하며, 노회는 시무 목사와 총대 장로의 숫자가 같아야 한다.","노회 직무는 지교회의 장로선택, 임직을 허락하며 장로와 전도사의 자격 고시를 한다.","정기노회는 예정한 시일과 장소에 회집하되 개회 1개월 전에 소집을 통지하여야 한다."],a:2,e:"노회 개회는 목사·장로 각 과반수 출석이면 되고, 시무목사와 총대장로의 숫자가 같아야 한다는 동수 규정은 없음 → ③."},
{subj:"헌법",year:"2020",no:8,q:"세례교인(입교인)된 교인은 성찬 참례권과 ( )이 있다. 단, ( )은 ( )세 이상으로 한다. ( )안에 들어갈 알맞은 답은?",opts:["공동의회 회원권, 성찬 참례권, 18","공동의회 회원권, 공동의회 회원권, 18","공동의회 회원권, 공동의회 회원권, 20","제직회 회원권, 제직회 회원권, 20","제직회 회원권, 성찬 참례권, 18"],a:1,e:"제16조 — 성찬 참례권과 공동의회 회원권, 공동의회 회원권은 18세 이상."},
{subj:"헌법",year:"2020",no:9,q:"다음 중 목사의 자격과 거리가 먼 것은?",opts:["신앙이 진실하고 행위가 복음에 적합한 자.","가정을 잘 다스리고 타인의 존경을 받는 자.","무흠한 세례교인(입교인)으로 5년을 경과한 자.","30세 이상 된 자로서 총회 직영 신학대학원을 졸업한 후 2년 이상 교역 경험을 가진 자. 다만, 군목과 선교목사는 예외로 한다.","총회 목사고시에 합격한 자."],a:2,e:"제26조 — 목사 자격은 무흠 세례교인 7년 경과(5년이 아님)."},
{subj:"헌법",year:"2020",no:10,q:"공동의회 설명으로 바르지 않은 것은?",opts:["공동의회 회원은 그 지교회 무흠 세례교인(입교인) 중 18세 이상인 자로 한다.","공동의회의 결의는 다른 규정에 명시된 사항이 아닌 것은 재석 3분의 2로 결의하고 인선은 무기명 비밀투표로 한다.","공동의회는 당회의 결의로 당회장이 소집하되 일시, 장소, 안건을 한 주일 전에 교회에 광고한다.","공동의회 개회는 회집된 회원으로 할 수 있다.","공동의회의 의장과 서기는 당회장과 당회 서기로 한다."],a:1,e:"제90조 — 공동의회 일반 결의는 재석 '과반수'(3분의 2가 아님)."},
{subj:"헌법",year:"2020",no:11,q:"제직회에 관한 사항 중 잘못된 것은?",opts:["제직회 회원은 목사, 장로, 안수집사, 권사, 전도사로 한다. (서리집사 제외)","제직회 소집은 제직회장이 제직회 소집의 필요를 인정할 때 한다.","제직회 소집은 일주일 전에 광고하며, 개회성수는 출석수로 한다.","제직회 회장은 당회장이 되고 서기와 회계는 회에서 선정한다.","제직회 소집은 교회 제직 3분의 1의 요청이 있을 때 제직회장이 해야 한다."],a:0,e:"제91조 — 제직회 회원에 1년 임기 임시직인 '서리집사'도 포함됨. '서리집사 제외'는 틀림."},
{subj:"헌법",year:"2020",no:12,q:"책벌과 그 설명이 바르게 된 것은?",opts:["시무정지: 3개월 이상 1년 이내의 기간 치리권(행정권과 권징권)을 정지 한다.","시무해임: 6개월 이상 1년 이내의 기간 교회의 시무를 해임한다.","수찬정지: 3개월 이상 1년 이내의 기간 수찬을 정지한다.","근신: 3개월 이상 6개월 이내의 기간 죄과에 대해 반성문을 쓰게 한다.","견책: 죄과를 꾸짖고 회개하게 하며 반성문을 쓰게 한다."],a:0,e:"①이 맞음. 시무해임은 3개월~1년, 수찬정지는 6개월~1년, 근신은 2개월~6개월, 견책은 반성문을 쓰지 않음."},
{subj:"헌법",year:"2020",no:13,q:"헌법에 명시된 목사의 의의가 아닌 것은?",opts:["목사는 예수 그리스도의 양인 교인을 양육하는 목자이다.","목사는 그리스도를 봉사하는 종 또는 사자이다.","목사는 모든 교인의 모범이 되어 교회를 치리하는 장로이다.","목사는 구원의 복된 소식을 전하는 전도인이다.","목사는 하나님의 도를 맡은 사도이다."],a:4,e:"제24조 — 목사는 하나님의 도를 맡은 '청지기'이지 '사도'가 아님."},
{subj:"헌법",year:"2020",no:14,q:"목사의 청빙절차 중 틀린 것은?",opts:["위임목사의 청빙은 당회의 결의와 공동의회 출석회원 3분의 2 이상의 찬성을 얻어야 한다.","담임목사는 당회의 결의와 제직회 출석회원 과반수의 찬성을 얻어야 한다.","연임청원은 당회록과 제직회 결의록을 첨부하여 연임청원서를 담임목사가 노회에 제출한다.","기관목사의 청빙은 그 기관의 결의로 대표자가 청빙서를 노회에 제출하여야 한다.","부목사의 청빙은 당회의 결의와 제직회의 동의를 얻어야 한다."],a:2,e:"제28조 — 연임청원서는 목사 본인이 아니라 '대리당회장'이 노회에 제출."},
{subj:"헌법",year:"2020",no:15,q:"당회에 관한 설명 중 잘못된 것은?",opts:["당회는 지교회에서 시무하는 목사, 부목사, 장로 2인 이상으로 조직하되, 당회 조직은 세례교인(입교인) 30인 이상이 있어야 한다.","당회 조직 후 시무장로가 1인도 없으면 1년 후 첫 노회부터 폐당회가 된다.","당회 조직 후 장로 2인 미달 또는 세례교인(입교인)수가 30인 미달로 2년 경과한 후 첫 노회부터 당회가 폐지된다.","대리당회장은 은퇴목사에게도 이를 맡길 수 있다.","당회는 장로, 집사, 권사를 임직한다."],a:2,e:"제65조 — 장로 2인 미달·세례교인 30인 미달로 '3년' 경과 후 당회 폐지(2년이 아님). [개정 2012.11.16]"},
{subj:"헌법",year:"2020",no:16,q:"노회에 대한 설명 중 맞는 것은?",opts:["노회는 그리스도의 몸 된 교회에 여러 지교회가 있으므로 서로 협력하여 교리를 보전하고, 행정과 권징을 위하여 있다.","노회는 일정한 구역 안에 있는 시무목사 30인 이상과 당회 30처 이상과 세례교인 2,000인 이상이 있어야 조직할 수 있다.","위임목사, 담임목사, 공로목사, 부목사, 전도목사, 기관목사, 선교목사, 선교동역자는 회원권이 있다.","노회는 노회 소속 목사와 노회에 소속된 개 교회 장로 총수로 조직 한다.","노회는 회원(시무목사와 총대장로)의 출석수로 개회한다."],a:0,e:"①이 맞음(제72조). 세례교인 3,000인, 공로목사는 언권회원, 조직은 총대장로, 개회는 각 과반수."},
{subj:"헌법",year:"2020",no:17,q:"요리문답 \u201c말씀이 우리를 구원에 이르게 하는 효과 있는 것이 되게 하려면 우리가 말씀을 어떻게 읽고 들어야 하는가\u201d에 관한 답 중 틀린 것은?",opts:["우리가 부지런함과 준비와 기도로서 열중해야 한다.","믿음과 사랑으로 받아들여야 한다.","받은 말씀을 마음에 간직한다.","받은 말씀을 읽고 묵상한다.","받은 말씀을 우리 생활 속에 실천한다."],a:3,e:"웨스트민스터 소요리문답 90문에 '읽고 묵상한다'는 명시 항목이 아님."},
{subj:"헌법",year:"2020",no:18,q:"재판국원의 제척사유가 아닌 것은?",opts:["국원이 이해관계로 인하여 불공평한 재판을 할 우려가 있는 경우","국원이 피해자인 경우","국원이 피고인 또는 피해자와 친족관계에 있거나 있었던 경우","국원이 당해 사건에 관하여 증인 감정인이 된 경우","국원이 고소인(고발인) 또는 피고소인(피고발인)인 경우"],a:0,e:"권징 제8조 — '불공평한 재판 우려'는 당연 제척 사유가 아니라 당사자가 요청하는 '기피 사유'."},
{subj:"헌법",year:"2020",no:19,q:"당회가 비치할 명부가 아닌 것은 무엇인가?",opts:["세례교인 명부와 유아세례교인 명부","책벌 및 해벌 교인 명부와 실종교인 명부","제직 명부","이명교인 명부와 혼인 명부","별세 명부와 비품 대장 및 교회의 부동산 대장"],a:2,e:"제71조 비치 명부에 '제직 명부'는 규정되어 있지 않음."},
{subj:"헌법",year:"2020",no:20,q:"'신조' 8항에 따르면 성부와 성자로부터 오신 성령은 사람으로 하여금 어디에 참여하게 하는가?",opts:["은혜","은사","영생","구원","천국"],a:3,e:"신조 8항 — '구원에 참여하게 하신다'."},
{subj:"헌법",year:"2020",no:21,q:"교회에 대한 설명 중 틀린 것은?",opts:["당회가 있는 교회를 조직교회라 하고 당회가 없는 교회를 미조직교회라 한다.","지 교회를 설립하려면 세례교인(입교인) 15인 이상이 있어 노회에 청원하여 허락을 받아야 한다.","지 교회의 분립 및 합병은 그 지 교회의 당회와 공동의회의 결의로 노회의 허락을 받아야 한다.","지 교회의 폐지는 당해 시찰위원회를 경유하여 노회의 허락을 받아야 한다.","지 교회가 설립된 후 세례교인(입교인)의 수가 15인 미만의 상태로 1년간 계속되는 경우에는 노회는 이를 기도처로 변경한다."],a:4,e:"제12조 — 15인 미만 상태가 '2년'간 계속될 때 기도처로 변경(1년이 아님)."},
{subj:"헌법",year:"2020",no:22,q:"목사에 관한 설명 중 틀린 것은?",opts:["전도목사의 임기는 시무처와 노회의 정한 바에 의한다.","기관목사의 임기는 그 기관의 정한 바에 의한다.","선교목사의 파송은 총회가 한다.","교육목사의 임기는 시무처와 노회의 정한 바에 의한다.","원로목사의 예우는 지교회의 형편에 따른다."],a:3,e:"제27조 — 교육목사의 임기는 1년이며 매년 연임 청원을 해야 함(시무처·노회가 임의로 정하는 것이 아님)."},
{subj:"헌법",year:"2020",no:23,q:"고발기간과 취하에 대한 설명이다. ( )에 들어갈 알맞은 것은? '고발은 죄과를 범한 자를 알게 된 날로부터 ( )을 경과하거나, 죄과가 있은 날로부터 ( )을 경과하면 고발하지 못한다.'",opts:["3개월, 6개월","6개월, 1년","1년, 1년 6개월","1년, 2년","2년, 3년"],a:3,e:"권징 제52조 — 알게 된 날로부터 1년, 죄과가 있은 날로부터 2년."},
{subj:"헌법",year:"2020",no:24,q:"당회장 결원 시 임시당회장을 노회에 요청하지 않을 경우 얼마가 경과하면 노회에서 임시당회장을 직접 파송할 수 있는가?",opts:["즉시","3주","2개월","3개월","6개월"],a:3,e:"당회장 결원 후 3개월간 요청이 없으면 노회(임원회)가 직권으로 파송 가능."},
{subj:"헌법",year:"2020",no:25,q:"장로에 관한 설명 중 틀린 것은?",opts:["장로, 집사, 권사를 선택할 때 당회에서 후보자를 추천할 수 있다.","당회에서 교육을 한 후에도 당회의 결의에 의하여 직원 임직을 보류할 수 있다.","장로 투표는 한 노회 기간 동안 투표 횟수를 합하여 3차까지 할 수 있다.","목사, 장로, 집사, 권사를 신임 투표로 사임시킬 수 없다.","타 교단 소속 교회에서 이명한 장로는 노회 고시부의 면접 후 취임할 수 있다."],a:4,e:"타 교단에서 이명한 장로가 시무장로가 되려면 공동의회 과반수 득표 및 취임 절차를 밟아야 함 → ⑤."},
{subj:"헌법",year:"2020",no:26,q:"예배와 예식 편에 있는 교회예식에 해당되지 않는 것은?",opts:["임직예식","결혼예식","봉헌예식","장례예식","성찬예식"],a:4,e:"세례와 성찬은 예식이 아니라 예수님이 제정하신 '성례전'으로 구분 → ⑤."},
{subj:"헌법",year:"2020",no:27,q:"군목과 선교목사의 임직식은 노회의 위임을 받아 어디에서 주관할 수 있는가?",opts:["파송교회 및 기관단체","노회선교부(국내선교부)","노회 임원회","총회 파송부서","시무 군부대 및 선교처"],a:2,e:"제33조 예외 — 군목·선교목사의 임직식은 노회의 위임을 받아 노회 임원회가 주관할 수 있음."},
{subj:"헌법",year:"2020",no:28,q:"시무 중에 있는 목사가 몇 개월 이상 휴무를 원할 때 당회와 노회의 허락을 받아야 하는가?",opts:["1개월","2개월","3개월","4개월","6개월"],a:2,e:"제36조 — 3개월 이상 휴무 시 당회 결의와 노회 허락 필요."},
{subj:"헌법",year:"2020",no:29,q:"치리회에 과하는 벌은 무엇인가?",opts:["상회 총대파송 정지","견책","근신","수찬정지","정직"],a:0,e:"견책·근신·수찬정지 등은 개인에게 과하는 벌. 치리회에 과하는 유일한 벌은 상회 총대파송 정지."},
{subj:"헌법",year:"2020",no:30,q:"치리회는 교인으로 하여금 어디에 복종하게 하는 것인가?",opts:["그리스도의 법","교리","정치","헌법","말씀"],a:0,e:"제63조 — '교인으로 하여금 도덕과 영적 사건에 대하여 그리스도의 법에 복종케' 함."},
{subj:"헌법",year:"2020",no:31,q:"총회 총대 파송비율은 각 노회 당 몇 인을 기본수로 배정해야 하는가?",opts:["각 2인","각 3인","각 4인","각 5인","각 6인"],a:2,e:"제84조 — 각 노회당 목사·장로 각 4인을 기본수로 배정."},
{subj:"헌법",year:"2020",no:32,q:"권징책벌 중 상회 파송 정지에 관한 내용 중 틀린 것은?",opts:["교회직원은 1~3년 이내로 한다.","노회와 총회 직원은 2~3년 이내로 한다.","총회 산하단체, 기관 이사는 3~5년 이내로 한다.","총회 기관이사는 2~3년 이내로 한다.","각급 치리회의 파송 정지는 1~3년으로 한다."],a:3,e:"권징 제5조 — 총회 산하단체·기관 이사의 파송 정지는 3~5년 이내(2~3년이 아님) → ④."},
{subj:"헌법",year:"2020",no:33,q:"총회 출석 회원 3분의 2 이상의 가결로 개정안을 작성, 각 노회 3분의 2 이상의 가결과 투표 총수의 3분의 2 이상의 가표를 얻어야 개정할 수 있는 헌법은 무엇인가?",opts:["정치","권징","교리","예배와 예식","재판규정"],a:2,e:"제103조 — 정치·권징·예배와 예식은 노회 과반수로 가능하나, '교리'의 개정은 노회 3분의 2 가결과 투표 3분의 2 이상 찬성이 필요."},
