<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>목사고시 학습 — 예장통합 기출</title>
<style>
  :root {
    --ink: #1c1a17;
    --paper: #f4efe6;
    --paper-2: #ece4d6;
    --card: #fbf8f1;
    --line: #d8cdb9;
    --burgundy: #7a2230;
    --burgundy-soft: #9c3a48;
    --gold: #b08545;
    --green: #3f6b48;
    --green-soft: #e3efe3;
    --red: #a23030;
    --red-soft: #f6e3e0;
    --muted: #7c7363;
    --shadow: 0 1px 2px rgba(40,30,15,.06), 0 8px 24px rgba(40,30,15,.07);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { -webkit-text-size-adjust: 100%; }
  body {
    font-family: "Apple SD Gothic Neo", "Malgun Gothic", "Noto Sans KR", sans-serif;
    background: var(--paper);
    color: var(--ink);
    line-height: 1.65;
    letter-spacing: -0.01em;
  }
  .app-container {
    max-width: 640px;
    margin: 0 auto;
    padding: 20px;
  }
  header {
    border-bottom: 2px solid var(--ink);
    padding-bottom: 15px;
    margin-bottom: 20px;
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
  }
  h1 { font-size: 1.5rem; color: var(--burgundy); letter-spacing: -0.03em; }
  
  .filters {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 20px;
  }
  .chip {
    padding: 6px 12px;
    background: var(--paper-2);
    border: 1px solid var(--line);
    border-radius: 20px;
    font-size: 0.9rem;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s;
  }
  .chip.on {
    background: var(--burgundy);
    color: #fff;
    border-color: var(--burgundy);
  }
  
  .mode-tab {
    flex: 1;
    padding: 10px;
    text-align: center;
    background: var(--paper-2);
    border: 1px solid var(--line);
    cursor: pointer;
    font-weight: bold;
    color: var(--muted);
  }
  .mode-tab:first-child { border-radius: 8px 0 0 8px; }
  .mode-tab:last-child { border-radius: 0 8px 8px 0; }
  .mode-tab.on {
    background: var(--ink);
    color: #fff;
    border-color: var(--ink);
  }

  /* 카드 디자인 */
  .card {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 24px;
    box-shadow: var(--shadow);
    margin-bottom: 20px;
  }
  .q-meta { font-size: 0.85rem; color: var(--gold); font-weight: bold; margin-bottom: 10px; }
  .q-text { font-size: 1.2rem; font-weight: 600; margin-bottom: 20px; word-break: keep-all; }
  
  .options { display: flex; flex-direction: column; gap: 10px; }
  .opt {
    padding: 14px 16px;
    background: #fff;
    border: 1px solid var(--line);
    border-radius: 8px;
    cursor: pointer;
    transition: 0.2s;
    font-size: 1.05rem;
  }
  .opt:hover { border-color: var(--gold); background: var(--paper-2); }
  .opt.correct { background: var(--green-soft); border-color: var(--green); color: var(--green); font-weight: bold; }
  .opt.wrong { background: var(--red-soft); border-color: var(--red); color: var(--red); text-decoration: line-through; }
  
  .ans-box {
    margin-top: 20px;
    padding: 16px;
    background: var(--paper-2);
    border-left: 4px solid var(--burgundy);
    border-radius: 0 8px 8px 0;
    font-size: 0.95rem;
    display: none;
    animation: fadeIn 0.3s;
  }
  
  .nav-btns { display: flex; justify-content: space-between; margin-top: 20px; }
  .nav-btn {
    padding: 12px 24px;
    background: var(--ink);
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 1rem;
    cursor: pointer;
  }
  .nav-btn:disabled { background: var(--line); cursor: not-allowed; }

  /* 플래시 카드 모드 */
  .flash-card {
    perspective: 1000px;
    height: 300px;
    width: 100%;
    cursor: pointer;
  }
  .flash-inner {
    position: relative;
    width: 100%; height: 100%;
    text-align: center;
    transition: transform 0.6s;
    transform-style: preserve-3d;
  }
  .flash-card.flipped .flash-inner { transform: rotateY(180deg); }
  .flash-front, .flash-back {
    position: absolute;
    width: 100%; height: 100%;
    backface-visibility: hidden;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 20px;
    border-radius: 12px;
    background: var(--card);
    border: 2px solid var(--gold);
    box-shadow: var(--shadow);
  }
  .flash-back {
    transform: rotateY(180deg);
    background: var(--paper-2);
    border-color: var(--burgundy);
  }

  /* ✨ 시험모드 전용 CSS 추가 */
  .exam-timer {
    background: var(--burgundy);
    color: white;
    padding: 10px;
    text-align: center;
    font-size: 1.2rem;
    font-weight: bold;
    border-radius: 8px;
    margin-bottom: 20px;
    position: sticky;
    top: 10px;
    z-index: 100;
    box-shadow: var(--shadow);
  }
  .exam-submit-btn {
    display: block;
    width: 100%;
    padding: 15px;
    background: var(--ink);
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 1.1rem;
    font-weight: bold;
    margin-top: 30px;
    margin-bottom: 40px;
    cursor: pointer;
  }
  .exam-result-box {
    background: var(--card);
    border: 2px solid var(--burgundy);
    padding: 20px;
    border-radius: 8px;
    text-align: center;
    margin-bottom: 20px;
  }
  .wrong-badge {
    display: inline-block;
    background: var(--red-soft);
    color: var(--red);
    padding: 2px 8px;
    border-radius: 12px;
    font-size: 0.8rem;
    margin-left: 10px;
  }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>

<div class="app-container">
  <header>
    <h1>예장통합 목사고시</h1>
    <button id="reset" style="background:transparent; border:none; color:var(--muted); text-decoration:underline; cursor:pointer;">초기화</button>
  </header>

  <!-- 필터 옵션 -->
  <div class="filters">
    <button class="chip year-f on" data-year="all">전체 연도</button>
    <button class="chip year-f" data-year="2015">2015 기출</button>
    <button class="chip year-f" data-year="2016">2016 기출</button>
    <button class="chip year-f" data-year="2017">2017 기출</button>
    <button class="chip year-f" data-year="2018">2018 기출</button>
    <button class="chip year-f" data-year="2019">2019 기출</button>
    <button class="chip year-f" data-year="2025">2025 기출</button>
    </div>
    
    <div style="width:100%; height:4px;"></div>
    
    <button class="chip subj-f on" data-subj="성경">성경</button>
    <button class="chip subj-f" data-subj="교회사">교회사</button>
    <button class="chip subj-f" data-subj="헌법">헌법</button>
    
    <div style="width:100%; height:4px;"></div>
    
    <button class="chip" data-filter="freq">⭐ 빈출 2배수</button>
    <button class="chip" data-filter="wrong">내 오답만</button>
    <button class="chip" data-filter="shuffle">🔀 셔플</button>
    
    <!-- ✨ 오답노트 필터 추가 -->
    <button class="chip" style="border-color:var(--burgundy); color:var(--burgundy); font-weight:bold;" data-filter="wrongnote">🔥 잦은 오답(3회 이상)</button>
  </div>

  <!-- 모드 선택 -->
  <div class="filters" style="display:flex; margin-bottom:20px;">
    <button class="mode-tab on" data-mode="study">학습 모드</button>
    <button class="mode-tab" data-mode="flash">암기 카드</button>
    <!-- ✨ 시험 모드 탭 추가 -->
    <button class="mode-tab" style="color:var(--red);" data-mode="exam">⏳ 실전 모의고사</button>
  </div>

  <!-- 콘텐츠 렌더링 영역 -->
  <div id="content-area"></div>
</div>

<script>
// ==========================================
// 1. 데이터베이스 영역 (99문제 - 2025 기출 완벽 수록)
// ==========================================
const allQuestions = [
// ===================== 2015년도 기출 =====================
// 성경
{subj:"성경",year:"2015",no:1,q:"다음 중 연결이 맞지 않는 것은?",
 opts:["창세기 4장 — 가인의 족보","창세기 5장 — 아담의 족보","창세기 6장 — 노아의 족보","창세기 9장 — 노아 아들들의 족보"],a:3,
 e:"노아 아들들(셈·함·야벳)의 족보는 <b>창세기 10장</b>(열국 분포). 창9장은 노아 언약. 창6:9 '노아의 족보', 창5장 아담 계보, 창4장 가인 후손."},
{subj:"성경",year:"2015",no:2,q:"출애굽기 17장에 나타난 중요한 2가지 사건은?",
 opts:["므리바 사건 — 아말렉과의 전쟁","므리바 사건 — 만나를 주심","만나를 주심 — 지도자를 세움","아말렉과의 전쟁 — 지도자를 세움"],a:0,
 e:"출17장: 르비딤(맛사·<b>므리바</b>)에서 반석의 물 + <b>아말렉</b>과의 전쟁. 만나는 16장, 천부장 세움은 18장(이드로)."},
{subj:"성경",year:"2015",no:3,q:"사사와 한 일이 맞지 않는 것은?",
 opts:["기드온 — 300명 용사","아비멜렉 — 맷돌 위짝에 맞아 죽음","입다 — 기생의 아들","드보라 — 시스라를 죽임"],a:3,
 e:"시스라를 죽인 이는 <b>야엘</b>(장막 말뚝, 삿4:21). 드보라는 바락과 함께한 사사."},
{subj:"성경",year:"2015",no:4,q:"다음 중 연결이 잘못된 것은?",
 opts:["엘리야 — 수넴 여인의 아들을 살림","엘리야 — 까마귀로 먹을 것을 공급받음","엘리사 — 대머리","엘리사 — 선지자 가정의 빚 갚으려 그릇에 기름을 채움"],a:0,
 e:"수넴 여인의 아들을 살린 이는 <b>엘리사</b>(왕하4장). 엘리야가 살린 것은 사르밧 과부의 아들(왕상17장)."},
{subj:"성경",year:"2015",no:5,q:"에스겔서에서 마른 뼈가 살아난 사건과 성전에서 물이 나와 강을 이루는 내용이 기록된 장은?",
 opts:["33장, 45장","7장, 40장","37장, 47장","31장, 45장"],a:2,
 e:"마른 뼈 환상 = <b>겔 37장</b>, 성전 문지방에서 흐르는 생명수 강 = <b>겔 47장</b>."},
{subj:"성경",year:"2015",no:6,q:"다니엘이 사자굴에 들어갈 때 어인을 찍고 조서를 내린 왕은?",
 opts:["다리오","느부갓네살","벨사살","고레스"],a:0,
 e:"<b>다리오</b> 왕(단 6장). 느부갓네살=금신상·풀무불(3장), 벨사살=벽의 글씨(5장)."},
{subj:"성경",year:"2015",no:7,q:"에베소서 6장에 나온 내용이 아닌 것은?",
 opts:["남편과 아내","부모와 자녀","종과 상전","하나님의 전신갑주"],a:0,
 e:"엡6장 = 자녀-부모, 종-상전, <b>하나님의 전신갑주</b>. '남편과 아내'는 엡5장."},
// 교회사
{subj:"교회사",year:"2015",no:1,q:"초대교회 이단 중 유대교적 이단은?",
 opts:["에비온파","말시온파","영지주의","마니교"],a:0,
 e:"<b>에비온파</b> — 율법 준수 강조, 예수를 사람으로 봄. 말시온=구약 배격, 영지주의·마니교=이원론."},
{subj:"교회사",year:"2015",no:2,q:"헬라 교부 중 이단을 배격하는 5권의 저서가 있고, 구약을 신약과 동등한 비중으로 논한 최초의 인물은?",
 opts:["클레멘트","이레니우스","오리겐","터툴리안"],a:1,
 e:"<b>이레니우스</b> — '이단논박(Adversus Haereses)' 5권. 영지주의 반박, 구약·신약 연속성 강조."},
{subj:"교회사",year:"2015",no:5,q:"주후 800년경, 어거스틴의 『신의 도성』을 읽고 기독교 제국을 건설하려 했으며 십일조를 법제화하고 사도신경·주기도문·십계명을 널리 보급한 황제는?",
 opts:["콘스탄티누스","샤를마뉴","인노센트 3세","그레고리 1세"],a:1,
 e:"<b>샤를마뉴(카롤루스 대제)</b> — 800년 서로마 황제 대관. 카롤링거 르네상스, 교구제 개선."},
{subj:"교회사",year:"2015",no:6,q:"종교개혁 전 개혁자 중 교회의 위선을 공박하고 『바보예찬』에서 교회의 타락을 비판한 사람은?",
 opts:["에라스무스","후스","위클리프","사보나롤라"],a:0,
 e:"<b>에라스무스</b>. '알을 낳은 자는 에라스무스, 부화시킨 자는 루터'."},
{subj:"교회사",year:"2015",no:7,q:"빈칸 인물 연결 — '스위스 북부는 [ ]에 의해 취리히 중심으로, 남부는 베른 중심으로 [ ]에 의해 일어났고, [ ]은 제네바에서 성공했다.'",
 opts:["츠빙글리 - 파렐 - 칼뱅","파렐 - 츠빙글리 - 칼뱅","칼뱅 - 뮌처 - 츠빙글리","츠빙글리 - 베자 - 칼뱅"],a:0,
 e:"취리히=<b>츠빙글리</b>, 베른 일대=<b>파렐</b>, 제네바 성공=<b>칼뱅</b>(파렐의 권유로 정착)."},
{subj:"교회사",year:"2015",no:8,q:"루터의 3대 논문 중 '교황청의 삼중 보루가 파괴되었다, 모든 신자는 다 사제다(만인사제주의)'를 담은 논문은?",
 opts:["교회의 바벨론 포로","로마 교황권에 관하여","독일 크리스천 귀족에게 고함","크리스천의 자유에 대하여"],a:2,
 e:"<b>독일 크리스천 귀족에게 고함</b> — 영적/세속, 성경 해석권, 공의회 소집권의 '세 담(보루)'을 무너뜨림."},
{subj:"교회사",year:"2015",no:9,q:"칼뱅이 국가 구축의 필요 요소로 강조한 세 가지가 아닌 것은?",
 opts:["국가의 공직자","국가의 법","정교분리의 원칙","국민의 순종"],a:2,
 e:"칼뱅의 3요소 = 공직자(위정자)·법·백성(순종). <b>정교분리</b>는 해당 없음(교회·국가 협력 모델)."},
{subj:"교회사",year:"2015",no:11,q:"스코틀랜드 종교개혁자로 갤리선 노예 19개월을 겪고, '스코틀랜드 신앙고백서'와 '공동의 예배모범'을 지은 사람은?",
 opts:["위클리프","존 낙스","토마스 크랜머","패트릭 해밀턴"],a:1,
 e:"<b>존 낙스</b> — 칼뱅 신학의 영향. 스코틀랜드 장로교의 기초."},
{subj:"교회사",year:"2015",no:12,q:"18세기 경건주의 운동의 교회사적 공헌으로 잘못 설명한 것은?",
 opts:["교리논쟁용이 아니라 성령의 지도 아래 기도·명상하며 경건한 삶을 위해 성경을 읽음","교리 설교보다 주석 설교를, 구약보다 신약을 강조하고 중세 수도원운동을 강조함","목사후보생 교육을 강조하고 평신도의 위치를 높임","찬송가를 많이 만들고 해외 선교를 강조함"],a:1,
 e:"경건주의는 <b>중세 수도원운동을 강조하지 않음</b>. 나머지(주석 설교·신약 강조·평신도·찬송·선교)는 공헌이 맞음."},
{subj:"교회사",year:"2015",no:13,q:"교회사 시대구분과 특징 연결이 잘못된 것은?",
 opts:["16세기 — 종교개혁 시대","18세기 — 경건주의, 교파 절대주의 시대","19세기 — 유럽의 세속화, 위대한 선교의 세기","20세기 — 에큐메니칼 운동"],a:1,

{subj:"교회사",year:"2019",no:20,q:"자유주의 신학이 퍼져가는 가운데 종교를 '절대 의존의 감정'이라고 정의하면서 이성의 시대에서도 종교의 필요성을 주장했던 사람은 누구입니까?",opts:["루터","찰스 스펄전","슐라이에르마허","조나단 에드워즈","진젠 도르프"],a:2,e:"슐라이에르마허."},
{subj:"교회사",year:"2019",no:21,q:"자유주의 신학에 맞서 신정통주의를 주창한 신학자는 누구입니까?",opts:["존 낙스","조나단 에드워즈","야콥 슈페너","칼 바르트","불트만"],a:3,e:"칼 바르트(신정통주의)."},
{subj:"교회사",year:"2019",no:22,q:"로버트 토마스(Robert J. Thomas) 선교사에 관한 내용 중 틀린 것은 무엇입니까?",opts:["미국 웨일즈 지방 출신, 한국 개신교의 최초의 순교자이다.","미국 상선 제너럴 셔먼호를 타고 대동강을 거슬러 올라 왔다.","박춘권의 칼에 의해 순교하였다.","박춘권은 예수를 믿고 신자가 되어 안주교회의 영수가 되었다.","토마스 선교사에 의해 전해진 성경을 집에 벽지로 발랐던 박영식의 집은 평양 최초의 교회인 널다리골 예배당이 되었다."],a:0,e:"토마스는 영국 웨일즈 출신('미국' 웨일즈가 아님)."},
{subj:"교회사",year:"2019",no:23,q:"변화하는 시대 속에서 기존 교회의 한계를 느끼고 메도디스트(Methodist) 운동을 시작하고 감리교를 창설한 사람은 누구입니까?",opts:["찰스 피니","존 네비우스","존 웨슬레","윌리엄 캐리","존 낙스"],a:2,e:"존 웨슬리."},
{subj:"교회사",year:"2019",no:24,q:"네비우스 정신과 선교정책 결과로 맞지 않는 것은 무엇입니까?",opts:["구제하는 교회","기도하는 교회","교육하는 교회","전도하는 교회","자립하는 교회"],a:0,e:"네비우스 3자(자립·자치·자전)와 성경교육이 핵심. '구제하는 교회'는 아님."},
{subj:"교회사",year:"2019",no:25,q:"1885년 한국 최초의 근대식 병원인 광혜원을 세운 사람은 누구인가?",opts:["언더우드","토마스","아펜젤러","알렌","존 로스"],a:3,e:"알렌(광혜원/제중원)."},
{subj:"교회사",year:"2019",no:26,q:"3.1운동이 기독교적인 차원에서 갖게 되는 의미들을 설명한 것 중 옳지 않은 것은 무엇입니까?",opts:["3.1운동은 한민족의 독립을 넘어 동양과 세계의 평화를 주장하였고 인류의 공존과 호혜를 강조하는 성숙의 모습을 보여 주었다.","3.1운동은 기독교의 평화적 비폭력 저항운동이 나타나고 있다.","3.1운동은 한국교회의 민족운동과 애국적 신앙의 모습을 보여주고 있다.","3.1운동은 일제 치하의 정교분리론을 적극적으로 지지한 운동이라 할 수 있다.","한국교회가 민족의 고난에 적극 참여하며 박해를 받음으로 민족 동반자의 종교로 인정받게 되었다."],a:3,e:"3.1운동은 오히려 교회의 사회 참여로, '정교분리론을 적극 지지'했다는 설명은 옳지 않음."},
{subj:"교회사",year:"2019",no:27,q:"1833년 7월 존 케이블이 '국민적 배신'이라는 설교를 함으로 시작된 종교 운동으로, 일명 '소책자 운동'으로 불리는 운동은 무슨 운동입니까?",opts:["경건주의 운동","대각성 운동","옥스퍼드 운동","십자군 운동","오순절 운동"],a:2,e:"옥스퍼드 운동(트랙트 운동, 존 키블)."},
{subj:"교회사",year:"2019",no:28,q:"선교지 분할 정책 '예양협정(Comity Arrangement)'에 대해서 틀린 것은 무엇입니까?",opts:["같은 지역에서 선교의 경쟁적 구도를 만들기 위한 협정이다.","미국 북장로교회는 평안도, 황해도, 경기도, 경상북도 지역을 맡았다.","남장로교회는 전라도, 충청도 지역을 맡았다.","캐나다장로교회는 함경도 지역을 맡았다.","호주장로교회는 경남과 부산을 담당하여 선교하기로 합의하였다."],a:0,e:"예양협정은 선교 경쟁·중복을 '피하기' 위한 분할 협정. '경쟁적 구도를 만들기 위한'은 틀림."},
{subj:"교회사",year:"2019",no:29,q:"조선기독교의 아버지라 불리우며 한국 최초의 새벽기도 실시로 1907년 대부흥의 영적 토대를 만든 사람은 누구입니까?",opts:["손양원","이기풍","방기창","송인서","길선주"],a:4,e:"길선주."},
{subj:"교회사",year:"2019",no:30,q:"장대현 교회에서 노회 조직 시 목사 안수를 받고 제주도에 파송된 최초의 제주도 선교사는 누구인가?",opts:["길선주","이기풍","김익두","한석진","서경조"],a:1,e:"이기풍 목사."},
{subj:"교회사",year:"2019",no:31,q:"제임스 게일 선교사에 대한 소개 중 틀린 것은 무엇입니까?",opts:["토론토 대학 YMCA의 후원으로 1888년 12월 부산에 도착한 캐나다 선교사다.","한문에 능통한 이창직을 만나 한글을 배웠다.","게일이 1895년 완역한 《천로역정》은 한국어로 번역된 최초의 서양서적이었다.","장대현교회 초대 담임목사로도 사역하였다.","구운몽, 춘향전, 심청전 등을 영어로 번역하였다."],a:3,e:"게일은 연동교회에서 사역. '장대현교회 초대 담임목사'는 틀림."},
{subj:"교회사",year:"2019",no:32,q:"신학교 졸업생들의 목사안수를 위한 노회 창립의 필요성이 대두된 시기에 1907년 9월 17일 장대현 교회에서 독립노회가 개최되게 됩니다. 이 때 초대 노회장은 누가 선출되었습니까?",opts:["길선주","마펫","언더우드","알렌","김익두"],a:1,e:"초대 독노회장 = 마포삼열(마펫)."},
{subj:"교회사",year:"2019",no:33,q:"1912년 9월 1일 조선 예수교 장로회 총회의 초대 총회장은 누구입니까?",opts:["언더우드","마포삼열","길선주","김익두","알렌"],a:0,e:"초대 총회장 언더우드."},

{subj:"헌법",year:"2019",no:1,q:"목사의 칭호가 아닌 것은 무엇입니까?",opts:["위임목사","임시목사","부목사","담임목사","선교목사"],a:1,e:"제27조 — '임시목사'는 칭호가 아님(담임목사로 대체)."},
{subj:"헌법",year:"2019",no:2,q:"장로와 관련된 내용 중 틀린 것은 무엇입니까?",opts:["장로는 교회의 택함을 받고 치리회의 회원이 되어 목사와 협력하여 행정과 권징을 관장한다.","장로는 교회의 신령상 관계를 살핀다.","장로는 교인들이 교리를 오해하거나 도덕적으로 부패하지 않도록 교인을 권면한다.","장로는 권면하였으나 회개하지 않는 자가 있으면 당회에 보고한다.","장로는 개인으로는 그 당회 아래 있고 직무상에는 노회 아래 있다."],a:4,e:"⑤는 목사후보생(제41조)에 대한 설명이지 장로가 아님."},
{subj:"헌법",year:"2019",no:3,q:"노회에 대한 설명 중 잘못된 것은 무엇입니까?",opts:["노회는 그리스도의 몸된 교회에 여러 지교회가 있으므로 서로 협력하여 교리를 보전하고 행정과 권징을 위하여 노회가 있다.","노회는 각 당회록을 검사하며 교회 권징에 대한 문의를 해석하여 답변한다.","노회는 노회록을 정확히 작성하여 연 1차씩 총회의 검사를 받는다.","노회는 회원(시무목사와 총대장로) 각 과반수의 출석으로 개회한다.","노회는 과반수의 결의로 회원권(결의권, 선거권, 피선거권)을 제한 할 수 있다."],a:4,e:"회원권 제한은 단순 과반수 결의로 할 수 없음(권징 절차에 의함) → ⑤가 잘못."},
{subj:"헌법",year:"2019",no:4,q:"직원의 자격에 관한 설명 중 연결이 잘못된 것은 무엇입니까?",opts:["장로는 무흠 세례교인으로 7년 경과하고 40세 이상 된 자로 한다.","권사는 무흠 세례교인으로 5년 경과하고 30세 이상 된 자로 한다.","전도사는 무흠 세례교인으로 5년 경과하고 25세 이상 된 자로 한다.","집사는 무흠 세례교인으로 5년 경과하고 35세 이상 된 자로 한다.","서리집사는 무흠 세례교인으로 1년 경과하고 25세 이상 된 자로 한다."],a:1,e:"권사는 35세 이상('30세'는 틀림)."},
{subj:"헌법",year:"2019",no:5,q:"다음 중 회의의 개회성수가 잘못된 것은 무엇입니까?",opts:["총회는 전국 노회 수 과반의 참석과 회원(목사 총대 및 장로 총대) 각 과반수의 출석으로 개회한다.","노회는 시무 목사와 총대 장로 각 과반수의 출석으로 개회한다.","당회는 당회장을 제외한 과반수의 출석으로 개회한다. 대리 당회장도 성수에 포함되지 않는다.","제직회 개회는 출석수로, 결의는 과반수로 한다.","공동의회 개회는 회집된 회원으로 할 수 있다."],a:2,e:"제66조 — 당회 개회성수는 당회장을 '포함한' 과반수. '제외한'은 틀림."},
{subj:"헌법",year:"2019",no:6,q:"12신조 중 \u201c죽은 자가 마지막 날에 ( )을 얻고 그리스도의 ( ) 앞에서 이 세상에서 선악 간에 행한 바를 따라 보응을 받을 것이다.\u201d에서 빈 칸에 들어갈 말은 무엇입니까?",opts:["부활함, 보좌","영생함, 심판대","구원함, 보좌","상급, 영광","면류관, 권세"],a:0,e:"신조 — '부활함을 얻고 그리스도의 심판하시는 보좌 앞에서'."},
{subj:"헌법",year:"2019",no:7,q:"대한예수교장로회 헌법 정치 원리에 해당되는 것은 무엇입니까?",opts:["공회의 자격","거룩한 생활","양심의 자유","신앙의 자유","교회의 설립"],a:2,e:"정치 원리 = 양심의 자유(③). '신앙의 자유'는 함정."},
{subj:"헌법",year:"2019",no:8,q:"다음 중 전도사와 관련된 설명으로 옳은 것은 무엇입니까?",opts:["20세 이상 되어야 한다.","성서학원 졸업자도 가능하다.","무흠 세례교인(입교인)으로 7년을 경과한 자","필요시에는 시무장로가 전도사를 겸할 수 있다.","미조직 교회에서는 노회장의 허락으로 제직회 임시 회장이 될 수 있다."],a:1,e:"제49조 — 전도사는 25세 이상, 신학교 또는 성서학원 졸업자, 무흠 5년. ②가 옳음."},
{subj:"헌법",year:"2019",no:9,q:"다음 중 교인 명부에서 제명하여 교회 출석을 금지시키는 책벌은?",opts:["수찬정지","견책","면직","정직","출교"],a:4,e:"출교 — 교인명부에서 제명하여 교회 출석을 금함."},
{subj:"헌법",year:"2019",no:10,q:"다음 중 바르게 연결된 것은 무엇입니까?",opts:["제직회 결의 사항 – 직원 선거","임시노회 – 통지한 안건만 처리한다.","공동의회 결의 사항 – 구제비의 수입, 지출 및 특별 헌금 취급","노회 회원 총수 – 1,500명 이내","당회의 노회 총대장로 파송 규정 인원 – 100인까지 2인"],a:1,e:"임시노회는 통지한 안건만 처리(②)가 옳음. 직원선거=공동의회, 구제비·특별헌금=제직회, 1,500명 이내=총회 총대."},
{subj:"헌법",year:"2019",no:11,q:"12신조입니다. 틀린 것은 무엇입니까?",opts:["성부와 성자로부터 오신 성령이 사람으로 하여금 구원에 참여하게 하신다.","우리의 조상이 선악 간에 택할 자유가 있었는데 시험을 받아 하나님께 범죄 하였다.","그리스도가 세우신 성례는 세례와 성찬이다.","삼위는 한 하나님이시다. 본체는 하나요 권능과 영광이 동등이시다.","신구약성경은 하나님의 말씀이니 계시와 영감에 대하여 정확 무오한 유일의 법칙이다."],a:4,e:"신조 제1조는 '신앙과 행위(본분)에 대하여 정확무오한 유일의 법칙'. '계시와 영감에 대하여'는 틀림."},
{subj:"헌법",year:"2019",no:12,q:"다음은 교인의 구분에 대한 것 중에서 맞는 것은 무엇입니까?",opts:["교인은 원입교인, 유아세례교인, 학습교인, 세례교인(입교인)으로 구분한다.","원입교인은 예수 믿기로 결심하고 공동예배에 참석하는 15세 이상인 자이다.","유아세례교인은 예수 그리스도를 고백하는 2세 미만 유아세례를 받은 자이다.","세례교인(입교인)은 유아세례교인으로서 입교한 자(15세 이상) 또는 원입교인(15세 이상)으로서 세례를 받은 자이다.","세례교인(입교인)은 학습교인이 15세 이상으로서 세례를 받은 자이다."],a:3,e:"정답표 미표기 → 공식 헌법으로 ④ 확정. 통합엔 학습교인 구분이 없고, 원입교인엔 연령 제한이 없음. ④의 '15세'는 출제 당시 기준임. ▶현행[개정 2021.11.29]: 세례교인(입교인)은 유아세례교인으로서 입교한(13세 이상)자 또는 원입교인(13세 이상)으로서 세례를 받은 자."},
{subj:"헌법",year:"2019",no:13,q:"집사, 권사로 선택된 자는 당회 지도 아래 몇 개월의 교양을 받아야 합니까?",opts:["6개월","5개월","4개월","3개월","2개월"],a:3,e:"안수집사·권사는 3개월 이상 교육."},
{subj:"헌법",year:"2019",no:14,q:"헌법상 목사의 의의에 맞는 것은 무엇입니까?",opts:["목사는 축복을 베푸는 하나님의 대리자이다.","목사는 모든 교인의 모범이 되어 교회를 치리하는 장로이다.","목사는 교인들을 위로하는 상담자이다.","목사는 교회 재정을 총괄하는 대표자이다.","목사는 하나님의 도를 맡은 파수꾼이다."],a:1,e:"제24조 — '모든 교인의 모범이 되어 교회를 치리하는 장로'."},
{subj:"헌법",year:"2019",no:15,q:"헌법 개정(정치, 권징, 예배와 예식)에 맞는 것은 무엇입니까?",opts:["총회는 출석회원 과반수 찬성의 결의로 개정안을 작성하여 각 노회에 수의한다.","헌법(헌법시행규정 포함)은 개정한 지 3년 이내에는 개정할 수 없다.","각 노회는 수의된 안건을 투표하여 과반수 찬성으로 총회장에게 보고한다.","헌법개정위원은 총회장이 직권으로 선정하여 개정안을 작성케 한다.","개정헌법은 공포한 날로부터 반드시 1년 간 연구케 한 후 시행한다."],a:1,e:"제102조 — 정치·권징·예배와 예식 개정안 작성은 총회 출석 2/3(과반수 아님), 개정 후 3년 이내 재개정 불가(②가 맞음)."},
{subj:"헌법",year:"2019",no:16,q:"교인에 관한 부분 중에서 맞는 것은 무엇입니까?",opts:["교인의 의무는 공동예배 출석과 봉헌과 전도와 교회 치리에 복종하는 것이다.","세례교인(입교인) 된 교인은 성찬 참례권과 공동의회 회원권이 있다.","공동의회의 회원권은 15세 이상 세례교인으로 한다.","교인은 다른 교회로 이명하고자 하는 경우에는 6개월 이내에 담임목사에게 이명 청원을 하여야 한다.","교인이 신고 없이 교회를 떠나 의무를 행치 않고 6개월을 경과하면 실종교인이 된다."],a:1,e:"제15조 교인의 의무엔 '전도'가 없음(①은 틀림). 세례교인의 성찬 참례권·공동의회 회원권(②)이 맞음. (정답표는 ①이지만 공식 헌법상 ②.)"},
{subj:"헌법",year:"2019",no:17,q:"교회에 관한 부분 중에서 맞는 것은 무엇입니까?",opts:["당회가 있는 교회를 조직교회라 하고 당회가 없는 교회를 기도처라 한다.","지 교회를 설립코자 하려면 세례교인(입교인) 20인 이상이 있어 노회에 청원하여 허락을 받아 설립한다.","지 교회의 분립 및 합병은 그 지 교회의 당회와 공동의회의 결의로 노회의 허락을 받아야 한다.","지교회의 폐지는 그 지교회의 당회와 공동의회의 결의로 노회의 허락을 받아야 한다.","지 교회가 설립된 후 세례교인(입교인)의 수가 20인 미만의 상태로 1년간 계속되는 경우에는 노회는 이를 기도처로 변경한다."],a:2,e:"분립·합병은 당회와 공동의회 결의로 노회 허락(③)이 맞음. 당회 없는 교회=미조직교회, 설립은 15인 이상, 기도처 변경은 18세 이상 15인 미만 2년."},
{subj:"헌법",year:"2019",no:18,q:"목사의 청빙과 연임청원에 맞는 것은 무엇입니까?",opts:["조직교회는 위임목사만을 청빙 할 수 있다.","위임목사의 청빙은 당회의 결의와 공동의회의 3분의 2 이상의 찬성을 얻어야 한다.","담임목사의 청빙은 당회의 결의와 공동의회의 출석회원 과반수의 찬성을 얻어야 한다.","담임목사의 연임청원은 반드시 제직회에서 투표로 결의 하여야 한다.","부목사의 계속청원은 당회의 결의와 제직회 출석회원 과반수의 찬성을 얻어야 한다."],a:1,e:"위임목사 청빙 = 당회 결의 + 공동의회 출석 2/3 이상 찬성(②)이 맞음. 담임목사 청빙은 당회 결의+제직회 과반수."},
{subj:"헌법",year:"2019",no:19,q:"당회장에 대해 틀린 것은 무엇입니까?",opts:["당회장은 노회에서 임명한다.","임시당회장은 당회장이 결원되었을 때 당회원 과반수의 결의(합의 혹은 연명)로 요청한 해 노회 목사를 노회가 파송한다.","대리 당회장은 결의권이 있다.","대리 당회장은 당회장이 유고할 때 또는 기타 사정이 있을 때 당회장이 위임한 자 또는 당회원이 합의하여 청한 자로 당회장직을 대리케 할 수 있다.","은퇴목사에게는 임시당회장을 맡길 수 없다."],a:2,e:"제67조 — 대리당회장은 결의권이 '없다'. ③이 틀림."},
{subj:"헌법",year:"2019",no:20,q:"제직회의 결의사항이 아닌 것은 무엇입니까?",opts:["공동회의에서 결정한 예산집행","교인의 이명처리","부동산 매매","당회가 요청한 사항","재정에 관한 일반수지 예산 및 결산"],a:1,e:"'교인의 이명처리'는 당회 사항(제직회 결의사항이 아님)."},
{subj:"헌법",year:"2019",no:21,q:"노회가 지교회를 감독하는 치리권의 협조를 위하여 두는 것은 무엇입니까?",opts:["총회","노회","시찰회","당회","연합회"],a:2,e:"시찰회(시찰위원회)."},
{subj:"헌법",year:"2019",no:22,q:"권징의 사유가 되는 죄과가 아닌 것은 무엇입니까?",opts:["성경상의 계명에 대한 중대한 위반행위","예배를 방해한 행위","이단적 행위와 이에 적극적으로 동조한 행위","허위사실을 유포하여 교인 또는 직원의 명예를 훼손시킨 행위","교인에게 금품을 수수한 행위"],a:4,e:"제43조11은 '사건 담당직원이 사건과 관련하여 금품을 수수한 행위'. '교인에게 금품을 수수한 행위'는 그 사유가 아님."},
{subj:"헌법",year:"2019",no:23,q:"책벌에 있어서 교인에게 과하는 벌이 아닌 것은?",opts:["견책","근신","수찬정지","출교","정직"],a:4,e:"교인 벌 = 견책·근신·수찬정지·출교. '정직'은 직원 벌."},
{subj:"헌법",year:"2019",no:24,q:"공동의회에 관한 부분 중에서 맞는 것은 무엇입니까?",opts:["공동회의 회원은 15세 이상 세례교인(입교인) 이상이다.","원로목사는 공동의회의 투표하여 출석회원 3분의 2 이상의 득표 결의로 추대한다.","원로장로는 공동의회에서 투표하여 출석회원 3분의 2 이상의 득표 결의로 추대한다.","예산과 결산은 공동의회 결의사항이다.","공동회의에서 인선은 무기명 비밀투표로 하지 않아도 된다."],a:3,e:"예산과 결산은 공동의회 결의사항(④)이 맞음. 회원권은 18세 이상, 인선은 무기명 비밀투표."},
{subj:"헌법",year:"2019",no:25,q:"노회의 분립, 합병 및 폐지에 관한 부분 중 맞는 것은 무엇입니까?",opts:["노회가 분립코자 하면 재적 목사, 장로 각 3분의 2 이상의 결의가 있어야 한다.","노회가 분립코자 하면 노회 재산, 기관, 분할 구역에 속한 교회명단을 총회 규칙부에 청원한다.","노회가 합병코자 하면 목사, 장로 각 3분의 2 이상의 결의로 총회에 청원한다.","노회가 설립된 후 설립기준 미달로 3년이 경과되면 노회가 폐지된다.","노회의 분립과 합병에 대한 결의는 총회 특별대책회의에서 할 수 있다."],a:2,e:"정답 ③ — 노회 합병은 목사·장로 각 3분의 2 이상의 결의로 총회에 청원한다."},
{subj:"헌법",year:"2019",no:26,q:"책벌의 종류와 내용이 맞지 않는 것은 무엇입니까?",opts:["견책：죄과를 꾸짖고 회개하게 한다.","근신：2개월 이상 6개월 이내의 기간 죄과에 대한 반성문을 1회 이상 소속 치리회장에게 제출하게 하고 행동을 삼가게 한다.","수찬정지：6개월 이상 1년 이내의 기간 수찬을 정지한다.","면직：직원의 신분을 박탈한다.","시무해임：3개월 이상 1년 이내의 기간 치리권(행정권과 권징권)을 정지한다."],a:4,e:"치리권 정지는 '시무정지'의 내용. 시무해임은 '그 직무에 한하여 모든 시무 정지'라 ⑤가 틀림."},
{subj:"헌법",year:"2019",no:27,q:"권징에 대한 설명 중 맞는 것은 무엇입니까?",opts:["예수 그리스도께서 제직회에 준 권한을 행사하며 그 법도를 시행하는 것이다.","교인과 직원, 각 치리회가 예배를 방해한 행위로는 권징 할 수 없다.","책벌 중 근신이 가장 낮은 수준의 책벌이다.","항소의 재소 기간은 판결문을 송부 받은 날로부터 10일로 한다.","권징은 당회, 시찰회, 노회, 총회에서만 할 수 있다."],a:3,e:"정답표 미표기 → 소거법으로 ④ 확정. 권징권은 교회(치리회)에, 예배 방해는 권징 사유, 가장 낮은 책벌은 견책, 시찰회는 치리회가 아님. ④가 맞음."},
{subj:"헌법",year:"2019",no:28,q:"노회는 일정한 구역 안에 있는 세례교인(입교인) 3000인 이상과 시무목사 ( )인 이상과 당회 ( )처(조직교회) 이상 있어야 조직할 수 있는가?",opts:["20, 20","20, 30","30, 30","30, 40","40, 40"],a:2,e:"제73조 — 시무목사 30인, 당회 30처, 세례교인 3000인."},
{subj:"헌법",year:"2019",no:29,q:"고소, 고발 및 기소에 관하여 틀린 것은 무엇입니까?",opts:["당회 기소위원회는 당회에서 선임된 기소위원 1인 내지 2인으로 구성한다.","치리회장이 고소장(고발장)을 받은 때에는 20일 이내에 이를 기소위원회에 이첩하여야 한다.","고소기간은 죄과를 범한 자를 알게 된 날로부터 2년을 경과하면 고소하지 못한다.","고소를 취하한 자는 동일한 내용에 대하여 다시 고소하지 못한다.","고소 및 고발은 피고소인(피고발인)의 소속 치리회장에게 서면으로 해야 한다."],a:1,e:"정답 ② — 보기의 '20일'이 틀림. ▶제54조의1[고소 및 고발과 조치] 1.: 치리회장이 고소장(고발장)을 받은 때에는 10일 이내에 이를 기소위원회에 이첩하여야 한다. [개정 2015.12.8]"},
{subj:"헌법",year:"2019",no:30,q:"당회에 관한 부분 중에서 맞는 것은 무엇입니까?",opts:["당회는 교인의 신앙과 행위를 통찰하며 세례, 입교할 자를 문답하며 세례식과 성찬식을 관장한다.","당회는 지교회의 현금 및 동산을 관리한다.","당회는 범죄한 자를 소환 심문하고 범죄한 증거가 명백할 때는 공동의회에 회부한다.","당회는 당회장이 소집하되 연 3차 이상을 회집하여야 한다.","당회장이 당회 소집을 할 때 당회원 3분의 2 이상의 찬성이 있어야 한다."],a:0,e:"제68조1 — 신앙·행위 통찰, 세례·입교 문답, 세례식·성찬식 관장(①)이 맞음. 당회는 부동산 관리, 권징은 당회가 직접 시행."},
{subj:"헌법",year:"2019",no:31,q:"헌법에 명시된 당회가 비치할 명부가 아닌 것은?",opts:["헌금 대장 및 명부","세례교인(입교인) 명부","책벌 및 해벌 교인 명부","실종 교인 명부","별세 명부"],a:0,e:"제71조 명부에 '헌금 대장 및 명부'는 없음."},
{subj:"헌법",year:"2019",no:32,q:"원심판결에 항소이유가 아닌 것은 무엇입니까?",opts:["판결에 영향을 미친 헌법 또는 규정의 위반이 있는 때","판결재판국의 구성이 헌법 또는 규정에 위반한 때","국가 재판에서 승소하여 재심 청구가 필요한 때","판결에 이유를 붙이지 아니하거나 이유에 모순이 있는 때","사실의 오인에 있어 판결에 영향을 미친 때"],a:2,e:"'국가 재판 승소·재심 청구'는 항소이유가 아님."},
{subj:"헌법",year:"2019",no:33,q:"노회에 대한 설명 중 맞는 것은 무엇입니까?",opts:["노회는 회원(시무목사와 총대장로) 3분의 1 이상의 출석으로 개회한다.","정기노회는 개회 2개월 전에 소집을 통지하여야 한다.","노회는 노회 소속 목사와 당회에서 파송한 총대장로로 조직한다.","임시노회는 목사, 장로 각 3인 이상의 청원에 의하여 소집한다.","노회는 임원회 회의록을 작성하여 연 1차씩 총회의 검사를 받아야 한다."],a:2,e:"노회는 노회 소속 목사와 당회 파송 총대장로로 조직(③)이 맞음. 개회는 각 과반수, 노회록(임원회 회의록 아님)을 총회 검사."},

  // ===================== 2025 성경 =====================
  {subj:"성경",year:"2025",no:1,q:"다음 중 창조 사역의 일정에 어긋나는 것은?",opts:["첫째 날 – 빛과 어둠 나눔","둘째 날 – 씨 맺는 채소","셋째 날 – 열매 맺는 나무","넷째 날 – 두 큰 광명체","다섯째 날 – 날개 있는 모든 새들"],a:1,e:"<b>창세기 1장</b> — 둘째 날에는 궁창(하늘)을 창조하셨다. 씨 맺는 채소와 열매 맺는 나무는 물과 뭍이 나뉜 셋째 날 창조되었다."},
  {subj:"성경",year:"2025",no:2,q:"사람들이 비로소 여호와의 이름을 부른 때는 언제인가?",opts:["아담이 하와를 보았을 때","아벨이 제사를 드렸을 때","셋이 에노스를 낳았을 때","노아가 홍수 계시를 받았을 때","아브라함이 가나안으로 떠날 때"],a:2,e:"<b>창세기 4:26</b> — 셋도 아들을 낳고 이름을 에노스라 하였으며, 셋이 에노스를 낳았을 때 사람들이 비로소 여호와의 이름을 불렀다."},
  {subj:"성경",year:"2025",no:3,q:"다음 중 이스라엘 백성이 모세를 원망하거나 다투었던 곳이 아닌 곳은?",opts:["르비딤","신 광야","마라","시내 산","숙곳"],a:4,e:"<b>출애굽기 12:37</b> — 숙곳은 출애굽 후 처음 머문 출발 지점이며, 원망이나 다툼 사건이 기록되지 않았다."},
  {subj:"성경",year:"2025",no:4,q:"소제물에 반드시 들어가야 할 것은?",opts:["꿀","소금","유향","누룩","기름"],a:1,e:"<b>레위기 2:13</b> — 네 모든 소제물에 소금을 치라. 하나님의 언약의 소금을 반드시 쳐야 한다."},
  {subj:"성경",year:"2025",no:5,q:"신명기 34장에 보면 모세의 죽음에 관한 기록이 있다. 모세는 몇 세에 죽었으며, 죽은 장소는 어디인가?",opts:["120세 - 벳브올 맞은 편 모압 땅","130세 – 벳브올 맞은 편 모압 땅","120세 – 세일 산","130세 – 세일 산","140세 – 요단 동편, 지명은 알 수 없다."],a:0,e:"<b>신명기 34:5-7</b> — 모세는 120세의 나이로 모압 땅 벳브올 맞은편 골짜기(느보산)에 장사되었다."},
  {subj:"성경",year:"2025",no:6,q:"이스라엘 백성이 여호수아와 함께 가나안을 정복할 당시에 기브온에 거주하던 원주민은 어느 족속인가?(수 11:19)",opts:["헷 족속","기르가스 족속","아모리 족속","히위 족속","여부스 족속"],a:3,e:"<b>여호수아 11:19</b> — 기브온 주민 히위 족속 외에는 이스라엘 자손과 화친한 성읍이 하나도 없었다."},
  {subj:"성경",year:"2025",no:7,q:"기록된 바 의인은 없나니 하나도 없으며 깨닫는 자도 없고 하나님을 찾는 자도 없고 다 치우쳐 함께 무익하게 되고 선을 행하는 자는 없나니 하나도 없도다(롬 3:10~12)는 시편 몇 편에 유사한 내용이 있는가?",opts:["시편 53편","시편 69편","시편 70편","시편 84편","시편 119편"],a:0,e:"<b>시편 14편 및 53편</b> — 로마서 3장 10~12절은 시편 14편 1~3절 및 시편 53편 1~3절을 인용한 내용이다."},
  {subj:"성경",year:"2025",no:8,q:"오직 내게 이 두 가지 일을 행하지 마옵소서. 그리하시면 내가 주의 얼굴을 피하여 숨지 아니하오리니 곧 주의 손을 내게 대지 마시오며 주의 위엄으로 나를 두렵게 하지 마실 것이니이다라고 기도한 사람은 누구인가?",opts:["욥","다윗","아굴","예레미야","솔로몬"],a:0,e:"<b>욥기 13:20-21</b> — 극심한 고난 가운데 하나님께 탄원하며 드린 욥의 간절한 기도이다."},
  {subj:"성경",year:"2025",no:9,q:"나는 사론의 수선화요 골짜기의 백합화로다는 어느 책에 있는 말인가?",opts:["예레미야 애가","시편","잠언","전도서","아가서"],a:4,e:"<b>아가 2:1</b> — 아가서에 기록된 술람미 여인의 자기 고백적 노래이다."},
  {subj:"성경",year:"2025",no:10,q:"잠언에는 땅에 작고도 가장 지혜로운 것이 넷이 있다고 했는데 여기에 해당되지 않는 것은?",opts:["개미","사반","도마뱀","거머리","메뚜기"],a:3,e:"<b>잠언 30장</b> — 지혜로운 넷은 개미, 사반, 메뚜기, 도마뱀이다. 거머리는 탐욕스러운 자를 비유할 때 등장한다."},
  {subj:"성경",year:"2025",no:11,q:"여호와의 성전에서 이것들이 끊어지게 되면서 제사장들이 슬퍼했던 것은?(욜 1:9)",opts:["향과 등잔","진설병과 기름","소제와 전제","번제와 속죄제","화목제와 속건제"],a:2,e:"<b>요엘 1:9</b> — 소제와 전제가 여호와의 성전에서 끊어졌고 여호와께 수종드는 제사장은 슬퍼하도다고 기록한다."},
  {subj:"성경",year:"2025",no:12,q:"요나에 관한 설명 중 틀린 것은?",opts:["요나는 아밋대의 아들이다.","다시스로 도망치던 요나가 풍랑을 만나자 자원해서 물에 뛰어들었다.","니느웨 성에 가서도 건성으로 하나님의 심판을 선포했다.","햇볕을 가려주던 박 넝쿨이 말라버리자 하나님께 불평을 쏟아내었다.","니느웨 성 사람들이 회개하고 하나님께로 돌아서자 화를 내었다."],a:1,e:"<b>요나 1:15</b> — 요나는 자신을 바다에 던지라고 말하긴 했으나 본인이 직접 뛰어든 것이 아니라 선원들이 들어 바다에 던졌다."},
  {subj:"성경",year:"2025",no:13,q:"이사야 1장 15절에 하나님께서 이스라엘 백성이 많이 기도할지라도 듣지 않겠다고 말씀하신 이유는?",opts:["백성의 교만으로 인해","우상숭배가 가득하여","백성들의 손에 피가 가득함으로","성적 문란으로 인해","외식과 거짓된 기도로 인해"],a:2,e:"<b>이사야 1:15</b> — 너희가 많이 기도할지라도 내가 듣지 아니하리니 이는 너희의 손에 피가 가득함이라."},
  {subj:"성경",year:"2025",no:14,q:"에스겔 1장 1절 이하에서 하늘이 열리고 하나님의 모습이 에스겔에게 나타나셔서 권능으로 임하신 장소는?",opts:["그발 강가","요단 강가","힛데겔 강가","비손 강가","기혼 강가"],a:0,e:"<b>에스겔 1:1</b> — 내가 그발 강 가 사로잡힌 자 중에 있을 때에 하늘이 열리며 하나님의 모습이 내게 보이니."},
  {subj:"성경",year:"2025",no:15,q:"스가랴서에 등장하는 것이 아닌 것은?",opts:["화석류나무","네 뿔과 대장장이","순금 등잔대와 두 감람나무","측량줄","날아가는 병거"],a:4,e:"<b>스가랴의 환상</b> — 날아가는 두루마리와 네 병거가 등장한다. '날아가는 병거'는 환상의 올바른 이름이 아니다."},
  {subj:"성경",year:"2025",no:16,q:"오직 정의를 물 같이, 공의를 마르지 않는 강 같이 흐르게 할지어다라는 말씀은 어디에 있는가?",opts:["아모스 3장 12절","미가 3장 8절","아모스 5장 24절","미가 6장 6절","요엘 2장 13절"],a:2,e:"<b>아모스 5:24</b> — 종교적 의식보다 삶 속의 정의와 공의를 강조한 아모스의 핵심 선포 구절이다."},
  {subj:"성경",year:"2025",no:17,q:"마태복음 13장과 마가복음 4장에 공통적으로 언급된 비유는?",opts:["그물 비유","누룩 비유","진주 비유","겨자씨 비유","숨겨진 보화 비유"],a:3,e:"<b>마태복음 13장, 마가복음 4장</b> — 공통으로 등장하는 대표적인 하나님 나라 비유는 겨자씨 비유이다."},
  {subj:"성경",year:"2025",no:18,q:"여호와여 내가 주께 대한 소문을 듣고 놀랐나이다 여호와여 주는 주의 일을 이 수년 내에 부흥하게 하옵소서라는 말씀은 누구의 기도인가?",opts:["예레미야","하박국","스바냐","학개","스가랴"],a:1,e:"<b>하박국 3:2</b> — 선지자 하박국의 유명한 찬양 기도 구절이다."},
  {subj:"성경",year:"2025",no:19,q:"누가복음에만 나오는 예수님의 비유는?",opts:["가라지 비유","달란트 비유","어리석은 부자의 비유","네 가지 땅에 떨어진 씨 비유","겨자씨 비유"],a:2,e:"<b>누가복음 12:16-21</b> — 재물을 창고에 쌓아두고 안심하는 어리석은 부자의 비유는 누가복음에만 단독으로 기록되어 있다."},
  {subj:"성경",year:"2025",no:20,q:"믿음의 역사, 사랑의 수고, 소망의 인내로 칭찬받은 교회는?",opts:["갈라디아교회","데살로니가교회","고린도교회","안디옥교회","에베소교회"],a:1,e:"<b>데살로니가전서 1:3</b> — 바울이 데살로니가 성도들의 온전한 믿음의 삶을 칭찬하는 구절이다."},
  {subj:"성경",year:"2025",no:21,q:"예수님께서 야이로의 집으로 가시는 도중에 고쳐주신 병자는?",opts:["중풍병자","두 소경","혈루증을 앓는 여인","38년 병자","귀신들린 아이"],a:2,e:"<b>마가복음 5장</b> — 야이로의 딸을 살리러 가던 도중 12년 동안 혈루증을 앓던 여인이 예수님의 옷자락을 만져 고침을 받았다."},
  {subj:"성경",year:"2025",no:22,q:"예수님의 탄생을 기록한 복음서는?",opts:["마, 요","막, 눅","눅, 요","막, 요","마, 눅"],a:4,e:"<b>마태복음, 누가복음</b> — 두 복음서에만 예수님의 동정녀 탄생 및 베들레헴 성탄 기사가 수록되어 있다."},
  {subj:"성경",year:"2025",no:23,q:"요한복음에서 예수님께서 말씀하신 나는 ~이다가 아닌 것은?",opts:["생명의 떡","세상의 빛","양의 문","세상의 소금","선한 목자"],a:3,e:"<b>마태복음 5:13</b> — 요한복음의 '에고 에이미' 선언에는 생명의 떡, 세상의 빛, 양의 문, 선한 목자 등이 포함되나 세상의 소금은 산상수훈이다."},
  {subj:"성경",year:"2025",no:24,q:"마가복음에서 예수님이 행하신 첫 번째 이적은?",opts:["귀신 들린 사람 고침","열병을 고침","물이 포도주로 변함","눈을 뜨게 함","못 걷는 자를 걷게 함"],a:0,e:"<b>마가복음 1:23-26</b> — 가버나움 회당에 들어가 가장 먼저 행하신 표적이 더러운 귀신 들린 사람을 내쫓으신 것이다."},
  {subj:"성경",year:"2025",no:25,q:"주 예수를 믿으라 그리하면 너와 네 집이 구원을 받으리라라는 말씀이 기록되어 있는 곳은?",opts:["사도행전 1장 8절","사도행전 9장 31절","사도행전 12장 24절","사도행전 16장 31절","사도행전 20장 24절"],a:3,e:"<b>사도행전 16:31</b> — 빌립보 감옥에서 옥문이 열린 뒤 바울과 실라가 간수에게 전한 복음 선언이다."},
  {subj:"성경",year:"2025",no:26,q:"고린도전서에 나오는 말씀이 아닌 것은?",opts:["십자가의 도가 멸망하는 자들에게는 미련한 것이요","사람이 마땅히 우리를 그리스도의 일꾼이요 하나님의 비밀을 맡은 자로 여길지어다","형제들아 너희는 부르심을 받은 그대로 하나님과 함께 거하라","우리가 살아도 주를 위하여 살고 죽어도 주를 위하여 죽나니 그러므로 사나 죽으나 우리는 주의 것이로다","그런즉 믿음 소망 사랑 이 세 가지는 항상 있을 것인데 그 중의 제일은 사랑이라"],a:3,e:"<b>로마서 14:8</b> — 살아도 주를 위하여 살고 죽어도 주를 위하여 죽나니는 로마서 말씀이다."},
  {subj:"성경",year:"2025",no:27,q:"갈라디아서 1장 17절에 바울이 회심한 후 간 곳은?",opts:["예루살렘","안디옥","다메섹","드로아","아라비아"],a:4,e:"<b>갈라디아서 1:17</b> — 오직 아라비아로 갔다가 다시 다메섹으로 돌아갔노라."},
  {subj:"성경",year:"2025",no:28,q:"디모데후서 4장 14절에 언급된 바울의 대적자는?",opts:["후메내오","빌레도","알렉산더","데마","그리스게"],a:2,e:"<b>디모데후서 4:14</b> — 구리 세공업자 알렉산더가 내게 해를 많이 입혔으매."},
  {subj:"성경",year:"2025",no:29,q:"내가 궁핍하므로 말하는 것이 아니니라 어떠한 형편에든지 나는 자족하기를 배웠노니라는 말씀이 기록되어 있는 서신서는?",opts:["로마서","빌립보서","빌레몬서","갈라디아서","골로새서"],a:1,e:"<b>빌립보서 4:11-12</b> — 감옥에서 쓴 바울의 자족에 대한 위대한 신앙 고백이다."},
  {subj:"성경",year:"2025",no:30,q:"베드로전서 2장 9절에는 그리스도인의 정체성을 선언하고 있다. 괄호에 알맞은 말은?",opts:["민족 - 왕 - 자녀 된 자 - 백성 - 소식","나라 - 왕 - 구원받은 자녀 - 나라 - 덕","기업 - 금 - 거룩한 나라 - 자녀 - 복음","족속 - 금 - 구원받은 자녀 - 백성 - 복음","족속 - 왕 - 거룩한 나라 - 백성 - 덕"],a:4,e:"<b>베드로전서 2:9</b> — 오직 너희는 택하신 족속이요 왕 같은 제사장들이요 거룩한 나라요 그의 소유된 백성이니... 아름다운 덕을 선포하게 하려 하심이라."},
  {subj:"성경",year:"2025",no:31,q:"열왕기하 2장 3절에 다윗이 솔로몬에게 한 말이다. 괄호에 알맞은 말은?",opts:["길 - 율법 - 형통","길 - 가르침 - 평안","규례 - 길 - 승리","규례 - 가르침 - 순탄","법도 - 율법 - 평안"],a:0,e:"<b>열왕기상 2:3</b> — 원문의 성경명 오타이나, 여호와의 명령을 지켜 그 길로 행하여... 모세의 율법에 기록된 대로 지키라... 어디로 가든지 형통할지라가 정답이다."},
  {subj:"성경",year:"2025",no:32,q:"역대하 7장 14절의 말씀이다. 괄호에 알맞은 말은?",opts:["죄 - 겸비 - 뜻 - 과거","죄 - 회개 - 이름 - 과오","악한 길 - 겸비 - 이름 - 죄","악한 길 - 기도 - 얼굴 - 죄","거짓 - 기도 - 긍휼 - 과거"],a:3,e:"<b>역대하 7:14</b> — 그들의 악한 길에서 떠나 스스로 낮추고 기도하여 내 얼굴을 찾으면... 그들의 죄를 사하고."},
  {subj:"성경",year:"2025",no:33,q:"사도 요한이 요한계시록을 기록한 장소는?",opts:["바보 섬","구브로 섬","사모 섬","그레데","밧모 섬"],a:4,e:"<b>요한계시록 1:9</b> — 사도 요한은 밧모라 하는 섬에서 계시를 받아 기록하였다."},

  // ===================== 2025 교회사 =====================
  {subj:"교회사",year:"2025",no:1,q:"개화기 이수정의 주요 활동 중 틀린 것은?",opts:["일본의 농업의 권위자 쓰다센에게 신앙적 영향을 받았다.","일본에서 마가복음을 비롯하여 한글성경번역에 참여했다.","미국선교부에 조선으로 선교사 파송을 요청하였다.","최초 선교사 언더우드, 아펜젤러의 조선행을 이끌었다.","일본에서 귀국하여 알렌과 함께 협력하여 사역하였다."],a:4,e:"<b>역사적 사실</b> — 이수정은 1886년 귀국 직후 자객에게 암살당해 순교하였으므로, 국내에서 알렌과 본격적으로 협력하여 사역할 수 없었다."},
  {subj:"교회사",year:"2025",no:2,q:"네비우스 선교정책 중 틀린 것은?",opts:["신자 각인은 타인에게 복음의 선생이 된다.","모든 교회는 무급·유급 지도자나 조사들이 각 지역에서 지도자가 될 수 있도록 훈련한다.","모든 예배당은 신자들의 힘으로 건축되어야 한다.","1890년 6월에 선교사들에게 강론한 선교전략 방법이다.","교회 내의 소송문제는 선교사들의 주도하에 해결한다."],a:4,e:"<b>네비우스 정책</b> — 3대 근간인 자치(Self-Governing) 원칙에 따라 현지 교인들 스스로 치리하도록 자율성을 보장했으므로 선교사 주도 해결은 틀렸다."},
  {subj:"교회사",year:"2025",no:3,q:"한국교회사에 중요한 사건들과 그 연도가 잘못 연결된 것은?",opts:["평양장로회신학교 설립 - 1901년","조선예수교장로회 총회 조직 - 1915년","교단 명칭을 대한예수교장로회로 변경 - 1949년","신사참배 결의를 취소하고 참회 기도회 개최 - 1954년","대한예수교장로회 합동 측이 분립 - 1959년"],a:1,e:"<b>한국 교회사</b> — 조선예수교장로회 첫 총회 조직은 1915년이 아니라 1912년 9월 1일이다."},
  {subj:"교회사",year:"2025",no:4,q:"신사참배 가결과 관련이 없는 것은?",opts:["조선예수교장로회 총회 제29회에서 결의함","로마 교황청은 신사참배 독려함","미국 북장로교회는 기독교학교 및 세브란스 의전을 자발적으로 폐쇄함","주기철, 손양원 목사 등 순교자 배출 됨","남산 중턱에 조선 신궁이 건축 됨"],a:0,e:"<b>한국 교회사</b> — 장로교 총회가 평양에서 신사참배를 가결한 치욕스러운 사건은 제29회가 아니라 1938년 제27회 총회이다."},
  {subj:"교회사",year:"2025",no:5,q:"일제강점기 당시 삼천리 반도 금수강산 하나님 주신 동산이라는 찬송가를 작사한 사람은 누구인가?",opts:["이광수","이승훈","윤치호","전영택","남궁억"],a:4,e:"<b>찬송가 작사</b> — 독립운동가이며 교육자인 남궁억 선생이 작사하여 민족의 얼과 노동의 신성함을 일깨운 찬송가이다."},
  {subj:"교회사",year:"2025",no:6,q:"3.1 운동이 갖는 의미 중 틀린 것은?",opts:["3.1운동은 한민족의 독립을 넘어 동양과 세계의 평화를 주장하였다.","3.1운동은 기독교의 평화적 비폭력 저항운동이었다.","3.1운동은 한국교회의 민족운동과 애국적 신앙의 모습을 보여주었다.","3.1운동은 일제 치하의 정교분리를 적극적으로 지지한 운동이었다.","3.1운동으로 인해 한국교회는 민족 동반자의 종교로 인정받게 되었다."],a:3,e:"<b>역사적 의미</b> — 기독교인들이 주도적으로 민족의 독립(정치적 현실)에 앞장선 사건이므로 정교분리 지지 운동이라는 설명은 틀렸다."},
  {subj:"교회사",year:"2025",no:7,q:"초기 선교사들의 선교지 분할 정책 예양협정(Mission Comity Arrangement)에 대해서 틀린 것은?",opts:["같은 지역에서 선교의 경쟁적 구도를 만들기 위한 협정이다.","미국 북장로교회는 평안도, 황해도, 경기도, 경상북도 지역을 맡았다.","미국 남장로교회는 전라도, 충청도 지역을 맡았다.","캐나다장로교회는 함경도 지역을 맡았다.","호주장로교회는 경상남도와 부산 지역을 맡았다."],a:0,e:"<b>예양협정</b> — 각국 선교부 간에 마찰과 경쟁 구도를 '피하고' 효율적인 복음 전도를 위해 지역을 분할하여 협력한 정책이다."},
  {subj:"교회사",year:"2025",no:8,q:"초기 한국교회의 복음 수용의 특징이 아닌 것은?",opts:["주체적이고 자발적이다.","성경을 중시하였다.","교파 절대주의였다.","연합정신이 강했다.","선교를 중요하게 여겼다."],a:2,e:"<b>한국 교회사</b> — 초기 한국교회는 교파 절대주의가 아니라, 장로교와 감리교가 연합하여 찬송가와 성경을 만드는 등 초교파적 연합정신이 매우 강했다."},
  {subj:"교회사",year:"2025",no:9,q:"1907년에 있었던 일이 아닌 것은?",opts:["대부흥 운동","최초의 신학교 7인 졸업","최초 목사 안수","백만인 구령운동 결의","예수교장로회 대한로회(독노회) 조직"],a:3,e:"<b>한국 교회사</b> — 1907년에는 평양대부흥과 독노회 조직 등이 있었고, 백만인 구령운동 결의는 1909년 감리교 연회에서 시작되어 1910년에 본격화되었다."},
  {subj:"교회사",year:"2025",no:10,q:"한국 복음 전래에 영향을 끼친 선교사들을 연대순으로 정리한 것은?",opts:["귀츨라프 → 토마스 → 레이놀즈 → 알렌 → 언더우드","토마스 → 레이놀즈 → 귀츨라프 → 알렌 → 언더우드","레이놀즈 → 귀츨라프 → 알렌 → 언더우드 → 토마스","귀츨라프 → 토마스 → 알렌 → 언더우드 → 레이놀즈","토마스 → 알렌 → 귀츨라프 → 언더우드 → 레이놀즈"],a:3,e:"<b>입국 연도</b> — 칼 귀츨라프(1832) → 로버트 토마스(1866) → 호러스 알렌(1884) → 호러스 언더우드(1885) → 윌리엄 레이놀즈(1892) 순서이다."},
  {subj:"교회사",year:"2025",no:11,q:"한국에 최초로 세워진 교회는 어디인가?",opts:["새문안교회","서문밖교회","내리교회","제물포교회","소래교회"],a:4,e:"<b>한국 교회사</b> — 1883년경 서상륜, 서경조 형제에 의해 황해도 장연군에 세워진 한국인 자생 최초의 조직교회는 소래교회이다. (*일부 오답지에서 서문밖교회를 지목하나 명백한 오류다.)"},
  {subj:"교회사",year:"2025",no:12,q:"선교 초창기에 세워진 학교와 설립자가 바르게 연결되지 않은 것은?",opts:["배재학당 - 아펜젤러","숭실학당 - 베어드","이화학당 - 메리 스크랜턴","경신학당 - 알렌","광성학당 - 제임스 홀"],a:3,e:"<b>기독교 학교</b> — 경신학당은 1886년 호러스 언더우드가 세운 '언더우드 학당'이 전신이며, 알렌은 의료기관인 제중원을 세웠다."},
  {subj:"교회사",year:"2025",no:13,q:"여성 안수에 관한 설명 중 틀린 것은?",opts:["첫 헌의는 제22회 총회(1933년)이다.","여성 안수가 법제화 된 해는 제79회 총회(1994년)이다.","여성 목사 안수는 1996년에 처음으로 이루어졌다.","교단 헌법 중 정치편(제2편)에 여성 목사 자격조항이 신설되었다.","여성 장로 안수는 여성 목사 안수보다 후에 이루어졌다."],a:4,e:"<b>총회 역사</b> — 1994년 여성 안수 법제화 통과 후, 1996년에 여성 목사와 여성 장로 안수가 동시에(함께) 처음 실행되었다."},
  {subj:"교회사",year:"2025",no:14,q:"초대교회 이단 중에 영지주의에 대해 틀린 것은?",opts:["영지주의란 지식을 의미하는 그리스어 그노시스에서 나온 말이다.","영적인 지식을 습득해야 참된 진리에 이를 수 있다.","2세기 말 종교와 철학 사상들의 절충을 통해 만들어진 사색 종교다.","플라톤 사상은 영지주의자들에게 결정적인 영향을 끼쳤다.","영지주의는 그리스도의 성육신을 부정했다."],a:2,e:"<b>초대교회 이단</b> — 영지주의는 2세기 말에 갑자기 절충되어 만들어진 것이 아니라 1세기 말~2세기 초부터 이미 형성되어 초대교회를 위협했다."},
  {subj:"교회사",year:"2025",no:15,q:"1세기 말 그리스도인들이 황제숭배를 거절하고 지하로 숨어 들어가 카타콤이 만들어지기 시작한 때의 로마 황제는 누구인가?",opts:["도미티아누스","네로","트라야누스","아우렐리우스","리키니우스"],a:0,e:"<b>초대 교회사</b> — 자신을 '주와 하나님'이라 부르게 하며 기독교를 극심하게 탄압하여 카타콤 신앙을 확산시킨 로마 황제는 도미티아누스이다."},
  {subj:"교회사",year:"2025",no:16,q:"초대교회의 이단 중에서 유대교적 이단은 무엇인가?",opts:["에비오니즘","마르키오니즘","영지주의","마니교","몬타니즘"],a:0,e:"<b>유대교적 이단</b> — 율법 준수(할례, 안식일)를 강요하며 예수를 위대한 선지자 중 한 명으로만 평가절하한 유대교적 이단은 에비오니즘이다."},
  {subj:"교회사",year:"2025",no:17,q:"삼위일체라는 신학적 용어를 최초로 사용한 서방 교부는 누구인가?",opts:["오리게네스","터툴리아누스","아우구스티누스","유스티누스","키프리아누스"],a:1,e:"<b>서방 교부</b> — '세 위격 한 본질'이라는 삼위일체(Trinitas) 신학 용어를 라틴어로 정립한 교부는 터툴리아누스이다."},
  {subj:"교회사",year:"2025",no:18,q:"기독교 국교화에 가장 크게 이바지한 로마의 황제인 데오도시우스 황제가 펼친 친기독교 정책이 아닌 것은?",opts:["380년 데살로니가 칙령을 내림","비그리스도인들의 공직 진출을 금함","이단 종파를 인정하지 않음","아리우스파도 기독교인으로 인정함","성부·성자·성령 삼위일체설을 믿는 사람만 보편적 기독교인으로 인정함"],a:3,e:"<b>데오도시우스 황제</b> — 삼위일체 신앙(니케아 정통)을 믿는 자만을 기독교인으로 인정하고 아리우스파를 이단으로 엄격히 배격했다."},
  {subj:"교회사",year:"2025",no:19,q:"예루살렘 탈환이라는 본래 목적을 벗어나 콘스탄티노플을 점령한 십자군 전쟁은?",opts:["2차 십자군 전쟁","3차 십자군 전쟁","4차 십자군 전쟁","5차 십자군 전쟁","6차 십자군 전쟁"],a:2,e:"<b>중세 교회사</b> — 베네치아 상인들의 이익에 눈이 멀어 같은 기독교 국가인 비잔틴 제국(콘스탄티노플)을 약탈한 치욕적인 4차 십자군 전쟁이다."},
  {subj:"교회사",year:"2025",no:20,q:"서방에서 수도원 제도를 확립한 수도사로 529년 몬테카시노 수도원을 세웠으며 수도원 규칙을 작성한 사람은 누구인가?",opts:["안토니우스","파코미우스","마르티누스","베네딕투스","아타나시우스"],a:3,e:"<b>수도원 운동</b> — '기도하고 일하라'는 정신으로 서방 수도원의 모범이 된 몬테카시노 수도원의 창설자 베네딕투스이다."},
  {subj:"교회사",year:"2025",no:21,q:"하인리히 4세의 카놋사의 굴욕과 관계가 있는 인물은 누구인가?",opts:["그레고리우스 7세","그레고리우스 1세","인노켄티우스 3세","보니파키우스 8세","클레멘스 5세"],a:0,e:"<b>카놋사의 굴욕</b> — 성직 임명권(서임권)을 두고 황제 하인리히 4세와 대립하여 그를 파문시키고 눈밭에 굴복하게 한 교황은 그레고리우스 7세이다."},
  {subj:"교회사",year:"2025",no:22,q:"우르바누스 2세가 십자군 운동을 호소하면서 내건 조건은?",opts:["교회 직위 수여","참가자에게 완전 면죄부 발부","공평한 재물 분배","토지 분배 제시","세속의 직위 수여"],a:1,e:"<b>십자군 전쟁</b> — 1095년 클레르몽 공의회에서 이교도로부터 예루살렘을 탈환하기 위해 참전을 독려하며 '완전 면죄부'를 내걸었다."},
  {subj:"교회사",year:"2025",no:23,q:"중세교회 제도의 기초를 세우고 성직매매를 근절한 인물은 누구인가?",opts:["레오 1세","베네딕투스 9세","그레고리우스 11세","그레고리우스 1세","하인리히 3세"],a:3,e:"<b>중세 교황권</b> — 성직매매 금지와 교회의 도덕적 회복을 강조하여 중세 교황권의 튼튼한 기초를 닦은 인물은 그레고리우스 1세이다."},
  {subj:"교회사",year:"2025",no:24,q:"종교개혁의 5대 솔라(Five Solas)가 아닌 것은?",opts:["오직 성경 (Sola Scriptura)","오직 성령 (Sola Spiritus)","오직 믿음 (Sola Fide)","오직 은혜 (Sola Gratia)","오직 그리스도 (Sola Christus)"],a:1,e:"<b>종교개혁</b> — 5대 솔라는 오직 성경, 오직 믿음, 오직 은혜, 오직 그리스도, 오직 하나님께 영광이다. '오직 성령'은 포함되지 않는다."},
  {subj:"교회사",year:"2025",no:25,q:"로마 카톨릭교회의 화상숭배, 화체설, 연옥설, 면죄부 판매 등을 반대하여 얀 후스와 함께 이단으로 정죄된 사람은 누구인가?",opts:["후퍼","밀러","위클리프","왈도","안셀무스"],a:2,e:"<b>종교개혁 이전</b> — '종교개혁의 새벽별' 존 위클리프는 사후에 얀 후스와 함께 이단으로 정죄되어 무덤이 파헤쳐지는 부관참시를 당했다."},
  {subj:"교회사",year:"2025",no:26,q:"스코틀랜드의 종교개혁자로서 칼뱅 신학의 영향을 받아 스코틀랜드 신앙고백서와 공동의 예배모범을 저술한 사람은 누구인가?",opts:["존 녹스","존 위클리프","얀 후스","사보나롤라","왈도"],a:0,e:"<b>스코틀랜드 장로교</b> — 제네바에서 칼뱅의 영향을 강하게 받아 스코틀랜드 장로교회의 기초를 놓은 위대한 개혁가 존 녹스이다."},
  {subj:"교회사",year:"2025",no:27,q:"로마에서 그리스도교를 공인 종교로 선언한 황제는?",opts:["콘스탄티누스","율리우스","트라야누스","유스티아누스","테트라키아"],a:0,e:"<b>초대 교회사</b> — 313년 밀라노 칙령으로 오랜 박해를 끝내고 기독교를 합법적 공인 종교로 선포한 로마 황제 콘스탄티누스이다."},
  {subj:"교회사",year:"2025",no:28,q:"종교개혁자 루터에 관한 설명 중 틀린 것은?",opts:["루터의 핵심 사상은 이신칭의다.","루터의 신학은 십자가의 신학이다.","에라스무스의 자유의지론을 반박하여 노예의지론을 저술했다.","교황 레오 10세의 칙령을 불태웠다.","루터는 급진적 개혁론자들과 손을 잡고 개혁에 박차를 가했다."],a:4,e:"<b>루터의 개혁</b> — 루터는 토마스 뮌처 등 재세례파나 농민 반란을 주도한 '급진적 개혁론자'들과 철저히 선을 긋고 질서를 옹호했다."},
  {subj:"교회사",year:"2025",no:29,q:"칼뱅에 관한 설명으로 적절하지 않은 것은?",opts:["성만찬에 관한 소논문을 발표했다.","가욤 파렐의 영향으로 제네바에 정착했다.","시편 찬송을 예배에 적극 활용했다.","프로테스탄트 교회론을 확립했다.","1539년에 기독교 강요를 썼으며 사회 개혁에 가장 많은 분량을 할애했다."],a:4,e:"<b>역사적 사실</b> — 칼뱅의 <기독교 강요>는 철저한 기독교 교리 체계서이며, 사회 개혁에 가장 많은 분량을 할애했다는 설명은 명백히 틀렸다."},
  {subj:"교회사",year:"2025",no:30,q:"종교개혁의 긍정적인 영향이라고 할 수 없는 것은?",opts:["성경의 근본 사상으로 돌아감","로마 교회의 쇠락으로 인해 개신교회가 곳곳에 세워짐","율법적인 종교에서 복음적인 종교로 변화","전체주의에서 개인 신앙의 자유를 얻게 함","우상화와 의식화된 예배를 성경 중심의 예배로 환원"],a:1,e:"<b>역사적 사실</b> — 개신교회의 확산 자체는 사실이나, '로마 교회의 쇠락' 자체를 종교개혁이 낳은 가치적이고 긍정적인 '영향'으로 평가하기는 어렵다."},
  {subj:"교회사",year:"2025",no:31,q:"영국의 청교도 운동에 관한 설명 중 틀린 것은?",opts:["청교도들은 비성서적인 감독제 철폐를 주장했다.","제임스 1세는 주일에 오락을 허용함으로써 청교도의 엄격주의에 항거했다.","찰스 2세는 청교도 성직자들을 우대했다.","새로운 잉글랜드를 건설하고자 메이플라워호를 타고 대서양을 건넌 사람들이 생겨났다.","청교도는 주일에는 예배와 구제만 해야 한다고 주장했다."],a:2,e:"<b>청교도 운동</b> — 왕정복고 시대의 찰스 2세는 통일령을 내려 영국 국교회(성공회)를 강요하고 청교도 목사들을 박해하고 추방했다."},
  {subj:"교회사",year:"2025",no:32,q:"정통주의와 합리주의에 대한 반동으로 일어난 경건주의 운동의 창설자로서 교회 안의 작은 교회라는 소그룹 운동을 시도했으며 만인제사장직을 실현한 사람은 누구인가?",opts:["진젠도르프","프랑케","필립 J. 슈페너","조나단 에드워즈","조지 폭스"],a:2,e:"<b>경건주의</b> — 17세기 독일 경건주의 운동의 창시자로, 소그룹 경건 모임(교회 안의 작은 교회)을 창안한 필립 J. 슈페너이다."},
  {subj:"교회사",year:"2025",no:33,q:"미국 교회의 제2차 대각성 부흥 운동에 헌신한 사람은 누구인가?",opts:["조나단 에드워즈","찰스 피니","윌리엄 캐리","존 녹스","조지 휫필드"],a:1,e:"<b>대각성 운동</b> — 미국 제2차 대각성 부흥운동의 핵심 주역으로 대중 집회(부흥회)와 즉석 회심 방식을 강력하게 도입한 찰스 피니이다."},

  // ===================== 2025 헌법 =====================
  {subj:"헌법",year:"2025",no:1,q:"요리문답에 관한 설명으로 틀린 것은?",opts:["요리문답은 대요리문답과 소요리문답이 있다.","소요리문답은 총 107문으로 구성되어 있다.","소요리문답은 제일 먼저 사람의 제일 되는 목적을 묻고 있다.","소요리문답에서는 십계명을 다루지 않는다.","소요리문답 100문부터는 주님의 기도에 관해 다루고 있다."],a:3,e:"<b>소요리문답 제41문~81문</b> — 소요리문답은 십계명의 내용을 매우 비중 있고 상세하게 다루고 있다."},
  {subj:"헌법",year:"2025",no:2,q:"웨스트민스터 신앙고백 제21장의 내용과 다른 것은?",opts:["자연은 하나님의 계시를 보여준다.","예배는 성부 성자 성령이신 하나님께 드려야 한다.","감사의 기도를 드리는 것은 예배의 특별한 한 부분이다.","기도는 모든 합당한 것을 들어주시게 하기 위한 것이다.","예배는 장소나 대상에 따라서 얼마든지 더 훌륭해질 수 있다."],a:4,e:"<b>웨스트민스터 신앙고백 제21장 6항</b> — 기도는 특정 장소나 고정된 대상에 매이는 것이 아니며, 장소에 의해 예배가 더 훌륭해지는 것은 아니다."},
  {subj:"헌법",year:"2025",no:3,q:"대한예수교장로회 정치 원리에 해당하지 않는 것은?",opts:["결사의 자유","양심의 자유","진리와 행위","교회의 자유","치리권"],a:0,e:"<b>헌법 정치 제1장 원리</b> — 6가지 원리는 양심의 자유, 교회의 자유, 진리와 행위, 교회의 직원, 치리권, 권징이다. 결사의 자유는 없다."},
  {subj:"헌법",year:"2025",no:4,q:"교단 헌법 제2편 정치 제27조에 의거할 경우 목사의 칭호가 아닌 것은?",opts:["담임목사","위임목사","협동목사","전도목사","기관목사"],a:2,e:"<b>헌법 정치 제27조(목사의 칭호)</b> — 위임, 담임, 부, 전도, 기관, 선교, 교육, 원로, 공로, 무임, 은퇴, 유학, 군종목사이며 협동목사는 없다."},
  {subj:"헌법",year:"2025",no:5,q:"장로에 관한 내용 중 맞는 것은?",opts:["무흠 세례교인으로 7년을 경과하고 45세 이상 된 자라야 한다.","피택자는 4개월 이상 당회 지도를 받고 노회 고시에 합격하여야 한다.","장로가 특별한 사정에 의하여 휴무코자 하면 제직회의 결의로 할 수 있다.","은퇴 장로는 제직회에는 언권회원이 되나 당회에는 참여할 수 없다.","자의 사임을 한 장로가 복직을 원할 경우 당회원 과반수의 결의로 복직할 수 있다."],a:1,e:"<b>헌법 정치 제42조 1항</b> — 장로 피택자는 반드시 4개월 이상 당회의 지도 아래 교육을 받은 후 노회 고시에 합격하여야 한다."},
  {subj:"헌법",year:"2025",no:6,q:"지교회의 당회장이 결원되었을 때 노회에서 파송하는 목사의 칭호는?",opts:["임시당회장","대리당회장","파송당회장","수습당회장","유고당회장"],a:0,e:"<b>헌법 정치 제67조 2항</b> — 당회장이 결원되었을 때 당회원 과반수 결의로 노회에 요청하면 노회는 '임시당회장'을 파송한다."},
  {subj:"헌법",year:"2025",no:7,q:"노회 회원권(결의권, 선거권, 피선거권)이 없는 목사는?",opts:["부목사","선교동역자","기관목사","교육목사","군종목사"],a:3,e:"<b>헌법 정치 제74조 2항</b> — 교육목사, 유학목사, 무임목사는 결의권이 없는 노회의 언권회원이 된다."},
  {subj:"헌법",year:"2025",no:8,q:"하나님의 영광과 권위를 위하여 ()를 미연에 방지하고 교회의 ()과(와) ()을(를) 유지하고 범죄자의 ()을(를) 촉구하여 올바른 신앙생활을 하게 함을 그 목적으로 한다. 괄호에 맞는 것은?",opts:["범죄 - 건덕 - 평화 - 회개","과오 - 화평 - 질서 - 반성","사고 - 권위 - 안녕 - 자백","과오 - 영성 - 권위 - 자백","범죄 - 신성 - 질서 - 회개"],a:4,e:"<b>권징 제2조</b> — 권징의 목적은 범죄를 방지하고 교회의 신성과 질서를 유지하며 회개를 촉구하는 것이다."},
  {subj:"헌법",year:"2025",no:9,q:"책벌의 원칙과 관련하여 틀린 것은?",opts:["은퇴자는 책벌의 대상이 되지 않는다.","재판을 받지 않고서는 권징할 수 없다.","재판석상에서 범한 폭언, 협박, 폭행, 상해, 재물 손괴 행위는 별도의 고소 및 기소 없이 즉시 판결로 책벌할 수 있다.","폭언, 협박, 폭행, 상해, 재물 손괴 행위는 피고인인 경우 본 죄와 병합하여 가중처벌할 수 있다.","죄과를 범한 자의 책벌은 재판 절차를 거쳐서 행하여야 한다."],a:0,e:"<b>권징 제6조 1항</b> — 죄과를 범한 자(은퇴자 포함)의 책벌은 재판절차를 거쳐서 행하여야 한다고 명시되어 은퇴자도 권징 대상이다."},
  {subj:"헌법",year:"2025",no:10,q:"해벌에 관한 내용 중 틀린 것은?",opts:["시벌 중인 자가 회개의 정이 뚜렷하면 치리회의 결의로 해벌할 수 있다.","시벌 기간이 만료된 자는 해벌 절차 없이 자동 해벌된 것으로 본다.","출교 받은 교인이 해벌되면 수찬 정지도 자연 해벌된다.","시벌 중에 있는 자에 대하여도 청빙할 수는 있으나 청빙 후에도 집행을 완료해야 해벌된다.","면직된 자가 해벌되어 복직되면 청빙이나 신임을 얻어 시무할 수 있다."],a:2,e:"<b>권징 제135조</b> — 출교 받은 교인은 해벌이 되어도 수찬정지로 2년이 경과되고 다시 치리회의 결의가 있어야 수찬정지가 해벌된다."},
  {subj:"헌법",year:"2025",no:11,q:"미조직교회에서는 당회권을 누가 행사하는가?",opts:["노회장","당회장","임시당회장","대리당회장","시찰장"],a:1,e:"<b>헌법 정치 제67조 4항</b> — 미조직교회의 당회권은 당회장이 단독으로 행사한다."},
  {subj:"헌법",year:"2025",no:12,q:"헌법시행규정 제20조 교육목사에 관한 내용 중 틀린 것은?",opts:["미조직교회 담임목사는 교육목사를 안수 청원할 수 없다.","교육목사로 청빙했더라도 교회 형편에 따라 전임 사역을 맡길 수 있다.","교육목사는 위임(담임)을 바로 승계할 수 없다.","조직교회에서는 당회의 결의로, 미조직교회에서는 제직회의 결의로 교육목사를 청빙 및 연임 청원할 수 있다.","교육목사는 노회의 언권회원이나 당회원권이나 제직회원권은 없다."],a:1,e:"<b>헌법시행규정 제20조의2 3항</b> — 교육목사를 청빙하여 전임사역을 맡길 수 없다고 명시되어 있다."},
  {subj:"헌법",year:"2025",no:13,q:"목사에 관한 설명 중 틀린 것은?",opts:["공로목사는 한 노회에서 20년 이상 시무해야 한다.","교육목사는 위임(담임)목사를 교육 분야에서 보좌하는 목사다.","무임목사는 노회의 결의에 의한 시무처가 없는 목사다.","담임목사는 노회의 허락을 받아 임시로 시무하는 목사다.","부목사는 담임목사를 보좌하는 목사다."],a:4,e:"<b>헌법 정치 제27조 3항</b> — 부목사는 '위임목사'를 보좌하는 목사라고 엄격히 규정되어 있으므로 담임목사 보좌라는 설명은 틀렸다."},
  {subj:"헌법",year:"2025",no:14,q:"총회의 직무가 아닌 것은?",opts:["소속 치리회 및 지교회와 소속 기관 및 산하 단체를 총괄한다.","각 노회록을 검사한다.","임원을 선출한다.","노회 재산에 대한 분규는 노회에 맡겨 처리해야 한다.","대한예수교장로회 헌법을 해석할 전권이 있다."],a:3,e:"<b>헌법 정치 제87조 9항</b> — 하급 치리회인 노회 재산에 대한 분규가 있을 때 총회가 직접 이를 처리할 직무를 갖는다."},
  {subj:"헌법",year:"2025",no:15,q:"노회에 관한 설명 중 틀린 것은?",opts:["노회는 일정한 구역 안에 있는 시무목사 30인 이상과 조직교회 30개 처 이상과 세례교인 3000명 이상이 있어야 조직할 수 있다.","유학목사도 노회에서 정식 회원권을 갖는다.","노회는 회원 각 과반수의 출석으로 개회한다.","노회는 지교회 장로 선택, 임직을 허락한다.","총대 장로는 서기가 총대 명부를 접수하면 회원권이 성립된다."],a:1,e:"<b>헌법 정치 제74조 2항</b> — 유학목사는 결의권이 없는 노회의 언권회원일 뿐, 정식 회원권은 갖지 않는다."},
  {subj:"헌법",year:"2025",no:16,q:"다음 중 서로 잘못 연결된 것은?",opts:["안수집사 자격 - 35세 이상 된 남자","권사의 자격 - 35세 이상 된 여자","집사의 자격 - 25세 이상 된 세례교인","집사의 자격 - 무흠 세례교인으로서 3년이 경과한 자","안수집사의 자격 - 무흠 세례교인으로서 5년이 경과한 자"],a:3,e:"<b>헌법 정치 제59조</b> — 집사의 자격은 무흠 세례교인으로서 '1년'을 경과하고 교회에 등록한 자이므로 3년 경과 규정은 틀렸다."},
  {subj:"헌법",year:"2025",no:17,q:"재판 판결 선고 기간 중 맞는 것은?",opts:["당회 재판국은 고소가 제기된 날부터 60일 이내에 하여야 한다.","노회 재판국은 고소가 제기된 날부터 90일 이내에 하여야 한다.","당회 재판국은 기소가 제기된 날부터 90일 이내에 하여야 한다.","노회 재판국은 기소가 제기된 날부터 60일 이내에 하여야 한다.","다만 항소심이나 상고심일 경우 기록을 송부 받은 날로부터 4개월 이내에 하나 필요할 경우 30일의 기간을 연장할 수도 있다."],a:4,e:"<b>권징 제32조</b> — 재판 선고는 고소가 아니라 '기소'가 제기된 날부터 당회 60일, 노회 90일 이내이며 항소/상고심 규정은 5번 지문과 같다."},

  {subj:"헌법",year:"2025",no:26,q:"담임목사의 청빙 및 연임청원에 관련하여 틀린 것은?",opts:["당회의 결의와 공동의회 출석회원 3분의 2 이상의 찬성을 얻어야 한다.","매 3년마다 연임청원 시 만장일치로 찬성하면 투표를 생략할 수 있다.","1인이라도 투표를 원하면 투표하여야 한다.","당회의 결의와 제직회 출석회원 과반수의 찬성을 얻어야 한다.","연임청원 시 당회장을 제외한 당회원이 장로만 2인일 경우 투표 결과 찬성과 반대가 각각 1인이면 공동의회 출석 과반수의 결의로 연임 여부를 결정한다."],a:0,e:"<b>헌법 정치 제28조 3항</b> — 담임목사의 청빙은 당회 결의와 제직회 출석회원 과반수의 찬성이다. 1번 보기는 위임목사의 청빙 조건이다."},

  {subj:"헌법",year:"2025",no:30,q:"당회장 결원 시 임시당회장을 노회에 요청하지 않을 경우 얼마가 경과하면 노회에서 임시당회장을 직접 파송할 수 있는가?",opts:["즉시","3주","2개월","3개월","6개월"],a:3,e:"<b>임시당회장 파송 (정치 제67조 관련)</b> — 당회장 결원 후 3개월간 지교회가 파송을 요청하지 않으면 노회가 직권으로 파송할 수 있다."},

  // 필터링 적용
  list = allQuestions.filter(q => {
    if (!state.freqOnly && q.year !== state.year && q.year !== '빈출') return false;
    if (state.freqOnly && q.year !== '빈출') return false;
    if (q.subj !== state.subj) return false;
    if (state.wrongOnly) {
      const rec = progress[getQId(q)];
      if (!rec || rec === 'O') return false;
    }
    // ✨ 잦은 오답 필터 (3회 이상 틀린 문제만)
    if (state.wrongnoteOnly) {
      if (!wrongNotes[getQId(q)] || wrongNotes[getQId(q)].count < 3) return false;
    }
    return true;
  });

  if (state.shuffled) list.sort(() => Math.random() - 0.5);

  if (list.length === 0) {
    cArea.innerHTML = `<div class="card" style="text-align:center; padding:40px;">조건에 맞는 문제가 없습니다.</div>`;
    return;
  }
  
  if (state.idx >= list.length) state.idx = 0;
  if (state.idx < 0) state.idx = list.length - 1;

  if (state.mode === 'study') {
    renderStudy(cArea);
  } else if (state.mode === 'flash') {
    renderFlash(cArea);
  }
}

function renderStudy(cArea) {
  const q = list[state.idx];
  const qid = getQId(q);
  const rec = progress[qid];
  
  let html = `
    <div class="card">
      <div class="q-meta">${state.idx + 1} / ${list.length} &nbsp;|&nbsp; ${q.year}년 ${q.subj} ${q.no}번</div>
      <div class="q-text">Q. ${q.q}</div>
      <div class="options">
  `;
  
  q.opts.forEach((opt, i) => {
    html += `<div class="opt" id="opt-${i}">${i + 1}. ${opt}</div>`;
  });
  
  html += `
      </div>
      <div class="ans-box" id="ans-box">
        <strong>정답: ${q.a + 1}번</strong><br><br>
        ${q.e}
      </div>
    </div>
    <div class="nav-btns">
      <button class="nav-btn" id="prev-btn">◀ 이전</button>
      <button class="nav-btn" id="next-btn">다음 ▶</button>
    </div>
  `;
  
  cArea.innerHTML = html;
  
  // 마킹 정보 표시
  if (rec === 'O') document.querySelector('.q-meta').innerHTML += ` <span style="color:var(--green)">[맞힘]</span>`;
  if (rec === 'X') document.querySelector('.q-meta').innerHTML += ` <span style="color:var(--red)">[틀림]</span>`;
  
  q.opts.forEach((opt, i) => {
    document.getElementById(`opt-${i}`).onclick = () => {
      if (showAns) return;
      showAns = true;
      
      if (i === q.a) {
        progress[qid] = 'O';
      } else {
        progress[qid] = 'X';
        // ✨ 오답 노트 카운트 증가 로직
        if (!wrongNotes[qid]) wrongNotes[qid] = { count: 0, last: '' };
        wrongNotes[qid].count++;
        wrongNotes[qid].last = new Date().toISOString().split('T')[0];
        localStorage.setItem("wrongNotes", JSON.stringify(wrongNotes));
      }
      save();
      
      document.getElementById(`opt-${q.a}`).classList.add("correct");
      if (i !== q.a) document.getElementById(`opt-${i}`).classList.add("wrong");
      document.getElementById("ans-box").style.display = "block";
    };
  });
  
  document.getElementById("prev-btn").onclick = () => { state.idx--; render(); };
  document.getElementById("next-btn").onclick = () => { state.idx++; render(); };
}

function renderFlash(cArea) {
  const q = list[state.idx];
  cArea.innerHTML = `
    <div class="q-meta" style="text-align:center; margin-bottom:10px;">${state.idx + 1} / ${list.length}</div>
    <div class="flash-card" id="f-card">
      <div class="flash-inner">
        <div class="flash-front">
          <div class="q-text" style="text-align:center; margin:0;">${q.q}</div>
          <div style="margin-top:20px; color:var(--gold); font-size:0.9rem;">(터치하여 정답 확인)</div>
        </div>
        <div class="flash-back">
          <strong style="color:var(--burgundy); font-size:1.3rem; margin-bottom:15px;">${q.opts[q.a]}</strong>
          <div style="font-size:0.9rem; color:var(--muted);">${q.e}</div>
        </div>
      </div>
    </div>
    <div class="nav-btns">
      <button class="nav-btn" id="prev-btn">◀ 이전</button>
      <button class="nav-btn" id="next-btn">다음 ▶</button>
    </div>
  `;
  document.getElementById("f-card").onclick = function() { this.classList.toggle("flipped"); };
  document.getElementById("prev-btn").onclick = () => { state.idx--; render(); };
  document.getElementById("next-btn").onclick = () => { state.idx++; render(); };
}

// ==========================================
// 4. ✨ 실전 모의고사 (시험 모드) 로직
// ==========================================
function renderExam() {
  const cArea = document.getElementById("content-area");
  cArea.innerHTML = "";

  // 시험 대기 화면
if (!examData.active && !examData.finished) {
    let yearText = state.year === 'all' ? '전체 연도' : state.year + '년';
    cArea.innerHTML = `
      <div class="card" style="text-align:center; padding:40px 20px;">
        <h2 style="color:var(--burgundy); margin-bottom:15px;">⏳ 실전 모의고사</h2>
        <p>현재 설정된 필터 [<b>${yearText} / ${state.subj}</b>] 안에서<br>랜덤으로 <b>33문제</b>가 출제됩니다.</p>
        <p style="color:var(--muted); font-size:0.9rem; margin-top:10px;">실제 목사고시와 동일하게 20분의 시간이 주어집니다.</p>
        <button onclick="startExam()" style="margin-top:30px; padding:12px 24px; background:var(--burgundy); color:#fff; border:none; border-radius:8px; font-size:1.1rem; cursor:pointer;">시험 시작하기</button>
      </div>`;
    return;
  }

  // 시험 결과 화면
  if (examData.finished) {
    let score = 0;
    examData.list.forEach((q, idx) => { if (examData.answers[idx] === q.a) score++; });
    const finalScore = Math.round((score / examData.list.length) * 100);

    let html = `
      <div class="exam-result-box">
        <h2>모의고사 결과</h2>
        <h1 style="color:var(--burgundy); font-size:3rem; margin:10px 0;">${finalScore}점</h1>
        <p>${examData.list.length}문제 중 ${score}문제 정답</p>
        <button onclick="resetExam()" style="margin-top:15px; padding:8px 16px; border:1px solid var(--burgundy); background:transparent; color:var(--burgundy); border-radius:4px; cursor:pointer;">모의고사 종료</button>
      </div>
      <h3 style="margin-bottom:10px;">오답 노트 (틀린 문제 해설)</h3>
    `;

    examData.list.forEach((q, idx) => {
      if (examData.answers[idx] !== q.a) {
        html += `
          <div class="card" style="margin-top:15px; border-left:4px solid var(--red); padding:15px;">
            <div class="q-meta">${q.year}년 ${q.subj} ${q.no}번 <span class="wrong-badge">내가 고른 답: ${examData.answers[idx] !== undefined ? examData.answers[idx]+1+'번' : '미체크'}</span></div>
            <div class="q-text" style="font-size:1rem; margin-bottom:10px;">Q. ${q.q}</div>
            <div class="ans-box" style="margin-top:10px; display:block; padding:10px;">
              <strong>정답: ${q.a + 1}번</strong><br>
              ${q.e}
            </div>
          </div>`;
      }
    });
    cArea.innerHTML = html;
    return;
  }

  // 시험 진행 화면
  const min = Math.floor(examData.timeLeft / 60).toString().padStart(2, '0');
  const sec = (examData.timeLeft % 60).toString().padStart(2, '0');
  
  let html = `<div class="exam-timer">남은 시간 - ${min}:${sec}</div>`;
  
  examData.list.forEach((q, qIndex) => {
    html += `
      <div class="card" style="margin-bottom:20px; padding:20px;">
        <div class="q-meta">${qIndex + 1}번. (${q.year} ${q.subj})</div>
        <div class="q-text" style="font-size:1.1rem;">${q.q}</div>
        <div class="options">
          ${q.opts.map((opt, i) => `
            <div class="opt" 
                 onclick="markExamAnswer(${qIndex}, ${i})" 
                 style="cursor:pointer; padding:10px; border:1px solid var(--line); margin-bottom:5px; border-radius:4px; ${examData.answers[qIndex] === i ? 'background:var(--burgundy-soft); color:white; border-color:var(--burgundy);' : ''}">
              ${i + 1}. ${opt}
            </div>
          `).join('')}
        </div>
      </div>`;
  });

  html += `<button class="exam-submit-btn" onclick="submitExam()">답안 제출 및 채점하기</button>`;
  cArea.innerHTML = html;
}

function startExam() {
  // 현재 필터링 상태(연도, 과목)를 반영하여 풀을 구성
  let currentList = allQuestions.filter(q => {
    if (!state.freqOnly && q.year !== state.year && q.year !== '빈출') return false;
    if (state.freqOnly && q.year !== '빈출') return false;
    if (q.subj !== state.subj) return false;
    return true;
  });

  let pool = [...currentList].sort(() => Math.random() - 0.5).slice(0, 33);
  if (pool.length === 0) return alert("현재 필터 조건에 맞는 문제가 없습니다.");
  
  examData = { active: true, finished: false, list: pool, answers: new Array(pool.length).fill(undefined), timeLeft: 1200, timerId: null };
  
  examData.timerId = setInterval(() => {
    examData.timeLeft--;
    if (examData.timeLeft <= 0) {
      clearInterval(examData.timerId);
      alert("시간이 종료되었습니다. 자동 제출됩니다.");
      submitExam();
    } else {
      renderExam();
    }
  }, 1000);
  
  renderExam();
}

function markExamAnswer(qIndex, optIndex) {
  examData.answers[qIndex] = optIndex;
  renderExam(); 
}

function submitExam() {
  if(!confirm("제출하고 채점하시겠습니까?")) return;
  clearInterval(examData.timerId);
  
  // 제출 시 틀린 문제들은 자동으로 오답노트에 추가
  examData.list.forEach((q, idx) => {
    if (examData.answers[idx] !== q.a) {
      const qid = getQId(q);
      if (!wrongNotes[qid]) wrongNotes[qid] = { count: 0, last: '' };
      wrongNotes[qid].count++;
      wrongNotes[qid].last = new Date().toISOString().split('T')[0];
    }
  });
  localStorage.setItem("wrongNotes", JSON.stringify(wrongNotes));
  
  examData.active = false;
  examData.finished = true;
  renderExam();
}

function resetExam() {
  examData = { active: false, finished: false, list: [], answers: [], timeLeft: 1200, timerId: null };
  renderExam();
}

// ==========================================
// 5. 이벤트 리스너 연결 및 초기화
// ==========================================
document.querySelectorAll(".year-f").forEach(c => c.onclick = () => {
  document.querySelectorAll(".year-f").forEach(x => x.classList.remove("on"));
  c.classList.add("on"); state.year = c.dataset.year; state.idx = 0; render();
});

document.querySelectorAll(".subj-f").forEach(c => c.onclick = () => {
  document.querySelectorAll(".subj-f").forEach(x => x.classList.remove("on"));
  c.classList.add("on"); state.subj = c.dataset.subj; state.idx = 0; render();
});

document.querySelectorAll(".chip[data-filter]").forEach(c => c.onclick = () => {
  const f = c.dataset.filter;
  if(f === "freq"){ state.freqOnly = !state.freqOnly; c.classList.toggle("on"); }
  if(f === "wrong"){ state.wrongOnly = !state.wrongOnly; c.classList.toggle("on"); }
  if(f === "shuffle"){ state.shuffled = !state.shuffled; c.classList.toggle("on"); }
  if(f === "wrongnote"){ state.wrongnoteOnly = !state.wrongnoteOnly; c.classList.toggle("on"); }
  state.idx = 0; render();
});

document.querySelectorAll(".mode-tab").forEach(t => t.onclick = () => {
  document.querySelectorAll(".mode-tab").forEach(x => x.classList.remove("on"));
  t.classList.add("on"); state.mode = t.dataset.mode; state.idx = 0; 
  if(state.mode !== 'exam' && examData.active) {
    if(confirm("시험을 중단하시겠습니까?")) { clearInterval(examData.timerId); examData.active = false; }
    else { document.querySelector('[data-mode="exam"]').click(); return; }
  }
  render();
});

document.getElementById("reset").onclick = () => {
  if(confirm("진행 상황(아는 것/틀린 것/오답노트 기록)을 모두 지울까요?")){ 
    progress = {}; localStorage.removeItem("moksagosi_prog");
    wrongNotes = {}; localStorage.removeItem("wrongNotes");
    state.idx = 0; render(); 
  }
};

document.addEventListener("keydown", e => {
  if (state.mode === 'exam') return; // 시험모드에선 키보드 이동 금지
  if (e.key === "ArrowRight") { const n = document.getElementById("next-btn"); if (n) n.click(); }
  if (e.key === "ArrowLeft") { const p = document.getElementById("prev-btn"); if (p) p.click(); }
  if (state.mode === 'study' && e.key >= "1" && e.key <= "5") {
    const idx = parseInt(e.key) - 1;
    const btn = document.getElementById(`opt-${idx}`);
    if (btn) btn.click();
  }
});

// 첫 화면 렌더링
render();
</script>
